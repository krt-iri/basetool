<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keycloak-Login — Ziel-Design (KRT)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../krt-components.css">
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    background:
      radial-gradient(circle at 50% -10%, rgba(231,126,35,0.10), transparent 55%),
      url('../assets/honeycomb-bg.svg'),
      var(--color-bg-black);
    background-repeat: no-repeat, repeat, no-repeat;
    background-size: auto, 46px 26.56px, auto; }

  /* Locale selector (top-right) */
  .locale { position: fixed; top: 18px; right: 18px; display: flex; align-items: center; gap: 8px;
    background: var(--color-bg-dark-gray); border: 1px solid var(--color-gray-3); border-bottom: 2px solid var(--color-primary);
    padding: 8px 14px; font-size: 0.85rem; color: var(--color-gray-1); cursor: pointer; }
  .locale .ic { color: var(--color-primary); }

  .kc-card { width: 100%; max-width: 450px; background: var(--color-bg-dark-gray); border: 1px solid var(--color-gray-3);
    border-top: 3px solid var(--color-primary); padding: 40px; position: relative; box-shadow: 0 0 20px rgba(231,126,35,0.10); }
  /* HUD corners (top-left + bottom-right) */
  .kc-card::before, .kc-card::after { content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid var(--color-primary); }
  .kc-card::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
  .kc-card::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

  .kc-logo { display: block; width: 84px; height: auto; margin: 0 auto 18px; }
  .kc-title { font-family: var(--font-headline); color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.05em;
    text-align: center; font-size: 1.4rem; margin: 0 0 4px; }
  .kc-sub { text-align: center; color: var(--color-gray-2); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 28px; }

  .kc-field { margin-bottom: 20px; }
  .kc-label { display: block; color: var(--color-gray-1); text-transform: uppercase; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 6px; }
  .kc-input { width: 100%; padding: 12px 15px; background: var(--color-bg-black); color: var(--color-gray-1);
    border: 1px solid var(--color-gray-2); border-bottom: 2px solid var(--color-primary); font-family: var(--font-body); font-size: 1rem;
    box-sizing: border-box; border-radius: 0; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .kc-input::placeholder { color: var(--color-gray-2); font-style: italic; }
  .kc-input.focused { border-color: var(--color-primary); box-shadow: 0 0 8px rgba(231,126,35,0.25); }

  /* error field (semantic danger, NOT orange) */
  .kc-field.err .kc-input { border-color: var(--color-danger); box-shadow: 0 0 8px rgba(163,0,10,0.3); }
  .kc-err { display: flex; align-items: center; gap: 6px; color: var(--color-danger); font-size: 0.8rem; margin-top: 6px; }

  .kc-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 24px; }
  .kc-check { display: flex; align-items: center; gap: 8px; color: var(--color-gray-1); font-size: 0.85rem; cursor: pointer; }
  .kc-check input { width: 18px; height: 18px; accent-color: var(--color-primary); }
  .kc-forgot { color: var(--color-primary); font-size: 0.85rem; }

  .kc-btn { width: 100%; padding: 15px; background: var(--color-primary); color: var(--color-bg-black); font-family: var(--font-headline);
    text-transform: uppercase; border: none; cursor: pointer; letter-spacing: 1px; border-radius: 0; min-height: 44px; box-shadow: var(--glow-primary);
    transition: background-color 0.2s; }
  .kc-btn:hover { background: var(--color-accent-light); }
  .kc-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--color-gray-2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .kc-divider::before, .kc-divider::after { content: ''; flex: 1; height: 1px; background: var(--color-gray-3); }
  .kc-btn-secondary { width: 100%; padding: 12px 15px; background: transparent; color: var(--color-primary); font-family: var(--font-headline);
    text-transform: uppercase; border: 1px solid var(--color-primary); cursor: pointer; letter-spacing: 1px; border-radius: 0; min-height: 44px; text-align: center;
    transition: background-color 0.2s, color 0.2s; box-sizing: border-box; }
  .kc-btn-secondary:hover { background: var(--color-primary); color: var(--color-bg-black); }
  .kc-foot { text-align: center; margin-top: 22px; color: var(--color-gray-2); font-size: 0.85rem; }
  .kc-foot a { color: var(--color-primary); }
</style>
</head>
<body>
  <div class="locale"><span class="ic">⌄</span> Deutsch</div>

  <div class="kc-card">
    <img class="kc-logo" src="../assets/krt.webp" alt="DAS KARTELL">
    <h1 class="kc-title">Profit Basetool</h1>
    <p class="kc-sub">Squadron Access · Anmeldung</p>

    <div class="kc-field">
      <label class="kc-label">Benutzername oder E-Mail</label>
      <input class="kc-input focused" type="text" value="cmdr.valk">
    </div>
    <div class="kc-field err">
      <label class="kc-label">Passwort</label>
      <input class="kc-input" type="password" value="••••••">
      <div class="kc-err"><span style="font-weight:bold;">⚠</span> Ungültige Anmeldedaten. Bitte erneut versuchen.</div>
    </div>

    <div class="kc-row">
      <label class="kc-check"><input type="checkbox" checked> Angemeldet bleiben</label>
      <a class="kc-forgot" href="#" onclick="return false">Passwort vergessen?</a>
    </div>

    <button class="kc-btn">Anmelden</button>

    <p class="kc-foot">Noch kein Konto? <a href="#" onclick="return false">Registrieren</a></p>
    <p style="text-align:center; margin:18px 0 0; color:var(--color-gray-2); font-size:0.68rem; font-family:var(--font-mono);">Unofficial Star Citizen fan tool · Keycloak SSO</p>
  </div>
</body>
</html>
