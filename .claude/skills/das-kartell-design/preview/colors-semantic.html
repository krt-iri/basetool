<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
</head>
<body>
  <p class="pv-label">Semantic status — aliased from departments</p>
  <div class="pv-row">
    <div class="swatch-wrap" style="width:160px;"><div class="swatch" style="background:#A3000A;"></div><div class="swatch-meta"><span class="swatch-name">Danger</span><span class="pv-mono">#A3000A</span></div></div>
    <div class="swatch-wrap" style="width:160px;"><div class="swatch" style="background:#239E33;"></div><div class="swatch-meta"><span class="swatch-name">Success</span><span class="pv-mono">#239E33</span></div></div>
    <div class="swatch-wrap" style="width:160px;"><div class="swatch" style="background:#FFD23F;"></div><div class="swatch-meta"><span class="swatch-name">Warning</span><span class="pv-mono">#FFD23F</span></div></div>
    <div class="swatch-wrap" style="width:160px;"><div class="swatch" style="background:#355DDC;"></div><div class="swatch-meta"><span class="swatch-name">Info</span><span class="pv-mono">#355DDC</span></div></div>
  </div>
  <p class="pv-mono" style="margin-top:14px;">danger=combat · success=profit · warning=search&amp;rescue · info=sub/radar. Used as 20% tint fills with a solid left-border in alerts.</p>
</body>
</html>
