<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
</head>
<body>
  <p class="pv-label">Badges, dept tags &amp; status pills</p>
  <div class="pv-row" style="gap:10px; align-items:center; margin-bottom:14px;">
    <span class="squadron-badge">IRI</span>
    <span class="squadron-badge squadron-badge-muted">Created by</span>
    <span class="squadron-badge squadron-badge-foreign">Foreign</span>
    <span class="squadron-badge squadron-badge-sk">SK · Vipers</span>
  </div>
  <div class="pv-row" style="gap:10px; align-items:center; margin-bottom:14px;">
    <span class="dept-tag" style="color:#A3000A;">Sub-Radar</span>
    <span class="dept-tag" style="color:#239E33;">Profit</span>
    <span class="dept-tag" style="color:#37BBC0;">Raumüberleg.</span>
    <span class="dept-tag" style="color:#FFD23F;">S&amp;R</span>
  </div>
  <div class="pv-row" style="gap:18px; align-items:center;">
    <span class="status-pill status-planned">PLANNED</span>
    <span class="status-pill status-active">ACTIVE</span>
    <span class="status-pill status-completed">COMPLETED</span>
    <span class="status-pill status-cancelled">CANCELLED</span>
  </div>
</body>
</html>
