<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
</head>
<body>
  <p class="pv-label">Form controls — dark fills, orange focus glow</p>
  <div class="pv-row" style="gap:14px; align-items:flex-end;">
    <div style="width:200px;">
      <label class="form-label-sm">Mission name</label>
      <input type="text" placeholder="Enter mission name…" style="width:100%;">
    </div>
    <div style="width:160px;">
      <label class="form-label-sm">Status</label>
      <select style="width:100%;"><option>Planned</option><option>Active</option></select>
    </div>
    <div style="display:flex; gap:16px; align-items:center; padding-bottom:11px;">
      <label style="display:flex; gap:7px; align-items:center; color:var(--color-gray-1); font-size:.85rem;"><input type="checkbox" checked> Fitted</label>
      <label style="display:flex; gap:7px; align-items:center; color:var(--color-gray-1); font-size:.85rem;"><input type="radio" checked> LTI</label>
    </div>
  </div>
  <p class="pv-mono" style="margin-top:16px;">Focus: border → orange + 5px bloom. Placeholders italic, gray-2. Checkbox tick is black on orange.</p>
</body>
</html>
