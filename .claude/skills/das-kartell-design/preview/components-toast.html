<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
</head>
<body>
  <p class="pv-label">Notification toast — corner brackets + bloom</p>
  <div class="pv-row" style="gap:16px;">
    <div class="notification-toast" style="max-width:300px;">
      <h4>Action Successful</h4>
      <p>Ship successfully added to hangar.</p>

      <p>Error while saving. Please retry.</p>
    </div>
  </div>
