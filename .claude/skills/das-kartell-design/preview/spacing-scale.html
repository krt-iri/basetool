<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .sp { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .bar { background:var(--color-primary); height:14px; }
  .sp .n { font-family:var(--font-mono); font-size:.66rem; color:var(--color-gray-2); width:120px; flex:none; }
</style>
</head>
<body>
  <p class="pv-label">Spacing — rem rhythm, multiples of 0.5</p>
  <div class="sp"><span class="n">space-1 · 4px</span><span class="bar" style="width:4px;"></span></div>
  <div class="sp"><span class="n">space-2 · 8px</span><span class="bar" style="width:8px;"></span></div>
  <div class="sp"><span class="n">space-3 · 12px</span><span class="bar" style="width:12px;"></span></div>
  <div class="sp"><span class="n">space-4 · 16px</span><span class="bar" style="width:16px;"></span></div>
  <div class="sp"><span class="n">space-6 · 24px</span><span class="bar" style="width:24px;"></span></div>
  <div class="sp"><span class="n">space-8 · 32px</span><span class="bar" style="width:32px;"></span></div>
  <p class="pv-mono" style="margin-top:14px;">Touch target ≥ 44px · content column max 1200px · paragraph measure 80ch</p>
</body>
</html>
