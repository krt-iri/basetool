<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:baseline; gap:14px; margin-bottom:7px; }
  .row .tag { font-family: var(--font-mono); font-size:0.62rem; color: var(--color-gray-2); width:78px; flex:none; }
  .s1{font-family:var(--font-headline);color:var(--color-primary);text-transform:uppercase;letter-spacing:.05em;line-height:1.05;}
</style>
</head>
<body>
  <p class="pv-label">Type scale — headings (Audiowide) · body (Lato)</p>
  <div class="row"><span class="tag">h1 · 2rem</span><span class="s1" style="font-size:2rem;">Mission Control</span></div>
  <div class="row"><span class="tag">h2 · 1.5rem</span><span class="s1" style="font-size:1.5rem;">Next Mission</span></div>
  <div class="row"><span class="tag">h3 · 1.17rem</span><span class="s1" style="font-size:1.17rem;">Participants</span></div>
  <div class="row"><span class="tag">body · 1rem</span><span style="font-size:1rem;color:var(--color-gray-1);font-weight:300;">Server join at 19:00 — meet on Teamspeak.</span></div>
  <div class="row"><span class="tag">sm · 0.9rem</span><span style="font-size:0.9rem;color:var(--color-gray-1);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Table Header</span></div>
  <div class="row"><span class="tag">xs · 0.8rem</span><span style="font-size:0.8rem;color:var(--color-gray-2);">Footer · v1.4.3</span></div>
</body>
</html>
