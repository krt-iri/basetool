<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Basetool — UI Kit</title>
<link rel="icon" type="image/webp" href="../../assets/krt-favicon.webp">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../krt-components.css">
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screen-mission-detail.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(false);
  const [route, setRoute] = useState("home");
  const [sidebar, setSidebar] = useState(false);
  const { toasts, push } = useToasts();

  const isAdmin = route === "members" || route === "uex" || route === "settings";

  if (!authed) {
    return (
      <React.Fragment>
        {KRT_SPRITE}
        <LoginScreen onLogin={() => { setAuthed(true); setRoute("home"); push("Authentication Confirmed", "You are successfully authenticated."); }} />
        <ToastViewport toasts={toasts} />
      </React.Fragment>
    );
  }

  let screen;
  switch (route) {
    case "home": screen = <Dashboard onOpenMission={() => setRoute("mission-detail")} />; break;
    case "missions": screen = <MissionsScreen push={push} onOpen={() => setRoute("mission-detail")} />; break;
    case "mission-detail": screen = <MissionDetailScreen push={push} onBack={() => setRoute("missions")} />; break;
    case "hangar": screen = <HangarScreen push={push} />; break;
    case "materials": screen = <MaterialsScreen />; break;
    case "members": screen = <MembersScreen />; break;
    case "uex": screen = <PlaceholderScreen title="UEX Data" note="Trade terminal & commodity data synced from the UEX feed. Last sync: 3h ago. (Admin-only data view — recreated as a stub in this kit.)" />; break;
    case "settings": screen = <PlaceholderScreen title="System Settings" note="Refinery rounding, order-age color thresholds, transfer-fee rate and per-squadron promotion toggles live here. (Admin-only — stub.)" />; break;
    default: screen = <Dashboard onOpenMission={() => setRoute("missions")} />;
  }

  return (
    <React.Fragment>
      {KRT_SPRITE}
      <Header onHamburger={() => setSidebar(true)} admin={isAdmin} activeSquadron="IRI" />
      <Sidebar open={sidebar} onClose={() => setSidebar(false)} current={route}
        onNavigate={setRoute} onLogout={() => { setAuthed(false); setSidebar(false); }} />
      <main className="app-main">{screen}</main>
      <Footer />
      <ToastViewport toasts={toasts} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
