name: Bug Report
description: Report a reproducible bug in Basetool.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in the fields as completely as
        possible — incomplete reports delay the fix.

        **Do NOT report security vulnerabilities here.** Use the confidential
        channel via [GitHub Security Advisories](https://github.com/krt-iri/basetool/security/advisories/new)
        instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: >-
        What happens, in one sentence? E.g. "PUT /api/v1/operations/{id}
        returns 409 even though nobody else is editing the operation."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Backend (REST API / Service / Repository)
        - Frontend (Thymeleaf / Controller / JS)
        - Database / Flyway migration
        - Security / OIDC / Keycloak / Roles
        - Concurrency / Locking / Transactions
        - UEX integration
        - Hangar / Inventory / Refinery
        - Mission Planning / Operations
        - Inventory / Stock
        - i18n / UI strings / Styleguide
        - Build / Gradle / CI
        - Docker / Compose / Stack
        - Other (describe in detail)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit Hash
      description: Which build is affected? Commit SHA, branch, or release tag.
      placeholder: "e.g. main @ 7bc6044 or v1.4.2"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local (./gradlew bootRun, dev profile)
        - Local Docker stack (--profile dev)
        - Local test stack (.env.test + docker-compose.test.yml)
        - Staging
        - Production
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: What does someone have to do to see the bug?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: >-
        Stack trace, screenshot, HTTP response — whatever helps diagnosis.
        Please do not post tokens, passwords, or personal data.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Correlation ID
      description: >-
        The `correlationId` from the `X-Correlation-Id` response header or
        from the MDC log field. If you have a stack trace, please post it in
        full — but redact any sensitive data first.
      render: text

  - type: dropdown
    id: role
    attributes:
      label: Role of the Affected User
      options:
        - GUEST
        - SQUADRON_MEMBER
        - LOGISTICIAN
        - MISSION_MANAGER
        - OFFICER
        - ADMIN
        - Multiple / not relevant

  - type: dropdown
    id: browser
    attributes:
      label: Browser (frontend bugs only)
      options:
        - not relevant
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge

  - type: dropdown
    id: device
    attributes:
      label: Device (UI bugs only)
      description: Which of the four KRT device classes was affected?
      options:
        - not relevant
        - "Smartphone (<= 768px)"
        - "Tablet (768-1024px)"
        - "Desktop (1024-1600px)"
        - "Ultra-wide (1600px+)"

  - type: checkboxes
    id: checks
    attributes:
      label: Self-Check
      options:
        - label: I have searched open and closed issues for duplicates.
          required: true
        - label: I have not included any tokens, passwords, email addresses, or real names in this report.
          required: true
        - label: I understand that security vulnerabilities must be reported confidentially — not here.
          required: true
