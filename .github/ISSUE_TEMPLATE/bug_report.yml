name: Bug Report
description: Einen reproduzierbaren Fehler im Basetool melden.
title: "[Bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Danke für die Meldung. Bitte fülle die Felder so vollständig wie möglich aus —
        unvollständige Reports verzögern den Fix.

        **Sicherheitslücken bitte NICHT hier melden**, sondern vertraulich über
        [GitHub Security Advisories](https://github.com/krt-iri/basetool/security/advisories/new).

  - type: textarea
    id: summary
    attributes:
      label: Zusammenfassung
      description: >-
        Was passiert in einem Satz? Z. B. "PUT /api/v1/operations/{id} liefert 409,
        obwohl niemand sonst die Operation editiert."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Betroffener Bereich
      multiple: true
      options:
        - Backend (REST API / Service / Repository)
        - Frontend (Thymeleaf / Controller / JS)
        - Datenbank / Flyway-Migration
        - Security / OIDC / Keycloak / Rollen
        - Concurrency / Locking / Transaktionen
        - UEX-Integration
        - Hangar / Inventory / Refinery
        - Mission Planning / Operations
        - Inventar / Bestand
        - i18n / UI-Texte / Styleguide
        - Build / Gradle / CI
        - Docker / Compose / Stack
        - Sonstiges (im Detail erläutern)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit-Hash
      description: Welcher Build ist betroffen? Commit-SHA, Branch oder Release-Tag.
      placeholder: "z. B. main @ 7bc6044 oder v1.4.2"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Umgebung
      options:
        - Lokal (./gradlew bootRun, dev profile)
        - Lokaler Docker-Stack (--profile dev)
        - Lokaler Test-Stack (.env.test + docker-compose.test.yml)
        - Staging
        - Produktion
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduktionsschritte
      description: Was muss man tun, um den Fehler zu sehen?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
      description: >-
        Stacktrace, Screenshot, HTTP-Response — was zur Diagnose hilft.
        Bitte keine Tokens, Passwörter oder personenbezogenen Daten posten.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Correlation-ID
      description: >-
        Die `correlationId` aus dem `X-Correlation-Id`-Response-Header oder
        aus dem MDC-Log-Feld. Wenn ein Stacktrace vorliegt, bitte vollständig
        posten — aber sensitive Daten vorher entfernen.
      render: text

  - type: dropdown
    id: role
    attributes:
      label: Rolle des betroffenen Users
      options:
        - GUEST
        - SQUADRON_MEMBER
        - LOGISTICIAN
        - MISSION_MANAGER
        - OFFICER
        - ADMIN
        - Mehrere / nicht relevant

  - type: dropdown
    id: browser
    attributes:
      label: Browser (nur bei Frontend-Bugs)
      options:
        - nicht relevant
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge

  - type: dropdown
    id: device
    attributes:
      label: Endgerät (nur bei UI-Bugs)
      description: Welche der vier KRT-Device-Klassen war betroffen?
      options:
        - nicht relevant
        - "Smartphone (<= 768px)"
        - "Tablet (768-1024px)"
        - "Desktop (1024-1600px)"
        - "Ultra-wide (1600px+)"

  - type: checkboxes
    id: checks
    attributes:
      label: Self-Check
      options:
        - label: Ich habe in offenen und geschlossenen Issues nach Duplikaten gesucht.
          required: true
        - label: Ich habe keine Tokens, Passwörter, Mail-Adressen oder Klarnamen im Report hinterlassen.
          required: true
        - label: Mir ist klar, dass Sicherheitslücken vertraulich gemeldet werden müssen — nicht hier.
          required: true
