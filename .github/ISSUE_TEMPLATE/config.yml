blank_issues_enabled: false
contact_links:
  - name: Report a Security Vulnerability
    url: https://github.com/krt-profit/basetool/security/advisories/new
    about: >-
      NEVER post security-relevant findings publicly as an issue.
      Please submit them confidentially via GitHub Security Advisories.
  - name: Question or Discussion
    url: https://github.com/krt-profit/basetool/discussions
    about: >-
      General questions, architecture discussions, or how-to topics
      belong in Discussions, not the issue tracker.
