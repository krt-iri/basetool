name: Feature Request
description: Propose a new feature or enhancement.
title: "[Feature] "
labels:
  - enhancement
  - triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: >-
        Which problem does this feature solve? Who benefits from it?
        Which role (ADMIN / OFFICER / LOGISTICIAN / MISSION_MANAGER /
        SQUADRON_MEMBER / GUEST)?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: >-
        What could the feature look like? UI sketch, API shape, workflow —
        whatever helps sharpen the end picture.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / Workarounds
      description: >-
        What would the solution be without this feature? Which alternatives
        were rejected, and why?

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Backend (REST API / Service / Repository)
        - Frontend (Thymeleaf / Controller / JS)
        - Database / Flyway migration
        - Security / OIDC / Keycloak / Roles
        - UEX integration
        - Hangar / Inventory / Refinery
        - Mission Planning / Operations
        - Inventory / Stock
        - i18n / UI strings / Styleguide
        - Build / Gradle / CI
        - Docker / Compose / Stack
        - Other
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Implementation Scope (reminder)
      description: Please tick what needs to be considered during implementation.
      options:
        - label: Requires a Flyway migration (V<n>__<desc>.sql)
        - label: Requires new/changed role logic (`@PreAuthorize`, `app_user` flags)
        - label: Requires multi-user data isolation (filter by JWT `sub`)
        - label: Has a UI component (responsive check on Smartphone/Tablet/Desktop/Ultra-wide required)
        - label: Introduces new user-visible strings (i18n keys in de + en + fallback)
        - label: Requires an entry in `CHANGELOG.md` under `[Unreleased]`
        - label: Requires OpenAPI updates (`openapi.json` + SpringDoc annotations)
        - label: Requires Resilience4j configuration for new backend calls

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know the feature is "done"?
      value: |
        - [ ]
        - [ ] Tests in place (unit + MVC/integration test if applicable)
        - [ ] `./gradlew check` passes green
        - [ ] CHANGELOG entry added

  - type: checkboxes
    id: confirm
    attributes:
      label: Self-Check
      options:
        - label: I have searched open and closed issues for duplicates.
          required: true
