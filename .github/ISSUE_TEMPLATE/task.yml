name: Task / Refactor / Chore
description: A technical task without direct user visibility (refactor, tech debt, build, dependency, docs).
title: "[Task] "
labels:
  - task
  - triage
body:
  - type: textarea
    id: context
    attributes:
      label: Context / Motivation
      description: >-
        Why is this task worthwhile? Which pain, risk, or benefit is
        attached to it? If available: link to the triggering bug / issue / PR.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: >-
        What exactly should happen? Where? Which modules, packages, or files
        are affected? What is explicitly NOT part of this task?
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Type of Task
      options:
        - Refactor
        - Tech debt
        - Dependency upgrade (versions.properties / libs.versions.toml)
        - Build / CI / GitHub Actions
        - Docs (CLAUDE.md / README / CHANGELOG / Javadoc)
        - Test coverage / test infrastructure
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must hold true for the task to count as done?
      value: |
        - [ ]
        - [ ] `./gradlew check` passes green (Checkstyle, SpotBugs, tests)
        - [ ] No new lint warnings in the changed code

  - type: checkboxes
    id: confirm
    attributes:
      label: Self-Check
      options:
        - label: I have searched open and closed issues for duplicates.
          required: true
