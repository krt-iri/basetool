# Dependabot covers the ecosystems that refreshVersions does NOT manage:
# GitHub Actions workflow pins and the Docker base images referenced by
# docker-compose. Java / Gradle dependencies are intentionally left to
# `./gradlew refreshVersions` (see .github/workflows/refresh-versions.yml)
# so the two systems do not generate duplicate PRs.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  # The ingest gateway is internet-facing like backend/frontend, so its base
  # image must get the same automated CVE bumps (security audit gap-fill).
  - package-ecosystem: docker
    directory: /ingest
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(compose)"
