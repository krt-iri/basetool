name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  build:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # `./gradlew build` runs `assemble` + `check`, and `check` pulls in the
      # JUnit suite, Checkstyle (Google style) and the SpotBugs `spotbugsMain`
      # task that the root build script wires into `check`. JaCoCo report
      # generation is `finalizedBy` the Test task and runs even when tests
      # fail. `--continue` keeps the build going so lint reports still get
      # generated when tests fail and vice versa.
      - name: Build, run tests and lint
        run: ./gradlew build --continue --stacktrace

      - name: Upload JUnit test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-reports
          path: '**/build/reports/jacoco/**'
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Checkstyle reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/**'
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spotbugs-reports
          path: '**/build/reports/spotbugs/**'
          retention-days: 14
          if-no-files-found: ignore
