name: CodeQL

# Semantic SAST via GitHub CodeQL. Closes the gap left by Checkstyle (style),
# SpotBugs (local bug patterns) and OWASP Dependency-Check (third-party CVEs):
# CodeQL performs taint-tracking and data-flow analysis on the project's own
# code and surfaces SQL/Path/XSS/SSRF-style vulnerabilities that the other
# tools cannot see.
#
# Languages:
#   - java-kotlin     -> backend + frontend Java sources (build-mode: manual,
#                        Gradle compiles main + test sources for extraction).
#   - javascript-typescript -> frontend's own JS under
#                        `frontend/src/main/resources/static/js/` (vendor
#                        bundles excluded via the inline config below).
#
# Trigger model:
#   - push to main     -> establishes the baseline so PRs can diff against it.
#   - pull_request     -> required check candidate; results show up inline in
#                        the PR's Files Changed tab and as a PR check.
#   - schedule (weekly Tuesday 06:17 UTC, offset from the Monday OWASP
#                        dependency-check run) -> picks up new CodeQL queries
#                        that GitHub ships, even on quiet branches.
#   - workflow_dispatch -> manual re-run from the Actions UI.
#
# Blocking is enforced via branch protection in repository settings: the two
# matrix check names ("CodeQL / Analyze (java-kotlin)" and
# "CodeQL / Analyze (javascript-typescript)") must be marked as required
# status checks against `main` AFTER this workflow has run at least once on
# main so the check names are known to GitHub. See CHANGELOG.md entry for
# the exact gh CLI commands.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 2'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  actions: read
  packages: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25 (Temurin)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        if: matrix.language == 'java-kotlin'
        run: chmod +x ./gradlew

      # `security-extended` adds the precision-2/3 security queries on top of
      # the default suite. `security-and-quality` would also pull in
      # maintainability/style queries that overlap with Checkstyle/SpotBugs
      # and produce noise. The inline `paths-ignore` keeps vendor bundles and
      # generated artefacts out of the JS extraction (no point scanning
      # minified third-party libraries — their CVEs are covered by the OWASP
      # dependency-check workflow).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          config: |
            paths-ignore:
              - '**/build/**'
              - '**/node_modules/**'
              - 'frontend/src/main/resources/static/js/vendor/**'
              - '**/*.min.js'

            # `java/log-injection` fires on every SLF4J parameterised call
            # `log.X("text {}", userValue)` where the argument is a method
            # parameter, request body, JWT claim, etc. SLF4J's `{}` placeholder
            # substitution is performed by MessageFormatter AFTER the log
            # appender's pattern has been resolved -- the user value is
            # interpolated as a plain string, never re-parsed as a format
            # directive. That makes SLF4J parameterised logging the standard
            # defence against log-injection by construction, so the rule
            # produces a False Positive on every call site in this codebase
            # (56 sites flagged in the PR #65 initial scan; CodeQL does not
            # recognise SLF4J's interpolation step as a sanitiser).
            #
            # If a future module emits log lines built with String.format()
            # or concatenation (`"text " + userValue`), THAT pattern is the
            # real injection vector and should be hand-fixed at the call site
            # rather than caught by this rule. Re-enable selectively if such
            # a module appears.
            query-filters:
              - exclude:
                  id: java/log-injection

      # CodeQL's Java extractor reads `.class` files produced by the Gradle
      # compile tasks plus the source tree. `compileJava` covers
      # `src/main/java/`; `compileTestJava` covers `src/test/java/` so test
      # helpers and architectural assertions in `ArchitectureTest` are
      # included in the analysis. Running `build` would also execute the
      # JUnit suite + Checkstyle + SpotBugs + JaCoCo, which the dedicated
      # `ci.yml` already does — duplicating that here would just burn
      # runner minutes without adding extraction value.
      #
      # `--no-build-cache` is load-bearing: CodeQL's Java extractor traces
      # `javac` via `LD_PRELOAD` and only records source it sees the compiler
      # process. When the Gradle build cache (populated by the main-branch
      # CodeQL run, read-only on PR branches per the `setup-gradle` config
      # above) serves `compileJava`/`compileTestJava` as `FROM-CACHE` — which
      # happens on every PR that does not touch any Java file — `javac` is
      # never invoked, the tracer captures nothing, and the analyze step
      # fails with "CodeQL could not process any code written in
      # Java/Kotlin". Disabling the build cache here forces actual
      # compilation each run so the tracer always has events to record.
      # Gradle's task-output up-to-date check (which lives on disk per
      # workspace, not in the shared cache) is unaffected, but CI workspaces
      # are ephemeral so every run effectively does a clean compile anyway.
      - name: Compile Java sources for extraction
        if: matrix.language == 'java-kotlin'
        run: ./gradlew compileJava compileTestJava --no-build-cache --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:${{ matrix.language }}
