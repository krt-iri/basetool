name: DCO

# Verifies that every commit in a pull request carries a Signed-off-by
# trailer whose name and email match the commit's author, certifying the
# Developer Certificate of Origin version 1.1 (https://developercertificate.org/).
#
# The DCO sign-off is the per-commit attestation complement to the
# one-time Contributor License Agreement signed via docs/cla-signatures.md.
# Together they give the project a verifiable per-contribution chain of
# custody plus a clean IP grant — see CONTRIBUTING.md > "Developer
# Certificate of Origin (DCO) sign-off" for the full policy.
#
# Trigger model:
#   - pull_request -> required check candidate; runs on every push to a
#                     PR branch and on PR reopen / mark-ready.
#
# Exemptions, in order:
#   1. Merge commits (parents >= 2) are skipped — they are produced by
#      Git's auto-merge and introduce no new contribution.
#   2. Commits authored by well-known bots (Dependabot, refreshVersions,
#      GitHub Actions, Renovate) are skipped — bot PRs are reviewed and
#      merged by maintainers under the maintainer's own DCO sign-off and
#      do not represent new contributor IP.
#
# Bootstrapping note: the PR that introduces this workflow may itself
# carry commits without sign-off (the policy did not exist when those
# commits were authored). Two ways to land it cleanly:
#   (a) `git rebase --signoff main` on the bootstrapping branch, then
#       `git push --force-with-lease`; or
#   (b) admin-merge once with this check overridden — pre-policy commits
#       on main are explicitly grandfathered per CONTRIBUTING.md.
#
# Blocking is enforced via branch protection in repository settings:
# the check name ("DCO / Verify Signed-off-by on every commit") must be
# marked as a required status check against `main` AFTER this workflow
# has run at least once on main so the check name is known to GitHub.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dco-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-signoff:
    name: Verify Signed-off-by on every commit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch-depth: 0 pulls the whole history so git log can walk
          # the base..head range even when the PR diverged from main long
          # ago. The default shallow checkout (depth 1) would make the
          # `git log "${BASE_SHA}..${HEAD_SHA}"` walk silently empty.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify each commit carries a matching Signed-off-by trailer
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          # Enumerate commits introduced by this PR (excludes commits
          # already on base). Reverse so the failure messages read in
          # chronological order, which is what reviewers expect.
          mapfile -t commits < <(git log --reverse --format='%H' "${BASE_SHA}..${HEAD_SHA}")

          if [[ ${#commits[@]} -eq 0 ]]; then
            echo "No commits to check (empty base..head range)."
            exit 0
          fi

          echo "Checking ${#commits[@]} commit(s) in ${BASE_SHA}..${HEAD_SHA}"
          echo

          # Author-email patterns that are exempt from DCO sign-off.
          # Bot PRs are reviewed and merged by maintainers under the
          # maintainer's own sign-off; the bot does not own IP.
          bot_emails=(
            'dependabot[bot]@users.noreply.github.com'
            'github-actions[bot]@users.noreply.github.com'
            'renovate[bot]@users.noreply.github.com'
            '49699333+dependabot[bot]@users.noreply.github.com'
            '41898282+github-actions[bot]@users.noreply.github.com'
          )

          failed=0

          for sha in "${commits[@]}"; do
            short=$(git log -1 --format='%h' "$sha")
            subject=$(git log -1 --format='%s' "$sha")
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            parents=$(git log -1 --format='%P' "$sha")

            # Skip merge commits (Git's auto-merges produce them on rebase /
            # merge-base operations and they introduce no new contribution).
            parent_count=$(echo "$parents" | wc -w)
            if [[ $parent_count -ge 2 ]]; then
              echo "::notice title=DCO::Skipped merge commit ${short} (${parent_count} parents): ${subject}"
              continue
            fi

            # Skip well-known bot authors.
            is_bot=0
            for bot in "${bot_emails[@]}"; do
              if [[ "${author_email,,}" == "${bot,,}" ]]; then
                echo "::notice title=DCO::Skipped bot commit ${short} (${author_email}): ${subject}"
                is_bot=1
                break
              fi
            done
            [[ $is_bot -eq 1 ]] && continue

            # Collect every Signed-off-by trailer on this commit.
            mapfile -t signoffs < <(git log -1 --format='%(trailers:key=Signed-off-by,valueonly=true)' "$sha")

            # Filter out any blank entries produced by the trailer format.
            filtered=()
            for so in "${signoffs[@]}"; do
              [[ -n "$so" ]] && filtered+=("$so")
            done

            if [[ ${#filtered[@]} -eq 0 ]]; then
              echo "::error title=DCO sign-off missing::Commit ${short} has no Signed-off-by trailer."
              echo "        Subject:  ${subject}"
              echo "        Author:   ${author_name} <${author_email}>"
              echo
              failed=1
              continue
            fi

            # The author's "Name <email>" must appear verbatim in at least
            # one trailer. Case-insensitive on the email (RFC 5321 says
            # the local-part is technically case-sensitive but in practice
            # nobody relies on that, and git commit -s downcases nothing).
            expected_lc="${author_name,,} <${author_email,,}>"
            matched=0
            for so in "${filtered[@]}"; do
              if [[ "${so,,}" == "${expected_lc}" ]]; then
                matched=1
                break
              fi
            done

            if [[ $matched -eq 0 ]]; then
              echo "::error title=DCO sign-off mismatch::Commit ${short} has Signed-off-by trailers but none match the author."
              echo "        Subject:        ${subject}"
              echo "        Author:         ${author_name} <${author_email}>"
              echo "        Found sign-off(s):"
              for so in "${filtered[@]}"; do
                echo "          - ${so}"
              done
              echo
              failed=1
            fi
          done

          if [[ $failed -eq 1 ]]; then
            cat <<'REMEDIATION'

          ====================================================================
          One or more commits are missing a matching DCO sign-off.

          Fix locally:
            - Last commit only:        git commit --amend --signoff --no-edit
            - All commits in this PR:  git rebase --signoff main

          Then refresh the PR:
            git push --force-with-lease origin "$(git branch --show-current)"

          The Signed-off-by trailer must match the commit's author
          "Name <email>" exactly (case-insensitive on the email). If your
          git config and your commit author disagree, fix
          `git config user.name` / `git config user.email` first, then
          rebase --signoff.

          Full procedure: CONTRIBUTING.md -> "Developer Certificate of
          Origin (DCO) sign-off".
          ====================================================================

          REMEDIATION
            exit 1
          fi

          echo
          echo "All checked commits carry a matching Signed-off-by trailer."
