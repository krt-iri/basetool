name: Dependency Check

# OWASP Dependency-Check scans every transitive dependency for known CVEs and
# emits SARIF that GitHub aggregates under the repository's Security tab.
#
# Trigger model:
#   - weekly cron (Monday 06:00 UTC) catches CVEs published after the last PR
#   - workflow_dispatch lets a maintainer force a fresh scan on demand
#   - push to main that touches dependency declarations triggers an
#     immediate scan so newly-introduced libraries get a same-day verdict
#   - pull_request that touches dependency declarations scans the proposed
#     change BEFORE merge, so a vulnerable bump is caught on the PR instead of
#     only by the next weekly run. The scan restores the weekly-warmed NVD DB
#     read-only; the gate is the gradle `failBuildOnCVSS = 7.0` build failure
#     (the SARIF upload is skipped on PRs). Kept NON-required on purpose: it is
#     path-filtered, and a required path-filtered check never reports on PRs
#     that don't touch the filtered paths (see flyway-migrations.yml).
#
# The plugin's first run downloads the NVD feed (~500 MB) and takes 5-15
# minutes; subsequent runs reuse the cache and finish in seconds. Set the
# `NVD_API_KEY` repository secret (free, register at
# https://nvd.nist.gov/developers/request-an-api-key) to bypass the public
# NVD rate limit — without it github-hosted runners frequently get 429s
# because they share an IP pool with every other CI job on github.com.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build.gradle.kts'
      - '**/build.gradle.kts'
      - 'versions.properties'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'
  pull_request:
    branches: [main]
    paths:
      - 'build.gradle.kts'
      - '**/build.gradle.kts'
      - 'versions.properties'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'

concurrency:
  group: dep-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

jobs:
  owasp:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # PRs restore the weekly-warmed NVD DB read-only (never write the
          # shared cache from a PR branch); scheduled / main runs keep
          # re-warming it.
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      # The cache key rotates weekly to match the Monday cron and the
      # `nvd.validForHours = 168` configured on the gradle plugin (see
      # `build.gradle.kts`): within a week we restore the exact same key
      # and the plugin treats the local DB as fresh, so no NVD API calls
      # happen at all. On the first run of a new ISO week, the broader
      # `restore-keys` fallback restores the previous week's DB and the
      # plugin only has to incrementally pull the new CVEs — that's what
      # keeps us inside the public NVD rate limit when `NVD_API_KEY` is
      # unset. Previously the key embedded `github.run_id` which never
      # collided and silently rebuilt the on-disk H2 DB from scratch on
      # every workflow_dispatch — that triggered 429s mid-transaction and
      # left the cached DB corrupt for the next run (see run 25933803540).
      - name: Compute ISO week (cache rotation key)
        id: cache-key
        shell: bash
        run: echo "week=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache NVD feed
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-feed-v1-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            nvd-feed-v1-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # `--no-parallel` is REQUIRED for this one Gradle invocation — do not
      # remove it. Gradle 9 enforces an exclusive lock on every Configuration
      # resolution, and the dependency-check plugin's aggregate task resolves
      # the configurations of ALL subprojects cross-project from its own task
      # action. Under the repo-wide `org.gradle.parallel=true`
      # (gradle.properties) that cross-project resolution runs without the
      # exclusive lock and Gradle aborts the scan ("Resolution of the
      # configuration ':backend:annotationProcessor' was attempted without an
      # exclusive lock") before any analyser stage runs — verified by a
      # parallel workflow_dispatch run on 2026-06-11 (run 27354476376, see
      # #415). The AsciidoctorJ plugin previously blamed for this (runs
      # 26516932803+) was merely the first configuration the race tripped
      # over; its removal in #414 did not fix it. The flag scopes the
      # workaround to this CI step only, so day-to-day developer builds keep
      # their parallel speedup.
      - name: Run dependencyCheckAggregate
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./gradlew dependencyCheckAggregate --no-parallel --stacktrace -PnvdApiKey="$NVD_API_KEY"
          else
            ./gradlew dependencyCheckAggregate --no-parallel --stacktrace
          fi

      # Guard the SARIF upload against a missing report file. If the gradle
      # task aborts (e.g. NVD rate-limit blow-up corrupts the H2 DB before
      # any analyser stage runs), no SARIF is produced, and the unguarded
      # `upload-sarif` step otherwise fails with `Path does not exist`, which
      # is noise on top of the real gradle failure that's already red above.
      - name: Check SARIF report exists
        id: sarif
        if: always()
        shell: bash
        run: |
          if [ -f build/reports/dependency-check/dependency-check-report.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SARIF report missing - dependency-check did not finish; skipping the GitHub Security upload."
          fi

      # Skipped on PRs: a PR branch (and especially a fork) may lack
      # security-events:write, and the PR gate is the CVSS>=7 build failure
      # above, not the Security-tab upload. Scheduled / main runs publish it.
      - name: Upload SARIF report to GitHub Security
        if: always() && steps.sarif.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: build/reports/dependency-check/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload dependency-check reports as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check/
          retention-days: 30
          if-no-files-found: ignore
