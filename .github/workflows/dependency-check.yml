name: Dependency Check

# OWASP Dependency-Check scans every transitive dependency for known CVEs and
# emits SARIF that GitHub aggregates under the repository's Security tab.
#
# Trigger model:
#   - weekly cron (Monday 06:00 UTC) catches CVEs published after the last PR
#   - workflow_dispatch lets a maintainer force a fresh scan on demand
#   - push to main that touches dependency declarations triggers an
#     immediate scan so newly-introduced libraries get a same-day verdict
#
# The plugin's first run downloads the NVD feed (~500 MB) and takes 5-15
# minutes; subsequent runs reuse the cache and finish in seconds. Set the
# `NVD_API_KEY` repository secret (free, register at
# https://nvd.nist.gov/developers/request-an-api-key) to bypass the public
# NVD rate limit — without it github-hosted runners frequently get 429s
# because they share an IP pool with every other CI job on github.com.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build.gradle.kts'
      - '**/build.gradle.kts'
      - 'versions.properties'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'

concurrency:
  group: dep-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

jobs:
  owasp:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: false

      # The cache key rotates weekly to match the Monday cron and the
      # `nvd.validForHours = 168` configured on the gradle plugin (see
      # `build.gradle.kts`): within a week we restore the exact same key
      # and the plugin treats the local DB as fresh, so no NVD API calls
      # happen at all. On the first run of a new ISO week, the broader
      # `restore-keys` fallback restores the previous week's DB and the
      # plugin only has to incrementally pull the new CVEs — that's what
      # keeps us inside the public NVD rate limit when `NVD_API_KEY` is
      # unset. Previously the key embedded `github.run_id` which never
      # collided and silently rebuilt the on-disk H2 DB from scratch on
      # every workflow_dispatch — that triggered 429s mid-transaction and
      # left the cached DB corrupt for the next run (see run 25933803540).
      - name: Compute ISO week (cache rotation key)
        id: cache-key
        shell: bash
        run: echo "week=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache NVD feed
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-feed-v1-${{ runner.os }}-${{ steps.cache-key.outputs.week }}
          restore-keys: |
            nvd-feed-v1-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run dependencyCheckAggregate
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./gradlew dependencyCheckAggregate --stacktrace -PnvdApiKey="$NVD_API_KEY"
          else
            ./gradlew dependencyCheckAggregate --stacktrace
          fi

      # Guard the SARIF upload against a missing report file. If the gradle
      # task aborts (e.g. NVD rate-limit blow-up corrupts the H2 DB before
      # any analyser stage runs), no SARIF is produced, and the unguarded
      # `upload-sarif` step otherwise fails with `Path does not exist`, which
      # is noise on top of the real gradle failure that's already red above.
      - name: Check SARIF report exists
        id: sarif
        if: always()
        shell: bash
        run: |
          if [ -f build/reports/dependency-check/dependency-check-report.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SARIF report missing - dependency-check did not finish; skipping the GitHub Security upload."
          fi

      - name: Upload SARIF report to GitHub Security
        if: always() && steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: build/reports/dependency-check/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload dependency-check reports as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check/
          retention-days: 30
          if-no-files-found: ignore
