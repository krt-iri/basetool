name: E2E

# The destructive functional flows (@Tag("e2e")) against an ephemeral full stack
# (Postgres x2 + Keycloak + Redis + backend + frontend), built and torn down by
# E2eStackExtension via `docker compose`, fanned out over three browser engines
# (Chromium, Firefox, WebKit) as a matrix. Heavy (~2 GB RAM + a Keycloak boot),
# so it runs nightly + on manual dispatch, and on PRs only when they carry the
# `e2e` label.
#
# The non-destructive @Tag("smoke") checks against a staging deployment live in
# `e2e-smoke.yml` — a post-release / nightly concern, deliberately NOT a PR check
# (so a dormant, skipped job never shows up as a confusing matrix placeholder on
# pull requests).
on:
  pull_request:
    branches: [main]
    # `labeled` is included so applying the `e2e` label AFTER a PR is opened
    # triggers the suite immediately. Without it the gate below only ever sees
    # the label state captured at open/synchronize, so a label added later (e.g.
    # by `gh pr create --label e2e`, which lands after the open event) silently
    # skips e2e until the next push — a real, recurring footgun.
    types: [opened, synchronize, reopened, labeled]
  schedule:
    - cron: '0 3 * * *' # nightly 03:00 UTC
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e:
    name: E2E flows (${{ matrix.browser }})
    # PRs: only when labelled `e2e`. A `labeled` event must be the `e2e` label
    # itself, so toggling an unrelated label never spins up this heavy stack;
    # open/synchronize/reopened run whenever the label is currently present.
    # schedule / workflow_dispatch: always.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.action == 'labeled' && github.event.label.name == 'e2e') ||
      (github.event.action != 'labeled' &&
      contains(github.event.pull_request.labels.*.name, 'e2e'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # Run all three engines even if one fails, so a Chromium-only regression
      # doesn't hide a Firefox/WebKit pass (and vice versa).
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Cache the Playwright-managed browsers (~/.cache/ms-playwright) so the
      # playwrightInstall task is a no-op on a hit. Keyed on the version catalog,
      # so a Playwright bump (gradle/libs.versions.toml) invalidates the cache.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # WebKit has no launch-level DNS override, so the ephemeral stack's Keycloak
      # issuer host must be mapped to the loopback at the OS level. Chromium (a
      # resolver arg) and Firefox (a profile pref) remap it themselves, but the
      # entry is harmless for them.
      - name: Map host.docker.internal to the loopback (needed by WebKit)
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      # E2eStackExtension builds the images and brings the stack up itself (no
      # E2E_BASE_URL => ephemeral mode); the Dockerfiles are multi-stage, so no
      # separate bootJar step is needed. Docker + compose v2 ship on the runner.
      - name: Run e2e flows
        run: ./gradlew :frontend:e2eTest -Pe2e.browser=${{ matrix.browser }} --stacktrace

      # Playwright traces, failure screenshots/HTML dumps and the docker compose
      # build/boot logs all land under frontend/build/e2e.
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts-${{ matrix.browser }}
          path: |
            frontend/build/e2e/**
            frontend/build/test-results/e2eTest/**
            frontend/build/reports/tests/e2eTest/**
          retention-days: 14
          if-no-files-found: ignore
