name: E2E

# Two Playwright suites, one workflow:
#   * e2e   — the destructive functional flows (@Tag("e2e")) against an
#             ephemeral full stack (Postgres x2 + Keycloak + Redis + backend +
#             frontend), built and torn down by E2eStackExtension via
#             `docker compose`. Heavy (~2 GB RAM + a Keycloak boot), so it runs
#             nightly + on manual dispatch, and on PRs only when they carry the
#             `e2e` label.
#   * smoke — the non-destructive page-load checks (@Tag("smoke")) against an
#             external deployment. Dormant until the repo defines an
#             E2E_BASE_URL variable (a staging host); never runs per-PR.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # nightly 03:00 UTC
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e:
    name: E2E flows (ephemeral stack)
    # PRs: only when labelled `e2e`. schedule / workflow_dispatch: always.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Cache the Playwright-managed Chromium (~/.cache/ms-playwright) so the
      # playwrightInstall task is a no-op on a hit. Keyed on the version catalog,
      # so a Playwright bump (gradle/libs.versions.toml) invalidates the cache.
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # E2eStackExtension builds the images and brings the stack up itself (no
      # E2E_BASE_URL => ephemeral mode); the Dockerfiles are multi-stage, so no
      # separate bootJar step is needed. Docker + compose v2 ship on the runner.
      - name: Run e2e flows
        run: ./gradlew :frontend:e2eTest --stacktrace

      # Playwright traces, failure screenshots/HTML dumps and the docker compose
      # build/boot logs all land under frontend/build/e2e.
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            frontend/build/e2e/**
            frontend/build/test-results/e2eTest/**
            frontend/build/reports/tests/e2eTest/**
          retention-days: 14
          if-no-files-found: ignore

  smoke:
    name: Smoke (staging)
    # Dormant until a staging host exists: gated on the E2E_BASE_URL repo
    # variable (a hostname, readable in `if:` — unlike a secret). Credentials
    # come from secrets, passed via the environment. Never runs per-PR.
    if: >-
      vars.E2E_BASE_URL != '' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # E2E_BASE_URL set => E2eStackExtension targets the external deployment and
      # does not manage Docker. Credentials travel via the environment (masked in
      # logs); the smokeTest task maps E2E_USERNAME / E2E_PASSWORD to the e2e.*
      # system properties the tests read.
      - name: Run smoke checks against staging
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: ./gradlew :frontend:smokeTest --stacktrace

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-artifacts
          path: |
            frontend/build/e2e/**
            frontend/build/test-results/smokeTest/**
            frontend/build/reports/tests/smokeTest/**
          retention-days: 14
          if-no-files-found: ignore
