name: Refresh Versions

# `./gradlew refreshVersions` is the project's canonical way to surface
# dependency / plugin updates (see CLAUDE.md: "Dependencies are managed by
# refreshVersions — edit `versions.properties`, not `build.gradle.kts`").
# This workflow runs it on a weekly cadence and opens a single rolling pull
# request whenever the tool annotates new versions into `versions.properties`
# or `gradle/libs.versions.toml`. The maintainer then promotes the desired
# bumps by hand — the workflow deliberately does NOT auto-apply updates,
# because refreshVersions emits proposals as comments rather than mutations.
#
# The PR step uses a dedicated `REFRESH_VERSIONS_TOKEN` secret (fine-grained
# PAT or GitHub App token) instead of the default `GITHUB_TOKEN`, because the
# `krt-iri` organization policy forbids Actions from creating or approving
# pull requests. Required token scopes on this repo: `pull-requests: write`
# and `contents: write`.
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: refresh-versions
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-versions:
    name: refreshVersions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run refreshVersions
        run: ./gradlew refreshVersions --stacktrace

      - name: Open / update pull request with proposed bumps
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.REFRESH_VERSIONS_TOKEN }}
          # Author the commit as the GitHub Actions bot so the DCO check
          # (dco.yml) takes its documented bot exemption. Without this,
          # create-pull-request defaults the author to github.actor — on a
          # workflow_dispatch run that is the maintainer, who then trips
          # "DCO sign-off missing" because this automated commit carries no
          # Signed-off-by trailer (the bot does not own contributor IP).
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          branch: chore/refresh-versions
          base: main
          title: "chore(deps): refreshVersions proposals"
          commit-message: "chore(deps): refreshVersions proposals"
          body: |
            Automated dependency-update proposals generated by
            `./gradlew refreshVersions`.

            Review the new `## # available =` comments in
            `versions.properties` and `gradle/libs.versions.toml`,
            then bump the entries you want to take by hand
            (refreshVersions never auto-applies — it only annotates).

            Closes any previous open `chore/refresh-versions` PR.
          add-paths: |
            versions.properties
            gradle/libs.versions.toml
          delete-branch: true
          labels: |
            dependencies
            automated
