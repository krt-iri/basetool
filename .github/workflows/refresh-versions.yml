name: Refresh Versions

# `./gradlew refreshVersions` is the project's canonical way to surface
# dependency / plugin updates (see CLAUDE.md: "Dependencies are managed by
# refreshVersions — edit `versions.properties`, not `build.gradle.kts`").
# This workflow runs it on a weekly cadence and opens a single rolling pull
# request whenever the tool annotates new versions into `versions.properties`
# or `gradle/libs.versions.toml`. The maintainer then promotes the desired
# bumps by hand — the workflow deliberately does NOT auto-apply updates,
# because refreshVersions emits proposals as comments rather than mutations.
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: refresh-versions
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-versions:
    name: refreshVersions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run refreshVersions
        run: ./gradlew refreshVersions --stacktrace

      - name: Open / update pull request with proposed bumps
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/refresh-versions
          base: master
          title: "chore(deps): refreshVersions proposals"
          commit-message: "chore(deps): refreshVersions proposals"
          body: |
            Automated dependency-update proposals generated by
            `./gradlew refreshVersions`.

            Review the new `## # available =` comments in
            `versions.properties` and `gradle/libs.versions.toml`,
            then bump the entries you want to take by hand
            (refreshVersions never auto-applies — it only annotates).

            Closes any previous open `chore/refresh-versions` PR.
          add-paths: |
            versions.properties
            gradle/libs.versions.toml
          delete-branch: true
          labels: |
            dependencies
            automated
