name: Repo Lint

# Lints the repository's non-Java assets that the Gradle build does not cover:
#   - shellcheck -> the server-side / helper shell scripts under scripts/
#                   (deploy.sh runs on the production host; a quoting bug there
#                   is a production incident, not a style nit).
#   - actionlint -> the GitHub Actions workflows themselves, incl. shellcheck
#                   over every embedded `run:` script (catches workflow-syntax
#                   and shell bugs before they burn a CI run to discover them).
#   - hadolint   -> the two multi-stage production Dockerfiles.
#
# Each linter runs from its pinned release binary (shellcheck ships
# preinstalled on the runner), so no third-party action enters the supply
# chain and the tool version is explicit + Dependabot-free (bump the env pins
# below). All three jobs are independent and block the PR on findings.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: repo-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # shellcheck is preinstalled on ubuntu-latest. Lint every tracked *.sh
      # (not just scripts/) so a future script anywhere is covered automatically.
      - name: Run shellcheck
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.sh')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts tracked; nothing to lint."
            exit 0
          fi
          printf 'Linting %d script(s):\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"
          shellcheck "${files[@]}"

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: 1.7.12
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: |
          set -euo pipefail
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "$url" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint -version

      # actionlint shells out to the preinstalled shellcheck for every embedded
      # `run:` script, so workflow YAML and the bash inside it are both linted.
      - name: Run actionlint
        run: actionlint -color

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HADOLINT_VERSION: 2.14.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install hadolint
        run: |
          set -euo pipefail
          url="https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          curl -fsSL "$url" -o /tmp/hadolint
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint
          hadolint --version

      # Threshold lives in .hadolint.yaml (warning) so local + CI agree.
      - name: Run hadolint
        run: hadolint backend/Dockerfile frontend/Dockerfile
