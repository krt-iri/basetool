# gitleaks configuration. Extends the upstream default ruleset and adds an
# allowlist for the two intentionally-committed fixtures that carry throwaway /
# placeholder credentials — never production secrets (see CLAUDE.md "Never use
# production / real credentials in tests or local test stacks"):
#
#   - .env.example                                       placeholder env values
#   - frontend/src/e2e/resources/realm-export.e2e.json   stripped Keycloak realm
#       export with a rotated, synthetic test client secret + a synthetic user
#
# The PR scan in .github/workflows/gitleaks.yml is range-scoped (it only walks
# the commits the PR introduces), so a NEW secret added anywhere else still
# fails the check. This allowlist only stops the two known fixtures from
# tripping the manual full-history scan (workflow_dispatch).

[extend]
useDefault = true

[allowlist]
description = "Committed test/sample fixtures with throwaway placeholder credentials"
paths = [
  '''\.env\.example$''',
  '''frontend/src/e2e/resources/realm-export\.e2e\.json$''',
]
# Obvious synthetic Discord snowflake used as a throwaway unit-test fixture (the
# 18-digit placeholder id in UserServiceDiscordSyncTest). It is a sequential dummy,
# never a real id — and a Discord *client id* is a public identifier, not a secret —
# so the default discord-client-id rule's match on it is a false positive. Scoped to
# this exact literal so any genuinely secret-shaped value still trips the scan.
regexes = [
  '''123456789012345678''',
]
