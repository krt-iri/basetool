spring:
  datasource:
    url: jdbc:postgresql://db-backend:15432/krt_basetool
    #url: jdbc:postgresql://db-backend:15432/krt_basetool
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
      #ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.profit-base.online/realms/iri}

# SC Wiki catalogue sync. The per-sync feature flags default to false in code
# (ScWikiProperties -- "ships dark"); enabled here so each scheduler step actually
# runs and the admin sync-report log (/admin/sync-reports) gets populated.
# sync-all-items is ON in dev (Weg 2): the full ~12 700-row backfill plus the name/slug
# reconciliation that merges uuid-less UEX rows into their Wiki twins. Prod keeps the
# default (false / closure mode) until the heavier backfill is signed off for production.
krt:
  scwiki:
    scheduler-enabled: true
    commodity-sync-enabled: true
    vehicle-sync-enabled: true
    item-sync-enabled: true
    blueprint-sync-enabled: true
    manufacturer-sync-enabled: true
    sync-all-items: true
    reconcile-uuidless-by-name: true
