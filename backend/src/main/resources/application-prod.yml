# ===================================================================
# Production Configuration for Backend
# 
# JVM Tuning Recommendations (apply via JAVA_TOOL_OPTIONS in Docker):
#   -XX:+UseContainerSupport
#   -XX:MaxRAMPercentage=75.0
#   -XX:InitialRAMPercentage=50.0
#   -XX:+HeapDumpOnOutOfMemoryError
#   -XX:HeapDumpPath=/tmp/heapdump.hprof
# ===================================================================
spring:
  datasource:
    url: jdbc:postgresql://db-backend:15432/krt_basetool
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # Production pool sizing — raised from the previous 10/30000 ms defaults after the
      # performance audit (H-5). Resilience4j's bulkhead caps fan-out at 50 concurrent
      # backend calls (see frontend application.yml) and Tomcat now runs virtual threads,
      # so 10 JDBC connections starved the pool under ~10 concurrent users. 15 leaves
      # headroom for the page-render fan-out (ParallelPageLoader issues 4 parallel calls
      # per mission-detail / hangar render) without inflating idle-connection cost.
      # connection-timeout 10 s replaces the previous 30 s: long enough to absorb
      # legitimate transient pool pressure, short enough that a runaway query no longer
      # makes a fresh request hang for half a minute before failing.
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 20s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.profit-base.online/realms/iri}
server:
  shutdown: graceful

# Swagger UI has been removed project-wide (springdoc -api starter). In production the raw OpenAPI
# document is additionally disabled so the API surface is never enumerable from outside a deployed
# environment — the committed backend/src/main/resources/api/openapi.json (regenerated by
# OpenApiGeneratorTest in the test profile) is the single source of API documentation.
springdoc:
  api-docs:
    enabled: false

app:
  logging:
    # Enables the JSON/LogstashEncoder appender defined in logback-spring.xml for the prod profile.
    structured-enabled: true
  rate-limit:
    # Audit finding H-8: the production deployment runs behind nginx-proxy-manager which
    # presents the immediate peer as a docker-network IP. Without trusting that range, every
    # request looks like it originates from NPM and the per-IP bucket collapses into a single
    # global budget. The default Docker bridge network (172.17.0.0/16) plus the user-defined
    # bridge ranges (172.18.0.0/16 and 172.19.0.0/16 are the typical compose-allocated
    # ranges) cover the typical compose topology — override via APP_RATE_LIMIT_TRUSTED_PROXIES
    # if the NPM container sits on a different subnet.
    trusted-proxies:
      - 172.17.0.0/16
      - 172.18.0.0/16
      - 172.19.0.0/16

# SC Wiki catalogue sync. The per-sync feature flags default to false in code
# (ScWikiProperties -- "ships dark"); enabled here so each scheduler step runs on the
# live instance and the admin sync-report log (/admin/sync-reports) gets populated.
# This generates real traffic against api.star-citizen.wiki. sync-all-items is ON (Weg 2):
# the full ~12 700-row item backfill plus the name/slug reconciliation that merges uuid-less
# UEX rows into their Wiki twins (~10-15 min per cycle at 5 req/s, vs the lighter closure mode).
# Any flag is overridable per the deployment runbook via env var, e.g.
# KRT_SCWIKI_SYNC_ALL_ITEMS=false, without a redeploy.
krt:
  scwiki:
    scheduler-enabled: true
    commodity-sync-enabled: true
    vehicle-sync-enabled: true
    item-sync-enabled: true
    blueprint-sync-enabled: true
    manufacturer-sync-enabled: true
    sync-all-items: true
    reconcile-uuidless-by-name: true
