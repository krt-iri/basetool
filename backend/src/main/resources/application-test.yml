# Test profile.
#
# Spring-Boot integration tests run against a real Postgres container started on
# demand by Testcontainers' JDBC-URL trick: when the URL starts with `jdbc:tc:...`
# the Testcontainers' `ContainerDatabaseDriver` boots a `postgres:18-alpine`
# container the first time a Spring context requests the DataSource and reuses it
# for subsequent contexts (controlled by Testcontainers' container reuse — see
# `TC_DAEMON` / `~/.testcontainers.properties` if you want cross-build reuse).
#
# Why Postgres (not H2)? Production runs on Postgres, our Flyway migrations carry
# Postgres-specific syntax (JSONB, GIN, pg_trgm, ON CONFLICT, gen_random_uuid),
# and `ddl-auto: validate` only catches schema drift if the schema being validated
# was produced by Flyway. Running tests on H2 reintroduced the exact "mock/prod
# divergence" risk CLAUDE.md warns about.
#
# Tests that are pure Mockito unit tests (`@ExtendWith(MockitoExtension.class)`
# without `@SpringBootTest`) do NOT load this YAML and start no container, so the
# fast feedback loop for service-layer unit tests is unchanged.
server:
  ssl:
    enabled: false
    key-store-password: test-keystore-password
spring:
  datasource:
    url: jdbc:tc:postgresql:18-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
    hikari:
      # Keep the test pool small — every @SpringBootTest spins up its own
      # ApplicationContext, and we do not want to flood the shared Testcontainer
      # with idle connections across parallel test classes.
      maximum-pool-size: 5
      minimum-idle: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
    hibernate:
      # `validate` so the test schema produced by Flyway has to match the entity
      # annotations exactly — the same contract as prod (application-prod.yml).
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak.example.com/realms/test

krt:
  uex:
    scheduler-enabled: false

app:
  cors:
    # Test-only origin used by SecurityTest CORS assertions. Production deliberately
    # leaves this empty (no direct browser-to-backend cross-origin calls allowed).
    allowed-origin-patterns: http://localhost:8080
  keycloak:
    sync:
      enabled: false
      admin-url: http://keycloak.example.com
      realm: test
      client-id: test-client
      client-secret: test-secret

# Disable the KeycloakHealthIndicator under @SpringBootTest. The test issuer URI
# (http://keycloak.example.com) is a non-resolvable placeholder; leaving the
# indicator enabled would slow every context-loading test by the
# connect-timeout while the JDK HttpClient waits for the DNS lookup to fail.
# Unit tests for the indicator itself instantiate it directly with a
# MockWebServer URL and do not consult this property.
#
# The readiness group is also redefined here: Spring Boot 4 ships a
# HealthEndpointGroupMembershipValidator that rejects a group `include` list
# referencing a non-registered contributor (`NoSuchHealthContributorException`
# at context startup). Under this profile `keycloak` is disabled (see above)
# and `ssl` is absent because `server.ssl.enabled=false`, so we narrow the
# group to the contributors that DO exist in tests. Production retains the
# full `readinessState, db, keycloak, diskSpace, ssl` set from application.yml.
management:
  health:
    keycloak:
      enabled: false
  endpoint:
    health:
      group:
        readiness:
          include: readinessState, db, diskSpace
