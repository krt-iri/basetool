server:
  tomcat:
    relaxed-query-chars: "{,},[,]"
    relaxed-path-chars: "{,},[,]"
    # Connector-level limits made explicit (M-3 from the performance audit). With
    # `spring.threads.virtual.enabled=true` Tomcat hands every request off to a
    # virtual-thread executor, so `threads.max` mostly documents intent for the
    # non-virtual fallback case (e.g. classpath without --enable-preview). The
    # NIO selector's accept queue (`accept-count`) and concurrent connection cap
    # (`max-connections`) however apply BEFORE the worker layer and are the real
    # gates under burst load — the Tomcat defaults (100 / 8192) used to drop
    # requests under spikes that the virtual-thread pool could otherwise have
    # absorbed. 200/10000 covers our public-internet exposure with headroom.
    threads:
      max: 200
      min-spare: 10
    accept-count: 200
    max-connections: 10000
  # Audit finding H-8: behind nginx-proxy-manager the immediate peer for `request.getRemoteAddr()`
  # is NPM's docker-internal IP — every client looks the same to the rate-limit filter and the
  # global bucket collapses into a single org-wide budget. With `framework` strategy Spring
  # consumes X-Forwarded-For / X-Forwarded-Proto / X-Forwarded-Host, exposes the real client IP
  # to downstream filters, and lets HSTS detect the proxy-terminated TLS scheme correctly.
  forward-headers-strategy: framework
  max-http-request-header-size: 65536
  http2:
    enabled: true
  port: 11261
  ssl:
    enabled: true
    # Default keeps backwards compatibility for local development and the test
    # stack, where the keystore is bind-mounted into the JAR as a classpath
    # resource at `backend/src/main/resources/keystore.p12`. In production the
    # keystore MUST NOT be baked into the image (see CLAUDE.md and
    # `.dockerignore`) — docker-compose overrides this with a `file:` URL
    # pointing at a runtime bind mount so the production cert lives outside
    # the GHCR image and never enters the registry.
    key-store: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: basetool
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/problem+json,text/html,text/plain,text/css,application/javascript,application/xml,image/svg+xml

spring:
  servlet:
    multipart:
      # Audit finding M-8: explicit multipart caps. Without these, Spring Boot's implicit
      # defaults (1MB file / 10MB request) apply — restrictive enough today but fragile to a
      # Spring Boot version bump that might change them. The only legitimate multipart-uploading
      # endpoints in the backend are the hangar ship-list / fleetview imports
      # (`HangarController.importShips` / `importFleetview`); real fleetview JSON tops out
      # under ~500 KB for a 100-ship hangar, so 2 MB covers it by an order of magnitude.
      max-file-size: 2MB
      max-request-size: 2MB
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  application:
    name: backend
  messages:
    fallback-to-system-locale: false
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          must-revalidate: true
    error:
      whitelabel:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    io.github.resilience4j: INFO
app:
  logging:
    correlation-id-header: X-Correlation-Id
    correlation-id-mdc-key: correlationId
    user-id-mdc-key: userId
    slow-request-threshold-ms: 2000
    structured-enabled: false
  keycloak:
    sync:
      enabled: true
      interval: 1m
      admin-url: ${KEYCLOAK_ADMIN_URL:http://keycloak:18080}
      realm: ${KEYCLOAK_REALM:iri}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:backend-service}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
  rate-limit:
    enabled: true
    paths:
      - /api/**
    capacity: 300
    refillTokens: 300
    refillPeriod: 1m
    # Audit finding L-5 (2026-05-20): tighter per-endpoint budgets layered on top of the global
    # 300/min/IP bucket. A spam attacker with one fixed IP trips the per-endpoint budget below
    # before the loose global budget is even touched, so a flood of anonymous joborder POSTs
    # cannot starve the legitimate read traffic. Capacities are sized for the realistic squadron
    # workload — a single human files at most a handful of these per minute; the limits leave
    # the legitimate user with comfortable headroom while flagging programmatic abuse.
    rules:
      - name: mission-create
        # Anonymous can create missions via POST /api/v1/missions. The endpoint runs a Mission
        # row insert + index update — heavy enough that 10/min/IP is the right ceiling for a
        # legitimate public submission flow.
        methods: [POST]
        paths:
          - /api/v1/missions
        capacity: 10
        refillTokens: 10
        refillPeriod: 1m
      - name: order-create
        # Anonymous can create job orders via POST /api/v1/orders (CLAUDE.md: gewollt). Same
        # write-heavy profile as the mission create, same cap.
        methods: [POST]
        paths:
          - /api/v1/orders
        capacity: 10
        refillTokens: 10
        refillPeriod: 1m
      - name: finance-entry-create
        # Anonymous guest participants can record their own payouts via POST /api/v1/finance-entries.
        # Slightly higher cap than mission/order because one mission may legitimately accrue 5–10
        # finance entries during its lifecycle, all created by the same guest IP.
        methods: [POST]
        paths:
          - /api/v1/finance-entries
        capacity: 20
        refillTokens: 20
        refillPeriod: 1m
      - name: participant-mutations
        # Covers the anonymous-reachable participant flows: add, slim add, update, check-in,
        # check-out, payout-preference change, delete (both legacy and /slim variants). A single
        # legitimate guest goes through join → check-in → maybe a payout flip → check-out — that's
        # 4–6 calls per mission they participate in. 30/min/IP comfortably covers the human path
        # while killing a script that tries to spam the participant table.
        methods: [POST, PUT, DELETE]
        paths:
          - /api/v1/missions/*/participants
          - /api/v1/missions/*/participants/**
        capacity: 30
        refillTokens: 30
        refillPeriod: 1m

# Actuator: expose only `health` for the Docker HEALTHCHECK / docker-compose
# `service_healthy` gating. The response is restricted to the bare status so that
# unauthenticated callers cannot enumerate internal components.
#
# The `readiness` group is widened from Spring's default (just `readinessState`) to
# also include the indicators whose `DOWN` actually means "stop sending traffic":
#   - db          — Hikari can run SELECT 1 against Postgres (auto-configured by
#                   spring-boot-starter-data-jpa).
#   - keycloak    — custom KeycloakHealthIndicator probes the OIDC discovery
#                   endpoint so Keycloak outages surface in readiness even though
#                   the Spring resource-server does not ship a built-in indicator.
#   - diskSpace   — auto-configured; <10 MB free trips DOWN, which would otherwise
#                   silently lose logs in prod (LogstashEncoder writes to disk).
#   - ssl         — auto-configured when server.ssl.enabled=true; warns when the
#                   keystore certificate is within the expiry threshold.
# `livenessState` is deliberately NOT in this group — a failing readiness probe
# should pull the container out of the load-balancer rotation, not restart it.
# The Docker HEALTHCHECK in backend/Dockerfile points at /actuator/health/readiness
# so this group is what gates docker-compose `service_healthy`.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, db, keycloak, diskSpace, ssl


