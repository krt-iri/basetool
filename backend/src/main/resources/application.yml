server:
  tomcat:
    relaxed-query-chars: "{,},[,]"
    relaxed-path-chars: "{,},[,]"
  # Audit finding H-8: behind nginx-proxy-manager the immediate peer for `request.getRemoteAddr()`
  # is NPM's docker-internal IP — every client looks the same to the rate-limit filter and the
  # global bucket collapses into a single org-wide budget. With `framework` strategy Spring
  # consumes X-Forwarded-For / X-Forwarded-Proto / X-Forwarded-Host, exposes the real client IP
  # to downstream filters, and lets HSTS detect the proxy-terminated TLS scheme correctly.
  forward-headers-strategy: framework
  max-http-request-header-size: 65536
  http2:
    enabled: true
  port: 11261
  ssl:
    enabled: true
    # Default keeps backwards compatibility for local development and the test
    # stack, where the keystore is bind-mounted into the JAR as a classpath
    # resource at `backend/src/main/resources/keystore.p12`. In production the
    # keystore MUST NOT be baked into the image (see CLAUDE.md and
    # `.dockerignore`) — docker-compose overrides this with a `file:` URL
    # pointing at a runtime bind mount so the production cert lives outside
    # the GHCR image and never enters the registry.
    key-store: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: basetool
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/problem+json,text/html,text/plain,text/css,application/javascript,application/xml,image/svg+xml

spring:
  servlet:
    multipart:
      # Audit finding M-8: explicit multipart caps. Without these, Spring Boot's implicit
      # defaults (1MB file / 10MB request) apply — restrictive enough today but fragile to a
      # Spring Boot version bump that might change them. The only legitimate multipart-uploading
      # endpoints in the backend are the hangar ship-list / fleetview imports
      # (`HangarController.importShips` / `importFleetview`); real fleetview JSON tops out
      # under ~500 KB for a 100-ship hangar, so 2 MB covers it by an order of magnitude.
      max-file-size: 2MB
      max-request-size: 2MB
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  application:
    name: backend
  messages:
    fallback-to-system-locale: false
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          must-revalidate: true
    error:
      whitelabel:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    io.github.resilience4j: INFO
app:
  logging:
    correlation-id-header: X-Correlation-Id
    correlation-id-mdc-key: correlationId
    user-id-mdc-key: userId
    slow-request-threshold-ms: 2000
    structured-enabled: false
  keycloak:
    sync:
      enabled: true
      interval: 1m
      admin-url: ${KEYCLOAK_ADMIN_URL:http://keycloak:18080}
      realm: ${KEYCLOAK_REALM:iri}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:backend-service}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
  rate-limit:
    enabled: true
    paths:
      - /api/**
    capacity: 300
    refillTokens: 300
    refillPeriod: 1m

# Actuator: expose only `health` for the Docker HEALTHCHECK / docker-compose
# `service_healthy` gating. The response is restricted to the bare status so that
# unauthenticated callers cannot enumerate internal components.
#
# The `readiness` group is widened from Spring's default (just `readinessState`) to
# also include the indicators whose `DOWN` actually means "stop sending traffic":
#   - db          — Hikari can run SELECT 1 against Postgres (auto-configured by
#                   spring-boot-starter-data-jpa).
#   - keycloak    — custom KeycloakHealthIndicator probes the OIDC discovery
#                   endpoint so Keycloak outages surface in readiness even though
#                   the Spring resource-server does not ship a built-in indicator.
#   - diskSpace   — auto-configured; <10 MB free trips DOWN, which would otherwise
#                   silently lose logs in prod (LogstashEncoder writes to disk).
#   - ssl         — auto-configured when server.ssl.enabled=true; warns when the
#                   keystore certificate is within the expiry threshold.
# `livenessState` is deliberately NOT in this group — a failing readiness probe
# should pull the container out of the load-balancer rotation, not restart it.
# The Docker HEALTHCHECK in backend/Dockerfile points at /actuator/health/readiness
# so this group is what gates docker-compose `service_healthy`.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, db, keycloak, diskSpace, ssl


