server:
  tomcat:
    relaxed-query-chars: "{,},[,]"
    relaxed-path-chars: "{,},[,]"
    # Connector-level limits made explicit (M-3 from the performance audit). With
    # `spring.threads.virtual.enabled=true` Tomcat hands every request off to a
    # virtual-thread executor, so `threads.max` mostly documents intent for the
    # non-virtual fallback case (e.g. classpath without --enable-preview). The
    # NIO selector's accept queue (`accept-count`) and concurrent connection cap
    # (`max-connections`) however apply BEFORE the worker layer and are the real
    # gates under burst load — the Tomcat defaults (100 / 8192) used to drop
    # requests under spikes that the virtual-thread pool could otherwise have
    # absorbed. 200/10000 covers our public-internet exposure with headroom.
    threads:
      max: 200
      min-spare: 10
    accept-count: 200
    max-connections: 10000
  # Audit finding H-8: behind nginx-proxy-manager the immediate peer for `request.getRemoteAddr()`
  # is NPM's docker-internal IP — every client looks the same to the rate-limit filter and the
  # global bucket collapses into a single org-wide budget. With `framework` strategy Spring
  # consumes X-Forwarded-For / X-Forwarded-Proto / X-Forwarded-Host, exposes the real client IP
  # to downstream filters, and lets HSTS detect the proxy-terminated TLS scheme correctly.
  forward-headers-strategy: framework
  max-http-request-header-size: 65536
  http2:
    enabled: true
  port: 11261
  ssl:
    enabled: true
    # Default keeps backwards compatibility for local development and the test
    # stack, where the keystore is bind-mounted into the JAR as a classpath
    # resource at `backend/src/main/resources/keystore.p12`. In production the
    # keystore MUST NOT be baked into the image (see CLAUDE.md and
    # `.dockerignore`) — docker-compose overrides this with a `file:` URL
    # pointing at a runtime bind mount so the production cert lives outside
    # the GHCR image and never enters the registry.
    key-store: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: basetool
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/problem+json,text/html,text/plain,text/css,application/javascript,application/xml,image/svg+xml

spring:
  servlet:
    multipart:
      # Audit finding M-8: explicit multipart caps. Without these, Spring Boot's implicit
      # defaults (1MB file / 10MB request) apply — restrictive enough today but fragile to a
      # Spring Boot version bump that might change them. Two endpoint classes upload multipart:
      # the hangar ship-list / fleetview imports (`HangarController.importShips` /
      # `importFleetview`), whose JSON tops out under ~500 KB for a 100-ship hangar, and the
      # admin-only P4K catalog import (`AdminP4kImportController`), which ingests the full game
      # DataForge export and is the driver for the larger ceiling below. The cap is global to
      # every multipart endpoint (all are auth-gated). 64 MB is a generous ceiling for the P4K
      # catalog; validate it against a measured real export before lowering it, and mind the
      # transient heap — the import parses the whole upload into a Jackson tree.
      # NOTE (deployment): the prod nginx-proxy-manager has its own `client_max_body_size`
      # (default 1 MB) — raise it there too, or large uploads 413 at the proxy before reaching
      # the app.
      max-file-size: 64MB
      max-request-size: 72MB
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  application:
    name: backend
  messages:
    fallback-to-system-locale: false
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          must-revalidate: true
    error:
      whitelabel:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
      # SEC-03: global statement-execution backstop. Every Hibernate-issued query (JPQL, derived,
      # @Query incl. native, @Modifying, pessimistic-lock waits) is bounded to this many
      # milliseconds, so a single heavy request -- e.g. a size=100000 load-all of the material
      # trade matrix -- can never pin one of the Hikari pool's connections indefinitely, and a
      # handful of concurrent ones cannot exhaust the pool (the Hikari timeouts only bound pool
      # ACQUISITION, not query EXECUTION). Applies ONLY to Hibernate; Flyway migrations use raw
      # JDBC and are unaffected, so a long migration is never killed. Generous (30s) so legitimate
      # load-all reads and batch syncs never trip it; raise via APP_DB_QUERY_TIMEOUT_MS for
      # environments with deliberately long batch queries.
      jakarta.persistence.query.timeout: ${APP_DB_QUERY_TIMEOUT_MS:30000}
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    io.github.resilience4j: INFO
app:
  logging:
    correlation-id-header: X-Correlation-Id
    correlation-id-mdc-key: correlationId
    user-id-mdc-key: userId
    slow-request-threshold-ms: 2000
    structured-enabled: false
  monitoring:
    scrape:
      # Basic-auth credentials for GET /actuator/prometheus (REQ-OBS-005, ADR-0061). Fail-closed:
      # when either variable is unset/blank, MonitoringScrapeSecurityConfig denies every request
      # to the endpoint. Set both only where a Prometheus scraper actually runs; never commit
      # real values.
      username: ${MONITORING_SCRAPE_USER:}
      password: ${MONITORING_SCRAPE_PASSWORD:}
  keycloak:
    sync:
      enabled: true
      interval: 1m
      admin-url: ${KEYCLOAK_ADMIN_URL:http://keycloak:18080}
      realm: ${KEYCLOAK_REALM:iri}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:backend-service}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
  discord:
    spi-precheck:
      # Shared secret the Keycloak Discord SPI presents (header X-KRT-SPI-Secret) to the internal
      # /internal/discord/account-existence endpoint (REQ-SEC-022). Blank disables the endpoint; the
      # SPI then fails open and skips the first-login collision precheck. Never commit a real value.
      shared-secret: ${KRT_DISCORD_SPI_SHARED_SECRET:}
  bank:
    integrity:
      # Scheduled ledger-integrity sweep (REQ-BANK-020). Disable or retune per environment.
      enabled: ${APP_BANK_INTEGRITY_ENABLED:true}
      interval: ${APP_BANK_INTEGRITY_INTERVAL:PT1H}
  notifications:
    retention:
      # Scheduled cleanup of READ notifications older than max-age (REQ-NOTIF-009). User-initiated
      # deletes (REQ-NOTIF-005) are independent of this sweep. Disable or retune per environment.
      enabled: ${APP_NOTIFICATIONS_RETENTION_ENABLED:true}
      max-age: ${APP_NOTIFICATIONS_RETENTION_MAX_AGE:P90D}
      interval: ${APP_NOTIFICATIONS_RETENTION_INTERVAL:PT24H}
  default-blueprints:
    provisioning:
      # One-time seed of the starter default blueprints + idempotent backfill/sweep that keeps the
      # "always present" guarantee (REQ-INV-016) true. Disabling stops both the startup bootstrap
      # and the periodic sweep; the first-login grant still runs. Disable or retune per environment.
      enabled: ${APP_DEFAULT_BLUEPRINTS_PROVISIONING_ENABLED:true}
      interval: ${APP_DEFAULT_BLUEPRINTS_PROVISIONING_INTERVAL:PT1H}
  rate-limit:
    enabled: true
    paths:
      - /api/**
    capacity: 300
    refillTokens: 300
    refillPeriod: 1m
    # Audit finding L-5 (2026-05-20): tighter per-endpoint budgets layered on top of the global
    # 300/min/IP bucket. A spam attacker with one fixed IP trips the per-endpoint budget below
    # before the loose global budget is even touched, so a flood of anonymous joborder POSTs
    # cannot starve the legitimate read traffic. Capacities are sized for the realistic squadron
    # workload — a single human files at most a handful of these per minute; the limits leave
    # the legitimate user with comfortable headroom while flagging programmatic abuse.
    rules:
      - name: mission-create
        # Anonymous can create missions via POST /api/v1/missions. The endpoint runs a Mission
        # row insert + index update — heavy enough that 10/min/IP is the right ceiling for a
        # legitimate public submission flow.
        methods: [POST]
        paths:
          - /api/v1/missions
        capacity: 10
        refillTokens: 10
        refillPeriod: 1m
      - name: order-create
        # Anonymous can create job orders via POST /api/v1/orders (CLAUDE.md: gewollt). Same
        # write-heavy profile as the mission create, same cap.
        methods: [POST]
        paths:
          - /api/v1/orders
        capacity: 10
        refillTokens: 10
        refillPeriod: 1m
      - name: finance-entry-create
        # Anonymous guest participants can record their own payouts via POST /api/v1/finance-entries.
        # Slightly higher cap than mission/order because one mission may legitimately accrue 5–10
        # finance entries during its lifecycle, all created by the same guest IP.
        methods: [POST]
        paths:
          - /api/v1/finance-entries
        capacity: 20
        refillTokens: 20
        refillPeriod: 1m
      - name: participant-mutations
        # Covers the anonymous-reachable participant flows: add, slim add, update, check-in,
        # check-out, payout-preference change, delete (both legacy and /slim variants). A single
        # legitimate guest goes through join → check-in → maybe a payout flip → check-out — that's
        # 4–6 calls per mission they participate in. 30/min/IP comfortably covers the human path
        # while killing a script that tries to spam the participant table.
        methods: [POST, PUT, DELETE]
        paths:
          - /api/v1/missions/*/participants
          - /api/v1/missions/*/participants/**
        capacity: 30
        refillTokens: 30
        refillPeriod: 1m

# Actuator: expose `health` for the Docker HEALTHCHECK / docker-compose
# `service_healthy` gating (bare status only, so unauthenticated callers cannot
# enumerate internal components) plus `prometheus` for the monitoring scrape
# (REQ-OBS-005). `/actuator/prometheus` is NOT public: MonitoringScrapeSecurityConfig
# guards it with fail-closed basic auth (denyAll until MONITORING_SCRAPE_USER/PASSWORD
# are set), so exposing it here adds no unauthenticated surface.
#
# The `readiness` group is widened from Spring's default (just `readinessState`) to
# also include the indicators whose `DOWN` actually means "stop sending traffic":
#   - db          — Hikari can run SELECT 1 against Postgres (auto-configured by
#                   spring-boot-starter-data-jpa).
#   - keycloak    — custom KeycloakHealthIndicator probes the OIDC discovery
#                   endpoint so Keycloak outages surface in readiness even though
#                   the Spring resource-server does not ship a built-in indicator.
#   - diskSpace   — auto-configured; <10 MB free trips DOWN, which would otherwise
#                   silently lose logs in prod (LogstashEncoder writes to disk).
#   - ssl         — auto-configured when server.ssl.enabled=true; warns when the
#                   keystore certificate is within the expiry threshold.
# `livenessState` is deliberately NOT in this group — a failing readiness probe
# should pull the container out of the load-balancer rotation, not restart it.
# The Docker HEALTHCHECK in backend/Dockerfile points at /actuator/health/readiness
# so this group is what gates docker-compose `service_healthy`.
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, db, keycloak, diskSpace, ssl
  metrics:
    tags:
      # Common tag on every meter; the Grafana "Spring Boot apps" dashboard selects the
      # module through this `application` label (epic #936 dashboard set).
      application: basetool-backend
