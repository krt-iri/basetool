# Backend ProblemDetail localization (RFC 7807).
#
# Used by GlobalExceptionHandler to localize the `title` and `detail` fields
# of RFC 7807 error responses based on the Accept-Language header. The stable
# `code` extension property (e.g. OPTIMISTIC_LOCK) is the authoritative
# machine-readable identifier and never changes; the human-readable strings
# below MAY be reworded freely.
#
# Default file = German (project's primary language; DAS KARTELL / IRIDIUM).
# messages_de.properties mirrors this; messages_en.properties holds English.
problem.optimistic_lock.title=Konflikt durch gleichzeitige \u00C4nderung
problem.optimistic_lock.detail=Die Ressource wurde inzwischen von einem anderen Benutzer ge\u00E4ndert. Bitte lade die Seite neu und versuche es erneut.
problem.pessimistic_lock.title=Ressource gesperrt
problem.pessimistic_lock.detail=Der Vorgang wird gerade von einem anderen Benutzer ausgef\u00FChrt. Bitte versuche es in einem Moment erneut.
problem.unauthenticated.title=Anmeldung erforderlich
problem.unauthenticated.detail=Du musst angemeldet sein, um diese Aktion auszuf\u00FChren.
problem.access_denied.title=Zugriff verweigert
problem.access_denied.detail=Du bist nicht berechtigt, diese Aktion auszuf\u00FChren.
problem.validation_failed.title=Validierung fehlgeschlagen
problem.validation_failed.detail=Ein oder mehrere Felder enthalten ung\u00FCltige Werte.
problem.constraint_violation.title=Validierung fehlgeschlagen
problem.constraint_violation.detail=Ein oder mehrere Anfrage-Parameter enthalten ung\u00FCltige Werte.
