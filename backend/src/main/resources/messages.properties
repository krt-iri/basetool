# Service-level error messages. Used as the `detail` field when a service throws a
# BadRequestException / NotFoundException / DuplicateEntityException with the key
# as the argument: `throw new BadRequestException("error.refinery_order.location_required")`.
# GlobalExceptionHandler#resolveDetail resolves the key against this bundle so the same
# throw site emits the locale-correct text. Throw sites that still use a literal English
# string keep working unchanged (the resolver passes them through verbatim) - migration
# is incremental.
error.user.not_found=Benutzer nicht gefunden.
error.location.not_found=Lagerort nicht gefunden.
error.mission.not_found=Einsatz nicht gefunden.
error.mission.participant.duplicate.user=Dieser Nutzer ist bereits Teilnehmer dieses Einsatzes.
error.mission.participant.duplicate.guest=Ein Gast mit diesem Namen ist bereits Teilnehmer dieses Einsatzes.
error.mission.crew.duplicate=Dieser Teilnehmer ist bereits einer Einheit dieses Einsatzes zugewiesen.
error.refining_method.not_found=Raffinerie-Methode nicht gefunden.
error.material.input.not_found=Eingangsmaterial nicht gefunden.
error.material.output.not_found=Ausgangsmaterial nicht gefunden.
error.refinery_order.not_found=Raffinerieauftrag nicht gefunden.
error.refinery_order.location_required=F\u00FCr einen Raffinerieauftrag muss ein Lagerort angegeben werden.
error.refinery_order.input_material_required=F\u00FCr ein veredeltes Gut muss ein Eingangsmaterial angegeben werden.
error.rank_requirement.invalid_step=Eine Bef\u00F6rderung muss genau einen Rangschritt umfassen (z. B. 20 -> 19), nicht mehrere.

# Refinery screenshot import (#434, epic #439). Envelope-level rejects surfaced by the
# GlobalExceptionHandler; the refineryImport.issue.* keys translate the ImportIssueCode
# enum (key = enum constant) on the review surface.
error.refineryImport.unsupportedSchemaVersion=Die Extract-Datei verwendet eine nicht unterst\u00FCtzte Schema-Version. Bitte den Basetool SC Extractor aktualisieren.
error.refineryImport.unsupportedPanelType=Die Extract-Datei stammt nicht vom SETUP-Bildschirm der Raffinerie. Es werden nur SETUP-Aufnahmen unterst\u00FCtzt.
refineryImport.issue.UNMATCHED_MATERIAL=Material konnte keinem Katalogeintrag zugeordnet werden - bitte manuell zuordnen.
refineryImport.issue.LOW_CONFIDENCE_MATERIAL=Material wurde nur unscharf zugeordnet - bitte Zuordnung pr\u00FCfen.
refineryImport.issue.NO_REFINED_MATERIAL=F\u00FCr das Eingangsmaterial ist kein veredeltes Material hinterlegt - das Ausgangsmaterial bleibt leer.
refineryImport.issue.OUT_OF_RANGE_QUALITY=Qualit\u00E4t liegt au\u00DFerhalb des g\u00FCltigen Bereichs 0-1000 - vermutlich ein Lesefehler, bitte korrigieren.
refineryImport.issue.UNRESOLVED_LOCATION=Raffinerie-Standort konnte nicht zugeordnet werden - bitte ausw\u00E4hlen.
refineryImport.issue.UNRESOLVED_METHOD=Raffinerie-Methode konnte nicht zugeordnet werden - bitte ausw\u00E4hlen.
refineryImport.issue.SKIPPED_REFINE_OFF=Zeile \u00FCbersprungen: REFINE war ausgeschaltet (z. B. inerte Materialien).
refineryImport.issue.SKIPPED_ZERO_QTY=Zeile \u00FCbersprungen: Menge oder Ertrag war 0.
refineryImport.issue.UNQUOTED_ROW=Zeile ohne Ertragswert (--): Screenshot wurde vor GET QUOTE aufgenommen. Im Spiel GET QUOTE dr\u00FCcken und erneut aufnehmen.
refineryImport.issue.UNQUOTED_ORDER=Alle Zeilen ohne Ertragswerte: Der Auftrag wurde vor GET QUOTE aufgenommen. Im Spiel GET QUOTE dr\u00FCcken und erneut aufnehmen.
refineryImport.issue.SUM_MISMATCH=Eine Kopfzeilen-Summe stimmt nicht mit den gelesenen Zeilen \u00FCberein - m\u00F6glicherweise fehlt ein gescrollter Screenshot.
refineryImport.issue.MULTIPLE_ORDERS_TRUNCATED=Die Datei enth\u00E4lt mehrere Auftr\u00E4ge - nur der erste wurde \u00FCbernommen.
refineryImport.issue.UNSUPPORTED_PANEL_TYPE=Nicht unterst\u00FCtzter Bildschirm-Typ.
