# Backend ProblemDetail localization (RFC 7807).
#
# Used by GlobalExceptionHandler to localize the `title` and `detail` fields
# of RFC 7807 error responses based on the Accept-Language header. The stable
# `code` extension property (e.g. OPTIMISTIC_LOCK) is the authoritative
# machine-readable identifier and never changes; the human-readable strings
# below MAY be reworded freely.
#
# Default file = German (project's primary language; DAS KARTELL / IRIDIUM).
# messages_de.properties mirrors this; messages_en.properties holds English.
problem.optimistic_lock.title=Konflikt durch gleichzeitige \u00C4nderung
problem.optimistic_lock.detail=Die Ressource wurde inzwischen von einem anderen Benutzer ge\u00E4ndert. Bitte lade die Seite neu und versuche es erneut.
problem.pessimistic_lock.title=Ressource gesperrt
problem.pessimistic_lock.detail=Der Vorgang wird gerade von einem anderen Benutzer ausgef\u00FChrt. Bitte versuche es in einem Moment erneut.
problem.unauthenticated.title=Anmeldung erforderlich
problem.unauthenticated.detail=Du musst angemeldet sein, um diese Aktion auszuf\u00FChren.
problem.access_denied.title=Zugriff verweigert
problem.access_denied.detail=Du bist nicht berechtigt, diese Aktion auszuf\u00FChren.
problem.validation_failed.title=Validierung fehlgeschlagen
problem.validation_failed.detail=Ein oder mehrere Felder enthalten ung\u00FCltige Werte.
problem.constraint_violation.title=Validierung fehlgeschlagen
problem.constraint_violation.detail=Ein oder mehrere Anfrage-Parameter enthalten ung\u00FCltige Werte.
problem.illegal_argument.title=Ung\u00FCltiges Argument
problem.illegal_argument.detail=Die Anfrage enthielt ein ung\u00FCltiges Argument. Im Server-Log mit der Correlation-Id stehen weitere Details.
problem.bad_request.title=Ung\u00FCltige Anfrage
problem.bad_request.detail=Die Anfrage konnte nicht verarbeitet werden, da sie ung\u00FCltige Daten enth\u00E4lt.
# Org chart (Profit-Bereich) constraint violations, surfaced as the 400 problem detail.
problem.org_chart.scope_mismatch=Der Funktionsrang passt nicht zur gew\u00E4hlten Ebene (Bereichsleitung, Staffel oder Spezialkommando).
problem.org_chart.unit_not_profit_eligible=Diese OrgUnit ist nicht profit-berechtigt oder inaktiv und kann nicht im Organigramm besetzt werden.
problem.org_chart.invalid_parent=Die \u00FCbergeordnete Position ist ung\u00FCltig. Ein Stv. Kommandoleiter und ein Ensign m\u00FCssen einem Kommandoleiter derselben Staffel zugeordnet werden.
problem.org_chart.command_limit=Eine Staffel kann h\u00F6chstens vier Kommandogruppen haben.
problem.org_chart.ensign_limit=Eine Staffel kann h\u00F6chstens vier Ensign haben.
problem.org_chart.commander_limit=Ein Spezialkommando kann h\u00F6chstens zwei SK-Leiter haben.
problem.org_chart.duplicate_lead=Diese Leitungsposition ist bereits besetzt.
problem.org_chart.duplicate_deputy=Dieser Kommandoleiter hat bereits einen Stv. Kommandoleiter.
problem.org_chart.user_already_assigned=Dieser Nutzer ist in diesem Bereich bereits einer Position zugeordnet.
problem.org_chart.user_required=F\u00FCr diese Position muss ein Nutzer ausgew\u00E4hlt werden.
problem.org_chart.name_not_allowed=Nur eine Kommandogruppe kann einen Namen tragen.
problem.unreadable_body.title=Ung\u00FCltige Anfrage
problem.unreadable_body.detail=Der Anfragerumpf konnte nicht gelesen oder geparst werden.
problem.duplicate_entity.title=Doppelter Eintrag
problem.duplicate_entity.detail=Ein Eintrag mit diesen Daten existiert bereits.
problem.entity_in_use.title=Eintrag in Verwendung
problem.entity_in_use.detail=Der Eintrag kann nicht gel\u00F6scht werden, da er noch verwendet wird.
problem.business_conflict.title=Konflikt mit aktuellem Zustand
problem.business_conflict.detail=Die Anfrage steht im Konflikt mit dem aktuellen Zustand der Ressource.
problem.data_integrity.title=Datenintegrit\u00E4tsverletzung
problem.data_integrity.detail=Der Vorgang konnte aufgrund einer Datenbank-Constraint-Verletzung nicht abgeschlossen werden.
problem.type_mismatch.title=Typ-Mismatch
problem.type_mismatch.detail=Ung\u00FCltiger Wert f\u00FCr Parameter "{0}".
problem.method_not_allowed.title=Methode nicht erlaubt
problem.method_not_allowed.detail=HTTP-Methode "{0}" wird f\u00FCr diesen Endpunkt nicht unterst\u00FCtzt.
problem.not_found.title=Nicht gefunden
problem.not_found.detail=Die angeforderte Ressource wurde nicht gefunden.
problem.external_service.title=Externer Dienst nicht erreichbar
problem.external_service.detail=Ein vom Backend ben\u00F6tigter externer Dienst hat einen Fehler gemeldet oder ist gerade nicht erreichbar. Bitte versuche es in einem Moment erneut.
problem.report_generation_failed.title=Bericht konnte nicht erstellt werden
problem.report_generation_failed.detail=Beim Erzeugen des Berichts ist ein unerwarteter Fehler aufgetreten. Die Correlation-Id im Server-Log enth\u00E4lt die Details.
problem.internal_error.title=Interner Serverfehler
problem.internal_error.detail=Ein unerwarteter Fehler ist aufgetreten. Bitte kontaktiere den Administrator, falls das Problem weiterhin besteht.

