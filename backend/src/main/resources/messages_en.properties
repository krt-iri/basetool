# Refinery screenshot import (#434, epic #439). Envelope-level rejects surfaced by the
# GlobalExceptionHandler; the refineryImport.issue.* keys translate the ImportIssueCode
# enum (key = enum constant) on the review surface.
error.refineryImport.unsupportedSchemaVersion=The extract file uses an unsupported schema version. Please update the Basetool SC Extractor.
error.refineryImport.unsupportedPanelType=The extract file was not captured on the refinery SETUP screen. Only SETUP captures are supported.
refineryImport.issue.UNMATCHED_MATERIAL=Material could not be matched to any catalogue entry - please assign it manually.
refineryImport.issue.LOW_CONFIDENCE_MATERIAL=Material was matched only fuzzily - please verify the assignment.
refineryImport.issue.NO_REFINED_MATERIAL=The input material has no refined material on record - the output material stays empty.
refineryImport.issue.OUT_OF_RANGE_QUALITY=Quality is outside the valid 0-1000 range - likely a misread, please correct it.
refineryImport.issue.UNRESOLVED_LOCATION=Refinery location could not be resolved - please select one.
refineryImport.issue.UNRESOLVED_METHOD=Refining method could not be resolved - please select one.
refineryImport.issue.SKIPPED_REFINE_OFF=Row skipped: REFINE was off (e.g. inert materials).
refineryImport.issue.SKIPPED_ZERO_QTY=Row skipped: quantity or yield was 0.
refineryImport.issue.UNQUOTED_ROW=Row without a yield value (--): the screenshot was taken before GET QUOTE. Press GET QUOTE in game and re-capture.
refineryImport.issue.UNQUOTED_ORDER=No row carries a yield value: the order was captured before GET QUOTE. Press GET QUOTE in game and re-capture.
refineryImport.issue.SUM_MISMATCH=The REFINE-ON quantities exceed the TO REFINE panel total - either a quantity/toggle was mis-read, or the order was modified after GET QUOTE (the panel total freezes at quote time). Check the rows, re-quote if needed and capture again.
refineryImport.issue.MULTIPLE_ORDERS_TRUNCATED=The file contains multiple orders - only the first one was imported.
refineryImport.issue.UNSUPPORTED_PANEL_TYPE=Unsupported screen type.

