# Override for spinning up the dev stack with test-only credentials from
# .env.test. The base docker-compose.yml hardcodes the production-facing
# KEYCLOAK_ISSUER_URI (https://keycloak.iri-base.org/realms/iri) into both
# x-backend and x-frontend templates; this file points everything at the
# locally-imported `iri` realm on the host-mapped Keycloak port 18080
# instead, using host.docker.internal so that the same URL works both
# inside containers and from the host browser on Docker Desktop.
#
# Usage:
#   docker compose --env-file .env.test -f docker-compose.yml -f docker-compose.test.yml \
#       --profile dev up -d
#
# After Keycloak is healthy, browse to http://localhost:18081 and log in as
# test-admin / test-admin-pw (defined in realm-export.json).
#
# Prerequisites in the worktree (all gitignored):
#   .env.test                            — credentials
#   realm-export.json                    — Keycloak realm dump with test-admin user
#   backend/src/main/resources/keystore.p12  — generated with the password
#                                              from .env.test (matching SAN: localhost, backend)
#
# This file is intentionally not auto-loaded (no `.override.yml` name) — it
# has to be passed explicitly so the production-targeted `docker compose up`
# in other contexts is not affected.

services:
  keycloak-dev:
    environment:
      # Make Keycloak emit issuer URLs that resolve identically from inside
      # Docker (backend / frontend containers reach the host via
      # host.docker.internal) and from the host browser (Docker Desktop
      # resolves host.docker.internal to localhost). KC_HOSTNAME_STRICT=false
      # also tolerates plain http://localhost:18080 access during testing.
      KC_HOSTNAME: host.docker.internal
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_PORT: "18080"
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB_USERNAME: ${KC_POSTGRES_USER}
      KC_DB_PASSWORD: ${KC_POSTGRES_PASSWORD}

  backend-dev:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Override the prod-target issuer URI baked into the base template.
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:18080/realms/iri
      # Admin-API calls stay on the internal Docker network — no need to go
      # via host.docker.internal for service-to-service traffic.
      KEYCLOAK_ADMIN_URL: http://keycloak:18080
      KEYCLOAK_REALM: iri
      KEYCLOAK_ADMIN_CLIENT_ID: backend-service
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    # Make host.docker.internal resolvable from inside the container on
    # platforms that don't ship the alias by default (Linux). On Docker
    # Desktop (Mac/Windows) the alias is already present; the extra_hosts
    # entry is a no-op there.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-dev:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      KEYCLOAK_ISSUER_URI: http://host.docker.internal:18080/realms/iri
    extra_hosts:
      - "host.docker.internal:host-gateway"
