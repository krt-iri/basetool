# Shared log-rotation policy. Without these limits the default `json-file`
# driver grows the per-container log file unbounded — at our request volume the
# backend alone produces ~150 MB/day of JSON access logs, so a long-running
# host would fill `/var/lib/docker/containers/` within weeks. Anchored here and
# referenced via `logging: *default-logging` from every service template so a
# future change (e.g. switch to `local` driver) is a single-line edit.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-db-backend: &db-backend-template
  # Pinned by digest in addition to the `:18-alpine` tag so a silent upstream
  # rebuild (Postgres or Alpine base) cannot land on the prod host between the
  # `docker compose pull` on the deploy server and a subsequent compose-driven
  # restart. Refresh by running `docker buildx imagetools inspect postgres:18-alpine`
  # locally and updating the digest below — never via :latest.
  image: postgres:18-alpine@sha256:d3e64d36360a9f40c30fbbc5dd2dde799fe35f8537500c8b067551a6497f50f4
  restart: unless-stopped
  logging: *default-logging
  # Container-aware memory tuning. The default Postgres settings (128 kB work_mem,
  # 128 MB shared_buffers) target a 4 GB host — at our 768 MB container limit the
  # buffer pool stays warm and join/sort operations spill to disk far less often.
  # `effective_cache_size` is an estimate to the planner, not an allocation, so
  # setting it to ~2/3 of the limit is safe and helps index plans win over seq
  # scans.
  command: >
    postgres
    -c shared_buffers=192MB
    -c effective_cache_size=512MB
    -c work_mem=8MB
    -c maintenance_work_mem=64MB
    -c max_connections=100
  environment:
    POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    PGPORT: 15432
    PGDATA: /var/lib/postgresql/data/pgdata
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?} -d ${POSTGRES_DB:?} -p 15432"]
    interval: 5s
    timeout: 5s
    retries: 5
  stop_grace_period: 60s
  # Resource budget: targets a 4 vCPU / 8 GB host. Total of all `prod` services
  # is ~5.6 GB RAM (leaves ~2 GB headroom for the kernel, the Docker daemon and
  # short-lived bursts). CPU limits are intentionally overcommitted relative to
  # the four physical vCPUs because they are per-container burst ceilings, not
  # reserved shares — the CFS scheduler arbitrates contention at run time.
  # Without these limits an in-container memory leak would let one service
  # monopolise the host and OOM-kill its neighbours (Postgres in particular
  # has historically been the casualty when the JVM heap runs away).
  deploy:
    resources:
      limits:
        memory: 768M
        cpus: '1.5'
  volumes:
    - /var/iri/db-backend:/var/lib/postgresql/data

x-db-keycloak: &db-keycloak-template
  # Same digest pin policy as db-backend (see comment there).
  image: postgres:18-alpine@sha256:d3e64d36360a9f40c30fbbc5dd2dde799fe35f8537500c8b067551a6497f50f4
  restart: unless-stopped
  logging: *default-logging
  # Smaller tuning than db-backend (512 MB limit vs 768 MB). Keycloak's working
  # set is realm config + user records + sessions — easily fits in 128 MB
  # shared_buffers for our member count.
  command: >
    postgres
    -c shared_buffers=128MB
    -c effective_cache_size=384MB
    -c work_mem=4MB
    -c maintenance_work_mem=32MB
    -c max_connections=100
  environment:
    POSTGRES_DB: ${KC_POSTGRES_DB:?KC_POSTGRES_DB must be set in .env}
    POSTGRES_USER: ${KC_POSTGRES_USER:?KC_POSTGRES_USER must be set in .env}
    POSTGRES_PASSWORD: ${KC_POSTGRES_PASSWORD:?KC_POSTGRES_PASSWORD must be set in .env}
    PGPORT: 15433
    PGDATA: /var/lib/postgresql/data/pgdata
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${KC_POSTGRES_USER:?} -d ${KC_POSTGRES_DB:?} -p 15433"]
    interval: 5s
    timeout: 5s
    retries: 5
  stop_grace_period: 60s
  # Smaller than db-backend: Keycloak's schema is fixed and the working set
  # (users, sessions, realm config) easily fits in 512 MB shared_buffers + page
  # cache for our member count. Bump if user count grows past O(thousands).
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '1.0'
  volumes:
    - /var/iri/db-keycloak:/var/lib/postgresql/data

x-keycloak: &keycloak-template
  # Same digest pin policy as the Postgres images. Refresh with
  # `docker buildx imagetools inspect quay.io/keycloak/keycloak:26.6`.
  image: quay.io/keycloak/keycloak:26.6@sha256:5fdbf2dbb5897cc34e82de49d13e23db011f9925089dbc555fc095f2c8bc1dac
  command: start --proxy-headers xforwarded --cache=local --log=console,file --log-file=/var/log/keycloak/keycloak.log
  restart: unless-stopped
  logging: *default-logging
  stop_grace_period: 30s
  # Quarkus-based Keycloak with local cache + JWT signing + the realm import is
  # the second-biggest RAM consumer behind the backend. 1.5 GB matches the
  # upstream recommendation for a small production realm with our member count.
  deploy:
    resources:
      limits:
        memory: 1536M
        cpus: '2.0'
  environment:
    KC_HOSTNAME: keycloak.profit-base.online
    KC_HOSTNAME_STRICT: "true"
    KC_HEALTH_ENABLED: "true"
    KC_HTTP_ENABLED: "true"
    KC_HTTP_PORT: 18080
    KC_DB: postgres
    KC_DB_URL: jdbc:postgresql://db-keycloak:15433/${KC_POSTGRES_DB:?KC_POSTGRES_DB must be set in .env}
    KC_DB_USERNAME: ${KC_POSTGRES_USER:?KC_POSTGRES_USER must be set in .env}
    KC_DB_PASSWORD: ${KC_POSTGRES_PASSWORD:?KC_POSTGRES_PASSWORD must be set in .env}
    KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:?KC_BOOTSTRAP_ADMIN_USERNAME must be set in .env}
    KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD must be set in .env}
  # The Keycloak Quarkus image is built on `ubi9-micro` and ships neither curl
  # nor wget, so the readiness probe uses bash's `/dev/tcp` virtual filesystem to
  # open a TCP connection to the management port and reads back the HTTP status
  # line. `printf` (POSIX) replaces `echo -e` for predictable backslash handling.
  healthcheck:
    test:
      - CMD-SHELL
      - >-
        exec 3<>/dev/tcp/127.0.0.1/9000
        && printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
        && grep -q '200 OK' <&3
    interval: 10s
    timeout: 10s
    retries: 15
    start_period: 30s
  volumes:
    - ./keycloak-theme/krt-theme:/opt/keycloak/themes/krt-theme
    - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    - /var/iri/keycloak/log:/var/log/keycloak

x-backend: &backend-template
  # Image lives in GHCR and is produced by .github/workflows/release-images.yml.
  # `IRI_BASETOOL_VERSION` is the version pointer (default `stable`, which the
  # promote.yml workflow updates atomically); the server's deploy.sh script
  # writes a concrete version (e.g. `1.4.2`) into the host .env for explicit
  # rollbacks. For local-iteration on the Dockerfile itself, use
  # docker-compose.build.yml as an override to add `build:` back in.
  image: ghcr.io/${IRI_IMAGE_NAMESPACE:-krt-iri}/basetool-backend:${IRI_BASETOOL_VERSION:-stable}
  restart: always
  logging: *default-logging
  stop_grace_period: 30s
  # Biggest workload on the host: every API call goes through this JVM, Flyway
  # runs at startup, and Hibernate caches L1/L2 + Caffeine caches live here.
  # MaxRAMPercentage=75 (set further down in JAVA_TOOL_OPTIONS) maps to roughly
  # 1.1 GB heap inside the 1536M limit, the remaining ~400 MB cover Metaspace,
  # the JIT code cache, native libs (openpdf, postgres jdbc) and a working
  # buffer for the Tomcat thread pool.
  deploy:
    resources:
      limits:
        memory: 1536M
        cpus: '2.0'
  environment:
    SPRING_PROFILES_ACTIVE: prod
    SERVER_PORT: 11261
    SPRING_DATASOURCE_URL: jdbc:postgresql://db-backend:15432/${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
    SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    KEYCLOAK_ISSUER_URI: https://keycloak.profit-base.online/realms/iri
    KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:?KEYCLOAK_ADMIN_CLIENT_SECRET must be set in .env}
    # The keystore lives on the host filesystem (bind-mounted below) and is
    # explicitly NOT packaged into the GHCR image. Both backend and frontend
    # share the same PKCS12 file because the cert's SAN covers the Docker
    # network aliases `backend` and `frontend`. If a future operator wants
    # per-service keystores, set IRI_KEYSTORE_HOST_PATH_BACKEND and
    # IRI_KEYSTORE_HOST_PATH_FRONTEND separately in .env and override the
    # volume entry per service.
    SERVER_SSL_KEY_STORE: file:/run/secrets/keystore.p12
    SERVER_SSL_KEY_STORE_PASSWORD: ${SERVER_SSL_KEY_STORE_PASSWORD:?SERVER_SSL_KEY_STORE_PASSWORD must be set in .env}
    JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
  volumes:
    - /var/iri/backend/log:/app/logs
    # Production cert is on the host, never in the image. Default points at the
    # repo-root `./keystore.p12` so a local developer can generate one there
    # and `docker compose --profile dev up -d` works out of the box; the prod
    # `.env` overrides this to `/var/iri/secrets/keystore.p12`. The path is
    # resolved relative to the directory containing docker-compose.yml.
    - ${IRI_KEYSTORE_HOST_PATH:-./keystore.p12}:/run/secrets/keystore.p12:ro

x-redis: &redis-template
  # Same digest pin policy as the Postgres images. Refresh with
  # `docker buildx imagetools inspect redis:8-alpine`.
  image: redis:8-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
  # Lightweight RDB persistence (re-enabled 2026-06 for the 30-day session
  # goal). M-7 had turned all persistence off (`--save "" --appendonly no`) on
  # the premise that a Redis restart only drops Spring Sessions, which
  # SsoReAuthenticationEntryPoint rebuilds via a transparent `prompt=none`
  # Keycloak redirect. That premise no longer holds: the Spring Session now
  # carries the OAuth2 refresh token behind a rolling 30-day login, and losing
  # it forces a re-auth round-trip that is only silent while the browser still
  # holds a live Keycloak SSO cookie. RDB snapshots restore that durability
  # cheaply via periodic background forks with NO per-write fsync -- the
  # ~200 fsync/s AOF cost M-7 removed stays off (`--appendonly no`). The session
  # dataset is tiny (OidcUser / OAuth2AuthorizedClient + flash attributes), so a
  # fork-and-dump every few minutes is negligible I/O. `--save "300 1 60 1000"`
  # snapshots after 300s if >=1 key changed (<=5 min worst-case loss) or after
  # 60s under heavy churn; dump.rdb lands on the /var/iri/redis bind mount and
  # is reloaded on restart.
  command: redis-server --save "300 1 60 1000" --appendonly no --loglevel notice --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
  restart: unless-stopped
  logging: *default-logging
  stop_grace_period: 30s
  # Only stores Spring sessions (OidcUser / OAuth2AuthorizedClient + flash
  # attributes). 256 MB is generous for our active-user count plus the
  # copy-on-write headroom an RDB snapshot fork transiently needs.
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: '0.5'
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?}", "--no-auth-warning", "ping"]
    interval: 5s
    timeout: 5s
    retries: 5
  volumes:
    - /var/iri/redis:/data

x-frontend: &frontend-template
  # See x-backend above for the GHCR / IRI_BASETOOL_VERSION rationale. Local
  # rebuilds happen via docker-compose.build.yml.
  image: ghcr.io/${IRI_IMAGE_NAMESPACE:-krt-iri}/basetool-frontend:${IRI_BASETOOL_VERSION:-stable}
  restart: always
  logging: *default-logging
  stop_grace_period: 30s
  # Thymeleaf SSR + WebClient proxy to the backend; no JPA, no business logic,
  # so the working set is well below the backend's. 768 MB → ~576 MB heap with
  # MaxRAMPercentage=75 is enough for Tomcat, the Spring Session client cache
  # and the Caffeine-backed reference-data cache.
  deploy:
    resources:
      limits:
        memory: 768M
        cpus: '1.0'
  environment:
    SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    SERVER_PORT: 18081
    KEYCLOAK_ISSUER_URI: https://keycloak.profit-base.online/realms/iri
    BACKEND_URL: https://backend:11261
    REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    SERVER_SSL_KEY_STORE: file:/run/secrets/keystore.p12
    SERVER_SSL_KEY_STORE_PASSWORD: ${SERVER_SSL_KEY_STORE_PASSWORD:?SERVER_SSL_KEY_STORE_PASSWORD must be set in .env}
    JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
  volumes:
    - /var/iri/frontend/log:/app/logs
    - ${IRI_KEYSTORE_HOST_PATH:-./keystore.p12}:/run/secrets/keystore.p12:ro

x-ingest: &ingest-template
  # The desktop one-click ingest gateway (epic #639, ADR-0018) — the ONLY new internet-reachable
  # service. NPM terminates TLS and proxies to its plain-HTTP port, so unlike backend/frontend it
  # carries no server keystore; the bind-mounted keystore.p12 is used only as a TRUSTSTORE so the
  # gateway can validate the backend's self-signed https://backend:11261 cert (backend-trust bundle
  # in application-prod.yml). It owns no database — it relays to the backend and stages a short-lived
  # single-use handoff in the shared Redis. See x-backend for the GHCR / IRI_BASETOOL_VERSION
  # rationale; local rebuilds use docker-compose.build.yml.
  image: ghcr.io/${IRI_IMAGE_NAMESPACE:-krt-iri}/basetool-ingest:${IRI_BASETOOL_VERSION:-stable}
  restart: always
  logging: *default-logging
  stop_grace_period: 30s
  # Lightweight: a JWT-validating relay + Redis staging, no JPA, no business logic. 512 MB →
  # ~384 MB heap with MaxRAMPercentage=75 covers Tomcat, the reactive WebClient and Lettuce.
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '1.0'
  environment:
    SPRING_PROFILES_ACTIVE: prod
    SERVER_PORT: 11262
    KEYCLOAK_ISSUER_URI: https://keycloak.profit-base.online/realms/iri
    BACKEND_URL: https://backend:11261
    # Public frontend URL the extractor's browser is sent to (…?handoff=<id>). Override per
    # deployment in .env; the local dev stack should point this at http://localhost:18081.
    FRONTEND_URL: ${IRI_FRONTEND_PUBLIC_URL:-https://profit-base.online}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    # Audience enforcement stays OFF until the Keycloak runbook (#641, docs/INGEST_KEYCLOAK_SETUP.md)
    # has BOTH the extractor and frontend tokens carrying aud=basetool-backend. Only then set this to
    # basetool-backend — enabling it earlier rejects every frontend token and breaks the app.
    APP_SECURITY_JWT_EXPECTED_AUDIENCES: ${IRI_INGEST_EXPECTED_AUDIENCES:-}
    # Truststore only (the gateway serves plain HTTP behind NPM); same keystore + password the other
    # modules use. These also bind to `server.ssl.key-store`, which would otherwise switch the
    # gateway's own connector to HTTPS on 11262 and break NPM's http:// proxy + the Docker
    # HEALTHCHECK — the ingest module pins `server.ssl.enabled=false` (ingest application.yml) so
    # these stay truststore-only.
    SERVER_SSL_KEY_STORE: file:/run/secrets/keystore.p12
    SERVER_SSL_KEY_STORE_PASSWORD: ${SERVER_SSL_KEY_STORE_PASSWORD:?SERVER_SSL_KEY_STORE_PASSWORD must be set in .env}
    JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
  volumes:
    - ${IRI_KEYSTORE_HOST_PATH:-./keystore.p12}:/run/secrets/keystore.p12:ro

services:
  redis:
    <<: *redis-template
    profiles: ["prod"]
    networks:
      - net-redis-frontend
      - net-redis-ingest

  redis-dev:
    <<: *redis-template
    profiles: ["dev"]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      net-redis-frontend:
        aliases:
          - redis
      net-redis-ingest:
        aliases:
          - redis

  db-backend:
    <<: *db-backend-template
    profiles: ["prod"]
    networks:
      - net-db-backend

  db-backend-dev:
    <<: *db-backend-template
    profiles: ["dev"]
    ports:
      - "127.0.0.1:15432:15432"
    networks:
      net-db-backend:
        aliases:
          - db-backend

  db-keycloak:
    <<: *db-keycloak-template
    profiles: ["prod"]
    networks:
      - net-db-keycloak

  db-keycloak-dev:
    <<: *db-keycloak-template
    profiles: ["dev"]
    ports:
      - "127.0.0.1:15433:15433"
    networks:
      net-db-keycloak:
        aliases:
          - db-keycloak

  keycloak:
    <<: *keycloak-template
    profiles: ["prod"]
    depends_on:
      db-keycloak:
        condition: service_healthy
    networks:
      - net-db-keycloak
      - net-proxy-keycloak
      - net-backend-keycloak

  keycloak-dev:
    <<: *keycloak-template
    command: start-dev --import-realm --proxy-headers xforwarded --cache=local
    profiles: ["dev"]
    ports:
      - "127.0.0.1:18080:18080"
    depends_on:
      db-keycloak-dev:
        condition: service_healthy
    networks:
      net-db-keycloak:
        aliases:
          - keycloak
      net-proxy-keycloak:
        aliases:
          - keycloak
      net-backend-keycloak:
        aliases:
          - keycloak

  backend:
    <<: *backend-template
    profiles: ["prod"]
    depends_on:
      db-backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - net-db-backend
      - net-backend-frontend
      - net-backend-keycloak
      - net-backend-ingest

  backend-dev:
    <<: *backend-template
    profiles: ["dev"]
    ports:
      - "127.0.0.1:11261:11261"
    depends_on:
      db-backend-dev:
        condition: service_healthy
      keycloak-dev:
        condition: service_healthy
    networks:
      net-db-backend:
        aliases:
          - backend
      net-backend-frontend:
        aliases:
          - backend
      net-backend-keycloak:
        aliases:
          - backend
      net-backend-ingest:
        aliases:
          - backend

  frontend:
    <<: *frontend-template
    profiles: ["prod"]
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net-backend-frontend
      - net-proxy-frontend
      - net-backend-keycloak
      - net-redis-frontend

  frontend-dev:
    <<: *frontend-template
    profiles: ["dev"]
    ports:
      - "127.0.0.1:18081:18081"
    depends_on:
      backend-dev:
        condition: service_healthy
      keycloak-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    networks:
      net-backend-frontend:
        aliases:
          - frontend
      net-proxy-frontend:
        aliases:
          - frontend
      net-backend-keycloak:
        aliases:
          - frontend
      net-redis-frontend:
        aliases:
          - frontend

  ingest:
    <<: *ingest-template
    profiles: ["prod"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net-proxy-ingest
      - net-backend-ingest
      - net-redis-ingest

  ingest-dev:
    <<: *ingest-template
    profiles: ["dev"]
    ports:
      - "127.0.0.1:11262:11262"
    depends_on:
      backend-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    networks:
      net-proxy-ingest:
        aliases:
          - ingest
      net-backend-ingest:
        aliases:
          - ingest
      net-redis-ingest:
        aliases:
          - ingest

  npm:
    # Pin to a concrete release. Bump deliberately as part of an upgrade workflow;
    # do not move back to `:latest` (silent upstream changes are a supply-chain risk
    # and break reproducibility). Consider appending @sha256:<digest> as well.
    image: jc21/nginx-proxy-manager:2.15.1@sha256:52b2c59994f3d36acfcf70a1626f29734df0ed8c71bacc0269f78b6f939858bb
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"     # Frontend / Keycloak HTTP Traffic
      - "443:443"    # Frontend / Keycloak HTTPS Traffic
      - "127.0.0.1:10081:81"     # NGINX Proxy Manager Admin Web UI (loopback-only)
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
    # Nginx + the SQLite-backed admin UI is feather-light; 256 MB / 0.5 vCPU is
    # ample for HTTP/HTTPS proxying at our request volume.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    volumes:
      - /var/iri/npm/data:/data
      - /var/iri/npm/letsencrypt:/etc/letsencrypt
      # Maintenance page served on upstream 502/503/504 during deploys. The
      # snippets in ./docker/maintenance/nginx are picked up by NPM via its
      # /data/nginx/custom hook (http.conf into the `http` block, server_proxy.conf
      # into every proxy host's `server` block) and the static assets are read
      # from /usr/share/nginx/html/maintenance/.
      #
      # The static-assets mount is :ro; the two .conf mounts are intentionally
      # NOT read-only. NPM's startup script `/etc/s6-overlay/s6-rc.d/prepare/
      # 50-ipv6.sh` walks every *.conf under /data/nginx/ and runs `sed -i`
      # against it to add IPv6 listeners — with :ro that fails with EROFS,
      # the `prepare` s6 service exits non-zero, and the entire NPM container
      # refuses to start. Our snippets contain no `listen` directives so sed
      # produces byte-identical content, but the write attempt itself has to
      # succeed for the container boot to proceed.
      - ./docker/maintenance/static:/usr/share/nginx/html/maintenance:ro
      - ./docker/maintenance/nginx/http.conf:/data/nginx/custom/http.conf
      - ./docker/maintenance/nginx/server_proxy.conf:/data/nginx/custom/server_proxy.conf
    networks:
      - net-proxy-frontend
      - net-proxy-keycloak
      - net-proxy-ingest

networks:
  net-db-backend:
    driver: bridge
  net-db-keycloak:
    driver: bridge
  net-backend-frontend:
    driver: bridge
  net-proxy-frontend:
    driver: bridge
  net-proxy-keycloak:
    driver: bridge
  net-backend-keycloak:
    driver: bridge
  net-redis-frontend:
