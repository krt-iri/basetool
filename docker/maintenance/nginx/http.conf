# =============================================================================
# Profit Basetool - Maintenance page selector (nginx http-context snippet)
#
# Included by nginx-proxy-manager from /data/nginx/custom/http.conf into the
# top-level `http { }` block. Pairs with server_proxy.conf, which catches
# upstream 502/503/504s and routes them to the @maintenance named location.
#
# Picks the response representation by inspecting the client's Accept header:
#   - "application/json" or "application/problem+json"  -> RFC 7807 JSON
#   - anything else (incl. "text/html", "*/*", missing) -> branded HTML page
#
# The chosen target path is exposed as $maintenance_target and consumed via
# `rewrite ^.*$ $maintenance_target break;` inside @maintenance.
# =============================================================================

map $http_accept $maintenance_target {
    default                                /maintenance/maintenance.html;
    "~*application/(problem\+)?json"       /maintenance/maintenance.json;
}
