# =============================================================================
# IRIDIUM Basetool - Maintenance page wiring (nginx server-context snippet)
#
# Included by nginx-proxy-manager from /data/nginx/custom/server_proxy.conf
# into the `server { }` block of every proxy host. Pairs with http.conf, which
# defines the $maintenance_target variable used in @maintenance.
#
# Trigger: any upstream returning 502 / 503 / 504. During a basetool deploy
# (scripts/deploy.sh -> docker compose up -d --wait) the backend+frontend
# containers cycle out and the upstream momentarily fails with 502. Instead
# of letting the user see nginx's raw error page, we serve the branded
# maintenance page (or RFC 7807 JSON for AJAX) until the new containers
# pass their healthcheck and `--wait` returns.
#
# The =503 forces the response status to 503 Service Unavailable, regardless
# of which of 502/503/504 came back from upstream - which is the semantically
# correct status to pair with Retry-After.
# =============================================================================

error_page 502 503 504 =503 @maintenance;

location @maintenance {
    internal;

    root /usr/share/nginx/html;
    rewrite ^.*$ $maintenance_target break;

    # Override the mime type for .json so the AJAX variant is served as
    # RFC 7807 application/problem+json rather than plain application/json.
    # Local override - does not affect other proxy hosts' mime resolution.
    types {
        application/problem+json json;
        text/html                html;
    }

    add_header Retry-After   "60"       always;
    add_header Cache-Control "no-store" always;
}
