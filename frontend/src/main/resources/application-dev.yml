spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.profit-base.online/realms/iri}
  session:
    store-type: redis
    redis:
      namespace: basetool:session
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

spring.thymeleaf.cache: false

app:
  backend-url: ${BACKEND_URL:https://backend:11261}
