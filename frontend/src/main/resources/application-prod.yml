# ===================================================================
# Production Configuration for Frontend
# 
# JVM Tuning Recommendations (apply via JAVA_TOOL_OPTIONS in Docker):
#   -XX:+UseContainerSupport
#   -XX:MaxRAMPercentage=75.0
#   -XX:InitialRAMPercentage=50.0
#   -XX:+HeapDumpOnOutOfMemoryError
#   -XX:HeapDumpPath=/tmp/heapdump.hprof
# ===================================================================
spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.iri-base.org/realms/iri}
  session:
    store-type: redis
    redis:
      namespace: basetool:session
      flush-mode: immediate
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

spring.thymeleaf.cache: true

server:
  shutdown: graceful

app:
  backend-url: ${BACKEND_URL:https://backend:11261}
  logging:
    structured-enabled: true
