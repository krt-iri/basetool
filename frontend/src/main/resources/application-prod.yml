# ===================================================================
# Production Configuration for Frontend
#
# JVM Tuning Recommendations (apply via JAVA_TOOL_OPTIONS in Docker):
#   -XX:+UseContainerSupport
#   -XX:MaxRAMPercentage=75.0
#   -XX:InitialRAMPercentage=50.0
#   -XX:+HeapDumpOnOutOfMemoryError
#   -XX:HeapDumpPath=/tmp/heapdump.hprof
# ===================================================================
spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.profit-base.online/realms/iri}
  session:
    store-type: redis
    redis:
      namespace: basetool:session
      flush-mode: immediate
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  # Spring Boot SSL bundle that exposes the bind-mounted `keystore.p12` as a
  # truststore for the backend WebClient. The backend's HTTPS endpoint
  # (`https://backend:11261`) is served by the same self-signed cert that this
  # keystore carries, so by trusting the keystore the frontend trusts the
  # backend without falling back to the InsecureTrustManagerFactory (which
  # M-13 in the 2026-05-20 audit rightly restricted to dev/test). The location
  # and password resolve from the same env vars Tomcat already consumes for
  # the frontend's own HTTPS listener -- no new compose secrets needed.
  # Consumed by WebClientConfig via `SslBundles.getBundle("backend-trust")`;
  # if the bundle is absent (e.g. a future operator fronts the backend with a
  # publicly-trusted cert), WebClientConfig falls back to the default JVM
  # trust store.
  ssl:
    bundle:
      jks:
        backend-trust:
          truststore:
            location: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
            password: ${SERVER_SSL_KEY_STORE_PASSWORD}
            type: PKCS12

spring.thymeleaf.cache: true

server:
  shutdown: graceful

app:
  backend-url: ${BACKEND_URL:https://backend:11261}
  logging:
    structured-enabled: true
  # SEC-02 / REQ-SEC-011: the reverse proxies whose X-Forwarded-For the frontend trusts when
  # resolving the originating client IP it relays to the backend's per-IP rate limiter. In
  # production nginx-proxy-manager fronts the frontend on the internal Docker network, so the
  # default Docker bridge (172.17.0.0/16) plus the typical compose-allocated user bridges
  # (172.18.0.0/16, 172.19.0.0/16) cover the NPM hop. Mirrors the backend's
  # app.rate-limit.trusted-proxies. Override via APP_CLIENT_IP_TRUSTED_PROXIES if the NPM
  # container sits on a different subnet — a mismatch silently collapses every per-IP bucket onto
  # NPM's address (no leak, but the limiter is ineffective), so it MUST match the real NPM subnet.
  client-ip:
    trusted-proxies:
      - 172.17.0.0/16
      - 172.18.0.0/16
      - 172.19.0.0/16
