server:
  ssl:
    enabled: false
    key-store-password: test-keystore-password
spring:
  session:
    store-type: none
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: test-client
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            issuer-uri: http://keycloak.example.com/realms/test

spring.thymeleaf.cache: false

app:
  backend-url: http://backend:11261

resilience4j:
  spring:
    boot:
      verifier:
        enabled: false

# Disable the custom HealthIndicators under @SpringBootTest. The test profile
# pins placeholder URLs for both Keycloak (`http://keycloak.example.com/...`)
# and the backend (`http://backend:11261`) — neither is resolvable from the
# test JVM, so leaving the probes enabled would slow every context-loading
# test by their respective connect timeouts. Unit tests for the indicators
# themselves instantiate them directly against a MockWebServer URL and do
# not consult these properties.
#
# The readiness group is also redefined here: Spring Boot 4 ships a
# HealthEndpointGroupMembershipValidator that rejects a group `include` list
# referencing a non-registered contributor (`NoSuchHealthContributorException`
# at context startup). Under this profile `backend` and `keycloak` are disabled
# (above), `redis` is absent because `spring.session.store-type: none`, and
# `ssl` is absent because `server.ssl.enabled: false` — so we narrow the group
# to the contributors that DO exist in tests. Production retains the full
# `readinessState, backend, keycloak, redis, diskSpace, ssl` set from
# application.yml.
management:
  health:
    backend:
      enabled: false
    keycloak:
      enabled: false
  endpoint:
    health:
      group:
        readiness:
          include: readinessState, diskSpace
