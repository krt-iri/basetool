server:
  tomcat:
    relaxed-query-chars: "{,},[,]"
    relaxed-path-chars: "{,},[,]"
    # Same M-3 connector-level tuning as the backend. The frontend's request
    # profile is even more burst-prone than the backend's because every page
    # render is a fan-out of 1..4 backend WebClient calls; under load a hung
    # backend ties up the frontend request worker for the entire response
    # timeout and the accept queue is what decides between "request queues" and
    # "request gets refused at the socket layer".
    threads:
      max: 200
      min-spare: 10
    accept-count: 200
    max-connections: 10000
  max-http-request-header-size: 65536
  http2:
    enabled: true
  port: 18081
  forward-headers-strategy: framework
  ssl:
    enabled: true
    # Default keeps backwards compatibility for local development and the test
    # stack, where the keystore is bind-mounted into the JAR as a classpath
    # resource at `frontend/src/main/resources/keystore.p12`. In production the
    # keystore MUST NOT be baked into the image (see CLAUDE.md and
    # `.dockerignore`) — docker-compose overrides this with a `file:` URL
    # pointing at a runtime bind mount so the production cert lives outside
    # the GHCR image and never enters the registry.
    key-store: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: basetool
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,text/plain,text/css,application/javascript,application/json,image/svg+xml
  servlet:
    session:
      timeout: 240h
      cookie:
        secure: true
        http-only: true
        same-site: strict

spring:
  threads:
    virtual:
      enabled: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=600s
  application:
    name: frontend
  messages:
    encoding: UTF-8
    fallback-to-system-locale: false
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          must-revalidate: true
      chain:
        strategy:
          content:
            enabled: true
            paths: "/**"
    error:
      whitelabel:
        enabled: false
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: basetool-frontend
            client-authentication-method: none
            # Audit finding L-4 (2026-05-20): `offline_access` produces a long-lived refresh
            # token. Refresh tokens are persisted in the Redis-backed Spring Session anyway, so
            # the scope adds no functional capability — but its presence widens the blast radius
            # of a Redis snapshot leak (the offline refresh token can outlive the Spring Session
            # and re-establish access). The session-based flow handles refresh via the regular
            # OAuth2 client-registration, no `offline_access` required.
            scope: openid, profile, email, roles
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            user-name-attribute: preferred_username

app:
  http:
    connect-timeout: 2s
    response-timeout: 5s
    read-timeout: 3s
    write-timeout: 3s
  ui:
    notification-duration: 5000
  logging:
    correlation-id-header: X-Correlation-Id
    correlation-id-mdc-key: correlationId
    user-id-mdc-key: userId
    slow-request-threshold-ms: 2000
    slow-backend-call-threshold-ms: 1500
    structured-enabled: false

# Actuator: expose only `health` so the Docker HEALTHCHECK / docker-compose
# `service_healthy` gating can reach it. The response is restricted to the bare
# status so unauthenticated callers cannot enumerate internal components.
#
# The `readiness` group is widened from Spring's default (just `readinessState`)
# to include the indicators whose `DOWN` actually means "stop sending traffic to
# this frontend instance":
#   - backend     — custom BackendHealthIndicator probes the backend's own
#                   /actuator/health/readiness, so a backend outage drops the
#                   frontend out of `service_healthy` immediately on startup —
#                   the auto-configured Resilience4j CircuitBreakerHealthIndicator
#                   only flips DOWN once enough real traffic has tripped a breaker,
#                   which is too late for startup-gating.
#   - keycloak    — custom KeycloakHealthIndicator; a Keycloak outage breaks
#                   the SSO login redirect and token refresh.
#   - redis       — auto-configured; Spring Session persists OIDC tokens and
#                   flash attributes in Redis, so a Redis outage logs users out
#                   on every request.
#   - diskSpace   — auto-configured; <10 MB free trips DOWN, otherwise the
#                   LogstashEncoder JSON appender would silently lose logs in
#                   prod.
#   - ssl         — auto-configured when server.ssl.enabled=true; warns when
#                   the keystore certificate is within the expiry threshold.
# `livenessState` is deliberately NOT in this group — a failing readiness probe
# should yank the container out of the load-balancer rotation, not restart it.
# The Docker HEALTHCHECK in frontend/Dockerfile points at /actuator/health/readiness
# so this group is what gates docker-compose `service_healthy`.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, backend, keycloak, redis, diskSpace, ssl

logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: INFO
    io.github.resilience4j: INFO

resilience4j:
  spring:
    boot:
      verifier:
        enabled: false
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      backend:
        baseConfig: default
      backendApi:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      backend:
        baseConfig: default
      backendApi:
        baseConfig: default
  retry:
    configs:
      # Retry budget chosen to keep worst-case page-render latency bounded: at the previous
      # `maxAttempts: 3, waitDuration: 1s` an upstream that responded after the 3 s read-timeout
      # then queued another two attempts behind a 1 s wait each — six extra seconds on top of the
      # backend's own timeout, which the user perceived as a blank page. Drop to a single retry
      # at 500 ms; that still papers over the typical transient (a single packet loss or a
      # Reactor-Netty connection reset on a stale pooled connection) without inflating the
      # tail-latency budget for legitimate slow upstreams. Long-running ones reach the circuit
      # breaker faster too.
      default:
        maxAttempts: 2
        waitDuration: 500ms
    instances:
      backend:
        baseConfig: default
      backendApi:
        baseConfig: default
  bulkhead:
    configs:
      # Bulkhead concurrency raised from 20 to 50: a single mission-detail or hangar render now
      # fans out to four parallel backend calls (see `ParallelPageLoader`), and under ~10 concurrent
      # users that puts ~40 in-flight calls competing for the 20-slot gate. Spillover queues behind
      # `maxWaitDuration: 1s` and surfaces as a slow page render. 50 leaves comfortable headroom for
      # 12+ concurrent users without queueing while still capping a runaway from saturating the
      # Reactor-Netty pool (sized at 100 in `WebClientConfig`).
      default:
        maxConcurrentCalls: 50
        maxWaitDuration: 1s
    instances:
      backend:
        baseConfig: default
      backendApi:
        baseConfig: default
