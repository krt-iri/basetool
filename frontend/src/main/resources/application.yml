server:
  tomcat:
    relaxed-query-chars: "{,},[,]"
    relaxed-path-chars: "{,},[,]"
    # Same M-3 connector-level tuning as the backend. The frontend's request
    # profile is even more burst-prone than the backend's because every page
    # render is a fan-out of 1..4 backend WebClient calls; under load a hung
    # backend ties up the frontend request worker for the entire response
    # timeout and the accept queue is what decides between "request queues" and
    # "request gets refused at the socket layer".
    threads:
      max: 200
      min-spare: 10
    accept-count: 200
    max-connections: 10000
    # Tomcat 11.0.8+ lowered the `maxPartCount` connector default from 1000 to 10 as a multipart
    # DoS hardening. That bites us hard: the frontend's in-place AJAX writes (epic #571) submit
    # their forms as `multipart/form-data` via `FormData`, so EVERY form field is its own part —
    # not just file uploads. A refinery order or a job order with several line items already has
    # well over 10 fields, so on Tomcat 11 the save 500s with `FileCountLimitExceededException`
    # (whose "attachment" text is a hardcoded Tomcat label, not a real field name). We restore the
    # pre-11.0.8 default of 1000: generous enough for the largest legitimate editor (a refinery
    # order with ~30 goods is ~165 parts) while still bounding a malicious flood. The request-size
    # caps below remain the real volume guard; `GlobalExceptionHandler` turns any residual breach
    # into a clean 413 instead of a 500 (REQ-FE-009).
    max-part-count: 1000
  max-http-request-header-size: 65536
  http2:
    enabled: true
  port: 18081
  # SEC-02: the forwarded-header handling is registered explicitly in ForwardedHeaderConfig instead
  # of by the `framework` auto-config. Spring's ForwardedHeaderFilter still rebuilds scheme/host from
  # X-Forwarded-Proto/-Host for the OAuth2 redirect URI and HSTS (identical to `framework`), but it
  # is ordered one slot AFTER ClientIpContextFilter so the latter can read the RAW X-Forwarded-For
  # and resolve the client IP trusted-proxy-aware (Spring Boot pins the auto-registered filter to
  # Integer.MIN_VALUE, which no filter can precede). `framework` consumed the header and exposed only
  # the spoofable leftmost entry, letting an unauthenticated caller mint a fresh per-IP rate-limit
  # bucket per request. See ForwardedHeaderConfig + ClientIpContextFilter + app.client-ip.
  forward-headers-strategy: none
  ssl:
    enabled: true
    # Default keeps backwards compatibility for local development and the test
    # stack, where the keystore is bind-mounted into the JAR as a classpath
    # resource at `frontend/src/main/resources/keystore.p12`. In production the
    # keystore MUST NOT be baked into the image (see CLAUDE.md and
    # `.dockerignore`) — docker-compose overrides this with a `file:` URL
    # pointing at a runtime bind mount so the production cert lives outside
    # the GHCR image and never enters the registry.
    key-store: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: basetool
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,text/plain,text/css,application/javascript,application/json,image/svg+xml
  servlet:
    session:
      # 30-day rolling idle window (was 240h / 10 days). RedisSessionConfig's
      # SessionRepositoryCustomizer applies this as the repository's
      # defaultMaxInactiveInterval (sliding, refreshed on every request), so a
      # user who visits at least once every 30 days never expires server-side.
      timeout: 720h
      cookie:
        secure: true
        http-only: true
        same-site: strict
        # Persist the SESSION cookie for 30 days so the login survives a browser
        # restart. Without max-age this is a session cookie that dies on browser
        # close, forcing a fresh login even though the Redis-backed session is
        # still valid.
        max-age: 30d

spring:
  servlet:
    multipart:
      # L-4: mirror the backend's explicit multipart caps. The frontend's multipart endpoints are
      # the import proxies (HangarImportProxyController / PersonalBlueprintImportProxyController /
      # AdminP4kImportPageController), which buffer the whole upload via file.getBytes() and relay
      # it to the backend. The admin-only P4K catalog import is the large one and drives the 64 MB
      # ceiling; keep these in lockstep with the backend caps. An explicit cap stops a large upload
      # from materialising unbounded in the heap.
      max-file-size: 64MB
      max-request-size: 72MB
  threads:
    virtual:
      enabled: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=600s
  application:
    name: frontend
  messages:
    encoding: UTF-8
    fallback-to-system-locale: false
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
          must-revalidate: true
      chain:
        strategy:
          content:
            enabled: true
            paths: "/**"
    error:
      whitelabel:
        enabled: false
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: basetool-frontend
            client-authentication-method: none
            # Audit finding L-4 (2026-05-20): `offline_access` produces a long-lived refresh
            # token. Refresh tokens are persisted in the Redis-backed Spring Session anyway, so
            # the scope adds no functional capability — but its presence widens the blast radius
            # of a Redis snapshot leak (the offline refresh token can outlive the Spring Session
            # and re-establish access). The session-based flow handles refresh via the regular
            # OAuth2 client-registration, no `offline_access` required.
            scope: openid, profile, email, roles
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            user-name-attribute: preferred_username

app:
  http:
    connect-timeout: 2s
    response-timeout: 5s
    read-timeout: 3s
    write-timeout: 3s
  ui:
    notification-duration: 5000
  logging:
    correlation-id-header: X-Correlation-Id
    correlation-id-mdc-key: correlationId
    user-id-mdc-key: userId
    slow-request-threshold-ms: 2000
    slow-backend-call-threshold-ms: 1500
    structured-enabled: false

# Actuator: expose only `health` so the Docker HEALTHCHECK / docker-compose
# `service_healthy` gating can reach it. The response is restricted to the bare
# status so unauthenticated callers cannot enumerate internal components.
#
# The `readiness` group is widened from Spring's default (just `readinessState`)
# to include the indicators whose `DOWN` actually means "stop sending traffic to
# this frontend instance":
#   - backend     — custom BackendHealthIndicator probes the backend's own
#                   /actuator/health/readiness, so a backend outage drops the
#                   frontend out of `service_healthy` immediately on startup —
#                   the auto-configured Resilience4j CircuitBreakerHealthIndicator
#                   only flips DOWN once enough real traffic has tripped a breaker,
#                   which is too late for startup-gating.
#   - keycloak    — custom KeycloakHealthIndicator; a Keycloak outage breaks
#                   the SSO login redirect and token refresh.
#   - redis       — auto-configured; Spring Session persists OIDC tokens and
#                   flash attributes in Redis, so a Redis outage logs users out
#                   on every request.
#   - diskSpace   — auto-configured; <10 MB free trips DOWN, otherwise the
#                   LogstashEncoder JSON appender would silently lose logs in
#                   prod.
#   - ssl         — auto-configured when server.ssl.enabled=true; warns when
#                   the keystore certificate is within the expiry threshold.
# `livenessState` is deliberately NOT in this group — a failing readiness probe
# should yank the container out of the load-balancer rotation, not restart it.
# The Docker HEALTHCHECK in frontend/Dockerfile points at /actuator/health/readiness
# so this group is what gates docker-compose `service_healthy`.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, backend, keycloak, redis, diskSpace, ssl

logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: INFO
    io.github.resilience4j: INFO

resilience4j:
  spring:
    boot:
      verifier:
        enabled: false
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        # A missing/expired frontend OAuth2 token (client_authorization_required) is a per-session
        # auth state, not a backend-health signal — it must neither count toward the failure rate
        # nor open the breaker for everyone else. GlobalExceptionHandler turns it into a re-login
        # redirect instead (REQ-SEC-012).
        ignoreExceptions:
          - org.springframework.security.oauth2.client.ClientAuthorizationException
    instances:
      backendApi:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
        cancelRunningFuture: true
    instances:
      backendApi:
        baseConfig: default
  retry:
    configs:
      # Retry budget chosen to keep worst-case page-render latency bounded: at the previous
      # `maxAttempts: 3, waitDuration: 1s` an upstream that responded after the 3 s read-timeout
      # then queued another two attempts behind a 1 s wait each — six extra seconds on top of the
      # backend's own timeout, which the user perceived as a blank page. Drop to a single retry
      # at 500 ms; that still papers over the typical transient (a single packet loss or a
      # Reactor-Netty connection reset on a stale pooled connection) without inflating the
      # tail-latency budget for legitimate slow upstreams. Long-running ones reach the circuit
      # breaker faster too.
      default:
        maxAttempts: 2
        waitDuration: 500ms
        # Retrying a client_authorization_required gains nothing (the token is gone until an
        # interactive re-login) and only multiplies the log lines — fail fast so the user is
        # redirected promptly (REQ-SEC-012).
        ignoreExceptions:
          - org.springframework.security.oauth2.client.ClientAuthorizationException
    instances:
      backendApi:
        baseConfig: default
  bulkhead:
    configs:
      # Bulkhead concurrency raised from 20 to 50: a single mission-detail or hangar render now
      # fans out to four parallel backend calls (see `ParallelPageLoader`), and under ~10 concurrent
      # users that puts ~40 in-flight calls competing for the 20-slot gate. Spillover queues behind
      # `maxWaitDuration: 1s` and surfaces as a slow page render. 50 leaves comfortable headroom for
      # 12+ concurrent users without queueing while still capping a runaway from saturating the
      # Reactor-Netty pool (sized at 100 in `WebClientConfig`).
      default:
        maxConcurrentCalls: 50
        maxWaitDuration: 1s
    instances:
      backendApi:
        baseConfig: default
