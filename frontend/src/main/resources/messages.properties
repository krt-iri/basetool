privacy.h1_3=3. Datenerfassung auf dieser Website
privacy.h2_3_1=Externes Hosting
privacy.p_3_1_1=Diese Website wird bei einem externen Dienstleister gehostet. Die personenbezogenen Daten, die auf dieser Website erfasst werden, werden auf den Servern des Hosters gespeichert. Hierbei kann es sich v. a. um IP-Adressen, Kontaktanfragen, Meta- und Kommunikationsdaten, Kontaktdaten, Namen und Websitezugriffe handeln.
privacy.p_3_1_2=Der Einsatz des Hosters erfolgt zum Zwecke der Vertragserf\u00fcllung gegen\u00fcber unseren Nutzern (Art. 6 Abs. 1 lit. b DSGVO) und im Interesse einer sicheren, schnellen und effizienten Bereitstellung unseres Online-Angebots durch einen professionellen Anbieter (Art. 6 Abs. 1 lit. f DSGVO).
privacy.p_3_1_3=Wir setzen folgenden Hoster ein:<br>Hetzner Online GmbH<br>Industriestr. 25<br>91710 Gunzenhausen<br>Deutschland
privacy.p_3_1_4=Wir haben mit unserem Hoster einen Auftragsverarbeitungsvertrag (AVV) nach Art. 28 DSGVO geschlossen.
privacy.h2_3_2=Cookies und vergleichbare Technologien
privacy.p_3_2_1=Unsere Internetseiten verwenden ausschlie\u00dflich technisch notwendige und funktionale Cookies sowie vergleichbare lokale Speichertechnologien. Cookies zu Analyse-, Tracking- oder Marketingzwecken setzen wir nicht ein. Cookies sind kleine Textdateien, die auf Ihrem Endger\u00e4t gespeichert werden. Da diese Cookies f\u00fcr die Bereitstellung des von Ihnen ausdr\u00fccklich gew\u00fcnschten Dienstes erforderlich sind, ist hierf\u00fcr nach \u00a7 25 Abs. 2 Nr. 2 TDDDG keine Einwilligung erforderlich. Die Verarbeitung etwaiger personenbezogener Daten erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO; unser berechtigtes Interesse besteht an der technisch fehlerfreien, sicheren und komfortablen Bereitstellung unserer Dienste.
privacy.p_3_2_2=<strong>SESSION (Sitzungs-Cookie)</strong><br>Dieser Cookie speichert eine zuf\u00e4llig erzeugte Sitzungskennung, h\u00e4lt Ihren Anmeldestatus aufrecht und sch\u00fctzt die Sitzung zugleich vor Cross-Site-Request-Forgery (CSRF). Er ist f\u00fcr grundlegende Funktionen der Anwendung notwendig und wird sp\u00e4testens beim Schlie\u00dfen des Browsers gel\u00f6scht.
privacy.p_3_2_3=<strong>XSRF-TOKEN</strong><br>Dieses Sicherheits-Cookie sch\u00fctzt vor Cross-Site-Request-Forgery-Angriffen und wird im Zusammenhang mit der Programmierschnittstelle (API) bzw. deren Dokumentationsoberfl\u00e4che gesetzt. Es ist sitzungsgebunden und wird nach Ende der Sitzung automatisch gel\u00f6scht.
privacy.p_3_2_4=<strong>KRT_LOCALE</strong><br>Speichert die von Ihnen gew\u00e4hlte Anzeigesprache (Deutsch oder Englisch), damit die Oberfl\u00e4che bei Ihrem n\u00e4chsten Besuch in der gew\u00fcnschten Sprache erscheint. Dieser Cookie wird nur gesetzt, wenn Sie die Sprache aktiv wechseln, und bleibt bis zu 3 Monate gespeichert.
privacy.p_3_2_5=<strong>orders_filter_status / orders_filter_scope</strong><br>Diese Cookies speichern Ihre zuletzt gew\u00e4hlten Filter- und Ansichtseinstellungen in der Auftrags\u00fcbersicht, damit diese bei einem erneuten Aufruf erhalten bleiben. Sie werden nur nach einer aktiven Auswahl gesetzt und nach 30 Tagen automatisch gel\u00f6scht.
privacy.p_3_2_6=<strong>SSO_ATTEMPTED</strong><br>Kurzlebiges Hilfs-Cookie f\u00fcr die automatische Wiederanmeldung (Single Sign-On). Es verhindert Weiterleitungsschleifen, wenn Ihre Sitzung abgelaufen ist, und wird bereits nach 60 Sekunden automatisch gel\u00f6scht.
privacy.p_3_2_7=<strong>Cookies des Anmeldedienstes (Keycloak)</strong><br>Die Anmeldung erfolgt \u00fcber unseren Single-Sign-On-Dienst Keycloak. Dieser setzt im Zuge der Authentifizierung eigene, technisch notwendige Cookies zur Verwaltung Ihrer Anmeldesitzung. Diese Cookies sind f\u00fcr den Login zwingend erforderlich.
privacy.p_3_2_8=<strong>Lokaler Browser-Speicher (Local Storage / Session Storage)</strong><br>Erg\u00e4nzend speichern wir technisch notwendige Ansichtseinstellungen direkt in Ihrem Browser (z.B. ein- oder ausgeklappte Bereiche, Sortier- und Filterauswahl, Scrollposition). Diese Daten verbleiben ausschlie\u00dflich lokal auf Ihrem Endger\u00e4t, werden nicht an uns oder Dritte \u00fcbertragen und enthalten keine personenbezogenen Daten. Session-Storage-Eintr\u00e4ge werden beim Schlie\u00dfen des Browser-Tabs gel\u00f6scht; Local-Storage-Eintr\u00e4ge k\u00f6nnen Sie jederzeit \u00fcber die Einstellungen Ihres Browsers l\u00f6schen. Die Nutzung erfolgt nach \u00a7 25 Abs. 2 Nr. 2 TDDDG einwilligungsfrei.
privacy.h2_3_3=Server-Log-Dateien
privacy.p_3_3_1=Der Provider der Seiten erhebt und speichert automatisch Informationen in Server-Log-Dateien, die Ihr Browser \u00fcbermittelt. Die Erfassung erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO. Unser berechtigtes Interesse besteht in der Gew\u00e4hrleistung der Stabilit\u00e4t und Sicherheit unserer Webseite. Zu diesem Zweck werden die IP-Adressen der Besucher f\u00fcr einen Zeitraum von maximal 7 Tagen in unverk\u00fcrzter Form gespeichert, um im Falle eines Angriffs eine Analyse zu erm\u00f6glichen. Nach Ablauf dieser Frist werden die IP-Adressen anonymisiert, indem bei IPv4-Adressen das letzte Oktett und bei IPv6-Adressen die letzten 80 Bit auf null gesetzt werden, sodass kein Personenbezug mehr herstellbar ist.
privacy.h2_3_4=Kontaktformular und Forum
privacy.p_3_4_1=Die Verarbeitung der Daten, die Sie im Kontaktformular oder bei der Forumsregistrierung eingeben, erfolgt ausschlie\u00dflich auf Grundlage Ihrer Einwilligung (Art. 6 Abs. 1 lit. a DSGVO).

