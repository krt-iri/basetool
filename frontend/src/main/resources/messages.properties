privacy.h2_2_2=Speicherdauer
privacy.p_2_2=Im Falle einer L\u00f6schanfrage Ihres Nutzerkontos werden alle damit verbundenen personenbezogenen Daten (wie E-Mail-Adresse, IP-Adressen etc.) dauerhaft von unseren Systemen entfernt. Um die Integrit\u00e4t und den Kontext der Diskussionen in unserem Forum f\u00fcr die verbleibende Community zu erhalten, werden Ihre erstellten Beitr\u00e4ge und Kommentare standardm\u00e4\u00dfig anonymisiert. Dabei wird Ihr Nutzername durch einen neutralen Platzhalter (z.B. "[Ehemaliges Mitglied]") ersetzt, sodass kein direkter R\u00fcckschluss mehr auf Ihre Person m\u00f6glich ist. Ihr gesetzliches Recht nach Art. 17 DSGVO, stattdessen die vollst\u00e4ndige L\u00f6schung auch dieser Beitr\u00e4ge zu verlangen, bleibt davon unber\u00fchrt. Sie k\u00f6nnen diesen Wunsch im Rahmen Ihrer L\u00f6schanfrage \u00e4u\u00dfern. Das Vorgehen der standardm\u00e4\u00dfigen Anonymisierung st\u00fctzt sich auf unser berechtigtes Interesse (Art. 6 Abs. 1 lit. f DSGVO) am Fortbestand der Community-Inhalte.
privacy.h2_2_3=Ihre Rechte als Betroffener
privacy.p_2_3=Sie haben im Rahmen der geltenden gesetzlichen Bestimmungen (insb. DSGVO) folgende Rechte:
privacy.list_2_3_1=Recht auf Auskunft gem\u00e4\u00df Art. 15 DSGVO
privacy.list_2_3_2=Recht auf Berichtigung gem\u00e4\u00df Art. 16 DSGVO
privacy.list_2_3_3=Recht auf L\u00f6schung (\u201eRecht auf Vergessenwerden\u201c) gem\u00e4\u00df Art. 17 DSGVO
privacy.list_2_3_4=Recht auf Einschr\u00e4nkung der Verarbeitung gem\u00e4\u00df Art. 18 DSGVO
privacy.list_2_3_5=Recht auf Daten\u00fcbertragbarkeit gem\u00e4\u00df Art. 20 DSGVO
privacy.list_2_3_6=Widerspruchsrecht gem\u00e4\u00df Art. 21 DSGVO
privacy.list_2_3_7=Recht auf Beschwerde bei einer Aufsichtsbeh\u00f6rde gem\u00e4\u00df Art. 77 DSGVO
privacy.h2_2_4=Widerruf Ihrer Einwilligung zur Datenverarbeitung
privacy.p_2_4=Viele Datenverarbeitungsvorg\u00e4nge sind nur mit Ihrer ausdr\u00fccklichen Einwilligung m\u00f6glich. Sie k\u00f6nnen eine bereits erteilte Einwilligung jederzeit widerrufen. Dazu reicht eine formlose Mitteilung per E-Mail an uns. Die Rechtm\u00e4\u00dfigkeit der bis zum Widerruf erfolgten Datenverarbeitung bleibt vom Widerruf unber\u00fchrt.
privacy.h2_2_5=Beschwerderecht bei der zust\u00e4ndigen Aufsichtsbeh\u00f6rde
privacy.p_2_5_1=Im Falle datenschutzrechtlicher Verst\u00f6\u00dfe steht Ihnen ein Beschwerderecht bei der zust\u00e4ndigen Aufsichtsbeh\u00f6rde zu. Die f\u00fcr uns zust\u00e4ndige Aufsichtsbeh\u00f6rde ist:
