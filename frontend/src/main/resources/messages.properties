terms.title=Nutzungsbedingungen
terms.intro=Diese Nutzungsbedingungen regeln die Nutzung des Profit Basetool (nachfolgend "Plattform"). Mit dem Zugriff auf die Plattform erkennt der Nutzer diese Bedingungen an.
terms.h1_1=1. Geltungsbereich und Vertragspartner
terms.p_1_1=Diese Nutzungsbedingungen gelten zwischen dem im Impressum genannten Betreiber und allen Personen, die auf die Plattform zugreifen oder sie nutzen.
terms.p_1_2=Die Plattform ist ein internes Verwaltungswerkzeug f\u00fcr Mitglieder und G\u00e4ste der Star-Citizen-Organisationen "DAS KARTELL" und steht in keiner gesch\u00e4ftlichen Verbindung zur Cloud Imperium Games Corp. oder zu Roberts Space Industries.
terms.h1_2=2. Zweck der Plattform
terms.p_2_1=Die Plattform unterst\u00fctzt die organisationsinterne Verwaltung von Eins\u00e4tzen, Operationen, Hangar, Inventar und Raffinerieauftr\u00e4gen. Sie dient ausschlie\u00dflich Spielzwecken im Rahmen von Star Citizen und der internen Organisation der genannten Vereinigung.
terms.h1_3=3. Zugang und Registrierung
terms.p_3_1=Der Zugang erfolgt \u00fcber Single Sign-On (Keycloak) und ist Mitgliedern sowie ausdr\u00fccklich freigegebenen G\u00e4sten vorbehalten. Ein Anspruch auf Zulassung besteht nicht; die Aufnahme entscheiden die Organisationsf\u00fchrung und die Administratoren der Plattform.
terms.p_3_2=Der Nutzer ist verpflichtet, seine Zugangsdaten geheim zu halten und nicht an Dritte weiterzugeben. Bei Verdacht einer Kompromittierung ist unverz\u00fcglich der Betreiber zu informieren.
terms.p_3_3=Pro Person ist nur ein Account zul\u00e4ssig, sofern ein zus\u00e4tzlicher Account nicht ausdr\u00fccklich von einem Administrator freigegeben wurde.
terms.h1_4=4. Pflichten der Nutzer
terms.p_4_1=Der Nutzer verpflichtet sich insbesondere zu Folgendem:
terms.list_4_1_1=Wahrheitsgem\u00e4\u00dfe und aktuelle Angaben zum Profil zu machen.
terms.list_4_1_2=Die Plattform nur f\u00fcr ihren bestimmungsgem\u00e4\u00dfen Zweck zu verwenden; insbesondere keine Werbung, kein Spam, kein Phishing und keine Bel\u00e4stigung anderer Nutzer.
terms.list_4_1_3=Keine Inhalte einzustellen, die gegen geltendes Recht, Rechte Dritter, die Nutzungsbedingungen oder Spielregeln der Cloud Imperium Games Corp. oder gegen die internen Regeln der Organisation versto\u00dfen.
terms.list_4_1_4=Keine automatisierten Abfragen, kein Scraping, keine Lasttests, kein Reverse-Engineering und keine sonstigen technischen Eingriffe in den Betrieb der Plattform vorzunehmen, sofern dies nicht ausdr\u00fccklich vom Betreiber gestattet wurde.
terms.list_4_1_5=Festgestellte Sicherheitsl\u00fccken nicht auszunutzen, sondern unverz\u00fcglich und vertraulich an den Betreiber zu melden.
terms.h1_5=5. Nutzerinhalte
terms.p_5_1=Der Nutzer beh\u00e4lt die Rechte an Inhalten, die er einstellt (zum Beispiel Einsatzbeschreibungen, Kommentare, Inventardaten).
terms.p_5_2=Mit dem Einstellen r\u00e4umt der Nutzer dem Betreiber das nicht ausschlie\u00dfliche, zeitlich auf die Plattformnutzung beschr\u00e4nkte Recht ein, diese Inhalte zu speichern, zu verarbeiten und im Rahmen der Plattformfunktionen f\u00fcr andere berechtigte Nutzer anzuzeigen.
terms.p_5_3=F\u00fcr die Rechtm\u00e4\u00dfigkeit der eingestellten Inhalte ist allein der Nutzer verantwortlich.
terms.h1_6=6. Rollen, Rechte und Sichtbarkeit
terms.p_6_1=Die Plattform kennt verschiedene Rollen (zum Beispiel ADMIN, OFFICER, LOGISTICIAN, MISSION_MANAGER, KRT_MEMBER) mit unterschiedlichen Berechtigungen. Welche Daten ein Nutzer sehen oder \u00e4ndern darf, ergibt sich aus seiner Rolle und seinen Mitgliedschaften in den verwalteten Organisationseinheiten.
terms.p_6_2=Der Nutzer akzeptiert, dass die von ihm eingestellten Informationen f\u00fcr andere berechtigte Nutzer einsehbar sein k\u00f6nnen, soweit dies die Plattformfunktionen vorsehen.
terms.h1_7=7. Verf\u00fcgbarkeit
terms.p_7_1=Die Plattform wird als privates, ehrenamtlich betriebenes Projekt bereitgestellt. Der Betreiber bem\u00fcht sich um eine m\u00f6glichst hohe Verf\u00fcgbarkeit, schuldet diese jedoch nicht.
terms.p_7_2=Wartungsarbeiten, Updates, Migrationen oder St\u00f6rungen k\u00f6nnen jederzeit zu Ausfallzeiten, Datenverlust oder Funktions\u00e4nderungen f\u00fchren. Ein Anspruch auf permanente Verf\u00fcgbarkeit, auf eine bestimmte Antwortzeit oder auf einen bestimmten Funktionsumfang besteht nicht.
terms.h1_8=8. Sperrung und Beendigung
terms.p_8_1=Der Betreiber sowie die Administratoren k\u00f6nnen den Zugang eines Nutzers jederzeit, auch ohne Angabe von Gr\u00fcnden, einschr\u00e4nken, sperren oder l\u00f6schen, insbesondere bei Verst\u00f6\u00dfen gegen diese Bedingungen, gegen interne Regeln oder bei Verlust der Organisationsmitgliedschaft.
terms.p_8_2=Bereits eingestellte Inhalte k\u00f6nnen nach Beendigung der Nutzung weiterhin gespeichert bleiben, soweit dies aus betrieblichen Gr\u00fcnden oder zur Erf\u00fcllung gesetzlicher Aufbewahrungspflichten erforderlich ist. Im \u00dcbrigen gelten die Regelungen der Datenschutzerkl\u00e4rung.
terms.h1_9=9. Geistiges Eigentum und Marken
terms.p_9_1=Der Quellcode der Plattform steht unter der im zugeh\u00f6rigen Repository ver\u00f6ffentlichten Lizenz.
terms.p_9_2=Marken, Logos und Corporate-Design-Elemente der Organisation "DAS KARTELL" verbleiben bei den jeweiligen Rechteinhabern und d\u00fcrfen nur im Rahmen der Plattform und nach Ma\u00dfgabe der internen Regeln verwendet werden.
terms.p_9_3="Star Citizen", "Squadron 42", Schiffsnamen, Standortbezeichnungen und sonstige spielbezogene Begriffe sind Marken oder gesch\u00fctzte Bezeichnungen der Cloud Imperium Games Corp. bzw. Roberts Space Industries. Die Plattform steht in keiner gesch\u00e4ftlichen Verbindung zu diesen Unternehmen.
terms.h1_10=10. Haftung
terms.p_10_1=Die Plattform wird ohne ausdr\u00fcckliche oder stillschweigende Gew\u00e4hrleistung ("as is") zur Verf\u00fcgung gestellt.
terms.p_10_2=Der Betreiber haftet nur f\u00fcr Sch\u00e4den, die auf Vorsatz oder grober Fahrl\u00e4ssigkeit beruhen, sowie f\u00fcr Sch\u00e4den aus der Verletzung des Lebens, des K\u00f6rpers oder der Gesundheit und im Umfang zwingender gesetzlicher Vorschriften, insbesondere des Produkthaftungsgesetzes. Im \u00dcbrigen ist die Haftung ausgeschlossen, soweit gesetzlich zul\u00e4ssig.
terms.p_10_3=F\u00fcr die Richtigkeit, Vollst\u00e4ndigkeit und Aktualit\u00e4t der durch Nutzer eingestellten Inhalte \u00fcbernimmt der Betreiber keine Haftung. F\u00fcr Inhalte und Verf\u00fcgbarkeit verlinkter externer Dienste (zum Beispiel UEX, Star Citizen Wiki) ist allein der jeweilige Anbieter verantwortlich.
terms.h1_11=11. Datenschutz
terms.p_11_1=Die Verarbeitung personenbezogener Daten ist in der gesonderten Datenschutzerkl\u00e4rung geregelt. Mit der Nutzung der Plattform best\u00e4tigt der Nutzer, diese gelesen und zur Kenntnis genommen zu haben.
terms.h1_12=12. \u00c4nderungen der Nutzungsbedingungen
terms.p_12_1=Der Betreiber beh\u00e4lt sich vor, diese Nutzungsbedingungen jederzeit anzupassen, insbesondere wenn dies aus rechtlichen, sicherheitsrelevanten oder funktionalen Gr\u00fcnden erforderlich wird. \u00dcber wesentliche \u00c4nderungen werden die Nutzer in geeigneter Weise informiert, etwa durch einen Hinweis nach dem Login.
terms.p_12_2=Die fortgesetzte Nutzung der Plattform nach Inkrafttreten ge\u00e4nderter Bedingungen gilt als Zustimmung zur jeweils aktuellen Fassung.
terms.h1_13=13. Anwendbares Recht und Gerichtsstand
terms.p_13_1=Es gilt das Recht der Bundesrepublik Deutschland unter Ausschluss des UN-Kaufrechts. Gerichtsstand ist, soweit gesetzlich zul\u00e4ssig, der Sitz des Betreibers.
terms.h1_14=14. Salvatorische Klausel
terms.p_14_1=Sollten einzelne Bestimmungen dieser Nutzungsbedingungen ganz oder teilweise unwirksam sein oder werden, bleibt die Wirksamkeit der \u00fcbrigen Bestimmungen davon unber\u00fchrt. An die Stelle der unwirksamen Bestimmung tritt eine Regelung, die dem wirtschaftlichen Zweck der unwirksamen Bestimmung am n\u00e4chsten kommt.
