privacy.h1_3=3. Datenerfassung auf dieser Website
privacy.h2_3_1=Externes Hosting
privacy.p_3_1_1=Diese Website wird bei einem externen Dienstleister gehostet. Die personenbezogenen Daten, die auf dieser Website erfasst werden, werden auf den Servern des Hosters gespeichert. Hierbei kann es sich v. a. um IP-Adressen, Kontaktanfragen, Meta- und Kommunikationsdaten, Kontaktdaten, Namen und Websitezugriffe handeln.
privacy.p_3_1_2=Der Einsatz des Hosters erfolgt zum Zwecke der Vertragserf\u00fcllung gegen\u00fcber unseren Nutzern (Art. 6 Abs. 1 lit. b DSGVO) und im Interesse einer sicheren, schnellen und effizienten Bereitstellung unseres Online-Angebots durch einen professionellen Anbieter (Art. 6 Abs. 1 lit. f DSGVO).
privacy.p_3_1_3=Wir setzen folgenden Hoster ein:<br>Hetzner Online GmbH<br>Industriestr. 25<br>91710 Gunzenhausen<br>Deutschland
privacy.p_3_1_4=Wir haben mit unserem Hoster einen Auftragsverarbeitungsvertrag (AVV) nach Art. 28 DSGVO geschlossen.
privacy.h2_3_2=Cookies
privacy.p_3_2_1=Unsere Internetseiten verwenden ausschlie\u00dflich technisch notwendige \u201eCookies\u201c. Cookies sind kleine Textdateien, die auf Ihrem Endger\u00e4t gespeichert werden. Die Verarbeitung dieser Cookies erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO sowie \u00a7 25 Abs. 2 TDDDG. Unser berechtigtes Interesse besteht an der technisch fehlerfreien und optimierten Bereitstellung unserer Dienste.
privacy.p_3_2_2=<strong>Sitzungs-Cookie (User-Session)</strong><br>Dieser Cookie speichert eine zuf\u00e4llig erzeugte Sitzungs-ID und ist f\u00fcr grundlegende Funktionen wie den Login-Status notwendig. Er wird automatisch gel\u00f6scht, sobald Sie den Browser schlie\u00dfen.
privacy.p_3_2_3=<strong>XSRF-TOKEN</strong><br>Dieser Cookie dient der Sicherheit, indem er Cross-Site-Request-Forgery-Angriffe verhindert. Er wird nach Ende der Sitzung automatisch gel\u00f6scht.
privacy.h2_3_3=Server-Log-Dateien
privacy.p_3_3_1=Der Provider der Seiten erhebt und speichert automatisch Informationen in Server-Log-Dateien, die Ihr Browser \u00fcbermittelt. Die Erfassung erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO. Unser berechtigtes Interesse besteht in der Gew\u00e4hrleistung der Stabilit\u00e4t und Sicherheit unserer Webseite. Zu diesem Zweck werden die IP-Adressen der Besucher f\u00fcr einen Zeitraum von maximal 7 Tagen in unverk\u00fcrzter Form gespeichert, um im Falle eines Angriffs eine Analyse zu erm\u00f6glichen. Nach Ablauf dieser Frist werden die IP-Adressen anonymisiert, indem bei IPv4-Adressen das letzte Oktett und bei IPv6-Adressen die letzten 80 Bit auf null gesetzt werden, sodass kein Personenbezug mehr herstellbar ist.
privacy.h2_3_4=Kontaktformular und Forum
privacy.p_3_4_1=Die Verarbeitung der Daten, die Sie im Kontaktformular oder bei der Forumsregistrierung eingeben, erfolgt ausschlie\u00dflich auf Grundlage Ihrer Einwilligung (Art. 6 Abs. 1 lit. a DSGVO).

