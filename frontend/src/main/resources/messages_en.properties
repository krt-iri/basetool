terms.title=Terms of Use
terms.intro=These Terms of Use govern the use of the Profit Basetool (hereinafter "the Platform"). By accessing the Platform, the user accepts these terms.
terms.h1_1=1. Scope and Contractual Parties
terms.p_1_1=These Terms of Use apply between the operator named in the imprint and any person who accesses or uses the Platform.
terms.p_1_2=The Platform is an internal administration tool for members and guests of the Star Citizen organisations "DAS KARTELL" and has no commercial affiliation with Cloud Imperium Games Corp. or Roberts Space Industries.
terms.h1_2=2. Purpose of the Platform
terms.p_2_1=The Platform supports the internal administration of missions, operations, hangars, inventory, and refinery orders. It serves exclusively for gameplay purposes within the context of Star Citizen and the internal organisation of the aforementioned association.
terms.h1_3=3. Access and Registration
terms.p_3_1=Access is granted via Single Sign-On (Keycloak) and is reserved for members and explicitly approved guests. There is no entitlement to admission; admission decisions are made by the organisation's leadership and the Platform administrators.
terms.p_3_2=The user is obliged to keep credentials confidential and not to share them with third parties. In case of a suspected compromise, the operator must be notified without delay.
terms.p_3_3=Only one account per person is permitted, unless an additional account has been expressly authorised by an administrator.
terms.h1_4=4. User Obligations
terms.p_4_1=The user undertakes in particular to:
terms.list_4_1_1=provide truthful and up-to-date information regarding the profile;
terms.list_4_1_2=use the Platform only for its intended purpose; in particular, no advertising, spam, phishing, or harassment of other users;
terms.list_4_1_3=not post content that violates applicable law, third-party rights, the terms of service or game rules of Cloud Imperium Games Corp., or the internal rules of the organisation;
terms.list_4_1_4=refrain from automated queries, scraping, load tests, reverse engineering, and any other technical interference with the operation of the Platform, unless expressly permitted by the operator;
terms.list_4_1_5=not exploit any security vulnerabilities discovered, but instead report them promptly and confidentially to the operator.
terms.h1_5=5. User Content
terms.p_5_1=The user retains the rights to content they post (for example mission descriptions, comments, inventory data).
terms.p_5_2=By posting, the user grants the operator the non-exclusive right, limited to the duration of Platform use, to store, process, and display such content to other authorised users within the scope of the Platform's functionality.
terms.p_5_3=The user is solely responsible for the legality of posted content.
terms.h1_6=6. Roles, Permissions, and Visibility
terms.p_6_1=The Platform defines several roles (for example ADMIN, OFFICER, LOGISTICIAN, MISSION_MANAGER, SQUADRON_MEMBER) with different permissions. Which data a user may view or modify is determined by their role and their memberships in the managed organisational units.
terms.p_6_2=The user accepts that the information they post may be visible to other authorised users to the extent provided by the Platform's functionality.
terms.h1_7=7. Availability
terms.p_7_1=The Platform is provided as a private, voluntarily operated project. The operator strives for the highest possible availability but does not warrant it.
terms.p_7_2=Maintenance work, updates, migrations, or disruptions may at any time result in downtime, data loss, or changes in functionality. There is no entitlement to permanent availability, to a specific response time, or to a specific scope of functionality.
terms.h1_8=8. Suspension and Termination
terms.p_8_1=The operator and the administrators may at any time, even without stating reasons, restrict, suspend, or delete a user's access, in particular in case of violations of these terms, of internal rules, or upon loss of organisational membership.
terms.p_8_2=Posted content may continue to be stored after termination of use, insofar as this is necessary for operational reasons or to comply with statutory retention obligations. Otherwise, the provisions of the privacy policy apply.
terms.h1_9=9. Intellectual Property and Trademarks
terms.p_9_1=The source code of the Platform is licensed under the licence published in the associated repository.
terms.p_9_2=Trademarks, logos, and corporate design elements of the organisation "DAS KARTELL" remain with the respective rights holders and may be used only within the scope of the Platform and in accordance with internal rules.
terms.p_9_3="Star Citizen", "Squadron 42", ship names, location names, and other game-related terms are trademarks or protected designations of Cloud Imperium Games Corp. or Roberts Space Industries respectively. The Platform has no commercial affiliation with these companies.
terms.h1_10=10. Liability
terms.p_10_1=The Platform is provided without any express or implied warranty ("as is").
terms.p_10_2=The operator is liable only for damages caused by intent or gross negligence, as well as for damages resulting from injury to life, body, or health, and to the extent of mandatory statutory provisions, in particular the German Product Liability Act. Otherwise, liability is excluded to the extent permitted by law.
terms.p_10_3=The operator assumes no liability for the accuracy, completeness, or timeliness of content posted by users. The respective provider is solely responsible for the content and availability of linked external services (for example UEX, Star Citizen Wiki).
terms.h1_11=11. Data Protection
terms.p_11_1=The processing of personal data is governed by the separate privacy policy. By using the Platform, the user confirms that they have read and acknowledged it.
terms.h1_12=12. Changes to the Terms of Use
terms.p_12_1=The operator reserves the right to amend these Terms of Use at any time, in particular if this becomes necessary for legal, security-related, or functional reasons. Users will be informed of material changes in an appropriate manner, such as a notice after login.
terms.p_12_2=Continued use of the Platform after amended terms take effect constitutes acceptance of the then-current version.
terms.h1_13=13. Applicable Law and Jurisdiction
terms.p_13_1=The laws of the Federal Republic of Germany apply, excluding the UN Convention on Contracts for the International Sale of Goods. Jurisdiction shall be, to the extent permitted by law, the registered seat of the operator.
terms.h1_14=14. Severability Clause
terms.p_14_1=Should individual provisions of these Terms of Use be or become wholly or partially invalid, the validity of the remaining provisions shall remain unaffected. The invalid provision shall be replaced by a provision that comes closest to the economic purpose of the invalid provision.
