<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{admin.settings.title} + ' - ' + #{app.title}">Systemeinstellungen - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
        <style>
            .data-section {
                margin-bottom: 3rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
            .form-group label {
                display: block;
                margin-bottom: 0.5rem;
                color: var(--color-primary);
                font-family: var(--font-headline);
                font-size: 0.8rem;
            }
            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 0.5rem;
                background-color: var(--color-gray-4);
                border: 1px solid var(--color-gray-3);
                color: var(--color-gray-1);
                font-family: var(--font-body);
                box-sizing: border-box;
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{admin.settings.title}">Systemeinstellungen</h1>
    </div>

    <div class="hud-box" style="margin-top: 2rem;">
        <div class="data-section">
            <h2 th:text="#{admin.settings.orders}">Auftragsverwaltung</h2>
            <p style="margin-bottom: 1rem; color: var(--color-gray-2);" th:text="#{admin.settings.orders.description}">Konfiguration der Farbcodierung für ältere Aufträge (in Tagen).</p>
            
            <form th:action="@{/admin/settings}" method="post">
                <input type="hidden" name="ageYellowVersion" th:value="${ageYellowVersion}">
                <input type="hidden" name="ageRedVersion" th:value="${ageRedVersion}">
                <input type="hidden" name="refineryRoundingVersion" th:value="${refineryRoundingVersion}">
                
                <div class="form-group" style="max-width: 300px;">
                    <label for="ageYellowDays" th:text="#{admin.settings.orders.yellowDays}">Tage bis gelbe Markierung</label>
                    <input type="number" id="ageYellowDays" name="ageYellowDays" th:value="${ageYellowDays}" min="0" required>
                </div>
                
                <div class="form-group" style="max-width: 300px;">
                    <label for="ageRedDays" th:text="#{admin.settings.orders.redDays}">Tage bis rote Markierung</label>
                    <input type="number" id="ageRedDays" name="ageRedDays" th:value="${ageRedDays}" min="0" required>
                </div>

                <div class="data-section" style="margin-top: 2rem;">
                    <h2 th:text="#{admin.settings.refinery}">Raffinerie</h2>
                    <p style="margin-bottom: 1rem; color: var(--color-gray-2);" th:text="#{admin.settings.refinery.description}">Konfiguration des Rundungsverhaltens (Units zu SCU).</p>
                    
                    <div class="form-group" style="max-width: 300px;">
                        <label for="refineryRoundingMode" th:text="#{admin.settings.refinery.roundingMode}">Rundungsmodus (Units -> SCU)</label>
                        <select id="refineryRoundingMode" name="refineryRoundingMode" required>
                            <option value="UP" th:selected="${refineryRoundingMode == 'UP'}" th:text="#{admin.settings.refinery.rounding.up}">Aufrunden (Ceil)</option>
                            <option value="DOWN" th:selected="${refineryRoundingMode == 'DOWN'}" th:text="#{admin.settings.refinery.rounding.down}">Abrunden (Floor)</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn" style="margin-top: 1rem;" th:text="#{admin.settings.save}">Speichern</button>
            </form>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
</body>
</html>
