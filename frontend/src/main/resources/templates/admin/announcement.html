<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{info.title} + ' - ' + #{app.title}">Informationen - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
<style>
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-gray-4);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{info.edit.title}">Informationen verwalten</h1>
    </div>

    <div class="hud-box mt-2">
        <form th:action="@{/admin/announcement/update}" method="post">
             <input type="hidden" name="version" th:value="${adminAnnouncement != null ? adminAnnouncement.version : 0}">
             <div class="form-group">
                 <textarea name="content" id="info-edit-content" rows="10" 
                           th:text="${adminAnnouncement != null ? adminAnnouncement.content : ''}"></textarea>
             </div>
             
             <div class="flex-between">
                 <button type="submit" class="btn" th:text="#{members.save}">Speichern</button>
                 <button type="button" id="trigger-delete-confirm" class="btn" style="background-color: var(--color-dept-combat);" th:text="#{info.delete}">Löschen</button>
             </div>
        </form>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-confirm-modal" class="modal" style="display:none; z-index: 3100;">
        <div class="modal-content hud-box" style="max-width: 500px; text-align: center;">
            <h2 th:text="#{info.delete.confirm.title}" style="margin-top:0;">Löschen bestätigen</h2>
            <p th:text="#{info.delete.confirm.message}" style="margin-bottom: 2rem;">Wirklich löschen?</p>
            <div class="flex-center-gap">
                <button type="button" class="btn btn-secondary close-delete-modal" th:text="#{general.cancel}">Abbrechen</button>
                <form th:action="@{/admin/announcement/delete}" method="post" style="margin:0;">
                    <button type="submit" class="btn" style="background-color: var(--color-dept-combat);" th:text="#{info.delete}">Löschen</button>
                </form>
            </div>
        </div>
    </div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const deleteModal = document.getElementById('delete-confirm-modal');
        const triggerDeleteBtn = document.getElementById('trigger-delete-confirm');
        const closeDeleteBtns = document.querySelectorAll('.close-delete-modal');

        if (triggerDeleteBtn && deleteModal) {
            triggerDeleteBtn.onclick = function() {
                deleteModal.style.display = "flex";
            }
        }

        if (deleteModal) {
            closeDeleteBtns.forEach(btn => {
                btn.onclick = function() {
                    deleteModal.style.display = "none";
                }
            });
        }

        window.onclick = function(event) {
            if (event.target == deleteModal) {
                deleteModal.style.display = "none";
            }
        }
    });
</script>
</body>
</html>
