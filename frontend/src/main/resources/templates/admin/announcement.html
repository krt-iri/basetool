<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{info.title} + ' - ' + ${appTitle}">Informationen - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-surface-input);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{info.edit.title}">Informationen verwalten</h1>
    </div>

    <div class="hud-box mt-2">
        <form id="announcement-update-form" th:action="@{/admin/announcement/update}" method="post">
             <input type="hidden" name="version" th:value="${adminAnnouncement != null ? adminAnnouncement.version : 0}">
             <div class="form-group">
                 <textarea name="content" id="info-edit-content" rows="10" 
                           th:text="${adminAnnouncement != null ? adminAnnouncement.content : ''}"></textarea>
             </div>
             
             <div class="flex-between">
                 <button type="submit" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{members.save}">Speichern</span></button>
                 <button type="button" id="trigger-delete-confirm" class="btn btn-outline-danger"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-trash"/></svg> <span th:text="#{info.delete}">Löschen</span></button>
             </div>
        </form>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-confirm-modal" class="modal" style="display:none; z-index: 3100;">
        <div class="modal-content hud-box" style="max-width: 500px; text-align: center;">
            <h2 th:text="#{info.delete.confirm.title}" class="mt-0">Löschen bestätigen</h2>
            <p th:text="#{info.delete.confirm.message}" class="mb-2">Wirklich löschen?</p>
            <div class="flex-center-gap">
                <button type="button" class="btn btn-ghost close-delete-modal" th:text="#{general.cancel}">Abbrechen</button>
                <form id="announcement-delete-form" th:action="@{/admin/announcement/delete}" method="post" class="m-0">
                    <button type="submit" class="btn btn-danger" th:text="#{info.delete}">Löschen</button>
                </form>
            </div>
        </div>
    </div>
</main>
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', function() {
        const deleteModal = document.getElementById('delete-confirm-modal');
        const triggerDeleteBtn = document.getElementById('trigger-delete-confirm');
        const closeDeleteBtns = document.querySelectorAll('.close-delete-modal');
        const updateForm = document.getElementById('announcement-update-form');
        const deleteForm = document.getElementById('announcement-delete-form');

        const MSG = {
            saveSuccess:   /*[[#{notification.success.save}]]*/ 'Gespeichert.',
            saveError:     /*[[#{notification.error.save}]]*/ 'Speichern fehlgeschlagen.',
            deleteSuccess: /*[[#{notification.success.delete}]]*/ 'Gelöscht.',
            deleteError:   /*[[#{notification.error.delete}]]*/ 'Löschen fehlgeschlagen.'
        };
        const CONFLICT = {
            title:                /*[[#{frontend.ajax.conflict.title}]]*/ 'Konflikt',
            reloadDetailFallback: /*[[#{frontend.ajax.conflict.detail}]]*/ 'Bitte neu laden.',
            reloadLabel:          /*[[#{frontend.ajax.conflict.reload}]]*/ 'Aktuelle Werte laden',
            dismissLabel:         /*[[#{frontend.ajax.conflict.dismiss}]]*/ 'Schliessen',
            reloadQuestion:       /*[[#{frontend.ajax.conflict.question}]]*/ 'Aktuelle Werte laden?'
        };

        function closeDeleteModal() {
            if (deleteModal) deleteModal.style.display = "none";
        }

        if (triggerDeleteBtn && deleteModal) {
            triggerDeleteBtn.onclick = function() {
                deleteModal.style.display = "flex";
            };
        }

        closeDeleteBtns.forEach(function(btn) {
            btn.onclick = closeDeleteModal;
        });

        window.onclick = function(event) {
            if (event.target == deleteModal) {
                closeDeleteModal();
            }
        };

        // In-place save: post the update via the AJAX twin and write the bumped
        // optimistic-lock version back into the hidden input so the next save
        // does not 409. Without krtFetch (no-JS) the native POST->redirect runs.
        if (updateForm) {
            updateForm.addEventListener('submit', function(event) {
                event.preventDefault();
                if (!window.krtFetch) { updateForm.submit(); return; }
                const versionInput = updateForm.querySelector('input[name="version"]');
                const contentInput = updateForm.querySelector('textarea[name="content"]');
                window.krtFetch.write({
                    method: 'POST',
                    url: updateForm.getAttribute('action'),
                    payload: {
                        content: contentInput ? contentInput.value : '',
                        version: versionInput && versionInput.value !== ''
                            ? Number(versionInput.value) : null
                    },
                    successMessage: MSG.saveSuccess,
                    errorMessage: MSG.saveError,
                    conflict: CONFLICT,
                    onSuccess: function(body) {
                        if (versionInput && body && body.version != null) {
                            versionInput.value = body.version;
                        }
                    }
                });
            });
        }

        // In-place delete: on success the announcement is gone, so reset the form to
        // its empty create state in place instead of reloading. The no-reload win is
        // the failure path (inline toast, modal stays open).
        if (deleteForm) {
            deleteForm.addEventListener('submit', function(event) {
                event.preventDefault();
                if (!window.krtFetch) { deleteForm.submit(); return; }
                window.krtFetch.write({
                    method: 'POST',
                    url: deleteForm.getAttribute('action'),
                    successMessage: MSG.deleteSuccess,
                    errorMessage: MSG.deleteError,
                    conflict: CONFLICT,
                    onSuccess: function() {
                        if (updateForm) {
                            const versionInput = updateForm.querySelector('input[name="version"]');
                            const contentInput = updateForm.querySelector('textarea[name="content"]');
                            if (contentInput) contentInput.value = '';
                            if (versionInput) versionInput.value = '0';
                        }
                        closeDeleteModal();
                    }
                });
            });
        }
    });
</script>
</body>
</html>
