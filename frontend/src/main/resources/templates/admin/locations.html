<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{admin.locations.title} + ' - ' + ${appTitle}">Orte - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        .data-section {
            margin-bottom: 3rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-surface-input);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{admin.locations.title}">Orte verwalten</h1>
    </div>

    <div class="hud-box mt-2">
        <!-- Locations Section -->
        <div class="data-section">
            <div class="flex-between-mb">
                <h2 th:text="#{admin.locations.locations}">Orte</h2>
                <div class="form-group" style="margin-bottom: 0; width: 300px; position: relative;">
                    <input type="text" id="filterLocations" th:placeholder="#{general.filter.name.placeholder}" data-trigger="filter-table" data-table-id="locationsTable" autocomplete="off">
                    <!--/*
                      Location names are exposed to JavaScript via this server-
                      rendered <datalist> instead of a Thymeleaf JS-inline
                      expression. Thymeleaf 3.1 truncates the surrounding
                      <script> block right after the first List/Collection
                      JS-inline serialisation, so the filterTable function
                      defined further down would silently never be reached.
                      Keep the datalist; do NOT move this back into <script>.
                    */-->
                    <datalist id="locationNames-data" style="display: none;">
                        <option th:each="loc : ${locations}" th:value="${loc.name}"></option>
                    </datalist>
                </div>
            </div>

            <div class="table-responsive">
            <table id="locationsTable">
                <thead>
                    <tr>
                        <th th:text="#{admin.location.name}">Name</th>
                        <th th:text="#{admin.location.description}">Beschreibung</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="loc : ${locations}">
                        <td th:text="${loc.name}">Name</td>
                        <td th:text="${loc.description}">Desc</td>
                        <td>
                            <div class="flex-gap-xs">
                                <form sec:authorize="hasRole('ADMIN')" method="post" th:action="@{/admin/locations/{id}/toggle-visibility(id=${loc.id})}" class="m-0" data-location-toggle="visibility">
                                    <input type="hidden" name="hidden" th:value="${!loc.hidden}">
                                    <button type="submit" class="btn" th:classappend="${loc.hidden} ? '' : 'btn-secondary'"
                                            th:data-label-on="#{admin.location.visibility.show}"
                                            th:data-label-off="#{admin.location.visibility.hide}"
                                            th:text="${loc.hidden} ? #{admin.location.visibility.show} : #{admin.location.visibility.hide}">Toggle</button>
                                </form>
                                <form sec:authorize="hasRole('ADMIN')" method="post" th:action="@{/admin/locations/{id}/toggle-home-location(id=${loc.id})}" class="m-0" data-location-toggle="home">
                                    <input type="hidden" name="homeLocation" th:value="${!loc.homeLocation}">
                                    <button type="submit" class="btn" th:classappend="${loc.homeLocation} ? 'btn-secondary' : ''"
                                            th:data-label-on="#{admin.location.home.unmark}"
                                            th:data-label-off="#{admin.location.home.mark}"
                                            th:text="${loc.homeLocation} ? #{admin.location.home.unmark} : #{admin.location.home.mark}">Home</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/autocomplete.js}" th:attr="nonce=${cspNonce}"></script>
<script th:attr="nonce=${cspNonce}">
    document.addEventListener("DOMContentLoaded", function() {
        const dataList = document.getElementById("locationNames-data");
        const locationNames = dataList
            ? Array.from(dataList.options).map(function (o) { return o.value; })
            : [];
        const inpLocations = document.getElementById("filterLocations");
        if(inpLocations) krtAutocomplete(inpLocations, locationNames);
    });

    function filterTable(tableId, query) {
        var filter = query.toUpperCase();
        var table = document.getElementById(tableId);
        var tr = table.getElementsByTagName("tr");
        for (var i = 1; i < tr.length; i++) {
            var td = tr[i].getElementsByTagName("td")[0]; // Name is in the first column
            if (td) {
                var txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }       
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        // Scripts removed as modals are no longer used
    });
</script>
<!-- In-place visibility / home-location toggles (#582). Kept in a separate inline block from the
     filterTable script above, whose comment warns that a List/Collection JS-inline serialisation
     truncates the surrounding <script>; only scalar messages are inlined here. -->
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', function () {
        const MSG = {
            success:    /*[[#{notification.success.save}]]*/ 'Gespeichert.',
            error:      /*[[#{notification.error.save}]]*/ 'Speichern fehlgeschlagen.'
        };
        const CONFLICT = {
            title:                /*[[#{frontend.ajax.conflict.title}]]*/ 'Konflikt',
            reloadDetailFallback: /*[[#{frontend.ajax.conflict.detail}]]*/ 'Bitte neu laden.',
            reloadLabel:          /*[[#{frontend.ajax.conflict.reload}]]*/ 'Aktuelle Werte laden',
            dismissLabel:         /*[[#{frontend.ajax.conflict.dismiss}]]*/ 'Schliessen',
            reloadQuestion:       /*[[#{frontend.ajax.conflict.question}]]*/ 'Aktuelle Werte laden?'
        };

        // The response is the full LocationDto, so both toggle buttons in the row are re-rendered
        // from the authoritative state regardless of which one was clicked. data-label-on is the
        // label shown when the flag is TRUE, data-label-off when FALSE; btn-secondary tracks the
        // flag with the per-button polarity passed as secondaryWhen.
        function patchButton(btn, flagValue, secondaryWhen) {
            if (!btn) { return; }
            btn.textContent = flagValue
                ? btn.getAttribute('data-label-on')
                : btn.getAttribute('data-label-off');
            btn.classList.toggle('btn-secondary', flagValue === secondaryWhen);
        }

        function patchRow(row, updated) {
            if (!row || !updated) { return; }
            const visForm = row.querySelector('form[data-location-toggle="visibility"]');
            const homeForm = row.querySelector('form[data-location-toggle="home"]');
            if (visForm) {
                patchButton(visForm.querySelector('button'), updated.hidden, false);
                const visInput = visForm.querySelector('input[name="hidden"]');
                if (visInput) { visInput.value = String(!updated.hidden); }
            }
            if (homeForm) {
                patchButton(homeForm.querySelector('button'), updated.homeLocation, true);
                const homeInput = homeForm.querySelector('input[name="homeLocation"]');
                if (homeInput) { homeInput.value = String(!updated.homeLocation); }
            }
        }

        document.addEventListener('submit', function (event) {
            const form = event.target.closest('form[data-location-toggle]');
            if (!form) { return; }
            event.preventDefault();
            if (!window.krtFetch) { form.submit(); return; }
            const row = form.closest('tr');
            const button = form.querySelector('button[type="submit"]');
            if (button) { button.disabled = true; }
            window.krtFetch
                .write({
                    method: 'POST',
                    url: form.getAttribute('action'),
                    successMessage: MSG.success,
                    errorMessage: MSG.error,
                    conflict: CONFLICT,
                    onSuccess: function (updated) { patchRow(row, updated); }
                })
                .finally(function () {
                    if (button) { button.disabled = false; }
                });
        });
    });
</script>
</body>
</html>
