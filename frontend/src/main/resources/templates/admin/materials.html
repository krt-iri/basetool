<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::style})}">
    <title th:text="#{admin.materials.title} + ' - ' + #{app.title}">Materialien verwalten - IRIDIUM Basetool</title>
    <style>
        .data-section {
            margin-bottom: 3rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
            font-family: var(--font-headline);
            font-size: 0.8rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-gray-4);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
        .inline-form {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }
        .inline-form select {
            width: auto;
            flex-grow: 1;
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{admin.materials.title}">Materialien verwalten</h1>
    </div>

    <div class="hud-box" style="margin-top: 2rem;">
        <div class="data-section">
            <h2 th:text="#{admin.materials.categories.title}">Kategorien verwalten</h2>
            <form method="post" th:action="@{/admin/materials/categories}" class="inline-form" style="margin-bottom: 1rem;">
                <input type="text" name="name" required th:placeholder="#{general.name}">
                <button type="submit" class="btn" th:text="#{general.add}">Hinzufügen</button>
            </form>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th th:text="#{admin.materials.categories.name}">Kategorie</th>
                            <th th:text="#{general.action}">Aktion</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.name}">Category Name</td>
                            <td>
                                <form method="post" th:action="@{/admin/materials/categories/{id}/delete(id=${cat.id})}" style="display:inline;">
                                    <button type="submit" class="btn btn-danger" th:text="#{general.delete}" th:data-confirm="#{admin.materials.categories.delete.confirm}" onclick="return confirm(this.getAttribute('data-confirm'));">Löschen</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${categories.isEmpty()}">
                            <td colspan="2" th:text="#{general.no_entries}">Keine Einträge</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="hud-box" style="margin-top: 2rem;">
        <div class="data-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
                <h2 th:text="#{admin.materials.subtitle}">Materialien</h2>
                <div class="form-group" style="margin-bottom: 0; width: 300px; max-width: 100%; position: relative;">
                    <input type="text" id="filterMaterials" th:placeholder="#{general.filter.name.placeholder}" onkeyup="filterTable('materialsTable', this.value)" autocomplete="off">
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger" style="margin-bottom: 1rem;" th:text="#{${error}}">Fehler</div>

            <div class="table-responsive">
            <table id="materialsTable">
                <thead>
                    <tr>
                        <th th:text="#{admin.material.name}">Name</th>
                        <th th:text="#{admin.material.type}">MaterialType</th>
                        <th th:text="#{admin.materials.quantityType}">Mengentyp</th>
                        <th th:text="#{admin.materials.categories.name}">Kategorie</th>
                        <th th:text="#{admin.material.refined}">Veredeltes Material</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="mat : ${materials}">
                        <td>
                            <span th:if="${mat?.isIllegal == true}" class="text-danger" style="margin-right: 0.5rem; font-weight: bold;" th:title="#{material.is_illegal}">&#9888;</span><span th:if="${mat?.isVolatileQt == true}" class="text-warning" style="color: #ffc107; margin-right: 0.5rem; font-weight: bold;" th:title="#{material.is_volatile_qt}">&#9888;</span><span th:if="${mat?.isVolatileTime == true}" class="text-warning" style="color: #ffc107; margin-right: 0.5rem; font-weight: bold;" th:title="#{material.is_volatile_time}">&#9888;</span><span th:text="${mat?.name}">Name</span>
                        </td>
                        <td th:text="${mat?.type != null ? #messages.msg('material.type.' + mat.type) : '-'}">Type</td>
                        <td>
                            <form method="post" th:action="@{/admin/materials/{id}/quantity-type(id=${mat.id})}" class="inline-form">
                                <select name="quantityType">
                                    <option value="SCU" th:text="#{admin.materials.quantityType.scu}" th:selected="${mat.quantityType == 'SCU' || mat.quantityType == null}">SCU</option>
                                    <option value="PIECE" th:text="#{admin.materials.quantityType.piece}" th:selected="${mat.quantityType == 'PIECE'}">Stück</option>
                                </select>
                                <button type="submit" class="btn" th:text="#{general.save}">Speichern</button>
                            </form>
                        </td>
                        <td>
                            <form method="post" th:action="@{/admin/materials/{id}/category(id=${mat.id})}" class="inline-form">
                                <select name="categoryId">
                                    <option value="" th:text="#{admin.materials.categories.unsorted}">Unsortiert</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${mat.category != null and mat.category.id == cat.id}">Category</option>
                                </select>
                                <button type="submit" class="btn" th:text="#{general.save}">Speichern</button>
                            </form>
                        </td>
                        <td>
                            <th:block th:if="${mat?.type == 'RAW'}">
                                <form sec:authorize="hasAnyRole('ADMIN', 'OFFICER')" method="post" th:action="@{/admin/materials/{id}/refined(id=${mat.id})}" class="inline-form">
                                    <select name="refinedMaterialId">
                                        <option value="" th:text="#{general.please_select}">Bitte wählen...</option>
                                        <option th:each="rm : ${refinedMaterials}" th:value="${rm.id}" th:text="${rm.name}" th:selected="${mat.refinedMaterial != null and mat.refinedMaterial.id == rm.id}">Refined Material</option>
                                    </select>
                                    <button type="submit" class="btn" th:text="#{general.save}">Speichern</button>
                                </form>
                                <span sec:authorize="!hasAnyRole('ADMIN', 'OFFICER')" th:text="${mat.refinedMaterial != null ? mat.refinedMaterial.name : '-'}">-</span>
                            </th:block>
                            <th:block th:if="${mat?.type != 'RAW'}">
                                <span>-</span>
                            </th:block>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/autocomplete.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const materialNames = /*[[${materials.![name]}]]*/ [];
        const inpMaterials = document.getElementById("filterMaterials");
        if(inpMaterials) krtAutocomplete(inpMaterials, materialNames);
    });

    function filterTable(tableId, query) {
        var filter = query.toUpperCase();
        var table = document.getElementById(tableId);
        var tr = table.getElementsByTagName("tr");
        for (var i = 1; i < tr.length; i++) {
            var td = tr[i].getElementsByTagName("td")[0]; // Name is in the first column
            if (td) {
                var txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }       
        }
    }
</script>
</body>
</html>
