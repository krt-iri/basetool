<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::style})}">
    <title th:text="#{admin.materials.title} + ' - ' + #{app.title}">Materialien verwalten - IRIDIUM Basetool</title>
    <style>
        .data-section {
            margin-bottom: 3rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
            font-family: var(--font-headline);
            font-size: 0.8rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-gray-4);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
        .inline-form {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }
        .inline-form select {
            width: auto;
            flex-grow: 1;
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{admin.materials.title}">Materialien verwalten</h1>
    </div>

    <div class="hud-box mt-2">
        <div class="data-section">
            <h2 th:text="#{admin.materials.categories.title}">Kategorien verwalten</h2>
            <form method="post" th:action="@{/admin/materials/categories}" class="inline-form mb-1">
                <input type="text" name="name" required th:placeholder="#{general.name}">
                <button type="submit" class="btn" th:text="#{general.add}">Hinzufügen</button>
            </form>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th th:text="#{admin.materials.categories.name}">Kategorie</th>
                            <th th:text="#{general.action}">Aktion</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.name}">Category Name</td>
                            <td>
                                <form method="post" th:action="@{/admin/materials/categories/{id}/delete(id=${cat.id})}" style="display:inline;"
                                      data-krt-confirm th:data-krt-confirm-message="#{admin.materials.categories.delete.confirm}">
                                    <button type="submit" class="btn btn-danger" th:text="#{general.delete}">Löschen</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${categories.isEmpty()}">
                            <td colspan="2" th:text="#{general.no_entries}">Keine Einträge</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="hud-box mt-2">
        <div class="data-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
                <h2 th:text="#{admin.materials.subtitle}">Materialien</h2>
                <div class="form-group" style="margin-bottom: 0; width: 300px; max-width: 100%; position: relative;">
                    <input type="text" id="filterMaterials" th:placeholder="#{general.filter.name.placeholder}" data-trigger="filter-table" data-table-id="materialsTable" autocomplete="off">
                    <!--/*
                      Material names are exposed to JavaScript via this server-
                      rendered <datalist> instead of a Thymeleaf JS-inline
                      expression. Thymeleaf 3.1 truncates the surrounding
                      <script> block right after the first List/Collection
                      JS-inline serialisation, so the data-krt-confirm form
                      delete-confirmation handlers + updateMaterial bindings
                      defined further down in the script would silently never
                      be wired. Keep the datalist; do NOT move this back into
                      the <script> block.
                    */-->
                    <datalist id="materialNames-data" style="display: none;">
                        <option th:each="mat : ${materials}" th:value="${mat.name}"></option>
                    </datalist>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger mb-1" th:text="#{${error}}">Fehler</div>

            <div class="table-responsive">
            <table id="materialsTable">
                <thead>
                    <tr>
                        <th th:text="#{admin.material.name}">Name</th>
                        <th th:text="#{admin.material.type}">MaterialType</th>
                        <th th:text="#{admin.materials.quantityType}">Mengentyp</th>
                        <th th:text="#{admin.materials.categories.name}">Kategorie</th>
                        <th th:text="#{admin.material.refined}">Veredeltes Material</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="mat : ${materials}" th:data-mat-id="${mat.id}" th:data-version="${mat.version}">
                        <td>
                            <span th:if="${mat?.isIllegal == true}" class="text-danger" style="margin-right: 0.5rem; font-weight: bold;" th:title="#{material.is_illegal}">&#9888;</span><span th:if="${mat?.isVolatileQt == true}" class="text-warning" style="color: #ffc107; margin-right: 0.5rem; font-weight: bold;" th:title="#{material.is_volatile_qt}">&#9888;</span><span th:if="${mat?.isVolatileTime == true}" class="text-warning" style="color: #ffc107; margin-right: 0.5rem; font-weight: bold;" th:title="#{material.is_volatile_time}">&#9888;</span><span th:text="${mat?.name}">Name</span>
                        </td>
                        <td>
                            <div style="white-space: nowrap;">
                                <span th:text="${mat?.type != null ? #messages.msg('material.type.' + mat.type) : '-'}">Type</span>
                            </div>
                            <div sec:authorize="hasRole('ADMIN')" style="margin-top: 0.5rem; font-size: 0.85em; white-space: nowrap;">
                                <label style="margin-bottom: 0; cursor: pointer; min-height: 44px; display: flex; align-items: center;">
                                    <input type="checkbox" name="isManualRawMaterial" data-update-type="MANUAL_RAW" th:checked="${mat.isManualRawMaterial == true}" data-trigger="admin-materials-update" style="margin-right: 0.25rem;" />
                                    <span th:text="#{admin.material.manual_raw}">Manuelles Rohmaterial</span>
                                </label>
                            </div>
                            <div sec:authorize="hasRole('ADMIN')" style="margin-top: 0.5rem; font-size: 0.85em; white-space: nowrap;">
                                <label style="margin-bottom: 0; cursor: pointer; min-height: 44px; display: flex; align-items: center;">
                                    <input type="checkbox" name="isJobOrder" data-update-type="JOB_ORDER" th:checked="${mat.isJobOrder == true}" data-trigger="admin-materials-update" style="margin-right: 0.25rem;" />
                                    <span th:text="#{admin.material.job_order}">Auftrag</span>
                                </label>
                            </div>
                        </td>
                        <td>
                            <select name="quantityType" data-update-type="QUANTITY_TYPE" data-trigger="admin-materials-update" style="width: 100%;">
                                <option value="SCU" th:text="#{admin.materials.quantityType.scu}" th:selected="${mat.quantityType == 'SCU' || mat.quantityType == null}">SCU</option>
                                <option value="PIECE" th:text="#{admin.materials.quantityType.piece}" th:selected="${mat.quantityType == 'PIECE'}">Stück</option>
                            </select>
                        </td>
                        <td>
                            <select name="categoryId" data-update-type="CATEGORY" data-trigger="admin-materials-update" style="width: 100%;">
                                <option value="" th:text="#{admin.materials.categories.unsorted}">Unsortiert</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${mat.category != null and mat.category.id == cat.id}">Category</option>
                            </select>
                        </td>
                        <td>
                            <th:block th:if="${mat?.type == 'RAW' or mat?.isManualRawMaterial == true}">
                                <select sec:authorize="hasRole('ADMIN')" name="refinedMaterialId" data-update-type="REFINED" data-trigger="admin-materials-update" style="width: 100%;">
                                    <option value="" th:text="#{general.please_select}">Bitte wählen...</option>
                                    <option th:each="rm : ${refinedMaterials}" th:value="${rm.id}" th:text="${rm.name}" th:selected="${mat.refinedMaterial != null and mat.refinedMaterial.id == rm.id}">Refined Material</option>
                                </select>
                                <span sec:authorize="!hasRole('ADMIN')" th:text="${mat.refinedMaterial != null ? mat.refinedMaterial.name : '-'}">-</span>
                            </th:block>
                            <th:block th:if="${mat?.type != 'RAW' and mat?.isManualRawMaterial != true}">
                                <span>-</span>
                            </th:block>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/autocomplete.js}" th:attr="nonce=${cspNonce}"></script>
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    document.addEventListener("DOMContentLoaded", function() {
        // Material names come from the sibling <datalist id="materialNames-data">
        // rather than a Thymeleaf JS-inline expression; see the HTML comment on
        // the datalist for the Thymeleaf 3.1 truncation bug. th:inline=
        // "javascript" stays on this script because the toast translation keys
        // further down (notification.success.save / notification.error.save)
        // still rely on it — those are single primitives, which Thymeleaf's
        // inline parser handles correctly.
        const dataList = document.getElementById("materialNames-data");
        const materialNames = dataList
            ? Array.from(dataList.options).map(function (o) { return o.value; })
            : [];
        const inpMaterials = document.getElementById("filterMaterials");
        if(inpMaterials) krtAutocomplete(inpMaterials, materialNames);

        // KRT-styled confirmation modal for forms marked with data-krt-confirm.
        // Replaces native window.confirm() per the no-native-dialogs UI rule.
        document.querySelectorAll('form[data-krt-confirm]').forEach(function(form) {
            form.addEventListener('submit', function(event) {
                if (form.dataset.krtConfirmed === 'true') {
                    return;
                }
                event.preventDefault();
                const message = form.getAttribute('data-krt-confirm-message') || '';
                if (typeof window.showKrtConfirm !== 'function') {
                    form.dataset.krtConfirmed = 'true';
                    form.submit();
                    return;
                }
                window.showKrtConfirm(null, message).then(function(ok) {
                    if (ok) {
                        form.dataset.krtConfirmed = 'true';
                        form.submit();
                    }
                });
            });
        });
    });

    function filterTable(tableId, query) {
        var filter = query.toUpperCase();
        var table = document.getElementById(tableId);
        var tr = table.getElementsByTagName("tr");
        for (var i = 1; i < tr.length; i++) {
            var td = tr[i].getElementsByTagName("td")[0]; // Name is in the first column
            if (td) {
                var txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }       
        }
    }

    function updateMaterial(selectElement) {
        const tr = selectElement.closest('tr');
        const matId = tr.getAttribute('data-mat-id');
        const version = tr.getAttribute('data-version');
        const updateType = selectElement.getAttribute('data-update-type');
        
        selectElement.disabled = true;
        
        let requestBody = {
            updateType: updateType,
            version: parseInt(version)
        };
        
        if (updateType === 'QUANTITY_TYPE') {
            requestBody.quantityType = selectElement.value;
        } else if (updateType === 'CATEGORY') {
            requestBody.categoryId = selectElement.value || null;
        } else if (updateType === 'REFINED') {
            requestBody.refinedMaterialId = selectElement.value || null;
        } else if (updateType === 'MANUAL_RAW') {
            requestBody.isManualRawMaterial = selectElement.checked;
        } else if (updateType === 'JOB_ORDER') {
            requestBody.isJobOrder = selectElement.checked;
        }

        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        
        const headers = {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        };
        if (csrfToken && csrfHeader) {
            headers[csrfHeader] = csrfToken;
        }
        
        fetch(`/admin/materials/${matId}/ajax`, {
            method: 'PUT',
            headers: headers,
            body: JSON.stringify(requestBody)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Update failed with status ' + response.status);
            }
            return response.json();
        })
        .then(updatedMaterial => {
            tr.setAttribute('data-version', updatedMaterial.version);
            if (typeof window.showFrontendSuccessToast === 'function') {
                window.showFrontendSuccessToast(/*[[#{notification.success.save}]]*/ 'Erfolgreich gespeichert.');
            }
        })
        .catch(error => {
            console.error('Error updating material:', error);
            if (typeof window.showFrontendErrorToast === 'function') {
                window.showFrontendErrorToast(/*[[#{notification.error.save}]]*/ 'Fehler beim Speichern.');
            }
        })
        .finally(() => {
            selectElement.disabled = false;
        });
    }

    // CSP-safe delegated binding (replaces onchange="updateMaterial(this)" inline handlers
    // on all the per-row checkboxes / selects). The page-local filterTable function picked
    // up by the global filter-table common-handler stays unchanged.
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('change', 'admin-materials-update', function (el) { updateMaterial(el); });
    }
</script>
</body>
</html>
