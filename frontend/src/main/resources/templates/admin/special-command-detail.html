<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="${specialCommand != null ? specialCommand.name() + ' - ' + appTitle : appTitle}">Spezialkommando - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
        <style th:attr="nonce=${cspNonce}">
            .role-checkbox {
                width: auto;
                margin-right: 0.25rem;
            }
            .flags-form {
                display: inline-flex;
                gap: 0.5rem;
                align-items: center;
                margin: 0;
            }
            .lead-toggle-form {
                display: inline-flex;
                gap: 0.5rem;
                align-items: center;
                margin: 0;
            }
            .role-badge {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
                border-radius: var(--radius-none);
                margin-left: 0.25rem;
            }
            .role-badge.lead {
                background-color: var(--color-accent);
                color: var(--color-bg);
            }
            .role-badge.role-logistician {
                background-color: var(--color-dept-search-rescue);
                color: var(--color-bg);
            }
            .role-badge.role-mission-manager {
                background-color: var(--color-dept-forschung);
                color: var(--color-white);
            }
            .sk-meta {
                color: var(--color-gray-2);
                font-size: 0.9rem;
                margin: 0.5rem 0;
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <a th:href="@{/admin/special-commands}" style="font-size: 0.9rem; color: var(--color-gray-2);" th:text="#{admin.specialcommands.back_to_list}">&larr; zurück zur Übersicht</a>
        <h1 th:text="${specialCommand != null ? specialCommand.name() : ''}">Spezialkommando</h1>
        <p class="sk-meta">
            <span th:text="#{admin.specialcommands.column.shorthand}">Kürzel</span>:
            <strong th:text="${specialCommand != null ? specialCommand.shorthand() : ''}">SHRT</strong>
        </p>
        <p th:if="${specialCommand != null and specialCommand.description() != null and !#strings.isEmpty(specialCommand.description())}"
           class="sk-meta" th:text="${specialCommand.description()}">Beschreibung</p>
    </div>

    <!-- Member roster -->
    <div class="hud-box mt-2" id="members-box">
        <div class="box-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2 th:text="#{admin.specialcommands.members.title}" class="m-0">Mitglieder</h2>
            <button id="add-member-btn" class="btn btn--cta" type="button" th:text="#{admin.specialcommands.members.add}">Mitglied hinzufügen</button>
        </div>

        <div th:if="${members == null or #lists.isEmpty(members)}" style="color: var(--color-gray-2); padding: 1rem 0;" th:text="#{admin.specialcommands.members.empty}">
            Noch keine Mitglieder zugeordnet.
        </div>

        <div th:if="${members != null and !#lists.isEmpty(members)}" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th th:text="#{admin.specialcommands.members.column.name}">Name</th>
                        <th th:text="#{admin.specialcommands.members.column.roles}">Rollen</th>
                        <th th:text="#{admin.specialcommands.members.column.lead}">Leiter</th>
                        <th th:text="#{admin.specialcommands.column.actions}">Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${members}">
                        <td>
                            <span th:text="${m.userDisplayName()}">Display Name</span>
                            <span th:if="${m.isLead()}" class="role-badge lead" th:text="#{admin.specialcommands.members.lead_badge}">Lead</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/special-commands/{id}/members/{userId}/flags(id=${specialCommand.id()},userId=${m.userId()})}"
                                  method="post" class="flags-form">
                                <input type="hidden" name="version" th:value="${m.version()}">
                                <!-- Spring _field markers: an unchecked checkbox sends nothing,
                                     so without these the binder would skip the field entirely
                                     and the demote-via-uncheck path would silently no-op. -->
                                <input type="hidden" name="_isLogistician">
                                <input type="hidden" name="_isMissionManager">
                                <label style="display: inline-flex; align-items: center; gap: 0.25rem; cursor: pointer; margin-right: 0.5rem;">
                                    <input type="checkbox" class="role-checkbox" name="isLogistician" value="true" th:checked="${m.isLogistician()}">
                                    <span th:text="#{admin.specialcommands.members.role.logistician}">Logistiker</span>
                                </label>
                                <label style="display: inline-flex; align-items: center; gap: 0.25rem; cursor: pointer;">
                                    <input type="checkbox" class="role-checkbox" name="isMissionManager" value="true" th:checked="${m.isMissionManager()}">
                                    <span th:text="#{admin.specialcommands.members.role.mission_manager}">Einsatzleiter</span>
                                </label>
                                <button type="submit" class="btn btn-ghost" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" th:text="#{members.save}">Speichern</button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/special-commands/{id}/members/{userId}/lead(id=${specialCommand.id()},userId=${m.userId()})}"
                                  method="post" class="lead-toggle-form">
                                <input type="hidden" name="version" th:value="${m.version()}">
                                <input type="hidden" name="isLead" th:value="${!m.isLead()}">
                                <button type="submit" class="btn btn-ghost"
                                        th:text="${m.isLead() ? #messages.msg('admin.specialcommands.members.lead.demote') : #messages.msg('admin.specialcommands.members.lead.promote')}">
                                    Toggle Lead
                                </button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/special-commands/{id}/members/{userId}/delete(id=${specialCommand.id()},userId=${m.userId()})}"
                                  method="post" style="margin: 0; display: inline;">
                                <button type="submit" class="btn btn-quiet-danger delete-btn"
                                        th:data-action="@{/admin/special-commands/{id}/members/{userId}/delete(id=${specialCommand.id()},userId=${m.userId()})}"
                                        th:text="#{admin.specialcommands.members.remove}">Entfernen</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Add-Member Modal -->
<div id="add-member-modal" class="modal" style="display: none;">
    <div class="modal-content hud-box">
        <span class="close-add-member-modal close-modal">&times;</span>
        <h2 th:text="#{admin.specialcommands.members.add}">Mitglied hinzufügen</h2>
        <form th:action="@{/admin/special-commands/{id}/members(id=${specialCommand.id()})}" method="post">
            <div class="form-group">
                <label for="add-member-userid" th:text="#{admin.specialcommands.members.user_picker}">Nutzer</label>
                <select id="add-member-userid" name="userId" required>
                    <option value="" th:text="#{admin.specialcommands.members.user_picker.placeholder}">-- Bitte wählen --</option>
                    <option th:each="u : ${allUsers}" th:value="${u.id()}" th:text="${u.effectiveName() ?: u.username()}">User</option>
                </select>
            </div>
            <button type="submit" class="btn btn--cta" th:text="#{admin.specialcommands.members.add.submit}">Hinzufügen</button>
        </form>
    </div>
</div>

<!-- Add-Member modal wiring (CSP-safe) -->
<script th:attr="nonce=${cspNonce}">
(function () {
    const modal = document.getElementById('add-member-modal');
    const openBtn = document.getElementById('add-member-btn');
    const closeBtn = document.querySelector('#add-member-modal .close-add-member-modal');
    if (!modal || !openBtn) return;

    openBtn.addEventListener('click', () => { modal.style.display = 'flex'; });
    closeBtn.addEventListener('click', () => { modal.style.display = 'none'; });
    modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });
})();
</script>
</body>
</html>
