<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="${specialCommand != null ? specialCommand.name() + ' - ' + appTitle : appTitle}">Spezialkommando - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
        <style th:attr="nonce=${cspNonce}">
            .role-checkbox {
                width: auto;
                margin-right: 0.25rem;
            }
            .flags-form {
                display: inline-flex;
                gap: 0.5rem;
                align-items: center;
                margin: 0;
            }
            .lead-toggle-form {
                display: inline-flex;
                gap: 0.5rem;
                align-items: center;
                margin: 0;
            }
            .role-badge {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
                border-radius: var(--radius-none);
                margin-left: 0.25rem;
            }
            .role-badge.lead {
                background-color: var(--color-accent-light);
                color: var(--color-bg-black);
            }
            .role-badge.role-logistician {
                background-color: var(--color-dept-search-rescue);
                color: var(--color-bg-black);
            }
            .role-badge.role-mission-manager {
                background-color: var(--color-dept-forschung);
                color: var(--color-white);
            }
            .sk-meta {
                color: var(--color-gray-2);
                font-size: 0.9rem;
                margin: 0.5rem 0;
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <a th:href="@{/admin/special-commands}" style="font-size: 0.9rem; color: var(--color-gray-2);" th:text="#{admin.specialcommands.back_to_list}">&larr; zurück zur Übersicht</a>
        <h1 th:text="${specialCommand != null ? specialCommand.name() : ''}">Spezialkommando</h1>
        <p class="sk-meta">
            <span th:text="#{admin.specialcommands.column.shorthand}">Kürzel</span>:
            <strong th:text="${specialCommand != null ? specialCommand.shorthand() : ''}">SHRT</strong>
        </p>
        <p th:if="${specialCommand != null and specialCommand.description() != null and !#strings.isEmpty(specialCommand.description())}"
           class="sk-meta" th:text="${specialCommand.description()}">Beschreibung</p>
    </div>

    <!-- Member roster -->
    <div class="hud-box mt-2" id="members-box" th:data-sc-id="${specialCommand != null ? specialCommand.id() : ''}">
        <div class="box-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2 th:text="#{admin.specialcommands.members.title}" class="m-0">Mitglieder</h2>
            <button id="add-member-btn" class="btn btn--cta" type="button" th:text="#{admin.specialcommands.members.add}">Mitglied hinzufügen</button>
        </div>

        <!-- AJAX swap target (#582): the flags / lead / remove / add-member writes re-render only
             this fragment, refreshing role badges, lead state and the fresh @Version on every form
             so the next member action does not 409. -->
        <div id="members-results">
        <th:block th:fragment="membersResults">
        <div th:if="${members == null or #lists.isEmpty(members)}" style="color: var(--color-gray-2); padding: 1rem 0;" th:text="#{admin.specialcommands.members.empty}">
            Noch keine Mitglieder zugeordnet.
        </div>

        <div th:if="${members != null and !#lists.isEmpty(members)}" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th th:text="#{admin.specialcommands.members.column.name}">Name</th>
                        <th th:text="#{admin.specialcommands.members.column.roles}">Rollen</th>
                        <th th:text="#{admin.specialcommands.members.column.lead}">Leiter</th>
                        <th th:text="#{admin.specialcommands.column.actions}">Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${members}">
                        <td>
                            <span th:text="${m.userDisplayName()}">Display Name</span>
                            <span th:if="${m.isLead()}" class="role-badge lead" th:text="#{admin.specialcommands.members.lead_badge}">Lead</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/special-commands/{id}/members/{userId}/flags(id=${specialCommand.id()},userId=${m.userId()})}"
                                  method="post" class="flags-form">
                                <input type="hidden" name="version" th:value="${m.version()}">
                                <!-- Spring _field markers: an unchecked checkbox sends nothing,
                                     so without these the binder would skip the field entirely
                                     and the demote-via-uncheck path would silently no-op. -->
                                <input type="hidden" name="_isLogistician">
                                <input type="hidden" name="_isMissionManager">
                                <label style="display: inline-flex; align-items: center; gap: 0.25rem; cursor: pointer; margin-right: 0.5rem;">
                                    <input type="checkbox" class="role-checkbox" name="isLogistician" value="true" th:checked="${m.isLogistician()}">
                                    <span th:text="#{admin.specialcommands.members.role.logistician}">Logistiker</span>
                                </label>
                                <label style="display: inline-flex; align-items: center; gap: 0.25rem; cursor: pointer;">
                                    <input type="checkbox" class="role-checkbox" name="isMissionManager" value="true" th:checked="${m.isMissionManager()}">
                                    <span th:text="#{admin.specialcommands.members.role.mission_manager}">Einsatzleiter</span>
                                </label>
                                <button type="submit" class="btn btn-ghost btn-icon" style="font-size: 0.8rem; padding: 0.25rem 0.5rem;" th:title="#{members.save}" th:aria-label="#{members.save}"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg></button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/special-commands/{id}/members/{userId}/lead(id=${specialCommand.id()},userId=${m.userId()})}"
                                  method="post" class="lead-toggle-form">
                                <input type="hidden" name="version" th:value="${m.version()}">
                                <input type="hidden" name="isLead" th:value="${!m.isLead()}">
                                <button type="submit" class="btn btn-ghost"
                                        th:text="${m.isLead() ? #messages.msg('admin.specialcommands.members.lead.demote') : #messages.msg('admin.specialcommands.members.lead.promote')}">
                                    Toggle Lead
                                </button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/special-commands/{id}/members/{userId}/delete(id=${specialCommand.id()},userId=${m.userId()})}"
                                  method="post" style="margin: 0; display: inline;">
                                <button type="submit" class="btn btn-quiet-danger delete-btn btn-icon"
                                        th:data-action="@{/admin/special-commands/{id}/members/{userId}/delete(id=${specialCommand.id()},userId=${m.userId()})}"
                                        th:title="#{admin.specialcommands.members.remove}" th:aria-label="#{admin.specialcommands.members.remove}"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-trash"/></svg></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        </th:block>
        </div>
    </div>
</main>

<!-- Add-Member Modal -->
<div id="add-member-modal" class="modal" style="display: none;">
    <div class="modal-content hud-box">
        <span class="close-add-member-modal close-modal">&times;</span>
        <h2 th:text="#{admin.specialcommands.members.add}">Mitglied hinzufügen</h2>
        <form th:action="@{/admin/special-commands/{id}/members(id=${specialCommand.id()})}" method="post">
            <div class="form-group">
                <label for="add-member-userid" th:text="#{admin.specialcommands.members.user_picker}">Nutzer</label>
                <select id="add-member-userid" name="userId" required data-krt-combobox>
                    <option value="" th:text="#{admin.specialcommands.members.user_picker.placeholder}">-- Bitte wählen --</option>
                    <option th:each="u : ${allUsers}" th:value="${u.id()}" th:attr="data-search=${u.username()}" th:text="${u.effectiveName() ?: u.username()}">User</option>
                </select>
            </div>
            <button type="submit" class="btn btn--cta" th:text="#{admin.specialcommands.members.add.submit}">Hinzufügen</button>
        </form>
    </div>
</div>

<!-- Add-Member modal wiring + in-place member CRUD (#582) -->
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
(function () {
    var MEMBER_MSG = {
        saved:   '[[#{notification.success.save}]]',
        deleted: '[[#{notification.success.delete}]]',
        error:   '[[#{notification.error.save}]]'
    };
    var MEMBER_CONFLICT = {
        title:                '[[#{frontend.ajax.conflict.title}]]',
        reloadDetailFallback: '[[#{frontend.ajax.conflict.detail}]]',
        reloadLabel:          '[[#{frontend.ajax.conflict.reload}]]',
        dismissLabel:         '[[#{frontend.ajax.conflict.dismiss}]]',
        reloadQuestion:       '[[#{frontend.ajax.conflict.question}]]'
    };

    var membersBox = document.getElementById('members-box');
    var scId = membersBox ? membersBox.getAttribute('data-sc-id') : '';

    // Re-renders the member roster fragment, refreshing role/lead badges and the fresh @Version on
    // every form so the next member action does not 409.
    function reswapMembers() {
        if (!window.krtFetch || !scId) { return; }
        window.krtFetch.swap({
            url: '/admin/special-commands/' + encodeURIComponent(scId) + '?fragment=members',
            container: '#members-results',
            fragmentValue: 'members',
            history: false
        });
    }

    // FormData POST to a member AJAX twin (keeps the @ModelAttribute / @RequestParam binding) with
    // X-Requested-With + CSRF + retry-once-on-403. On success re-swaps the roster; on failure
    // delegates to krtFetch.handleProblem (already-member toast / OPTIMISTIC_LOCK reload-confirm).
    // Migrated to krtFetch.submitForm (S10, REQ-FE-009): the shared foundation owns the CSRF header
    // (no Content-Type so the browser sets the multipart boundary), the bare-403 refresh-and-retry,
    // X-Reauthenticate, the success toast and the !ok handleProblem (already-member toast or
    // OPTIMISTIC_LOCK reload-confirm). This helper keeps only its page behaviour: run onSuccess and
    // re-swap the roster in place. Callers guard with if (!window.krtFetch) form.submit() so the
    // classic POST->redirect stays the no-JS fallback.
    function memberWrite(theForm, successMessage, onSuccess) {
        window.krtFetch.submitForm({
            form: theForm,
            successMessage: successMessage,
            errorMessage: MEMBER_MSG.error,
            conflict: MEMBER_CONFLICT,
            onSuccess: function () {
                if (typeof onSuccess === 'function') { onSuccess(); }
                reswapMembers();
            },
        });
    }

    // The flags / lead / remove forms live inside the swappable roster fragment, so they are
    // document-delegated (survive a re-swap). Remove uses the delete message, the rest "saved".
    document.addEventListener('submit', function (e) {
        var memberForm = e.target.closest('#members-results form');
        if (!memberForm) { return; }
        e.preventDefault();
        if (!window.krtFetch) { memberForm.submit(); return; }
        var isRemove = memberForm.getAttribute('action').indexOf('/delete') !== -1;
        memberWrite(memberForm, isRemove ? MEMBER_MSG.deleted : MEMBER_MSG.saved, null);
    });

    // Add-member modal (outside the fragment): open/close + in-place add.
    var modal = document.getElementById('add-member-modal');
    var openBtn = document.getElementById('add-member-btn');
    var closeBtn = document.querySelector('#add-member-modal .close-add-member-modal');
    if (modal && openBtn) {
        openBtn.addEventListener('click', function () { modal.style.display = 'flex'; });
        if (closeBtn) { closeBtn.addEventListener('click', function () { modal.style.display = 'none'; }); }
        modal.addEventListener('click', function (e) { if (e.target === modal) { modal.style.display = 'none'; } });
        var addForm = modal.querySelector('form');
        if (addForm) {
            addForm.addEventListener('submit', function (e) {
                e.preventDefault();
                if (!window.krtFetch) { addForm.submit(); return; }
                memberWrite(addForm, MEMBER_MSG.saved, function () {
                    modal.style.display = 'none';
                    addForm.reset();
                });
            });
        }
    }
})();
</script>
</body>
</html>
