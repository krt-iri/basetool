<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{admin.terminals.title} + ' - ' + #{app.title}">Terminals - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
<style>
        .data-section {
            margin-bottom: 3rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-primary);
            font-family: var(--font-headline);
            font-size: 0.8rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-gray-4);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
        /* Active state for the segmented loading-dock / auto-load override buttons.
           Strong orange fill plus an inset bright-orange ring makes the currently
           selected variant unmistakable next to its muted gray siblings. */
        .btn-active {
            background-color: var(--color-primary);
            color: var(--color-bg-black);
            box-shadow: inset 0 0 0 2px var(--color-accent-light);
            cursor: default;
        }
        .btn-active:hover {
            background-color: var(--color-primary);
            color: var(--color-bg-black);
        }
        /* Tiny footer below each segmented control: surfaces what UEX actually
           reported for this flag, regardless of whether an officer has pinned
           it. The "UEX" label uses the brand orange to anchor the line in the
           page palette; the value sits in muted gray-1 so it reads as
           informational, not actionable. When the on-screen value disagrees
           with what UEX claims (.uex-source-chip.mismatch) we tint the value
           amber to flag a divergence at a glance — keeps the column compact
           without adding a separate "UEX says" column. */
        .uex-source-chip {
            display: flex;
            align-items: baseline;
            gap: 0.35rem;
            margin-top: 0.35rem;
            font-family: var(--font-body);
            font-size: 0.7rem;
            line-height: 1;
            color: var(--color-gray-1);
        }
        .uex-source-chip .uex-source-chip__label {
            color: var(--color-primary);
            font-family: var(--font-headline);
            letter-spacing: 0.04em;
        }
        .uex-source-chip .uex-source-chip__value {
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .uex-source-chip.mismatch .uex-source-chip__value {
            color: var(--color-accent-light);
        }
        .uex-source-chip .uex-source-chip__value.unknown {
            color: var(--color-gray-2);
            font-style: italic;
            text-transform: none;
            letter-spacing: 0;
        }
        /* Global "last UEX sweep" stamp at the top of the page. Sits inline
           with the page heading on wide screens and wraps below it on phones;
           visually quiet (gray-1, small caps label) so it does not compete
           with the H1 but stays in the same hud-box for context. */
        .uex-sync-stamp {
            display: inline-flex;
            align-items: baseline;
            gap: 0.4rem;
            margin-top: 0.6rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
            color: var(--color-gray-1);
        }
        .uex-sync-stamp__label {
            color: var(--color-primary);
            font-family: var(--font-headline);
            font-size: 0.7rem;
            letter-spacing: 0.06em;
        }
        .uex-sync-stamp__value.unknown {
            color: var(--color-gray-2);
            font-style: italic;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{admin.terminals.title}">Terminals verwalten</h1>
        <div class="uex-sync-stamp">
            <span class="uex-sync-stamp__label" th:text="#{admin.terminal.uexLastSync}">Letzter UEX-Sync</span>
            <span th:if="${latestUexSync != null}"
                  class="uex-sync-stamp__value local-datetime-display"
                  th:data-utc="${latestUexSync.toEpochMilli()}"
                  th:text="${#temporals.format(latestUexSync, 'dd.MM.yy HH:mm', 'UTC')} + ' UTC'">--</span>
            <span th:if="${latestUexSync == null}"
                  class="uex-sync-stamp__value unknown"
                  th:text="#{admin.terminal.uexLastSync.never}">noch nicht gesynct</span>
        </div>
    </div>

    <div class="hud-box mt-2">
        <!-- Terminals Section -->
        <div class="data-section">
            <div class="flex-between-mb">
                <h2 th:text="#{admin.terminals.terminals}">Terminals</h2>
                <div class="form-group" style="margin-bottom: 0; width: 300px; position: relative;">
                    <input type="text" id="filterTerminals" th:placeholder="#{general.filter.name.placeholder}" data-trigger="filter-table" data-table-id="terminalsTable" autocomplete="off">
                </div>
            </div>

            <div class="table-responsive">
            <table id="terminalsTable">
                <thead>
                    <tr>
                        <th th:text="#{admin.terminal.name}">Name</th>
                        <th th:text="#{admin.terminal.nickname}">Nickname</th>
                        <th th:text="#{admin.terminal.system}">System</th>
                        <th th:text="#{admin.terminal.loadingDock}">Loading Dock</th>
                        <th th:text="#{admin.terminal.autoLoad}">Autoload</th>
                        <th th:text="#{general.action}">Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="term : ${terminals}" th:id="'terminal-' + ${term.id}">
                        <td th:text="${term.name}">Name</td>
                        <td th:text="${term.nickname}">Nickname</td>
                        <td th:text="${term.starSystemName}">System</td>
                        <td>
                            <div class="flex-gap-xs" sec:authorize="hasAnyRole('ADMIN', 'OFFICER')">
                                <form method="post" th:action="@{/admin/terminals/{id}/loading-dock(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="action" value="uex">
                                    <button type="submit" class="btn" th:classappend="${!term.hasLoadingDockOverridden} ? 'btn-active' : 'btn-secondary'" th:text="#{admin.uex.flag.btn.uex}">UEX</button>
                                </form>
                                <form method="post" th:action="@{/admin/terminals/{id}/loading-dock(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="action" value="yes">
                                    <button type="submit" class="btn" th:classappend="${term.hasLoadingDockOverridden && term.hasLoadingDock} ? 'btn-active' : 'btn-secondary'" th:text="#{admin.uex.flag.btn.yes}">Yes</button>
                                </form>
                                <form method="post" th:action="@{/admin/terminals/{id}/loading-dock(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="action" value="no">
                                    <button type="submit" class="btn" th:classappend="${term.hasLoadingDockOverridden && !term.hasLoadingDock} ? 'btn-active' : 'btn-secondary'" th:text="#{admin.uex.flag.btn.no}">No</button>
                                </form>
                            </div>
                            <div class="uex-source-chip"
                                 th:classappend="${term.uexHasLoadingDock != null and term.hasLoadingDock != null and term.uexHasLoadingDock != term.hasLoadingDock} ? 'mismatch' : ''"
                                 th:title="#{admin.terminal.uexValue.tooltip}">
                                <span class="uex-source-chip__label" th:text="#{admin.terminal.uexValue.label}">UEX:</span>
                                <span th:if="${term.uexHasLoadingDock != null}"
                                      class="uex-source-chip__value"
                                      th:text="${term.uexHasLoadingDock} ? #{admin.uex.flag.btn.yes} : #{admin.uex.flag.btn.no}">--</span>
                                <span th:if="${term.uexHasLoadingDock == null}"
                                      class="uex-source-chip__value unknown"
                                      th:text="#{admin.terminal.uexValue.unknown}">--</span>
                            </div>
                        </td>
                        <td>
                            <div class="flex-gap-xs" sec:authorize="hasAnyRole('ADMIN', 'OFFICER')">
                                <form method="post" th:action="@{/admin/terminals/{id}/auto-load(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="action" value="uex">
                                    <button type="submit" class="btn" th:classappend="${!term.isAutoLoadOverridden} ? 'btn-active' : 'btn-secondary'" th:text="#{admin.uex.flag.btn.uex}">UEX</button>
                                </form>
                                <form method="post" th:action="@{/admin/terminals/{id}/auto-load(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="action" value="yes">
                                    <button type="submit" class="btn" th:classappend="${term.isAutoLoadOverridden && term.isAutoLoad} ? 'btn-active' : 'btn-secondary'" th:text="#{admin.uex.flag.btn.yes}">Yes</button>
                                </form>
                                <form method="post" th:action="@{/admin/terminals/{id}/auto-load(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="action" value="no">
                                    <button type="submit" class="btn" th:classappend="${term.isAutoLoadOverridden && !term.isAutoLoad} ? 'btn-active' : 'btn-secondary'" th:text="#{admin.uex.flag.btn.no}">No</button>
                                </form>
                            </div>
                            <div class="uex-source-chip"
                                 th:classappend="${term.uexIsAutoLoad != null and term.isAutoLoad != null and term.uexIsAutoLoad != term.isAutoLoad} ? 'mismatch' : ''"
                                 th:title="#{admin.terminal.uexValue.tooltip}">
                                <span class="uex-source-chip__label" th:text="#{admin.terminal.uexValue.label}">UEX:</span>
                                <span th:if="${term.uexIsAutoLoad != null}"
                                      class="uex-source-chip__value"
                                      th:text="${term.uexIsAutoLoad} ? #{admin.uex.flag.btn.yes} : #{admin.uex.flag.btn.no}">--</span>
                                <span th:if="${term.uexIsAutoLoad == null}"
                                      class="uex-source-chip__value unknown"
                                      th:text="#{admin.terminal.uexValue.unknown}">--</span>
                            </div>
                        </td>
                        <td>
                            <div class="flex-gap-xs">
                                <form sec:authorize="hasAnyRole('ADMIN', 'OFFICER')" method="post" th:action="@{/admin/terminals/{id}/toggle-visibility(id=${term.id})}" style="margin: 0;">
                                    <input type="hidden" name="hidden" th:value="${!term.hidden}">
                                    <button type="submit" class="btn" th:classappend="${term.hidden} ? '' : 'btn-secondary'" th:text="${term.hidden} ? #{btn.show} : #{btn.hide}">Toggle</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/autocomplete.js}" th:attr="nonce=${cspNonce}"></script>
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    // sessionStorage key for the page's vertical scroll position. The override
    // forms POST to the controller, which 302-redirects back here — without
    // restoration the browser would land at scrollY=0 and the admin would have
    // to re-scroll to the row they were just operating on.
    var TERMINALS_SCROLL_KEY = "admin-terminals-scroll-y";

    document.addEventListener("DOMContentLoaded", function() {
        const terminalNames = /*[[${terminals.![name]}]]*/ [];
        const inpTerminals = document.getElementById("filterTerminals");
        if(inpTerminals) krtAutocomplete(inpTerminals, terminalNames);

        // Capture the current scrollY just before any row form is submitted so
        // we can put the page back where it was after the redirect.
        var forms = document.querySelectorAll("form[method='post']");
        forms.forEach(function(f) {
            f.addEventListener("submit", function() {
                try {
                    sessionStorage.setItem(TERMINALS_SCROLL_KEY, String(window.scrollY));
                } catch (e) { /* sessionStorage may be unavailable; ignore */ }
            });
        });

        // Restore scroll on load (and consume the key so a manual reload
        // doesn't replay a stale offset).
        try {
            var savedY = sessionStorage.getItem(TERMINALS_SCROLL_KEY);
            if (savedY !== null) {
                sessionStorage.removeItem(TERMINALS_SCROLL_KEY);
                var y = parseInt(savedY, 10);
                if (!isNaN(y) && y >= 0) {
                    window.scrollTo(0, y);
                }
            }
        } catch (e) { /* ignore */ }

        // Render the UEX sync stamp in the browser's local timezone. The server
        // renders the value pre-formatted in UTC (so the page works even with
        // JS disabled); when JS is available we rewrite it to the user's local
        // clock to match the convention used elsewhere in the app (see
        // refinery-orders-index.html).
        document.querySelectorAll('.local-datetime-display').forEach(function (el) {
            var utcMsStr = el.getAttribute('data-utc');
            if (!utcMsStr) return;
            var date = new Date(parseInt(utcMsStr, 10));
            if (isNaN(date.getTime())) return;
            var day = String(date.getDate()).padStart(2, '0');
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var year = String(date.getFullYear()).slice(-2);
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            el.textContent = day + '.' + month + '.' + year + ' ' + hours + ':' + minutes;
        });
    });

    function filterTable(tableId, query) {
        var filter = query.toUpperCase();
        var table = document.getElementById(tableId);
        var tr = table.getElementsByTagName("tr");
        for (var i = 1; i < tr.length; i++) {
            var td = tr[i].getElementsByTagName("td")[0]; // Name is in the first column
            if (td) {
                var txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    }
</script>
</body>
</html>
