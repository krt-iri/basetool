<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{blueprintOverview.title} + ' - ' + ${appTitle}">Blueprint Availability - Profit Basetool</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{blueprintOverview.title}">Blueprint Availability</h1>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${error}" class="hud-box hud-box-error">
            <p th:text="#{__${error}__}">Error</p>
        </div>

        <style th:attr="nonce=${cspNonce}">
            .details-row {
                display: none;
            }
            /* Toggled per row by blueprint-overview.js. A tr:has(details[open]) sibling
               rule here forced a style recalculation across the whole (up to 1000-row)
               table on every expand and visibly janked the UI (REQ-INV-012). */
            .details-row.bp-expanded {
                display: table-row;
            }
            .details-row td {
                border-left: 2px solid var(--color-primary) !important;
                padding: 0 !important;
                background-color: rgba(0, 0, 0, 0.1);
            }
            .bp-owners-panel {
                padding: 0.75rem 1rem;
            }
            .bp-owners-loading,
            .bp-owners-empty,
            .bp-owners-error {
                font-size: 0.85rem;
                color: var(--color-gray-2);
            }
            .bp-owners-error {
                color: var(--color-danger);
            }
            .bp-owners-list {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem;
            }
            .bp-owners-list .bp-owner {
                padding: 0.2rem 0.6rem;
                font-size: 0.85rem;
                color: var(--color-gray-1);
                background-color: rgba(231, 126, 35, 0.08);
                border: 1px solid rgba(231, 126, 35, 0.25);
            }
            .bp-owner-count {
                font-weight: 700;
            }
            /* ---- Blueprint live filter ---- */
            .bp-filter {
                position: relative;
                max-width: 360px;
                margin-bottom: 1.25rem;
            }
            .bp-filter .bp-filter-icon {
                position: absolute;
                left: 0.85rem;
                top: 50%;
                transform: translateY(-50%);
                display: inline-flex;
                color: var(--color-gray-2);
                pointer-events: none;
            }
            .bp-filter input[type="search"] {
                width: 100%;
                padding-left: 2.6rem;
            }
        </style>

        <!-- The overview aggregates owned blueprints per product across the caller's oversight
             org units. In admin "all org units" mode the bucket merges every org unit - tell the
             admin the totals span all of them. Officers / SK leads only ever see their own. -->
        <div th:if="${isAllSquadronsMode}" class="squadron-badge squadron-badge-muted"
             style="display: block; padding: 0.6rem 0.9rem; margin-bottom: 1rem; border-radius: var(--radius-none); white-space: normal; text-align: left;"
             th:text="#{blueprintOverview.all_orgunits_notice}">
            Aggregation across all org units.
        </div>

        <div class="bp-filter" th:if="${!#lists.isEmpty(overview)}">
            <span class="bp-filter-icon" aria-hidden="true">
                <svg class="krt-icon"><use href="#krt-icon-search"/></svg>
            </span>
            <input type="search" id="bp-overview-filter" autocomplete="off"
                   th:attr="placeholder=#{blueprintOverview.filter.placeholder},aria-label=#{blueprintOverview.filter.placeholder}">
        </div>

        <div class="table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th th:text="#{blueprintOverview.column.blueprint}">Blueprint</th>
                <th th:text="#{blueprintOverview.column.owners}">Available from</th>
                <th th:text="#{general.actions}" class="nowrap">Actions</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="item : ${overview}">
            <tr class="bp-row" th:attr="data-bp-filter=${#strings.toLowerCase(item.productName)}">
                <td th:text="${item.productName}" style="vertical-align: top; padding-top: 1rem;">Blueprint</td>
                <td style="vertical-align: top; padding-top: 1rem;">
                    <span class="bp-owner-count" th:text="${item.ownerCount}">0</span>
                </td>
                <td style="vertical-align: top; padding-top: 0.5rem;">
                    <details th:attr="data-product-key=${item.productKey}">
                        <summary class="btn btn-ghost" style="cursor: pointer; display: inline-flex; align-items: center; min-height: unset; padding: 0.25rem 0.75rem; font-size: 0.8rem; width: auto;" th:text="#{general.details}">Details</summary>
                    </details>
                </td>
            </tr>
            <tr class="details-row">
                <td colspan="3" class="p-0">
                    <div class="bp-owners-panel" data-loaded="false"></div>
                </td>
            </tr>
            </th:block>
            <tr th:if="${#lists.isEmpty(overview)}">
                <td colspan="3" class="text-center" th:text="#{blueprintOverview.empty}">No blueprints recorded.</td>
            </tr>
            <tr id="bp-filter-empty" style="display: none;">
                <td colspan="3" class="text-center" th:text="#{blueprintOverview.filter.no_results}">No results for this search.</td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</main>

<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    /*<![CDATA[*/
    window.krtBlueprintOverview = {
        ownersUrl: /*[[@{/blueprint-overview/owners}]]*/ '/blueprint-overview/owners',
        i18n: {
            loading: /*[[#{blueprintOverview.owners.loading}]]*/ 'Loading owners...',
            empty: /*[[#{blueprintOverview.owners.empty}]]*/ 'No owners.',
            error: /*[[#{blueprintOverview.owners.error}]]*/ 'Could not load owners.'
        }
    };
    /*]]*/
</script>
<script th:src="@{/js/blueprint-overview.js}" th:attr="nonce=${cspNonce}"></script>

</body>
</html>
