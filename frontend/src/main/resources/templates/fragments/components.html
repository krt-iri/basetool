<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Reusable design-system component fragments — the canonical Buttons, Alerts and
  data Tables from krt-components.css / the preview/ specimen cards. Use these
  instead of hand-rolling the markup so every instance inherits the spec classes,
  status colours and 44px touch targets (and so a future spec change lands in one
  place).

  button(label, variant, type, extraClass)
    label      : already-resolved text — pass #{key} or a literal string.
    variant    : null/'' = primary (.btn); 'secondary' | 'danger' | 'success' | 'outline-danger'.
    type       : null = 'button'; pass 'submit' / 'reset' as needed.
    extraClass : optional extra classes (e.g. 'btn-sm'), or null.
    Buttons that also need data-*, th:href, id, name, value or sec:authorize cannot be
    expressed through fragment parameters — render `<button class="btn btn-…">` /
    `<a class="btn btn-…">` directly; the .btn / .btn-* classes carry the whole spec.

  alert(type, msgKey, extraClass)
    type       : 'danger' | 'success' | 'warning'.
    msgKey     : i18n message key (resolved here via #{…}). Wrap the call in th:if for
                 conditional display, e.g. th:if="${error}".
    extraClass : optional extra classes (e.g. 'mt-2'), or null.

  dataTable(head, body)
    Responsive-wrapped .krt-table shell — supplies the .table-responsive wrapper plus
    the <thead>/<tbody> scaffold so callers only provide the header cells and body rows
    as markup fragments. The child blocks feed the fragment via ~{::sel} and are NOT
    rendered in place because th:replace swaps the host element out:

      <div th:replace="~{fragments/components :: dataTable(head=~{::tblHead}, body=~{::tblBody})}">
          <th:block th:fragment="tblHead">
              <th th:text="#{col.a}">A</th>
              <th th:text="#{col.b}">B</th>
          </th:block>
          <th:block th:fragment="tblBody">
              <tr th:each="row : ${rows}">
                  <td th:text="${row.a}">a</td>
                  <td th:text="${row.b}">b</td>
              </tr>
          </th:block>
      </div>
-->

<!-- Button — uppercase, square, 44px min target. -->
<button th:fragment="button(label, variant, type, extraClass)"
        th:attr="type=${type != null ? type : 'button'}"
        class="btn"
        th:classappend="${(variant != null and variant != '' ? 'btn-' + variant : '') + (extraClass != null and extraClass != '' ? ' ' + extraClass : '')}"
        th:text="${label}">Button</button>

<!-- Alert — 20% tint fill + 4px solid left border in the status colour. -->
<div th:fragment="alert(type, msgKey, extraClass)"
     th:if="${msgKey != null}"
     class="alert"
     th:classappend="${'alert-' + type + (extraClass != null and extraClass != '' ? ' ' + extraClass : '')}"
     th:text="#{${msgKey}}">Alert message</div>

<!-- Data table — responsive-wrapped, uppercase orange head-rule, zebra rows. -->
<div th:fragment="dataTable(head, body)" class="table-responsive">
    <table class="krt-table">
        <thead><tr th:insert="${head}"></tr></thead>
        <tbody th:insert="${body}"></tbody>
    </table>
</div>

</body>
</html>
