<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Global page footer. Included once from `fragments/sidebar.html` so every
  page that renders the sidebar (i.e. every page) also renders the footer.
  CSS (.krt-footer in styles.css) uses flex `order: 999` to push the footer
  to the bottom of the body regardless of DOM position.

  Why a visible footer when the same links live in the sidebar?  Standard
  web convention: users looking for Impressum / Datenschutz /
  Nutzungsbedingungen scan the bottom of the page before opening a
  navigation drawer.  The sidebar links stay in place for keyboard /
  navigation-first users.
-->
<th:block th:fragment="footer">
    <footer class="krt-footer">
        <!--
          Star Citizen Fan Kit compliance band (Fan Kit Guidelines, sections 2
          and 2b). Two required elements live here:
            * the "Made By The Community" logo, which identifies the app as a
              Star Citizen fan project, and
            * the mandatory CIG trademark notice attributing the marks.
          The guidelines require the notice to sit "on a navigation area that is
          always visible regardless of scrolling" — this footer is
          `position: fixed; bottom: 0`, so it qualifies and the notice therefore
          appears on every page. The white-artwork logo variant is used
          unmodified (no recolour, outline, distortion or effect, per section 3)
          on the dark footer; the notice text is >=10pt and high-contrast to
          meet the "legible font size and color" rule (section 2b).
        -->
        <div class="krt-footer-fankit">
            <img class="krt-footer-fankit-logo"
                 th:src="@{/images/made-by-the-community.png}"
                 th:alt="#{footer.fankit.logo.alt}" alt="Made By The Community"
                 width="36" height="36"
                 loading="lazy" decoding="async">
            <span class="krt-footer-trademark" th:text="#{footer.fankit.trademark}">Star Citizen®, Roberts Space Industries® and Cloud Imperium ® are registered trademarks of Cloud Imperium Rights LLC</span>
        </div>
        <div class="krt-footer-links">
            <a th:href="@{/impressum}" th:text="#{nav.impressum}">Impressum</a>
            <a th:href="@{/privacy}" th:text="#{nav.privacy}">Datenschutz</a>
            <a th:href="@{/terms}" th:text="#{nav.terms}">Nutzungsbedingungen</a>
        </div>
        <div class="krt-footer-meta">
            <a class="krt-footer-handbook"
               href="https://github.com/krt-iri/basetool/wiki"
               target="_blank" rel="noopener noreferrer"
               th:text="#{footer.handbook}">Handbuch</a>
            <a class="krt-footer-github"
               href="https://github.com/krt-iri/basetool"
               target="_blank" rel="noopener noreferrer"
               th:title="#{footer.github.title}" th:aria-label="#{footer.github.title}">
                <svg class="krt-icon" aria-hidden="true" focusable="false"><use href="#krt-icon-github"/></svg>
            </a>
            <div class="krt-footer-version"
                 th:title="#{app.version.tooltip}"
                 th:text="#{app.version.display(${appVersion})}">v0.0.1</div>
        </div>
    </footer>
</th:block>
</body>
</html>
