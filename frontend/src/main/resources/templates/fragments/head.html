<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titleContent, additionalLinks)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" type="image/webp" th:href="@{/logos/krt-favicon.webp}">
    <!--
      Preload the critical body font weight so the browser starts the request before stylesheet
      parsing. Without this hint, @font-face requests sit behind styles.css and a `font-display:
      swap` swap-in becomes visible. Lato-Regular is the dominant body weight; Light and Bold
      load lazily on demand. The Audiowide headline font is also lazy because it only renders
      above-the-fold on a small set of pages.
    -->
    <link rel="preload" th:href="@{/fonts/Lato-Regular.woff2}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!--
      Bootstrap stub for `window.krtEvents`. Defines a tiny queuing implementation
      synchronously, BEFORE any external script tag. Every inline `<script>` block on
      every page template can therefore call `window.krtEvents.on(...)` without
      worrying about load order, defer/async timing, network speed or browser cache:
      registrations made before `event-delegation.js` loads are buffered, then drained
      by `event-delegation.js` when it installs the real implementation (see its IIFE,
      which checks `_isBootstrapStub` and replays the queue).

      Why this exists: we have been bitten THREE times by the same regression — an
      inline `window.krtEvents.on(...)` call ran before `event-delegation.js` had
      installed `window.krtEvents`, the silent `if (window.krtEvents && …)` guard in
      the templates swallowed the failure, and the registration was lost without a
      console error. The stub makes that race structurally impossible regardless of
      whether `event-delegation.js` ships deferred, gets stuck in cache, fails CSP
      or arrives slowly over the network. The watchdog in `event-delegation.js`
      additionally logs an error if the stub is still active 5 s after page load
      (i.e. the real implementation never replaced it).
    -->
    <script th:attr="nonce=${cspNonce}">
        window.krtEvents = window.krtEvents || (function () {
            var queue = [];
            return {
                _isBootstrapStub: true,
                _queuedRegistrations: queue,
                on: function (eventType, actionName, handler) {
                    queue.push([eventType, actionName, handler]);
                }
            };
        })();
    </script>
    <!--
      Defensive stub for `window.krtScuInput`. Defined synchronously, BEFORE
      `scu-decimal-input.js` loads, so the inline page scripts that read SCU
      amount fields live (book-out target<->amount sync, the AJAX material claim,
      the handover amount check) can call `.normalize(...)` / `.parse(...)` without
      worrying about load order or a failed/cached/CSP-blocked script. The full
      implementation in `scu-decimal-input.js` replaces this object and also
      installs the document-level input/submit listeners that strip non-numeric
      characters and canonicalise every field to a dot value on submit. If that
      file never loads, these two methods still let the live readers parse a
      comma-typed value; only the on-submit canonicalisation degrades (a stray
      comma then surfaces as a backend validation error, not a crash).
    -->
    <script th:attr="nonce=${cspNonce}">
        window.krtScuInput = window.krtScuInput || {
            normalize: function (raw) {
                if (raw === null || raw === undefined) {
                    return '';
                }
                var s = String(raw).trim().replace(/,/g, '.');
                if (!/[0-9]/.test(s)) {
                    return '';
                }
                var dot = s.indexOf('.');
                if (dot !== -1) {
                    s = s.slice(0, dot + 1) + s.slice(dot + 1).replace(/\./g, '');
                }
                return s;
            },
            parse: function (raw) {
                var n = parseFloat(this.normalize(raw));
                return isFinite(n) ? n : NaN;
            }
        };
    </script>
    <!--
      `defer` on the utility scripts whose globals are only consumed from inside event-handler
      callbacks (escape-html, safe-url, datetime-splitter): they execute in document order AFTER
      the HTML has been parsed, so they no longer block first contentful paint.

      `event-delegation.js` and `common-handlers.js` deliberately load WITHOUT `defer` because
      page templates call `window.krtEvents.on(...)` from synchronous inline `<script>` blocks at
      the bottom of the body. The bootstrap stub above already guarantees that those calls do
      not silently drop, but loading these two files synchronously also keeps the real handler
      registry online before the browser starts firing user events, so the buffered window stays
      tiny in normal operation. The two files are tiny IIFEs that only register globals /
      `document.addEventListener` listeners, so they are safe to evaluate before the DOM tree
      is built.
    -->
    <script th:src="@{/js/escape-html.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/safe-url.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/event-delegation.js}" th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/common-handlers.js}" th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/datetime-splitter.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/scu-decimal-input.js}" defer th:attr="nonce=${cspNonce}"></script>

    <title th:replace="${titleContent}"></title>
    <th:block th:if="${additionalLinks != null}" th:replace="${additionalLinks}"></th:block>
</head>
</html>
