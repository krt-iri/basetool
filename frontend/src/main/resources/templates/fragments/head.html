<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titleContent, additionalLinks)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" type="image/svg+xml" th:href="@{/logos/iridium.svg}">
    <!--
      Preload the critical body font weight so the browser starts the request before stylesheet
      parsing. Without this hint, @font-face requests sit behind styles.css and a `font-display:
      swap` swap-in becomes visible. Lato-Regular is the dominant body weight; Light and Bold
      load lazily on demand. The Ethnocentric headline font is also lazy because it only renders
      above-the-fold on a small set of pages.
    -->
    <link rel="preload" th:href="@{/fonts/Lato-Regular.woff2}" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!--
      `defer` on the four head scripts: they execute in document order AFTER the HTML has been
      parsed, so they no longer block first contentful paint. Each script ships side-effect-free
      initialisation; load order is still deterministic under `defer` (unlike `async`).
    -->
    <script th:src="@{/js/escape-html.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/safe-url.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/event-delegation.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/common-handlers.js}" defer th:attr="nonce=${cspNonce}"></script>
    <script th:src="@{/js/datetime-splitter.js}" defer th:attr="nonce=${cspNonce}"></script>
    
    <title th:replace="${titleContent}"></title>
    <th:block th:if="${additionalLinks != null}" th:replace="${additionalLinks}"></th:block>
</head>
</html>
