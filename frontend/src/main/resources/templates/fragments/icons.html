<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  KRT icon sprite — single hidden SVG declaring every reusable icon as a
  <symbol>. Pages reference icons via `<svg class="krt-icon"><use href="#krt-icon-NAME"/></svg>`
  so the underlying SVG is loaded exactly once per page-load and any icon usage is
  three lines (svg + use + closing svg). CSS sizing/colouring lives in styles.css
  on the `.krt-icon` base class plus modifier classes.

  Adding a new icon: drop a new <symbol id="krt-icon-NAME" viewBox="..."> inside
  the sprite below. Keep the viewBox 24x24 unless the source asset requires
  otherwise. Stroke/fill should use `currentColor` so the icon inherits the
  caller's text colour.

  This is intentionally a small, hand-curated set rather than a third-party
  icon library — CSP forbids external CDNs and a static font/sprite payload is
  smaller than pulling in lucide / feather wholesale for a dozen glyphs.
-->
<th:block th:fragment="sprite">
    <svg xmlns="http://www.w3.org/2000/svg" class="krt-icon-sprite" aria-hidden="true" focusable="false">
        <symbol id="krt-icon-close" viewBox="0 0 24 24">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-chevron-down" viewBox="0 0 24 24">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-chevron-up" viewBox="0 0 24 24">
            <path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-chevron-left" viewBox="0 0 24 24">
            <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-chevron-right" viewBox="0 0 24 24">
            <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-warning" viewBox="0 0 24 24">
            <path d="M12 3l10 18H2L12 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
            <path d="M12 10v5M12 18v0.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <symbol id="krt-icon-success" viewBox="0 0 24 24">
            <path d="M5 12l5 5 9-11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-info" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M12 11v6M12 7v0.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <symbol id="krt-icon-plus" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <symbol id="krt-icon-minus" viewBox="0 0 24 24">
            <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <symbol id="krt-icon-search" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M20 20l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <symbol id="krt-icon-filter" viewBox="0 0 24 24">
            <path d="M4 5h16l-6 8v6l-4-2v-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-edit" viewBox="0 0 24 24">
            <path d="M14 4l6 6-11 11H3v-6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/>
        </symbol>
        <symbol id="krt-icon-trash" viewBox="0 0 24 24">
            <path d="M5 7h14M9 7V4h6v3M7 7l1 14h8l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </symbol>
    </svg>
</th:block>
</body>
</html>
