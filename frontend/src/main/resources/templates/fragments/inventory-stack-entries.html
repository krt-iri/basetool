<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!--
  Lazily-loaded per-stack entry rows for the append-only Lager (ADR-0003, REQ-INV-002).

  The grouped Lager view (inventory-my / inventory-admin) renders only the collapsed
  Material -> Stack rows. A stack's individual append-only entries are NOT inlined — a
  stack grows unboundedly — so the browser fetches them on expand from
  /inventory/{my,all}/stack/entries, which renders one of these fragments into the
  stack's `.stack-entries-content` container. Every per-entry action (book-out, note,
  association change, bulk select) is wired through the page's existing delegated
  `data-trigger` handlers (krtEvents), so the injected rows need no re-binding.

  Model contract:
    - entries     : List<InventoryItemDto>  one page of the stack's entries, oldest-first
    - entriesPage : PageResponse<InventoryItemDto>  page metadata (page(), totalPages())
    - jobOrders   : active job orders, for the per-entry job-order dropdown
    - missions    : missions, for the per-entry mission dropdown
    - error       : optional i18n key set when the backend fetch failed
-->

<!-- ======================= personal Lager (/inventory/my) ======================= -->
<th:block th:fragment="stackEntriesMy">
    <div th:if="${error}" class="hud-box hud-box-error" style="margin: 0.5rem 2.5rem;">
        <p th:text="#{__${error}__}">Fehler</p>
    </div>
    <!-- Tree-table leaf rows injected into the stack's .stack-entries-content. No repeated
         column header; the per-entry bulk checkbox + Auftrag/Einsatz selects sit in
         .tree-leaf-main, amount + actions stay column-aligned, and a note renders only when
         present as its own indented .tree-note row. All data-* hooks (bulk select, version
         sync, book-out, note) are preserved verbatim. -->
    <th:block th:each="entry : ${entries}">
        <div class="tree-row tree-row--leaf" th:data-item-id="${entry.id}">
            <div class="tree-leaf-main">
                <input type="checkbox" class="item-checkbox inventory-item-checkbox"
                       th:data-id="${entry.id}"
                       th:data-material-id="${entry.material.id}"
                       data-trigger="inv-my-update-bulk-state">
                <span class="tree-leaf-tag" th:text="#{inventory.tree.entry}">Eintrag</span>
                <div class="tree-fieldset">
                    <div class="tree-field">
                        <span class="tree-field-cap" th:text="#{inventory.order}">Auftrag</span>
                        <select class="association-select"
                                th:data-id="${entry.id}"
                                th:data-material-id="${entry.material.id}"
                                th:data-location-id="${entry.location.id}"
                                th:data-quality="${entry.quality}"
                                th:data-amount="${entry.amount}"
                                th:data-personal="${entry.personal}"
                                th:data-version="${entry.version}"
                                th:data-field="jobOrderId"
                                data-trigger="inv-my-update-assoc">
                            <option value="" th:text="#{inventory.order.none}">-- Kein Auftrag --</option>
                            <option th:each="order : ${jobOrders}"
                                    th:value="${order.id}"
                                    th:text="'Auftrag #' + ${order.displayId}"
                                    th:selected="${order.id == entry.jobOrderId}"
                                    th:if="${order.materials == null or order.materials.isEmpty() or #lists.contains(order.materials.![material.id], entry.material.id)}">
                            </option>
                        </select>
                    </div>
                    <div class="tree-field">
                        <span class="tree-field-cap" th:text="#{inventory.tree.field.mission}">Einsatz</span>
                        <select class="association-select"
                                th:data-id="${entry.id}"
                                th:data-material-id="${entry.material.id}"
                                th:data-location-id="${entry.location.id}"
                                th:data-quality="${entry.quality}"
                                th:data-amount="${entry.amount}"
                                th:data-personal="${entry.personal}"
                                th:data-version="${entry.version}"
                                th:data-field="missionId"
                                data-trigger="inv-my-update-assoc">
                            <option value="" th:text="#{inventory.mission.none}">-- Kein Einsatz --</option>
                            <option th:each="mission : ${missions}"
                                    th:value="${mission.id}"
                                    th:text="${mission.plannedStartTime != null} ? |${mission.name} - ${#temporals.format(mission.plannedStartTime, #messages.msg('format.date'), #locale)}| : ${mission.name}"
                                    th:selected="${mission.id == entry.missionId}">
                            </option>
                            <option th:if="${entry.missionId != null and not #lists.contains(missions.![id], entry.missionId)}"
                                    th:value="${entry.missionId}"
                                    th:text="${entry.missionName}"
                                    selected="selected">
                            </option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="tree-cell tree-cell--num tree-amount" th:switch="${entry.material.quantityType}">
                <span th:case="'PIECE'"><span th:text="${entry.amount != null ? #numbers.formatInteger(entry.amount, 1) : '0'}">10</span> <span class="tree-unit" th:text="#{material.quantity.piece}">Stück</span></span>
                <span th:case="*"><span th:text="${entry.amount != null ? #numbers.formatDecimal(entry.amount, 1, 'NONE', 3, 'DEFAULT') : '0.000'}">10.500</span> <span class="tree-unit" th:text="#{material.quantity.scu}">SCU</span></span>
            </div>
            <div class="tree-cell tree-cell--actions">
                <button type="button" class="btn btn-outline btn-xs btn-icon"
                        th:data-id="${entry.id}"
                        th:data-amount="${entry.amount}"
                        th:data-version="${entry.version}"
                        th:data-material-id="${entry.material.id}"
                        th:data-quantity-type="${entry.material.quantityType}"
                        th:data-user-id="${entry.user.id}"
                        th:data-location-id="${entry.location.id}"
                        data-trigger="inv-my-bookout"
                        th:title="#{inventory.bookout.btn}" th:aria-label="#{inventory.bookout.btn}">
                    <svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-bookout"/></svg>
                </button>
                <button type="button" class="btn btn-xs btn-icon inventory-note-btn"
                        th:classappend="${entry.note != null and !#strings.isEmpty(entry.note)} ? 'btn-outline has-note' : 'btn-ghost'"
                        th:data-id="${entry.id}"
                        th:data-version="${entry.version}"
                        th:data-note="${entry.note}"
                        data-trigger="inv-my-open-note"
                        th:title="${entry.note != null and !#strings.isEmpty(entry.note)} ? ${entry.note} : #{inventory.note.add}"
                        th:aria-label="${entry.note != null and !#strings.isEmpty(entry.note)} ? #{inventory.note.edit} : #{inventory.note.add}">
                    <svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-edit"/></svg>
                </button>
            </div>
        </div>
        <div class="tree-note" th:if="${entry.note != null and !#strings.isEmpty(entry.note)}"
             th:attr="data-note-for=${entry.id}" th:title="${entry.note}" th:aria-label="#{inventory.note.label}">
            <div class="tree-note-box">
                <span class="tree-note-label" th:text="#{inventory.note.label}">Notiz</span>
                <span class="tree-note-text inventory-note-text" th:text="${entry.note}">Notiz</span>
            </div>
        </div>
    </th:block>
    <div class="tree-row" th:if="${#lists.isEmpty(entries)}">
        <div class="tree-cell text-muted" style="grid-column: 1 / -1; padding-left: 3rem;" th:text="#{inventory.stack.entries.empty}">Keine Einträge vorhanden.</div>
    </div>
    <div th:if="${entriesPage != null and entriesPage.totalPages() > 1}" class="stack-entries-pagination"
         style="display: flex; gap: 0.75rem; align-items: center; padding: 0.5rem 2.5rem;">
        <button type="button" class="btn btn-ghost" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;"
                data-trigger="inv-my-stack-page"
                th:data-page="${entriesPage.page() - 1}"
                th:disabled="${entriesPage.page() <= 0}"
                th:text="#{general.pagination.previous}">Zurück</button>
        <span style="color: var(--color-gray-2); font-size: 0.85rem;"
              th:text="|${entriesPage.page() + 1} / ${entriesPage.totalPages()}|">1 / 3</span>
        <button type="button" class="btn btn-ghost" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;"
                data-trigger="inv-my-stack-page"
                th:data-page="${entriesPage.page() + 1}"
                th:disabled="${entriesPage.page() + 1 >= entriesPage.totalPages()}"
                th:text="#{general.pagination.next}">Weiter</button>
    </div>
</th:block>

<!-- ======================= global Lager (/inventory/all) ======================= -->
<th:block th:fragment="stackEntriesAdmin">
    <div th:if="${error}" class="hud-box hud-box-error" style="margin: 0.5rem 2.5rem;">
        <p th:text="#{__${error}__}">Fehler</p>
    </div>
    <!-- Tree-table leaf rows injected into the stack's .stack-entries-content. No repeated
         column header (the page's single .tree-head covers all depths); Auftrag/Einsatz are
         wide labelled controls in .tree-leaf-main, amount + actions stay column-aligned, and
         a note renders only when present as its own indented .tree-note row. All data-* hooks
         (version sync, book-out, note) and the sec:authorize gating are preserved verbatim. -->
    <th:block th:each="entry : ${entries}">
        <div class="tree-row tree-row--leaf" th:data-item-id="${entry.id}">
            <div class="tree-leaf-main">
                <span class="tree-leaf-tag" th:text="#{inventory.tree.entry}">Eintrag</span>
                <div class="tree-fieldset">
                    <div class="tree-field">
                        <span class="tree-field-cap" th:text="#{inventory.order}">Auftrag</span>
                        <!-- Read-only text for users without association rights -->
                        <div sec:authorize="!hasAnyRole('LOGISTICIAN', 'OFFICER', 'ADMIN')">
                            <span th:if="${entry.jobOrderId != null}" th:text="'Auftrag #' + ${entry.jobOrderDisplayId}">Zugewiesen</span>
                            <span th:if="${entry.jobOrderId == null}" class="text-muted">-</span>
                        </div>
                        <select sec:authorize="hasAnyRole('LOGISTICIAN', 'OFFICER', 'ADMIN')" class="association-select"
                                th:data-id="${entry.id}"
                                th:data-material-id="${entry.material.id}"
                                th:data-location-id="${entry.location.id}"
                                th:data-quality="${entry.quality}"
                                th:data-amount="${entry.amount}"
                                th:data-personal="${entry.personal}"
                                th:data-version="${entry.version}"
                                th:data-field="jobOrderId"
                                data-trigger="inv-admin-update-assoc">
                            <option value="" th:text="#{inventory.order.none}">-- Kein Auftrag --</option>
                            <option th:each="order : ${jobOrders}"
                                    th:value="${order.id}"
                                    th:text="'Auftrag #' + ${order.displayId}"
                                    th:selected="${order.id == entry.jobOrderId}"
                                    th:if="${order.materials == null or order.materials.isEmpty() or #lists.contains(order.materials.![material.id], entry.material.id)}">
                            </option>
                        </select>
                    </div>
                    <div class="tree-field">
                        <span class="tree-field-cap" th:text="#{inventory.tree.field.mission}">Einsatz</span>
                        <!-- Read-only text for users without association rights -->
                        <div sec:authorize="!hasAnyRole('LOGISTICIAN', 'OFFICER', 'ADMIN')">
                            <span th:if="${entry.missionId != null}" th:text="${entry.missionName}">Einsatz</span>
                            <span th:if="${entry.missionId == null}" class="text-muted">-</span>
                        </div>
                        <select sec:authorize="hasAnyRole('LOGISTICIAN', 'OFFICER', 'ADMIN')" class="association-select"
                                th:data-id="${entry.id}"
                                th:data-material-id="${entry.material.id}"
                                th:data-location-id="${entry.location.id}"
                                th:data-quality="${entry.quality}"
                                th:data-amount="${entry.amount}"
                                th:data-personal="${entry.personal}"
                                th:data-version="${entry.version}"
                                th:data-field="missionId"
                                data-trigger="inv-admin-update-assoc">
                            <option value="" th:text="#{inventory.mission.none}">-- Kein Einsatz --</option>
                            <option th:each="mission : ${missions}"
                                th:value="${mission.id}"
                                th:text="${mission.plannedStartTime != null} ? |${mission.name} - ${#temporals.format(mission.plannedStartTime, #messages.msg('format.date'), #locale)}| : ${mission.name}"
                                th:selected="${mission.id == entry.missionId}">
                            </option>
                            <option th:if="${entry.missionId != null and not #lists.contains(missions.![id], entry.missionId)}"
                                    th:value="${entry.missionId}"
                                    th:text="${entry.missionName}"
                                    selected="selected">
                            </option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="tree-cell tree-cell--num tree-amount" th:switch="${entry.material.quantityType}">
                <span th:case="'PIECE'"><span th:text="${entry.amount != null ? #numbers.formatInteger(entry.amount, 1) : '0'}">10</span> <span class="tree-unit" th:text="#{material.quantity.piece}">Stück</span></span>
                <span th:case="*"><span th:text="${entry.amount != null ? #numbers.formatDecimal(entry.amount, 1, 'NONE', 3, 'DEFAULT') : '0.000'}">10.500</span> <span class="tree-unit" th:text="#{material.quantity.scu}">SCU</span></span>
            </div>
            <div class="tree-cell tree-cell--actions" sec:authorize="hasRole('LOGISTICIAN')">
                <button type="button" class="btn btn-outline btn-xs btn-icon"
                        th:data-id="${entry.id}"
                        th:data-amount="${entry.amount}"
                        th:data-version="${entry.version}"
                        th:data-material-id="${entry.material.id}"
                        th:data-quantity-type="${entry.material.quantityType}"
                        th:data-user-id="${entry.user.id}"
                        th:data-location-id="${entry.location.id}"
                        data-trigger="inv-admin-bookout"
                        th:title="#{inventory.bookout.btn}" th:aria-label="#{inventory.bookout.btn}">
                    <svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-bookout"/></svg>
                </button>
                <button type="button" class="btn btn-xs btn-icon inventory-note-btn"
                        th:classappend="${entry.note != null and !#strings.isEmpty(entry.note)} ? 'btn-outline has-note' : 'btn-ghost'"
                        th:data-id="${entry.id}"
                        th:data-version="${entry.version}"
                        th:data-note="${entry.note}"
                        data-trigger="inv-admin-open-note"
                        th:title="${entry.note != null and !#strings.isEmpty(entry.note)} ? ${entry.note} : #{inventory.note.add}"
                        th:aria-label="${entry.note != null and !#strings.isEmpty(entry.note)} ? #{inventory.note.edit} : #{inventory.note.add}">
                    <svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-edit"/></svg>
                </button>
            </div>
        </div>
        <div class="tree-note" th:if="${entry.note != null and !#strings.isEmpty(entry.note)}"
             th:attr="data-note-for=${entry.id}" th:title="${entry.note}" th:aria-label="#{inventory.note.label}">
            <div class="tree-note-box">
                <span class="tree-note-label" th:text="#{inventory.note.label}">Notiz</span>
                <span class="tree-note-text inventory-note-text" th:text="${entry.note}">Notiz</span>
            </div>
        </div>
    </th:block>
    <div class="tree-row" th:if="${#lists.isEmpty(entries)}">
        <div class="tree-cell text-muted" style="grid-column: 1 / -1; padding-left: 3rem;" th:text="#{inventory.stack.entries.empty}">Keine Einträge vorhanden.</div>
    </div>
    <div th:if="${entriesPage != null and entriesPage.totalPages() > 1}" class="stack-entries-pagination"
         style="display: flex; gap: 0.75rem; align-items: center; padding: 0.5rem 2.5rem;">
        <button type="button" class="btn btn-ghost" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;"
                data-trigger="inv-admin-stack-page"
                th:data-page="${entriesPage.page() - 1}"
                th:disabled="${entriesPage.page() <= 0}"
                th:text="#{general.pagination.previous}">Zurück</button>
        <span style="color: var(--color-gray-2); font-size: 0.85rem;"
              th:text="|${entriesPage.page() + 1} / ${entriesPage.totalPages()}|">1 / 3</span>
        <button type="button" class="btn btn-ghost" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;"
                data-trigger="inv-admin-stack-page"
                th:data-page="${entriesPage.page() + 1}"
                th:disabled="${entriesPage.page() + 1 >= entriesPage.totalPages()}"
                th:text="#{general.pagination.next}">Weiter</button>
    </div>
</th:block>

</body>
</html>
