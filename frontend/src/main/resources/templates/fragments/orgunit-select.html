<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Labelled org-unit <select> for the Job Order create/edit forms (Phase 2, #342). Unlike the
  generic owner-picker fragment, this one always renders (the responsible/requesting pickers are
  mandatory even when a single option exists) and takes a dynamic label key.

  Inputs:
    - selectId : the <select> element id (also used for the <label for>)
    - name     : the form field name (e.g. "responsibleOrgUnitId" / "requestingOrgUnitId")
    - options  : List<OrgUnitMembershipOptionDto> (orgUnitId, orgUnitName, orgUnitShorthand, kind)
    - selected : preselected UUID or null
    - labelKey : i18n message key for the field label
    - required : whether the picker is mandatory (boolean)

  Groups options under <optgroup>s in top-down hierarchy order (Organisationsleitung, Bereich,
  Staffel, Spezialkommando) when more than one kind is present; flat list otherwise. The requesting
  (Auftraggeber) picker may now carry Bereich + OL options (epic #692) so a Bereichsleitung/OL
  member can place an order on behalf of their tier; the responsible picker only ever receives
  profit-eligible Staffeln/SKs, so its Bereich/OL optgroups stay empty and unrendered. CSP-safe.
-->
<div th:fragment="orgUnitSelect(selectId, name, options, selected, labelKey, required)"
     class="form-group">
    <label th:for="${selectId}" th:text="#{__${labelKey}__}">Einheit</label>
    <select th:id="${selectId}" th:name="${name}" th:required="${required}"
            th:with="hasOl=${options != null and !options.?[kind == 'ORGANISATIONSLEITUNG'].isEmpty()},
                     hasBereich=${options != null and !options.?[kind == 'BEREICH'].isEmpty()},
                     hasStaffel=${options != null and !options.?[kind == 'SQUADRON'].isEmpty()},
                     hasSpecialCommand=${options != null and !options.?[kind == 'SPECIAL_COMMAND'].isEmpty()},
                     kindCount=${(hasOl ? 1 : 0) + (hasBereich ? 1 : 0) + (hasStaffel ? 1 : 0) + (hasSpecialCommand ? 1 : 0)}">
        <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
        <th:block th:if="${kindCount > 1}">
            <optgroup th:if="${hasOl}" th:label="#{ownerPicker.organisationsleitung}">
                <option th:each="o : ${options}"
                        th:if="${o.kind() == 'ORGANISATIONSLEITUNG'}"
                        th:value="${o.orgUnitId()}"
                        th:selected="${selected != null and selected == o.orgUnitId()}"
                        th:text="${o.orgUnitName()}">Organisationsleitung</option>
            </optgroup>
            <optgroup th:if="${hasBereich}" th:label="#{ownerPicker.bereich}">
                <option th:each="o : ${options}"
                        th:if="${o.kind() == 'BEREICH'}"
                        th:value="${o.orgUnitId()}"
                        th:selected="${selected != null and selected == o.orgUnitId()}"
                        th:text="${o.orgUnitName()}">Bereich</option>
            </optgroup>
            <optgroup th:if="${hasStaffel}" th:label="#{ownerPicker.staffel}">
                <option th:each="o : ${options}"
                        th:if="${o.kind() == 'SQUADRON'}"
                        th:value="${o.orgUnitId()}"
                        th:selected="${selected != null and selected == o.orgUnitId()}"
                        th:text="${o.orgUnitName()}">Staffel</option>
            </optgroup>
            <optgroup th:if="${hasSpecialCommand}" th:label="#{ownerPicker.specialCommand}">
                <option th:each="o : ${options}"
                        th:if="${o.kind() == 'SPECIAL_COMMAND'}"
                        th:value="${o.orgUnitId()}"
                        th:selected="${selected != null and selected == o.orgUnitId()}"
                        th:text="${o.orgUnitName()}">Spezialkommando</option>
            </optgroup>
        </th:block>
        <th:block th:if="${kindCount <= 1}">
            <option th:each="o : ${options}"
                    th:value="${o.orgUnitId()}"
                    th:selected="${selected != null and selected == o.orgUnitId()}"
                    th:text="${o.orgUnitName()}">Org Unit</option>
        </th:block>
    </select>
</div>
</body>
</html>
