<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Reusable owner-picker fragment (R5.d). Renders a `<select>` populated from a target user's
  OrgUnit memberships. Hidden automatically when the option list has 0 or 1 entries — at most
  one membership means there is no choice to offer, so the form falls back to the legacy
  implicit-stamp behaviour without UI noise.

  Inputs:
    - options   : List<OrgUnitMembershipOptionDto> (orgUnitId, orgUnitName, orgUnitShorthand, kind)
    - name      : HTML form-field name (e.g. "owningOrgUnitId", "targetOwningOrgUnitId")
    - selected  : preselected UUID or null
    - required  : whether the picker is mandatory (boolean)

  The fragment groups options under `<optgroup>` headers (in top-down hierarchy order:
  Organisationsleitung, Bereich, Staffel, Spezialkommando) when more than one kind is present;
  it collapses to a flat list when only one kind is present. Epic #692 Phase 5 added the
  Organisationsleitung + Bereich kinds, which a Bereichsleitung/OL leader's drill-down picker
  surfaces alongside the subordinate Staffeln/SKs they oversee. No inline event handlers — keeps
  the CSP-safe rendering invariant of the rest of the templates.
-->
<div th:fragment="ownerPicker(options, name, selected, required)"
     th:if="${options != null and options.size() > 1}"
     class="form-group owner-picker">
    <label th:for="${name}" th:text="#{ownerPicker.label}">Zuordnen zu</label>
    <select th:id="${name}" th:name="${name}" th:required="${required}">
        <option value="" th:text="#{ownerPicker.placeholder}">-- Bitte wählen --</option>
        <!--
          Render one <optgroup> per present kind when the list spans more than one kind; collapse
          to a flat list otherwise. SpEL's collection-selection syntax `.?[expr]` filters a list by
          predicate without lambdas — Thymeleaf's SpEL backend rejects Java lambda syntax (EL1042E),
          so the obvious .stream().anyMatch(o -> …) form fails when the fragment is exercised.
        -->
        <th:block th:with="hasOl=${!options.?[kind == 'ORGANISATIONSLEITUNG'].isEmpty()},
                            hasBereich=${!options.?[kind == 'BEREICH'].isEmpty()},
                            hasStaffel=${!options.?[kind == 'SQUADRON'].isEmpty()},
                            hasSpecialCommand=${!options.?[kind == 'SPECIAL_COMMAND'].isEmpty()},
                            kindCount=${(hasOl ? 1 : 0) + (hasBereich ? 1 : 0) + (hasStaffel ? 1 : 0) + (hasSpecialCommand ? 1 : 0)}">
            <th:block th:if="${kindCount > 1}">
                <optgroup th:if="${hasOl}" th:label="#{ownerPicker.organisationsleitung}">
                    <option th:each="o : ${options}"
                            th:if="${o.kind() == 'ORGANISATIONSLEITUNG'}"
                            th:value="${o.orgUnitId()}"
                            th:selected="${selected != null and selected == o.orgUnitId()}"
                            th:text="${o.orgUnitName()}">Organisationsleitung</option>
                </optgroup>
                <optgroup th:if="${hasBereich}" th:label="#{ownerPicker.bereich}">
                    <option th:each="o : ${options}"
                            th:if="${o.kind() == 'BEREICH'}"
                            th:value="${o.orgUnitId()}"
                            th:selected="${selected != null and selected == o.orgUnitId()}"
                            th:text="${o.orgUnitName()}">Bereich</option>
                </optgroup>
                <optgroup th:if="${hasStaffel}" th:label="#{ownerPicker.staffel}">
                    <option th:each="o : ${options}"
                            th:if="${o.kind() == 'SQUADRON'}"
                            th:value="${o.orgUnitId()}"
                            th:selected="${selected != null and selected == o.orgUnitId()}"
                            th:text="${o.orgUnitName()}">Staffel</option>
                </optgroup>
                <optgroup th:if="${hasSpecialCommand}" th:label="#{ownerPicker.specialCommand}">
                    <option th:each="o : ${options}"
                            th:if="${o.kind() == 'SPECIAL_COMMAND'}"
                            th:value="${o.orgUnitId()}"
                            th:selected="${selected != null and selected == o.orgUnitId()}"
                            th:text="${o.orgUnitName()}">Spezialkommando</option>
                </optgroup>
            </th:block>
            <th:block th:unless="${kindCount > 1}">
                <option th:each="o : ${options}"
                        th:value="${o.orgUnitId()}"
                        th:selected="${selected != null and selected == o.orgUnitId()}"
                        th:text="${o.orgUnitName()}">Org Unit</option>
            </th:block>
        </th:block>
    </select>
</div>
</body>
</html>
