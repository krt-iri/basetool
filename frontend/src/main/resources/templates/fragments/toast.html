<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="toast">
    <!-- Login Notification Toast -->
    <div th:if="${showLoginNotification}"
         id="loginNotification"
         class="notification-toast"
         th:data-duration="${notificationDuration}">
        <h4 th:text="#{notification.title}">Authentication Confirmed</h4>
        <p th:text="#{notification.authentication}">You are successfully authenticated. You can now access your data.</p>
    </div>

    <!-- General Success Toast -->
    <div th:if="${successToast}"
         id="successNotification"
         class="notification-toast"
         data-duration="5000">
        <h4 th:text="#{notification.success.title}">Aktion erfolgreich</h4>
        <p th:text="#{${successToast}}"></p>
    </div>

    <!-- General Success Toast (Text) -->
    <div th:if="${success}"
         id="successNotificationText"
         class="notification-toast"
         data-duration="5000">
        <h4 th:text="#{notification.success.title}">Aktion erfolgreich</h4>
        <p th:text="${!#strings.isEmpty(success)} ? #{${success}} : #{notification.success.title}"></p>
    </div>

    <!-- General Success Toast (Param) -->
    <!-- Only renders for keys that match the safe pattern below (alphanumeric + dots,
         up to 80 chars). Without that gate any URL like ?success=any.translation.key
         would let an attacker pick an arbitrary translation entry, enabling UI
         spoofing and translation-key enumeration. Server-controlled toasts use the
         flash-attribute "successToast" above instead. -->
    <div th:if="${param.success != null and #strings.matches(param.success[0], '^[A-Za-z][A-Za-z0-9._-]{0,79}$')}"
         id="successNotificationParam"
         class="notification-toast"
         data-duration="5000">
        <h4 th:text="#{notification.success.title}">Aktion erfolgreich</h4>
        <p th:text="#{${param.success[0]}} ?: #{notification.success.title}"></p>
    </div>

    <!-- General Error Toast -->
    <div th:if="${errorToast}"
         id="errorNotification"
         class="notification-toast error-toast"
         data-duration="7000">
        <h4 th:text="#{notification.error.title}">Aktion fehlgeschlagen</h4>
        <p th:text="#{${errorToast}}"></p>
    </div>

    <!-- General Error Toast (Text) -->
    <div th:if="${error}"
         id="errorNotificationText"
         class="notification-toast error-toast"
         data-duration="7000">
        <h4 th:text="#{notification.error.title}">Aktion fehlgeschlagen</h4>
        <p th:text="${!#strings.isEmpty(error)} ? #{${error}} : #{notification.error.title}"></p>
    </div>

    <!-- General Error Toast (Param) -->
    <!-- Same key-pattern gate as the success variant above: prevents arbitrary
         translation-key lookup via ?error=any.key. -->
    <div th:if="${param.error != null and #strings.matches(param.error[0], '^[A-Za-z][A-Za-z0-9._-]{0,79}$')}"
         id="errorNotificationParam"
         class="notification-toast error-toast"
         data-duration="7000">
        <h4 th:text="#{notification.error.title}">Aktion fehlgeschlagen</h4>
        <p th:text="#{${param.error[0]}} ?: #{notification.error.title}"></p>
    </div>

    <script th:inline="javascript" th:attr="nonce=${cspNonce}">
        function initToasts() {
            const toasts = document.querySelectorAll('.notification-toast:not(.initialized)');
            toasts.forEach(toast => {
                toast.classList.add('initialized');
                // Show shortly after load
                setTimeout(() => {
                    toast.classList.add('visible');
                }, 100);

                // Hide after duration
                const duration = parseInt(toast.getAttribute('data-duration')) || 5000;
                setTimeout(() => {
                    toast.classList.remove('visible');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            });
        }

        window.showFrontendErrorToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'notification-toast error-toast';
            toast.setAttribute('data-duration', '7000');
            
            const title = document.createElement('h4');
            title.textContent = /*[[#{notification.error.title}]]*/ 'Aktion fehlgeschlagen';
            
            const p = document.createElement('p');
            p.textContent = message;
            
            toast.appendChild(title);
            toast.appendChild(p);
            document.body.appendChild(toast);
            
            initToasts();
        };

        window.showFrontendSuccessToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.setAttribute('data-duration', '5000');
            
            const title = document.createElement('h4');
            title.textContent = /*[[#{notification.success.title}]]*/ 'Aktion erfolgreich';
            
            const p = document.createElement('p');
            p.textContent = message;
            
            toast.appendChild(title);
            toast.appendChild(p);
            document.body.appendChild(toast);
            
            initToasts();
        };

        document.addEventListener('DOMContentLoaded', initToasts);

        /*
         * KRT-styled confirmation modal (replaces native window.confirm()).
         * Returns a Promise<boolean> that resolves to true if the user
         * confirmed, false otherwise. Safe to call when the optional KRT
         * confirm fragment is not rendered on the page: falls back to a
         * minimal on-the-fly modal so no native confirm() is required.
         */
        window.showKrtConfirm = function(title, message, confirmLabel, cancelLabel) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'krt-confirm-overlay';
                overlay.setAttribute('role', 'dialog');
                overlay.setAttribute('aria-modal', 'true');

                const dialog = document.createElement('div');
                dialog.className = 'krt-confirm-dialog';

                const h = document.createElement('h4');
                h.className = 'krt-confirm-title';
                h.textContent = title || /*[[#{notification.error.title}]]*/ 'Bestätigung';

                const p = document.createElement('p');
                p.className = 'krt-confirm-message';
                p.textContent = message || '';

                const actions = document.createElement('div');
                actions.className = 'krt-confirm-actions';

                const btnCancel = document.createElement('button');
                btnCancel.type = 'button';
                btnCancel.className = 'btn btn-secondary krt-confirm-cancel';
                btnCancel.textContent = cancelLabel || /*[[#{general.cancel}]]*/ 'Abbrechen';

                const btnOk = document.createElement('button');
                btnOk.type = 'button';
                btnOk.className = 'btn btn-danger krt-confirm-ok';
                btnOk.textContent = confirmLabel || /*[[#{general.confirm}]]*/ 'Bestätigen';

                function close(result) {
                    document.removeEventListener('keydown', onKey);
                    overlay.remove();
                    resolve(result);
                }
                function onKey(e) {
                    if (e.key === 'Escape') close(false);
                    else if (e.key === 'Enter') close(true);
                }

                btnCancel.addEventListener('click', () => close(false));
                btnOk.addEventListener('click', () => close(true));
                overlay.addEventListener('click', (e) => { if (e.target === overlay) close(false); });
                document.addEventListener('keydown', onKey);

                actions.appendChild(btnCancel);
                actions.appendChild(btnOk);
                dialog.appendChild(h);
                dialog.appendChild(p);
                dialog.appendChild(actions);
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);

                setTimeout(() => btnOk.focus(), 50);
            });
        };
    </script>

    <style>
        .krt-confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 1rem;
        }
        .krt-confirm-dialog {
            background: #141414;
            border: 1px solid #E77E23;
            border-radius: 4px;
            max-width: 480px;
            width: 100%;
            padding: 1.5rem;
            color: #fff;
            font-family: 'Lato', sans-serif;
            box-shadow: 0 0 24px rgba(231, 126, 35, 0.35);
        }
        .krt-confirm-title {
            font-family: 'Ethnocentric', 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #E77E23;
            margin: 0 0 0.75rem 0;
            font-size: 1.05rem;
        }
        .krt-confirm-message {
            margin: 0 0 1.25rem 0;
            line-height: 1.4;
            font-weight: 300;
        }
        .krt-confirm-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .krt-confirm-actions .btn {
            min-height: 44px;
            min-width: 96px;
            padding: 0 1rem;
            font-family: 'Ethnocentric', 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 2px;
            border: 1px solid transparent;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }
        .krt-confirm-actions .btn-secondary {
            background: transparent;
            color: #bbb;
            border-color: #555;
        }
        .krt-confirm-actions .btn-secondary:hover {
            border-color: #888;
            color: #fff;
        }
        .krt-confirm-actions .btn-danger {
            background: #E77E23;
            color: #000;
            border-color: #E77E23;
        }
        .krt-confirm-actions .btn-danger:hover {
            background: #ff8f30;
            border-color: #ff8f30;
        }
        @media (max-width: 768px) {
            .krt-confirm-dialog {
                padding: 1rem;
            }
            .krt-confirm-actions {
                flex-direction: column-reverse;
            }
            .krt-confirm-actions .btn {
                width: 100%;
            }
        }
    </style>
</th:block>
</body>
</html>
