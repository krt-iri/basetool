<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="unsavedModal">
    <div id="unsaved-changes-modal" class="modal" style="display:none; z-index: 9999;">
        <div class="modal-content hud-box" style="max-width: 500px; text-align: center;">
            <h2 th:text="#{unsaved.modal.title}" class="mt-0">Ungespeicherte Änderungen</h2>
            <p th:text="#{unsaved.modal.message}" class="mb-2">Du hast ungespeicherte Änderungen. Möchtest du die Seite wirklich verlassen und die Änderungen verwerfen?</p>
            <div class="flex-center-gap">
                <button type="button" id="unsaved-leave-btn" class="btn btn-secondary" th:text="#{unsaved.modal.btn.leave}">Ohne Speichern verlassen</button>
                <button type="button" id="unsaved-stay-btn" class="btn" th:text="#{unsaved.modal.btn.stay}">Zurück</button>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
