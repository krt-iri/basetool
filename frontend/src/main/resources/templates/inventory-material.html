<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title>Material Details - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        .actions-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .material-select {
            padding: 0.5rem;
            background-color: var(--color-gray-4);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt_logo.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1>Detailansicht Material</h1>
    </div>

    <div class="hud-box mt-2">
        <div class="actions-bar">
            <a th:href="@{/inventory}" class="btn btn-secondary">&laquo; Zurück zur Übersicht</a>
            
            <div style="margin-left: auto; display: flex; gap: 0.5rem; align-items: center;">
                <label for="materialSelect" style="color: var(--color-primary); font-family: var(--font-headline); font-size: 0.8rem;">Anderes Material:</label>
                <select id="materialSelect" class="material-select" data-trigger="navigate-select" data-url-template="/inventory/material/{value}">
                    <option th:each="mat : ${materials}" th:value="${mat.id}" th:text="${mat.name}" th:selected="${mat.id == selectedMaterialId}"></option>
                </select>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <div class="table-responsive">
            <table class="krt-table">
                <thead>
                    <tr>
                        <th>Nutzer</th>
                        <th>Ort</th>
                        <th>Qualität</th>
                        <th>Menge</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.user.effectiveName}">Username</td>
                        <td th:text="${item.location.name}">Ort</td>
                        <td th:text="${item.quality}">100</td>
                        <td th:switch="${item.material.quantityType}">
                            <span th:case="'PIECE'" th:text="|${item.amount != null ? #numbers.formatInteger(item.amount, 1) : '0'} #{material.quantity.piece}|">10 Stück</span>
                            <span th:case="*" th:text="|${item.amount != null ? #numbers.formatDecimal(item.amount, 1, 'NONE', 3, 'DEFAULT') : '0.000'} #{material.quantity.scu}|">10.500 SCU</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="4" style="text-align: center; color: var(--color-gray-2);">Keine Einträge für dieses Material gefunden.</td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>
<th:block th:replace="~{fragments/toast :: toast}" />
</body>
</html>
