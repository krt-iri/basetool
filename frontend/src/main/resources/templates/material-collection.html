<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{material.collection.title} + ' - ' + ${appTitle}">Materialsammelübersicht - Profit Basetool</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between" style="flex-wrap: wrap; gap: 1rem;">
        <h1 th:text="#{material.collection.title}" style="letter-spacing: 0.08em;">Materialsammelübersicht</h1>
        <a th:href="@{/orders/{id}(id=${jobOrderId})}" class="btn btn-ghost" style="min-height: 44px; display: inline-flex; align-items: center;" th:text="#{material.collection.back}">Zurück zum Auftrag</a>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${entries == null or entries.isEmpty()}" style="color: var(--color-gray-2); font-family: 'Lato', sans-serif; padding: 2rem 0; text-align: center;" th:text="#{material.collection.empty}">
            Keine Lagereinträge für diesen Auftrag vorhanden.
        </div>

        <div th:unless="${entries == null or entries.isEmpty()}" class="table-responsive">
            <table class="data-table" id="material-collection-table">
                <thead>
                <tr>
                    <th th:text="#{material.collection.col.owner}">Besitzer</th>
                    <th th:text="#{material.collection.col.location}">Standort</th>
                    <th th:text="#{material.collection.col.material}">Material</th>
                    <th th:text="#{material.collection.col.quality}">Qualität</th>
                    <th th:text="#{material.collection.col.quantity}">Menge</th>
                    <th th:text="#{material.collection.col.delivered}">Geliefert</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${entries}"
                    th:data-inventory-id="${entry.inventoryEntryId}"
                    th:data-version="${entry.version}"
                    th:data-amount="${entry.quantity}">
                    <td>
                        <select class="owner-select krt-select"
                                th:data-inventory-id="${entry.inventoryEntryId}"
                                style="min-height: 44px; width: 100%; min-width: 140px; background-color: var(--color-surface-input); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); padding: 0.4rem 0.5rem;">
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.effectiveName}"
                                    th:selected="${u.id == entry.ownerId}"></option>
                        </select>
                    </td>
                    <td>
                        <select class="location-select krt-select"
                                th:data-inventory-id="${entry.inventoryEntryId}"
                                style="min-height: 44px; width: 100%; min-width: 140px; background-color: var(--color-surface-input); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); padding: 0.4rem 0.5rem;">
                            <option th:each="loc : ${locations}"
                                    th:value="${loc.id}"
                                    th:text="${loc.name}"
                                    th:selected="${loc.id == entry.locationId}"></option>
                        </select>
                    </td>
                    <td th:text="${entry.materialName}" style="font-family: 'Lato', sans-serif;"></td>
                    <td th:text="${entry.quality}" style="font-family: 'Lato', sans-serif;"></td>
                    <td th:text="${entry.quantity}" style="font-family: 'Lato', sans-serif;"></td>
                    <td class="text-center">
                        <input type="checkbox"
                               class="delivered-checkbox"
                               th:data-inventory-id="${entry.inventoryEntryId}"
                               th:checked="${entry.delivered}"
                               style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--color-primary);">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<style th:attr="nonce=${cspNonce}">
    .krt-select:focus {
        outline: 2px solid var(--color-primary);
        outline-offset: 1px;
    }
    @media (max-width: 768px) {
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
</style>

<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    /*<![CDATA[*/
    const MSG_OWNER_UPDATED   = /*[[#{material.collection.toast.ownerUpdated}]]*/ 'Besitzer aktualisiert.';
    const MSG_LOCATION_UPDATED = /*[[#{material.collection.toast.locationUpdated}]]*/ 'Standort aktualisiert.';
    const MSG_DELIVERED_UPDATED = /*[[#{material.collection.toast.deliveredUpdated}]]*/ 'Lieferstatus aktualisiert.';
    const MSG_ERROR_CONFLICT  = /*[[#{material.collection.toast.conflict}]]*/ 'Konflikt: Seite wird neu geladen.';
    const MSG_ERROR_GENERIC   = /*[[#{material.collection.toast.error}]]*/ 'Fehler beim Speichern.';

    function showToast(message, isError) {
        // Delegates to the shared toast component (fragments/toast.html, included
        // below) instead of a page-local .krt-toast implementation.
        if (isError) {
            window.showFrontendErrorToast(message);
        } else {
            window.showFrontendSuccessToast(message);
        }
    }

    function getVersion(inventoryId) {
        const row = document.querySelector('tr[data-inventory-id="' + inventoryId + '"]');
        return row ? parseInt(row.getAttribute('data-version'), 10) : 0;
    }

    function syncVersion(inventoryId, newVersion) {
        const row = document.querySelector('tr[data-inventory-id="' + inventoryId + '"]');
        if (row) row.setAttribute('data-version', newVersion);
    }

    function handleConflict() {
        showToast(MSG_ERROR_CONFLICT, true);
        setTimeout(() => window.location.reload(), 1500);
    }

    // CSRF is enforced for these session-authenticated frontend routes (the former
    // /inventory/** carve-out was removed in audit finding H-6), so every state-changing
    // fetch must echo the token from the head fragment's meta tags — otherwise the request
    // is rejected with 403 before it reaches the proxy controller.
    function csrfHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        if (token && header && header !== 'undefined' && token !== 'undefined') {
            headers[header] = token;
        }
        return headers;
    }

    // Owner dropdown change
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.owner-select').forEach(function (select) {
            select.addEventListener('change', function () {
                const sel = this;
                const inventoryId = sel.getAttribute('data-inventory-id');
                const targetUserId = sel.value;
                const version = getVersion(inventoryId);

                const row = document.querySelector('tr[data-inventory-id="' + inventoryId + '"]');
                const amount = row ? parseFloat(row.getAttribute('data-amount')) : 0;

                // Disable all selects in this row to prevent concurrent changes
                if (row) row.querySelectorAll('select').forEach(function (s) { s.disabled = true; });

                fetch('/inventory/' + inventoryId + '/transfer', {
                    method: 'POST',
                    headers: csrfHeaders(),
                    body: JSON.stringify({ amount: amount, targetUserId: targetUserId, targetLocationId: null, type: 'TRANSFER', terminal: null, sellAmount: null, version: version })
                }).then(function (res) {
                    if (res.status === 409) { handleConflict(); return null; }
                    if (!res.ok) {
                        if (row) row.querySelectorAll('select').forEach(function (s) { s.disabled = false; });
                        showToast(MSG_ERROR_GENERIC, true);
                        return null;
                    }
                    showToast(MSG_OWNER_UPDATED, false);
                    setTimeout(() => window.location.reload(), 800);
                }).catch(function () {
                    if (row) row.querySelectorAll('select').forEach(function (s) { s.disabled = false; });
                    showToast(MSG_ERROR_GENERIC, true);
                });
            });
        });

        // Location dropdown change
        document.querySelectorAll('.location-select').forEach(function (select) {
            select.addEventListener('change', function () {
                const sel = this;
                const inventoryId = sel.getAttribute('data-inventory-id');
                const targetLocationId = sel.value;
                const version = getVersion(inventoryId);

                const row2 = document.querySelector('tr[data-inventory-id="' + inventoryId + '"]');
                const amount2 = row2 ? parseFloat(row2.getAttribute('data-amount')) : 0;

                // Disable all selects in this row to prevent concurrent changes
                if (row2) row2.querySelectorAll('select').forEach(function (s) { s.disabled = true; });

                fetch('/inventory/' + inventoryId + '/transfer', {
                    method: 'POST',
                    headers: csrfHeaders(),
                    body: JSON.stringify({ amount: amount2, targetUserId: null, targetLocationId: targetLocationId, type: 'TRANSFER', terminal: null, sellAmount: null, version: version })
                }).then(function (res) {
                    if (res.status === 409) { handleConflict(); return null; }
                    if (!res.ok) {
                        if (row2) row2.querySelectorAll('select').forEach(function (s) { s.disabled = false; });
                        showToast(MSG_ERROR_GENERIC, true);
                        return null;
                    }
                    showToast(MSG_LOCATION_UPDATED, false);
                    setTimeout(() => window.location.reload(), 800);
                }).catch(function () {
                    if (row2) row2.querySelectorAll('select').forEach(function (s) { s.disabled = false; });
                    showToast(MSG_ERROR_GENERIC, true);
                });
            });
        });

        // Delivered checkbox change
        document.querySelectorAll('.delivered-checkbox').forEach(function (checkbox) {
            checkbox.addEventListener('change', function () {
                const inventoryId = this.getAttribute('data-inventory-id');
                const delivered = this.checked;
                const version = getVersion(inventoryId);

                fetch('/inventory/' + inventoryId + '/delivered', {
                    method: 'PATCH',
                    headers: csrfHeaders(),
                    body: JSON.stringify({ delivered: delivered, version: version })
                }).then(function (res) {
                    if (res.status === 409) { handleConflict(); return null; }
                    if (!res.ok) { showToast(MSG_ERROR_GENERIC, true); return null; }
                    return res.json();
                }).then(function (data) {
                    if (data && data.version !== undefined) {
                        syncVersion(inventoryId, data.version);
                        showToast(MSG_DELIVERED_UPDATED, false);
                    }
                }).catch(function () { showToast(MSG_ERROR_GENERIC, true); });
            });
        });
    });
    /*]]>*/
</script>

<th:block th:replace="~{fragments/toast :: toast}" />
</body>
</html>
