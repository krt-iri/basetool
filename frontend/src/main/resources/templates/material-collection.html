<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{material.collection.title} + ' - ' + ${appTitle}">Materialsammelübersicht - Profit Basetool</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between" style="flex-wrap: wrap; gap: 1rem;">
        <h1 th:text="#{material.collection.title}" style="letter-spacing: 0.08em;">Materialsammelübersicht</h1>
        <a th:href="@{/orders/{id}(id=${jobOrderId})}" class="btn btn-ghost" style="min-height: 44px; display: inline-flex; align-items: center;" th:text="#{material.collection.back}">Zurück zum Auftrag</a>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${entries == null or entries.isEmpty()}" style="color: var(--color-gray-2); font-family: 'Lato', sans-serif; padding: 2rem 0; text-align: center;" th:text="#{material.collection.empty}">
            Keine Lagereinträge für diesen Auftrag vorhanden.
        </div>

        <div th:unless="${entries == null or entries.isEmpty()}" class="table-responsive">
            <table class="data-table" id="material-collection-table">
                <thead>
                <tr>
                    <th th:text="#{material.collection.col.owner}">Besitzer</th>
                    <th th:text="#{material.collection.col.location}">Standort</th>
                    <th th:text="#{material.collection.col.material}">Material</th>
                    <th th:text="#{material.collection.col.quality}">Qualität</th>
                    <th th:text="#{material.collection.col.quantity}">Menge</th>
                    <th th:text="#{material.collection.col.delivered}">Geliefert</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${entries}"
                    th:data-inventory-id="${entry.inventoryEntryId}"
                    th:data-version="${entry.version}"
                    th:data-amount="${entry.quantity}">
                    <td>
                        <select class="owner-select krt-select"
                                th:data-inventory-id="${entry.inventoryEntryId}"
                                style="min-height: 44px; width: 100%; min-width: 140px; background-color: var(--color-surface-input); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); padding: 0.4rem 0.5rem;">
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.effectiveName}"
                                    th:selected="${u.id == entry.ownerId}"></option>
                        </select>
                    </td>
                    <td>
                        <select class="location-select krt-select"
                                th:data-inventory-id="${entry.inventoryEntryId}"
                                style="min-height: 44px; width: 100%; min-width: 140px; background-color: var(--color-surface-input); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); padding: 0.4rem 0.5rem;">
                            <option th:each="loc : ${locations}"
                                    th:value="${loc.id}"
                                    th:text="${loc.name}"
                                    th:selected="${loc.id == entry.locationId}"></option>
                        </select>
                    </td>
                    <td th:text="${entry.materialName}" style="font-family: 'Lato', sans-serif;"></td>
                    <td th:text="${entry.quality}" style="font-family: 'Lato', sans-serif;"></td>
                    <td th:text="${entry.quantity}" style="font-family: 'Lato', sans-serif;"></td>
                    <td class="text-center">
                        <input type="checkbox"
                               class="delivered-checkbox"
                               th:data-inventory-id="${entry.inventoryEntryId}"
                               th:checked="${entry.delivered}"
                               style="width: 22px; height: 22px; cursor: pointer; accent-color: var(--color-primary);">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<style th:attr="nonce=${cspNonce}">
    .krt-select:focus {
        outline: 2px solid var(--color-primary);
        outline-offset: 1px;
    }
    @media (max-width: 768px) {
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
</style>

<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    // #577: material-collection writes (owner/location transfer, delivered) save in place through
    // the shared krtFetch/krtCsrf foundation (REQ-FE-002). The page-local csrfHeaders/getVersion/
    // syncVersion/handleConflict/reload helpers are gone: krtFetch.write reads CSRF (with
    // retry-on-403), and for `delivered` it syncs the fresh version onto the row via containerSelector
    // so a follow-up action on the same row does not 409. A transfer moves the row's FULL amount: the
    // backend deletes the source item and appends a new target item (still linked to this job order),
    // returning that target DTO, so we re-key the <tr> to the new id/version in place.
    /*<![CDATA[*/
    const MSG_OWNER_UPDATED   = /*[[#{material.collection.toast.ownerUpdated}]]*/ 'Besitzer aktualisiert.';
    const MSG_LOCATION_UPDATED = /*[[#{material.collection.toast.locationUpdated}]]*/ 'Standort aktualisiert.';
    const MSG_DELIVERED_UPDATED = /*[[#{material.collection.toast.deliveredUpdated}]]*/ 'Lieferstatus aktualisiert.';
    const MSG_ERROR_GENERIC   = /*[[#{material.collection.toast.error}]]*/ 'Fehler beim Speichern.';
    /*]]>*/

    function collectionRow(inventoryId) {
        return document.querySelector('tr[data-inventory-id="' + inventoryId + '"]');
    }

    async function collectionTransfer(inventoryId, target, successMessage) {
        const row = collectionRow(inventoryId);
        if (!window.krtFetch || !row) return;
        const amount = parseFloat(row.getAttribute('data-amount'));
        const version = parseInt(row.getAttribute('data-version'), 10);
        // Disable the row's selects while the move is in flight to prevent concurrent changes.
        row.querySelectorAll('select').forEach(function (s) { s.disabled = true; });
        const result = await window.krtFetch.write({
            method: 'POST',
            url: '/inventory/' + inventoryId + '/transfer',
            payload: {
                amount: amount,
                targetUserId: target.targetUserId || null,
                targetLocationId: target.targetLocationId || null,
                type: 'TRANSFER',
                terminal: null,
                sellAmount: null,
                version: version
            },
            toast: false,
            errorMessage: MSG_ERROR_GENERIC,
            onSuccess: function (body) {
                window.showFrontendSuccessToast(successMessage);
                // The backend always deletes the full-amount source item and appends a brand-new
                // target item (its own id + version), returning that target DTO (never 204). The
                // target keeps this job-order link, so the row stays in the collection: re-key the
                // <tr> and its controls to the new id/version so a follow-up move or delivered-toggle
                // on the same row hits the live item instead of the deleted source (which would 404).
                // The fresh target row is not yet delivered.
                if (body && body.id) {
                    row.setAttribute('data-inventory-id', body.id);
                    if (body.version != null) {
                        row.setAttribute('data-version', body.version);
                    }
                    row.querySelectorAll('[data-inventory-id]').forEach(function (el) {
                        el.setAttribute('data-inventory-id', body.id);
                    });
                    const deliveredCheckbox = row.querySelector('.delivered-checkbox');
                    if (deliveredCheckbox) {
                        deliveredCheckbox.checked = false;
                    }
                }
            }
        });
        // Re-enable the row's selects whether the move succeeded (the row was re-keyed and stays
        // interactive) or failed (nothing changed) so the control is never left permanently disabled.
        row.querySelectorAll('select').forEach(function (s) { s.disabled = false; });
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.owner-select').forEach(function (select) {
            select.addEventListener('change', function () {
                collectionTransfer(this.getAttribute('data-inventory-id'), { targetUserId: this.value }, MSG_OWNER_UPDATED);
            });
        });

        document.querySelectorAll('.location-select').forEach(function (select) {
            select.addEventListener('change', function () {
                collectionTransfer(this.getAttribute('data-inventory-id'), { targetLocationId: this.value }, MSG_LOCATION_UPDATED);
            });
        });

        document.querySelectorAll('.delivered-checkbox').forEach(function (checkbox) {
            checkbox.addEventListener('change', async function () {
                const cb = this;
                const inventoryId = cb.getAttribute('data-inventory-id');
                const row = collectionRow(inventoryId);
                if (!window.krtFetch || !row) return;
                const previous = !cb.checked; // state before this toggle, for revert-on-failure
                const result = await window.krtFetch.write({
                    method: 'PATCH',
                    url: '/inventory/' + inventoryId + '/delivered',
                    payload: { delivered: cb.checked, version: parseInt(row.getAttribute('data-version'), 10) },
                    containerSelector: 'tr[data-inventory-id="' + inventoryId + '"]',
                    toast: false,
                    errorMessage: MSG_ERROR_GENERIC,
                    onSuccess: function () { window.showFrontendSuccessToast(MSG_DELIVERED_UPDATED); }
                });
                // A failed write (409 stale version / 5xx) already surfaced an error toast via
                // krtFetch.handleProblem, but the native checkbox kept its new, unpersisted state —
                // revert it so the control matches the persisted flag instead of lying until a reload
                // (mirrors the status <select> revert on a failed order-status change).
                if (!result || !result.ok) {
                    cb.checked = previous;
                }
            });
        });
    });
</script>

<th:block th:replace="~{fragments/toast :: toast}" />
</body>
</html>
