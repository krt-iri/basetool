<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{nav.materials.overview} + ' - ' + ${appTitle}">Material-Übersicht - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
        <link rel="stylesheet" th:href="@{/css/materials-overview.css}">
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main class="materials-overview-main">
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{nav.materials.overview}">Material-Übersicht</h1>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${error}" class="hud-box hud-box-error">
            <p th:text="#{__${error}__}">Fehler</p>
        </div>

        <!--
          Filter widgets are server-rendered (one checkbox per material / star system) but wired up
          and applied entirely by /js/materials-matrix.js: it binds the dropdown open/close, the
          select-all toggles and the boolean filters, then re-filters the already-fetched grid data
          in memory and re-renders the virtual table. No server round-trip per filter change.
        -->
        <div class="filters-container">
            <div class="form-group">
                <label th:text="#{filter.material}">Material filtern</label>
                <div class="multi-select-container" id="materialFilterContainer">
                    <div class="multi-select-header mtx-multi-header" data-options-id="materialOptions" th:data-all="#{filter.material.all}" th:data-selected="#{filter.selected}" id="materialHeader">
                        <span class="selected-text" id="materialSelectedText" th:text="#{filter.material.all}">Alle Materialien</span>
                    </div>
                    <div class="multi-select-options" id="materialOptions">
                        <label class="multi-select-option">
                            <span th:text="#{filter.all}">Alle</span>
                            <input type="checkbox" id="matAll" value="ALL" checked class="mtx-select-all" data-check-class="matCheck" data-header-id="materialHeader">
                        </label>
                        <label class="multi-select-option" th:each="mat : ${materialNames}">
                            <span th:text="${mat}">Material</span>
                            <input type="checkbox" class="matCheck mtx-check" th:value="${mat}" checked data-all-id="matAll" data-check-class="matCheck" data-header-id="materialHeader">
                        </label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label th:text="#{filter.system}">System filtern</label>
                <div class="multi-select-container" id="systemFilterContainer">
                    <div class="multi-select-header mtx-multi-header" data-options-id="systemOptions" th:data-all="#{filter.system.all}" th:data-selected="#{filter.selected}" id="systemHeader">
                        <span class="selected-text" id="systemSelectedText" th:text="#{filter.system.all}">Alle Systeme</span>
                    </div>
                    <div class="multi-select-options" id="systemOptions">
                        <label class="multi-select-option">
                            <span th:text="#{filter.all}">Alle</span>
                            <input type="checkbox" id="sysAll" value="ALL" checked class="mtx-select-all" data-check-class="sysCheck" data-header-id="systemHeader">
                        </label>
                        <label class="multi-select-option" th:each="sys : ${starSystems}">
                            <span th:text="${sys}">System</span>
                            <input type="checkbox" class="sysCheck mtx-check" th:value="${sys}" checked data-all-id="sysAll" data-check-class="sysCheck" data-header-id="systemHeader">
                        </label>
                    </div>
                </div>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; max-width: max-content;">
                <input type="checkbox" id="filterLoadingDock" class="mtx-bool-filter">
                <label for="filterLoadingDock" style="margin-bottom: 0; margin-top: 0;" th:text="#{filter.hasLoadingDock}">Hat Loading Dock</label>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; max-width: max-content;">
                <input type="checkbox" id="filterAutoLoad" class="mtx-bool-filter">
                <label for="filterAutoLoad" style="margin-bottom: 0; margin-top: 0;" th:text="#{filter.hasAutoLoad}">Hat Auto Load</label>
            </div>
            <!--
              Category-grouping toggle. Checked (default) groups material rows under the
              admin-defined category header rows; unchecked drops the headers and shows every
              material in one flat, alphabetically sorted list. Handled entirely in
              /js/materials-matrix.js and persisted per browser in localStorage.
            -->
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; max-width: max-content;">
                <input type="checkbox" id="filterGroupByCategory" checked>
                <label for="filterGroupByCategory" style="margin-bottom: 0; margin-top: 0;" th:text="#{filter.groupByCategory}">Nach Kategorie gruppieren</label>
            </div>
        </div>

        <!--
          Client-rendered, virtual-scrolling grid. The server ships only this empty skeleton plus
          the JSON config below; /js/materials-matrix.js fetches the matrix from
          /materials/overview/data and materializes just the visible rows into <tbody>, so the DOM
          stays small no matter how large the universe is. See the controller class Javadoc.
        -->
        <div id="matrixConfig"
             th:data-data-url="@{/materials/overview/data}"
             th:data-label-material="#{materials.matrix.material}"
             th:data-label-unsorted="#{material.category.unsorted}"
             th:data-label-no-results="#{materials.matrix.noResults}"
             th:data-label-illegal="#{material.is_illegal}"
             th:data-label-volatile-qt="#{material.is_volatile_qt}"
             th:data-label-volatile-time="#{material.is_volatile_time}"
             hidden></div>

        <div id="matrixLoading" class="matrix-loading" th:text="#{materials.matrix.loading}">Lade Matrix...</div>

        <div id="matrixError" class="hud-box hud-box-error" style="display: none;">
            <p th:text="#{error.materials.matrix.load}">Fehler</p>
        </div>

        <div class="table-wrapper" id="tableContainer" style="display: none;">
            <table class="matrix-table" id="matrixTable">
                <colgroup id="matrixColgroup"></colgroup>
                <thead id="matrixHead"></thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>

    </div>
</main>

<script th:src="@{/js/materials-matrix.js}" defer th:attr="nonce=${cspNonce}"></script>
</body>
</html>
