<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{nav.materials.list} + ' - ' + ${appTitle}">Materialien - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        .material-card {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        
        .material-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(231, 126, 35, 0.2);
        }

        .material-title {
            font-family: var(--font-body);
            font-weight: 700;
            color: var(--color-primary);
            font-size: 1.2rem;
            margin: 0;
            text-transform: uppercase;
        }
        
        .price-info {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-body);
            color: var(--color-gray-1);
        }
        
        .price-label {
            font-size: 0.8rem;
            color: var(--color-gray-2);
        }

        .price-value {
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1rem;
            max-width: 400px;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-surface-input);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }

        .materials-grouping-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0 1.5rem;
        }
        .materials-grouping-toggle label {
            font-family: var(--font-body);
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{nav.materials.list}">Materialien</h1>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${error}" class="hud-box hud-box-error">
            <p th:text="#{__${error}__}">Fehler</p>
        </div>

        <div class="form-group" style="position: relative;">
            <input type="text" id="materialFilter" th:placeholder="#{filter.material.placeholder}" data-trigger="materials-filter" autocomplete="off">
            <!--/*
              Material names for the custom krtAutocomplete dropdown. The names live in a datalist
              rather than being inlined into the surrounding script via the Thymeleaf JS inline
              comment-fallback pattern, because Thymeleaf 3.1's inline mechanism truncates the
              rest of the script block as soon as it serialises a Java List/Collection into a JS
              context — the substituted JSON array swallows every event after it, including the
              data-trigger registrations for the category-expand handler further down.
            */-->
            <datalist id="materialNames-data">
                <option th:each="mat : ${materials}" th:value="${mat.name}"></option>
            </datalist>
        </div>

        <!--/*
          View toggle: checked groups materials under the admin-defined categories (the accordion
          in #materialsGrouped); unchecked hides the category grouping and shows every material in
          one flat, alphabetically sorted grid (#materialsFlat). Pure presentation preference,
          persisted per browser in localStorage by the script below (mirrors the sidebar-section
          persistence pattern). Both views render the same card from fragments/material-card.html.
        */-->
        <div class="materials-grouping-toggle">
            <input type="checkbox" id="groupByCategory" data-trigger="materials-toggle-grouping" checked>
            <label for="groupByCategory" th:text="#{filter.groupByCategory}">Nach Kategorie gruppieren</label>
        </div>

        <div id="materialsGrouped">
            <div th:each="entry : ${materialsByKind}" class="kind-group mt-1-5">
                <div class="hud-box kind-header" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; background-color: var(--color-surface-input); padding: 0.5rem 1rem;" data-trigger="materials-toggle-kind">
                    <h2 style="margin: 0; font-family: var(--font-headline); font-size: 1.2rem; color: var(--color-primary);" th:text="${entry.key == 'Unsortiert' ? #messages.msg('material.category.unsorted') : entry.key}">Kategorie Name</h2>
                    <span class="toggle-icon" style="color: var(--color-primary); font-weight: bold; font-size: 1.5rem;">+</span>
                </div>

                <div class="grid-auto-cards materialsGrid" style="margin-top: 1rem; display: none;">
                    <th:block th:each="mat : ${entry.value}">
                        <div th:replace="~{fragments/material-card :: materialCard(${mat})}"></div>
                    </th:block>
                </div>
            </div>
        </div>

        <div id="materialsFlat" class="grid-auto-cards mt-1-5" style="display: none;">
            <th:block th:each="mat : ${materials}">
                <div th:replace="~{fragments/material-card :: materialCard(${mat})}"></div>
            </th:block>
        </div>

        <div id="noResultsMsg" style="display: none; text-align: center; color: var(--color-gray-2); margin-top: 2rem;" th:text="#{materials.list.noResults}">
            Keine Materialien gefunden.
        </div>
    </div>
</main>

<script th:src="@{/js/autocomplete.js}" th:attr="nonce=${cspNonce}"></script>
<script th:attr="nonce=${cspNonce}">
    document.addEventListener("DOMContentLoaded", function() {
        // Names come from the <datalist id="materialNames-data"> rendered above. The historical
        // Thymeleaf JS inline comment-fallback pattern would truncate the entire <script> block
        // once a Java List was serialised into it (see the parser-level comment next to the
        // datalist for the full diagnosis).
        const dataEl = document.getElementById("materialNames-data");
        const materialNames = dataEl
            ? Array.from(dataEl.options).map(function (opt) { return opt.value; })
            : [];
        const inp = document.getElementById("materialFilter");
        if (inp) krtAutocomplete(inp, materialNames);

        // Restore the saved grouping preference and show the matching view.
        initGroupingView();
    });

    // Per-browser persistence of the grouping preference (guarded so privacy modes that
    // throw on storage access degrade to the default grouped view instead of breaking).
    var GROUP_PREF_KEY = 'materials_group_by_category';
    function readGroupPref() {
        try { return localStorage.getItem(GROUP_PREF_KEY); } catch (e) { return null; }
    }
    function writeGroupPref(value) {
        try { localStorage.setItem(GROUP_PREF_KEY, value); } catch (e) { /* storage unavailable */ }
    }

    function isGroupedMode() {
        var box = document.getElementById("groupByCategory");
        return !box || box.checked;
    }

    // Show #materialsGrouped (accordion) or #materialsFlat (flat alphabetical grid) to match the
    // toggle, then re-apply the current text filter to whichever view is now visible.
    function applyGroupingView() {
        var grouped = isGroupedMode();
        var groupedEl = document.getElementById("materialsGrouped");
        var flatEl = document.getElementById("materialsFlat");
        if (groupedEl) groupedEl.style.display = grouped ? "" : "none";
        if (flatEl) flatEl.style.display = grouped ? "none" : "grid";
        filterMaterials();
    }

    function initGroupingView() {
        var box = document.getElementById("groupByCategory");
        if (box) {
            var pref = readGroupPref();
            if (pref !== null) {
                box.checked = pref === "1";
            }
        }
        applyGroupingView();
    }

    function onToggleGrouping() {
        writeGroupPref(isGroupedMode() ? "1" : "0");
        applyGroupingView();
    }

    function toggleKindGroup(element) {
        var content = element.nextElementSibling;
        var icon = element.querySelector('.toggle-icon');
        if (content.style.display === "none" || content.style.display === "") {
            content.style.display = "grid"; // or block depending on css, grid-auto-cards needs grid
            icon.textContent = "−";
        } else {
            content.style.display = "none";
            icon.textContent = "+";
        }
    }

    // Applies the text filter to whichever view is active and toggles the no-results message.
    function filterMaterials() {
        var input = document.getElementById("materialFilter");
        var filter = (input ? input.value : "").toUpperCase();
        var totalVisibleCount = isGroupedMode()
            ? filterGroupedView(filter)
            : filterFlatView(filter);

        var noResults = document.getElementById("noResultsMsg");
        if (noResults) {
            noResults.style.display = totalVisibleCount === 0 ? "block" : "none";
        }
    }

    // Category-grouped view: filter cards within each .kind-group, hide empty groups, and
    // auto-expand the surviving groups while a filter is active. Returns the visible-card count.
    function filterGroupedView(filter) {
        var groups = document.getElementsByClassName("kind-group");
        var totalVisibleCount = 0;

        for (var j = 0; j < groups.length; j++) {
            var group = groups[j];
            var cards = group.getElementsByClassName("material-card");
            var visibleInGroup = 0;

            for (var i = 0; i < cards.length; i++) {
                var title = cards[i].getElementsByClassName("material-title")[0];
                if (title) {
                    var txtValue = title.textContent || title.innerText;
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        cards[i].style.display = "";
                        visibleInGroup++;
                    } else {
                        cards[i].style.display = "none";
                    }
                }
            }

            if (visibleInGroup === 0) {
                group.style.display = "none";
            } else {
                group.style.display = "";
                totalVisibleCount += visibleInGroup;

                // If filtering is active, auto-expand groups
                var content = group.querySelector('.materialsGrid');
                var icon = group.querySelector('.toggle-icon');
                if (filter.length > 0) {
                    content.style.display = "grid";
                    icon.textContent = "−";
                }
            }
        }
        return totalVisibleCount;
    }

    // Flat view: filter the single #materialsFlat grid of all cards. Returns the visible-card count.
    function filterFlatView(filter) {
        var container = document.getElementById("materialsFlat");
        if (!container) {
            return 0;
        }
        var cards = container.getElementsByClassName("material-card");
        var visibleCount = 0;
        for (var i = 0; i < cards.length; i++) {
            var title = cards[i].getElementsByClassName("material-title")[0];
            var txtValue = title ? (title.textContent || title.innerText) : "";
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                cards[i].style.display = "";
                visibleCount++;
            } else {
                cards[i].style.display = "none";
            }
        }
        return visibleCount;
    }

    // CSP-safe delegated bindings (replace the historical onkeyup="filterMaterials()" and
    // onclick="toggleKindGroup(this)" inline handlers).
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('keyup', 'materials-filter', filterMaterials);
        window.krtEvents.on('click', 'materials-toggle-kind', function (el) { toggleKindGroup(el); });
        window.krtEvents.on('change', 'materials-toggle-grouping', onToggleGrouping);
    }
</script>
</body>
</html>
