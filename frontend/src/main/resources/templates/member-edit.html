<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{members.edit.title} + ' - ' + ${appTitle}">Mitglied bearbeiten - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--color-surface-input);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 5px rgba(231, 126, 35, 0.3);
        }
        .form-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{members.edit.title}">Mitglied bearbeiten</h1>
        <p th:text="${user.effectiveName}">Username</p>
    </div>

    <div class="hud-box mt-2">
        
        <!-- data-member-edit gates the in-place save script (epic #571, REQ-FE-007). The form keeps
             its th:action/method=post so a script-disabled browser still posts and hits the redirect
             handler (MemberManagementController#updateMember) — progressive enhancement. -->
        <form id="member-edit-form" data-member-edit="true"
              th:action="@{/members/{id}/edit(id=${user.id})}" method="post" th:object="${memberEditForm}">
            <input type="hidden" name="version" th:field="*{version}">
            <input type="hidden" name="source" th:field="*{source}">
            <!-- REQ-ORG-017: round-trips whether the authoritative Staffel-membership detail loaded
                 on the GET. When false (detail fetch failed) the controller skips the Staffel
                 reconcile on save, so blank slots never strip the member's Staffeln. -->
            <input type="hidden" name="staffelDetailLoaded" th:field="*{staffelDetailLoaded}">
            <div class="form-group">
                <label th:text="#{profile.rank}">Rang</label>
                <select name="rank">
                    <option th:each="i : ${#numbers.sequence(1, 20)}" 
                            th:value="${i}" 
                            th:text="${i}" 
                            th:selected="${i == memberEditForm.rank}">
                    </option>
                </select>
                <div th:if="${#fields.hasErrors('rank')}" th:errors="*{rank}" class="field-error"></div>
            </div>

            <div class="form-group">
                <label th:text="#{profile.display_name}">Anzeigename</label>
                <input type="text" name="displayName" th:value="*{displayName}" />
                <!-- Always present + GET-safe so the in-place save (REQ-FE-007) can paint the field
                     error client-side; a bare th:errors would throw on a GET with no BindingResult,
                     and .field-error:empty{display:none} hides it until populated. -->
                <div class="field-error" data-error-for="displayName"
                     th:text="${#fields.hasErrors('displayName') ? #fields.errors('displayName')[0] : ''}"></div>
            </div>

            <div class="form-group">
                <label th:text="#{profile.description}">Beschreibung</label>
                <textarea name="description" rows="5" th:text="*{description}"></textarea>
                <div class="field-error" data-error-for="description"
                     th:text="${#fields.hasErrors('description') ? #fields.errors('description')[0] : ''}"></div>
            </div>
            
            <div class="form-group">
                <label th:text="#{member.join_date}">Beitrittsdatum</label>
                <input type="date" name="joinDate"
                       th:value="*{joinDate}"
                       style="min-height:44px;" />
            </div>

            <!-- Staffel memberships (admin-only, since /members/{id}/edit is admin-only). REQ-ORG-017:
                 up to two Staffeln, each with its own Logistician / Mission-Manager flags
                 (REQ-SEC-005). SquadronContextAdvice injects `availableSquadrons`. The two fixed slots
                 bind to staffel1*/staffel2* fields; the Save button folds the non-empty slots into one
                 PATCH /api/v1/users/{id}/memberships reconcile. -->
            <div class="form-group" sec:authorize="hasRole('ADMIN')" id="staffel-section">
                <label th:text="#{members.staffel.title}">Staffeln</label>

                <!-- REQ-ORG-017: the authoritative Staffel-membership detail (each Staffel's own
                     flags) failed to load. The editable slots are hidden so the admin cannot make a
                     change that the save would silently drop, and a non-null reconcile that would
                     strip every Staffel is avoided (the controller skips the PATCH when
                     staffelDetailLoaded is false). The other fields above still save normally. -->
                <p class="field-error" th:unless="${memberEditForm.staffelDetailLoaded}"
                   th:text="#{members.staffel.detail_unavailable}">Staffel-Daten konnten nicht geladen werden.</p>

                <th:block th:if="${memberEditForm.staffelDetailLoaded}">
                <!-- Slot 1 -->
                <div class="staffel-slot hud-box" style="padding:1rem; margin-bottom:0.75rem;">
                    <label for="staffel1-select" th:text="#{members.staffel.slot1}">Staffel 1</label>
                    <select id="staffel1-select" class="staffel-select" name="staffel1Id" style="min-height:44px;">
                        <option value=""
                                th:selected="${memberEditForm.staffel1Id == null}"
                                th:text="#{members.field.squadron.unassigned}">-- Keine --</option>
                        <option th:each="sq : ${availableSquadrons}"
                                th:value="${sq.id()}"
                                th:selected="${memberEditForm.staffel1Id != null and memberEditForm.staffel1Id == sq.id()}"
                                th:text="|${sq.shorthand()} — ${sq.name()}|">IRI — IRIDIUM</option>
                    </select>
                    <div style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem;">
                        <label style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="hidden" name="_staffel1Logistician" value="on" />
                            <input type="checkbox" name="staffel1Logistician"
                                   th:checked="${memberEditForm.staffel1Logistician}" />
                            <span th:text="#{members.is_logistician}">Logistiker</span>
                        </label>
                        <label style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="hidden" name="_staffel1MissionManager" value="on" />
                            <input type="checkbox" name="staffel1MissionManager"
                                   th:checked="${memberEditForm.staffel1MissionManager}" />
                            <span th:text="#{members.is_mission_manager}">Missions-Manager</span>
                        </label>
                    </div>
                </div>

                <!-- Slot 2 (optional, REQ-ORG-017 second Staffel) -->
                <div id="staffel-slot-2" class="staffel-slot hud-box"
                     th:style="${memberEditForm.staffel2Id == null}
                               ? 'display:none; padding:1rem; margin-bottom:0.75rem;'
                               : 'padding:1rem; margin-bottom:0.75rem;'">
                    <label for="staffel2-select" th:text="#{members.staffel.slot2}">Staffel 2</label>
                    <select id="staffel2-select" class="staffel-select" name="staffel2Id" style="min-height:44px;">
                        <option value=""
                                th:selected="${memberEditForm.staffel2Id == null}"
                                th:text="#{members.field.squadron.unassigned}">-- Keine --</option>
                        <option th:each="sq : ${availableSquadrons}"
                                th:value="${sq.id()}"
                                th:selected="${memberEditForm.staffel2Id != null and memberEditForm.staffel2Id == sq.id()}"
                                th:text="|${sq.shorthand()} — ${sq.name()}|">IRI — IRIDIUM</option>
                    </select>
                    <div style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem;">
                        <label style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="hidden" name="_staffel2Logistician" value="on" />
                            <input type="checkbox" name="staffel2Logistician"
                                   th:checked="${memberEditForm.staffel2Logistician}" />
                            <span th:text="#{members.is_logistician}">Logistiker</span>
                        </label>
                        <label style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="hidden" name="_staffel2MissionManager" value="on" />
                            <input type="checkbox" name="staffel2MissionManager"
                                   th:checked="${memberEditForm.staffel2MissionManager}" />
                            <span th:text="#{members.is_mission_manager}">Missions-Manager</span>
                        </label>
                    </div>
                    <button type="button" class="btn btn-ghost" id="staffel-remove-2"
                            style="margin-top:0.75rem;" th:text="#{members.staffel.remove}">Entfernen</button>
                </div>

                <button type="button" class="btn btn-ghost" id="staffel-add-2"
                        th:style="${memberEditForm.staffel2Id == null} ? '' : 'display:none;'"
                        th:text="#{members.staffel.add_second}">Zweite Staffel hinzufügen</button>
                </th:block>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{members.save}">Speichern</span></button>
                <a th:href="@{/members}" class="btn btn-ghost" th:text="#{profile.back}">Zurück</a>
            </div>
        </form>
    </div>

    <!-- SPEZIALKOMMANDO_PLAN.md §7.4 — read-only Memberships-Übersicht. Each row links through to
         the corresponding management surface: Staffel rows to /admin/mission-data (squadron CRUD)
         or /members/{id}/edit (this page) for flag-toggles; SK rows to /admin/special-commands/{id}
         for the full roster UI. Full in-form delta-edit is a follow-up release. -->
    <div class="hud-box mt-2" sec:authorize="hasRole('ADMIN')">
        <h2 th:text="#{members.memberships.title}">Mitgliedschaften</h2>
        <p th:if="${memberMemberships == null or memberMemberships.isEmpty()}"
           th:text="#{members.memberships.none}">Keine Mitgliedschaften.</p>
        <ul th:if="${memberMemberships != null and !memberMemberships.isEmpty()}"
            class="memberships-list" style="list-style:none; padding-left:0;">
            <li th:each="m : ${memberMemberships}" style="margin: 0.4rem 0; display:flex; gap:0.6rem; align-items:center;">
                <span class="squadron-badge"
                      th:classappend="${m.kind() == 'SPECIAL_COMMAND' ? ' squadron-badge-sk' : ''}"
                      th:text="${m.orgUnitShorthand() != null ? m.orgUnitShorthand() : m.orgUnitName()}">IRI</span>
                <span th:text="${m.orgUnitName()}">IRIDIUM</span>
                <span class="badge-kind"
                      th:if="${m.kind() == 'SPECIAL_COMMAND'}"
                      th:text="#{orgUnit.kind.specialCommand.short}">SK</span>
                <span class="badge-kind"
                      th:if="${m.kind() != 'SPECIAL_COMMAND'}"
                      th:text="#{orgUnit.kind.squadron.short}">Staffel</span>
                <a th:if="${m.kind() == 'SPECIAL_COMMAND'}"
                   th:href="@{/admin/special-commands/{id}(id=${m.orgUnitId()})}"
                   th:text="#{members.memberships.manage}"
                   class="btn-link">Verwalten</a>
            </li>
        </ul>
    </div>
</main>
<!--
  In-place member-edit save (epic #571, REQ-FE-007). Intercepts the form submit and posts the same
  multipart body through a JSON twin (MemberManagementController#updateMemberAjax) — no navigation on
  success. FormData is used so the browser serialises the checkboxes + the Spring _field reset hidden
  inputs exactly like the native POST, and X-Requested-With routes to the twin. The form keeps its
  th:action/method=post so a script-disabled browser falls back to the redirect handler.
-->
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    (function () {
        'use strict';
        var form = document.getElementById('member-edit-form');
        if (!form || form.getAttribute('data-member-edit') === null || !window.krtFetch || !window.krtCsrf) {
            return;
        }
        var i18n = {
            saved: /*[[#{notification.success.save}]]*/ 'Saved.',
            error: /*[[#{error.member.update.failed}]]*/ 'Update failed.',
            conflictTitle: /*[[#{frontend.ajax.conflict.title}]]*/ 'Conflict',
            conflictReload: /*[[#{frontend.ajax.conflict.reload}]]*/ 'Load current values',
            conflictDismiss: /*[[#{frontend.ajax.conflict.dismiss}]]*/ 'Close',
            conflictQuestion: /*[[#{frontend.ajax.conflict.question}]]*/ 'Load current values?',
            conflictDetail: /*[[#{frontend.ajax.conflict.detail}]]*/ 'The data was changed in the meantime.'
        };

        // FormData needs the browser to set the multipart boundary, so build the CSRF headers
        // WITHOUT krtCsrf.headers() (which forces Content-Type: application/json).
        function writeHeaders() {
            var headers = {'X-Requested-With': 'XMLHttpRequest'};
            var token = window.krtCsrf.token();
            var headerName = window.krtCsrf.headerName();
            if (token && headerName) {
                headers[headerName] = token;
            }
            return headers;
        }

        function clearErrors() {
            form.querySelectorAll('.field-error[data-error-for]').forEach(function (slot) {
                slot.textContent = '';
            });
        }

        function renderErrors(errors) {
            clearErrors();
            if (!errors) {
                return;
            }
            Object.keys(errors).forEach(function (field) {
                var slot = form.querySelector('.field-error[data-error-for="' + field + '"]');
                if (slot) {
                    slot.textContent = errors[field];
                }
            });
        }

        function syncVersion(version) {
            if (version == null) {
                return;
            }
            form.querySelectorAll('input[name="version"]').forEach(function (input) {
                input.value = String(version);
            });
        }

        var inFlight = false;
        form.addEventListener('submit', function (event) {
            event.preventDefault();
            if (inFlight) {
                return;
            }
            inFlight = true;
            var submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.disabled = true;
            }
            function done() {
                inFlight = false;
                if (submitBtn) {
                    submitBtn.disabled = false;
                }
            }
            function doPost() {
                return fetch(form.getAttribute('action'), {
                    method: 'POST',
                    headers: writeHeaders(),
                    body: new FormData(form)
                });
            }
            doPost().then(function (resp) {
                // A bare 403 is the CSRF filter rejecting a stale token; refresh once and retry.
                if (resp.status === 403) {
                    return window.krtCsrf.refresh().then(function (refreshed) {
                        return refreshed ? doPost() : resp;
                    });
                }
                return resp;
            }).then(function (resp) {
                if (resp.status === 422) {
                    return resp.json().catch(function () { return {}; }).then(function (errors) {
                        renderErrors(errors);
                        done();
                    });
                }
                if (!resp.ok) {
                    return resp.json().catch(function () { return {}; }).then(function (data) {
                        if (data && data.code === 'OPTIMISTIC_LOCK') {
                            window.showFrontendErrorToast(data.detail || i18n.conflictDetail);
                            if (window.showKrtConfirm) {
                                window.showKrtConfirm(i18n.conflictTitle, i18n.conflictQuestion,
                                    i18n.conflictReload, i18n.conflictDismiss).then(function (ok) {
                                    if (ok) {
                                        window.location.reload();
                                    }
                                });
                            }
                        } else {
                            window.showFrontendErrorToast((data && data.detail) || i18n.error);
                        }
                        done();
                    });
                }
                return resp.json().catch(function () { return {}; }).then(function (body) {
                    clearErrors();
                    syncVersion(body ? body.version : null);
                    window.showFrontendSuccessToast(i18n.saved);
                    done();
                });
            }).catch(function () {
                window.showFrontendErrorToast(i18n.error);
                done();
            });
        });
    })();
</script>
<!--
  Two-Staffel slot management (REQ-ORG-017). Slot 1 is always visible; slot 2 is revealed by the
  "add" button and cleared+hidden by its "remove" button. Even while hidden, slot 2's inputs stay in
  the DOM and submit empty (the controller drops an empty/duplicate slot), so no DOM removal is
  needed. Each select disables the squadron currently chosen in the other, preventing the same
  Staffel twice client-side (the backend also rejects a duplicate defensively).
-->
<script th:attr="nonce=${cspNonce}">
    (function () {
        'use strict';
        var sel1 = document.getElementById('staffel1-select');
        var sel2 = document.getElementById('staffel2-select');
        var slot2 = document.getElementById('staffel-slot-2');
        var addBtn = document.getElementById('staffel-add-2');
        var removeBtn = document.getElementById('staffel-remove-2');
        if (!sel1 || !sel2 || !slot2 || !addBtn || !removeBtn) {
            return;
        }
        function showSlot2(show) {
            slot2.style.display = show ? '' : 'none';
            addBtn.style.display = show ? 'none' : '';
        }
        function clearSlot2() {
            sel2.value = '';
            slot2.querySelectorAll('input[type=checkbox]').forEach(function (c) {
                c.checked = false;
            });
        }
        function syncDuplicateOptions() {
            var v1 = sel1.value;
            var v2 = sel2.value;
            Array.prototype.forEach.call(sel2.options, function (o) {
                o.disabled = (o.value !== '' && o.value === v1);
            });
            Array.prototype.forEach.call(sel1.options, function (o) {
                o.disabled = (o.value !== '' && o.value === v2);
            });
        }
        addBtn.addEventListener('click', function () {
            showSlot2(true);
            syncDuplicateOptions();
        });
        removeBtn.addEventListener('click', function () {
            clearSlot2();
            showSlot2(false);
            syncDuplicateOptions();
        });
        sel1.addEventListener('change', syncDuplicateOptions);
        sel2.addEventListener('change', syncDuplicateOptions);
        syncDuplicateOptions();
    })();
</script>
</body>
</html>
