<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{members.edit.title} + ' - ' + ${appTitle}">Mitglied bearbeiten - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-headline);
            font-size: 0.8rem;
            color: var(--color-primary);
            text-transform: uppercase;
        }
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--color-gray-4);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 5px rgba(231, 126, 35, 0.3);
        }
        .form-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }
        .btn-secondary {
            background-color: var(--color-gray-3);
            color: var(--color-gray-1);
        }
        .btn-secondary:hover {
            background-color: var(--color-gray-2);
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" width="50" height="50">
            <span class="logo-text" th:text="${appTitle}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{members.edit.title}">Mitglied bearbeiten</h1>
        <p th:text="${user.effectiveName}">Username</p>
    </div>

    <div class="hud-box mt-2">
        
        <form th:action="@{/members/{id}/edit(id=${user.id})}" method="post" th:object="${memberEditForm}">
            <input type="hidden" name="version" th:field="*{version}">
            <input type="hidden" name="source" th:field="*{source}">
            <div class="form-group">
                <label th:text="#{profile.rank}">Rang</label>
                <select name="rank">
                    <option th:each="i : ${#numbers.sequence(1, 20)}" 
                            th:value="${i}" 
                            th:text="${i}" 
                            th:selected="${i == memberEditForm.rank}">
                    </option>
                </select>
                <div th:if="${#fields.hasErrors('rank')}" th:errors="*{rank}" style="color:var(--color-dept-combat); font-size: 0.8rem;"></div>
            </div>

            <div class="form-group">
                <label th:text="#{profile.display_name}">Anzeigename</label>
                <input type="text" name="displayName" th:value="*{displayName}" />
                <div th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}" style="color:var(--color-dept-combat); font-size: 0.8rem;"></div>
            </div>
            
            <div class="form-group">
                <label th:text="#{profile.description}">Beschreibung</label>
                <textarea name="description" rows="5" th:text="*{description}"></textarea>
                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color:var(--color-dept-combat); font-size: 0.8rem;"></div>
            </div>
            
            <div class="form-group">
                <label th:text="#{member.join_date}">Beitrittsdatum</label>
                <input type="date" name="joinDate"
                       th:value="*{joinDate}"
                       style="min-height:44px;" />
            </div>

            <!-- Squadron assignment (admin-only, since /members/{id}/edit is admin-only).
                 SquadronContextAdvice injects `availableSquadrons` on every request. -->
            <div class="form-group" sec:authorize="hasRole('ADMIN')">
                <label for="member-edit-squadron" th:text="#{members.field.squadron}">Staffel</label>
                <select id="member-edit-squadron" name="squadronId" style="min-height:44px;">
                    <option value=""
                            th:selected="${memberEditForm.squadronId == null}"
                            th:text="#{members.field.squadron.unassigned}">-- Keine --</option>
                    <option th:each="sq : ${availableSquadrons}"
                            th:value="${sq.id()}"
                            th:selected="${memberEditForm.squadronId != null and memberEditForm.squadronId == sq.id()}"
                            th:text="|${sq.shorthand()} — ${sq.name()}|">IRI — IRIDIUM</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn" th:text="#{members.save}">Speichern</button>
                <a th:href="@{/members}" class="btn btn-secondary" th:text="#{profile.back}">Zurück</a>
            </div>
        </form>
    </div>
</main>
<script th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', function() {
    });
</script>
</body>
</html>
