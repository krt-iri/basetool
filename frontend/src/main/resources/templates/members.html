<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{members.title} + ' - ' + ${appTitle}">Mitgliederverwaltung - Profit Basetool</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{members.title}">Mitgliederverwaltung</h1>
        <p th:text="#{members.description}">Verwalte die Mitglieder deiner Squadron.</p>
    </div>

    <div class="hud-box mt-2">

        <form id="members-filter-form" method="get" th:action="@{/members}" class="search-form no-track" style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1rem;">
            <label for="member-search" th:text="#{members.search}">Mitglied suchen</label>
            <div style="flex:1; min-width: 12rem; position: relative;">
                <input type="text"
                       id="member-search"
                       name="search"
                       th:value="${search}"
                       th:placeholder="#{members.search.placeholder}"
                       autocomplete="off"
                       style="width: 100%; box-sizing: border-box;">
            </div>
            <button type="submit" class="btn btn-ghost" th:text="#{general.search}">Suche</button>
        </form>
        <div id="members-results">
        <th:block th:fragment="membersTableFragment">
        <div class="table-responsive">
        <table th:if="${users}">
            <thead>
                <tr>
                    <th th:text="#{profile.username}">Username</th>
                    <th th:text="#{members.field.squadron}">Staffel</th>
                    <th th:text="#{members.list.specialcommands}">SK</th>
                    <th th:text="#{profile.rank}">Rang</th>
                    <th th:text="#{members.discord}">Discord</th>
                    <th th:text="#{members.status}">Status</th>
                    <th th:text="#{general.action}">Aktion</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.effectiveName}">Username</td>
                    <!-- REQ-ORG-017 — a member may hold up to two Staffeln; render every badge
                         (mirrors the SK column's separated-badge style). -->
                    <td>
                        <span th:if="${user.squadrons != null and !user.squadrons.isEmpty()}">
                            <th:block th:each="sq, st : ${user.squadrons}">
                                <span class="squadron-badge"
                                      th:title="${sq.name()}"
                                      th:text="${sq.shorthand()}">IRI</span><span th:if="${!st.last}">&#160;&middot;&#160;</span>
                            </th:block>
                        </span>
                        <span th:if="${user.squadrons == null or user.squadrons.isEmpty()}"
                              class="squadron-badge squadron-badge-muted">&mdash;</span>
                    </td>
                    <!-- SPEZIALKOMMANDO_PLAN.md §7.5 — comma-separated SK shorthand list (neutral
                         badge style so SK pins do not compete with the Staffel brand colour). -->
                    <td>
                        <span th:if="${userSkMemberships != null and userSkMemberships.get(user.id) != null and !userSkMemberships.get(user.id).isEmpty()}">
                            <th:block th:each="sk, st : ${userSkMemberships.get(user.id)}">
                                <span class="squadron-badge squadron-badge-sk"
                                      th:title="${sk.orgUnitName()}"
                                      th:text="${sk.orgUnitShorthand() != null ? sk.orgUnitShorthand() : sk.orgUnitName()}">ALPHA</span><span th:if="${!st.last}">&#160;&middot;&#160;</span>
                            </th:block>
                        </span>
                        <span th:if="${userSkMemberships == null or userSkMemberships.get(user.id) == null or userSkMemberships.get(user.id).isEmpty()}"
                              class="squadron-badge squadron-badge-muted"
                              th:utext="#{members.list.specialcommands.none}">&mdash;</span>
                    </td>
                    <td th:text="${user.rank}">Rang</td>
                    <td>
                        <span th:if="${user.discordLinked}" role="img"
                              th:title="#{members.discord.linked}" th:aria-label="#{members.discord.linked}">
                            <svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-discord"/></svg>
                        </span>
                        <span th:unless="${user.discordLinked}" class="text-muted"
                              th:title="#{members.discord.not_linked}" th:aria-label="#{members.discord.not_linked}">&mdash;</span>
                    </td>
                    <td>
                        <span th:if="${user.inKeycloak}" style="color: var(--color-success); font-size: 0.8rem;" th:text="#{members.in_keycloak}">In Keycloak</span>
                        <span th:if="${!user.inKeycloak}" style="color: var(--color-danger); font-size: 0.8rem;" th:text="#{members.not_in_keycloak}">Nicht in Keycloak</span>
                    </td>
                    <td>
                        <div class="flex-gap-xs">
                            <a th:href="@{/members/{id}/edit(id=${user.id}, source='members')}" class="btn btn-ghost btn-icon" th:title="#{members.edit}" th:aria-label="#{members.edit}"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-edit"/></svg></a>
                            <button th:if="${!user.inKeycloak}" sec:authorize="hasRole('ADMIN')"
                                    class="btn btn-quiet-danger btn-icon"
                                    th:data-user-id="${user.id}"
                                    data-trigger="members-delete-user"
                                    th:title="#{members.delete}" th:aria-label="#{members.delete}"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-trash"/></svg></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        </div>
        
        <div th:replace="~{fragments/pagination :: pagination(pageResponse=${usersPage}, baseUrl='/members')}"></div>
        
        <p th:if="${users == null && error == null}" th:text="#{members.empty}">Keine Mitglieder gefunden.</p>
        </th:block>
        </div>
    </div>

</main>
<script th:src="@{/js/autocomplete.js}" th:attr="nonce=${cspNonce}"></script>
<script th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('member-search');
        const filterForm = document.getElementById('members-filter-form');
        const resultsContainer = document.getElementById('members-results');
        let membersFilterTimer = null;

        // In-place filter + pagination (epic #571 / #573). The GET form stays the no-JS fallback;
        // the row actions (delete) are delegated via krtEvents
        // below, so they keep working after the results fragment is swapped.
        function applyMembersFilter() {
            if (!filterForm || !resultsContainer || !window.krtFetch) {
                if (filterForm) filterForm.submit();
                return;
            }
            const data = new FormData(filterForm);
            const params = new URLSearchParams();
            for (const [key, value] of data.entries()) {
                if (value !== '') params.append(key, value);
            }
            const query = params.toString();
            window.krtFetch.swap({
                url: '/members' + (query ? '?' + query : ''),
                container: resultsContainer,
                history: true,
            });
        }

        if (filterForm) {
            filterForm.addEventListener('submit', function (event) {
                event.preventDefault();
                clearTimeout(membersFilterTimer);
                applyMembersFilter();
            });
        }

        if (searchInput) {
            searchInput.addEventListener('input', function () {
                clearTimeout(membersFilterTimer);
                membersFilterTimer = setTimeout(applyMembersFilter, 300);
            });
            krtAutocomplete(searchInput, async (query) => {
                if (query.length < 2) return [];
                try {
                    const resp = await fetch(`/members/api/search?query=${encodeURIComponent(query)}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    if (!resp.ok) return [];
                    const data = await resp.json();
                    return [...new Set((data || []).map(u => u.effectiveName).filter(Boolean))].slice(0, 10);
                } catch (err) {
                    return [];
                }
            }, {
                onSelect: function(item) {
                    searchInput.value = item;
                    clearTimeout(membersFilterTimer);
                    applyMembersFilter();
                }
            });
        }
    });

    const MSG_DELETE_TITLE = "[[#{members.delete.title}]]";
    const MSG_DELETE_CONFIRM = "[[#{members.delete_confirm}]]";
    const MSG_DELETE_LABEL = "[[#{members.delete}]]";
    const MSG_CANCEL_LABEL = "[[#{general.cancel}]]";
    const MSG_DELETE_SUCCESS = "[[#{success.user.delete}]]";
    const MSG_DELETE_ERROR = "[[#{error.user.delete}]]";

    // Re-render the current (filtered/paginated) member list so a deleted row drops out and the
    // pagination + SK column stay coherent. The URL already carries the active filter (kept in
    // sync by applyMembersFilter's history:true), so re-fetch it as a fragment swap (#571/#573).
    function refreshMembersResults() {
        const container = document.getElementById('members-results');
        if (!container || !window.krtFetch) {
            location.reload();
            return;
        }
        window.krtFetch.swap({
            url: window.location.pathname + window.location.search,
            container: container
        });
    }

    async function deleteUser(userId) {
        const confirmed = await window.showKrtConfirm(MSG_DELETE_TITLE, MSG_DELETE_CONFIRM, MSG_DELETE_LABEL, MSG_CANCEL_LABEL);
        if (!confirmed) return;
        window.krtFetch.write({
            method: 'DELETE',
            url: '/members/' + encodeURIComponent(userId),
            successMessage: MSG_DELETE_SUCCESS,
            errorMessage: MSG_DELETE_ERROR,
            onSuccess: function () {
                refreshMembersResults();
            }
        });
    }

    // Delegated event bindings (CSP-safe replacement for inline onclick/onchange).
    // The matching data-trigger attribute is set on the delete button above; using the
    // global event-delegation helper keeps the wiring working when Thymeleaf re-renders
    // the member table on filter/pagination changes.
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('click', 'members-delete-user', function (el) {
            deleteUser(el.getAttribute('data-user-id'));
        });
    }
</script>
</body>
</html>
