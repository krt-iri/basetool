<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{operations.title} + ' - ' + ${appTitle}">Operations - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
        <style th:attr="nonce=${cspNonce}">
            html, body { overflow-x: hidden; }
            /* Constrain long descriptions so the row never forces horizontal page scroll. */
            .operations-table {
                width: 100%;
                table-layout: auto;
            }
            .operations-table td.op-desc,
            .operations-table th.op-desc {
                max-width: 40ch;
                white-space: normal;
                overflow-wrap: anywhere;
            }
            .operations-table td.op-action,
            .operations-table th.op-action {
                white-space: nowrap;
                text-align: right;
            }
            .operations-table td.op-action .btn { margin-left: 0.25rem; }

            /* Smartphone: hide the description column to keep the table on screen. */
            @media (max-width: 768px) {
                .operations-table td.op-desc,
                .operations-table th.op-desc { display: none; }
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt_logo.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{operations.title}">Operations</h1>
        <p th:text="#{operations.description}">Manage and view operations.</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success mt-2" th:text="#{${successMessage}}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger mt-2" th:text="#{${errorMessage}}"></div>
    <div th:if="${error}" class="alert alert-danger mt-2" th:text="#{${error}}"></div>

    <div class="hud-box mt-2">

        <div sec:authorize="hasRole('MISSION_MANAGER')" style="display:flex; justify-content:flex-end; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
            <button type="button" class="btn" th:text="#{operation.create}" data-trigger="open-modal-display" data-modal-id="create-operation-modal">Create New</button>
        </div>

        <div class="table-responsive">
            <table th:if="${operations != null and !operations.isEmpty()}" class="operations-table">
                <thead>
                    <tr>
                        <th th:text="#{operation.name}">Name</th>
                        <th th:text="#{operation.status}">Status</th>
                        <th class="op-desc" th:text="#{operation.description}">Description</th>
                        <th class="op-action" th:text="#{general.action}">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="op : ${operations}">
                        <td th:text="${op.name}">Name</td>
                        <td th:text="#{__${'operation.status.' + #strings.toLowerCase(op.status)}__}">Status</td>
                        <td class="op-desc" th:text="${op.description}">Description</td>
                        <td class="op-action">
                            <a class="btn" th:href="@{/operations/{id}(id=${op.id})}" th:text="#{general.details}">Details</a>
                            <button sec:authorize="hasRole('ADMIN')" type="button" class="btn btn-danger" th:text="#{general.delete}"
                                    th:data-id="${op.id}"
                                    data-trigger="operations-open-delete">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${operationsPage != null}">
            <div th:replace="~{fragments/pagination :: pagination(pageResponse=${operationsPage}, baseUrl='/operations')}"></div>
        </div>

        <p th:if="${operations == null or operations.isEmpty()}" th:text="#{operation.empty}">No operations.</p>
    </div>

    <!-- Create Modal -->
    <div id="create-operation-modal" class="modal" style="display:none;">
        <div class="modal-content hud-box" style="max-width:500px;">
            <h2 th:text="#{operation.create}">Create Operation</h2>
            <form th:action="@{/operations/create}" method="post">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="create-name" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.name}">Name</label>
                    <input type="text" id="create-name" name="name" style="width: 100%;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="create-desc" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.description}">Description</label>
                    <textarea id="create-desc" name="description" style="width: 100%;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="create-status" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.status}">Status</label>
                    <select id="create-status" name="status" style="width: 100%;" required>
                        <option value="PLANNED" th:text="#{operation.status.planned}">PLANNED</option>
                        <option value="ACTIVE" th:text="#{operation.status.active}">ACTIVE</option>
                        <option value="COMPLETED" th:text="#{operation.status.completed}">COMPLETED</option>
                        <option value="CANCELED" th:text="#{operation.status.canceled}">CANCELED</option>
                    </select>
                </div>
                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn" th:text="#{general.save}">Save</button>
                    <button type="button" class="btn btn-secondary" data-trigger="close-modal-display" data-modal-id="create-operation-modal" th:text="#{general.cancel}">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-operation-modal" class="modal" style="display:none;">
        <div class="modal-content hud-box" style="max-width:500px; border-color: var(--color-danger);">
            <h2 th:text="#{general.confirm}" class="text-danger">Confirm Delete</h2>
            <p th:text="#{operation.delete.confirm}" style="margin: 1.5rem 0;">Confirm that you want to delete this operation.</p>
            <form id="delete-operation-form" th:action="@{/operations/delete}" method="post">
                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn btn-danger" th:text="#{general.delete}">Delete</button>
                    <button type="button" class="btn btn-secondary" data-trigger="close-modal-display" data-modal-id="delete-operation-modal" th:text="#{general.cancel}">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</main>
<script th:attr="nonce=${cspNonce}">
    function openDeleteModal(id) {
        var deleteForm = document.getElementById('delete-operation-form');
        deleteForm.action = window.safeSameOriginUrl('/operations/' + id + '/delete', deleteForm.action);
        document.getElementById('delete-operation-modal').style.display = 'flex';
    }

    // CSP-safe delegated binding (replaces onclick="openDeleteModal(this.getAttribute('data-id'))").
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('click', 'operations-open-delete', function (el) {
            openDeleteModal(el.getAttribute('data-id'));
        });
    }
</script>
</body>
</html>
