<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{operations.title} + ' - ' + #{app.title}">Operations - IRIDIUM Basetool</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{operations.title}">Operations</h1>
        <p th:text="#{operations.description}">Manage and view operations.</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="#{${successMessage}}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="#{${errorMessage}}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="#{${error}}"></div>

    <div class="hud-box mt-2">

        <div sec:authorize="hasRole('MISSION_MANAGER')" class="mb-1">
             <button type="button" class="btn" th:text="#{operation.create}" onclick="document.getElementById('create-operation-modal').style.display='block'">Create New</button>
        </div>

        <div class="table-responsive">
        <table th:if="${operations != null and !operations.isEmpty()}">
            <thead>
                <tr>
                    <th th:text="#{operation.name}">Name</th>
                    <th th:text="#{operation.status}">Status</th>
                    <th th:text="#{operation.description}">Description</th>
                    <th th:text="#{general.action}">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="op : ${operations}">
                    <td th:text="${op.name}">Name</td>
                    <td th:text="${op.status}">Status</td>
                    <td th:text="${op.description}">Description</td>
                    <td>
                        <a class="btn" th:href="@{/operations/{id}(id=${op.id})}" th:text="#{general.details}">Details</a>
                        <button sec:authorize="hasRole('ADMIN')" type="button" class="btn btn-danger" th:text="#{general.delete}" 
                                th:data-id="${op.id}"
                                onclick="openDeleteModal(this.getAttribute('data-id'))">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
        </div>
        
        <div th:if="${operationsPage != null}">
            <div th:replace="~{fragments/pagination :: pagination(pageResponse=${operationsPage}, baseUrl='/operations')}"></div>
        </div>
        
        <p th:if="${operations == null or operations.isEmpty()}" th:text="#{operation.empty}">No operations.</p>
    </div>

    <!-- Create Modal -->
    <div id="create-operation-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content hud-box" style="background:#141414; padding:2rem; max-width:500px; width:100%; margin: 10% auto; border: 1px solid var(--color-primary);">
            <h2 th:text="#{operation.create}">Create Operation</h2>
            <form th:action="@{/operations/create}" method="post">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="create-name" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.name}">Name</label>
                    <input type="text" id="create-name" name="name" style="width: 100%;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="create-desc" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.description}">Description</label>
                    <textarea id="create-desc" name="description" style="width: 100%;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="create-status" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.status}">Status</label>
                    <select id="create-status" name="status" style="width: 100%;" required>
                        <option value="PLANNED" th:text="#{operation.status.planned}">PLANNED</option>
                        <option value="ACTIVE" th:text="#{operation.status.active}">ACTIVE</option>
                        <option value="COMPLETED" th:text="#{operation.status.completed}">COMPLETED</option>
                        <option value="CANCELED" th:text="#{operation.status.canceled}">CANCELED</option>
                    </select>
                </div>
                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn" th:text="#{general.save}">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('create-operation-modal').style.display='none'" th:text="#{general.cancel}">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-operation-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content hud-box" style="background:#141414; padding:2rem; max-width:500px; width:100%; margin: 10% auto; border: 1px solid var(--color-primary);">
            <h2 th:text="#{operation.edit}">Edit Operation</h2>
            <form id="edit-operation-form" method="post" th:action="@{/operations/update}">
                <input type="hidden" id="edit-version" name="version">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="edit-name" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.name}">Name</label>
                    <input type="text" id="edit-name" name="name" style="width: 100%;" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="edit-desc" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.description}">Description</label>
                    <textarea id="edit-desc" name="description" style="width: 100%;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="edit-status" style="display: block; margin-bottom: 0.5rem; color: var(--color-primary); font-weight: 700;" th:text="#{operation.status}">Status</label>
                    <select id="edit-status" name="status" style="width: 100%;" required>
                        <option value="PLANNED" th:text="#{operation.status.planned}">PLANNED</option>
                        <option value="ACTIVE" th:text="#{operation.status.active}">ACTIVE</option>
                        <option value="COMPLETED" th:text="#{operation.status.completed}">COMPLETED</option>
                        <option value="CANCELED" th:text="#{operation.status.canceled}">CANCELED</option>
                    </select>
                </div>
                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn" th:text="#{general.save}">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('edit-operation-modal').style.display='none'" th:text="#{general.cancel}">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-operation-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content hud-box" style="background:#141414; padding:2rem; max-width:500px; width:100%; margin: 10% auto; border: 1px solid var(--color-danger);">
            <h2 th:text="#{general.confirm}" class="text-danger">Confirm Delete</h2>
            <p th:text="#{operation.delete.confirm}" style="margin: 1.5rem 0;">Confirm that you want to delete this operation.</p>
            <form id="delete-operation-form" th:action="@{/operations/delete}" method="post">
                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn btn-danger" th:text="#{general.delete}">Delete</button>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('delete-operation-modal').style.display='none'" th:text="#{general.cancel}">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</main>
<script th:attr="nonce=${cspNonce}">
    function openDeleteModal(id) {
        document.getElementById('delete-operation-form').action = '/operations/' + id + '/delete';
        document.getElementById('delete-operation-modal').style.display = 'flex';
    }

    function openEditModal(id, name, desc, status, version) {
        document.getElementById('edit-operation-form').action = '/operations/' + id + '/update';
        document.getElementById('edit-name').value = name;
        document.getElementById('edit-desc').value = desc !== 'null' ? desc : '';
        document.getElementById('edit-status').value = status;
        document.getElementById('edit-version').value = version;
        document.getElementById('edit-operation-modal').style.display = 'block';
    }
</script>
</body>
</html>
