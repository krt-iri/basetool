<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{operations.title} + ' - ' + ${appTitle}">Operations - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
        <style th:attr="nonce=${cspNonce}">
            html, body { overflow-x: hidden; }
            /* Constrain long descriptions so the row never forces horizontal page scroll. */
            .operations-table {
                width: 100%;
                table-layout: auto;
            }
            .operations-table td.op-desc,
            .operations-table th.op-desc {
                max-width: 40ch;
                white-space: normal;
                overflow-wrap: anywhere;
            }
            .operations-table td.op-action,
            .operations-table th.op-action {
                white-space: nowrap;
                text-align: right;
            }
            .operations-table td.op-action .btn { margin-left: 0.25rem; }

            /* Smartphone: hide the description column to keep the table on screen. */
            @media (max-width: 768px) {
                .operations-table td.op-desc,
                .operations-table th.op-desc { display: none; }
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{operations.title}">Operations</h1>
        <p th:text="#{operations.description}">Manage and view operations.</p>
    </div>

    <th:block th:replace="~{fragments/components :: alert(type='success', msgKey=${successMessage}, extraClass='mt-2')}"></th:block>
    <th:block th:replace="~{fragments/components :: alert(type='danger', msgKey=${errorMessage}, extraClass='mt-2')}"></th:block>
    <th:block th:replace="~{fragments/components :: alert(type='danger', msgKey=${error}, extraClass='mt-2')}"></th:block>

    <div class="hud-box mt-2">

        <form id="operations-filter-form" method="get" th:action="@{/operations}" class="search-form no-track">
            <div class="search-form-flex-1">
                <label for="operation-search" th:text="#{operation.search}">Search</label>
                <input type="text" id="operation-search" name="search" th:value="${search}" th:placeholder="#{operation.search.placeholder}">
            </div>

            <div class="datetime-split-group" data-datetime-filter-role="start">
                <label for="operation-start" th:text="#{operation.filter.start}">From</label>
                <input type="hidden" name="start" id="operation-start" th:value="${start}">
                <div class="datetime-split-inputs">
                    <input type="date" class="date-part" th:aria-label="#{a11y.datetime.date}">
                    <input type="time" class="time-part" th:aria-label="#{a11y.datetime.time}">
                </div>
            </div>

            <div class="datetime-split-group" data-datetime-filter-role="end" th:attr="data-validate-after='operation-start', data-error-after=#{validation.datetime.after}">
                <label for="operation-end" th:text="#{operation.filter.end}">To</label>
                <input type="hidden" name="end" id="operation-end" th:value="${end}">
                <div class="datetime-split-inputs">
                    <input type="date" class="date-part" th:aria-label="#{a11y.datetime.date}">
                    <input type="time" class="time-part" th:aria-label="#{a11y.datetime.time}">
                </div>
            </div>

            <div class="search-form-checkbox-col" sec:authorize="isAuthenticated()">
                <div class="search-form-checkbox-spacer"></div>
                <label class="search-form-checkbox-label">
                    <input type="checkbox" name="showPast" th:checked="${showPast}">
                    <span th:text="#{operation.filter.show_past}">Show Past</span>
                </label>
            </div>

            <div class="search-form-actions">
                <button type="button" id="operations-filter-reset" class="btn btn-ghost" th:text="#{general.reset}">Reset</button>
                <button sec:authorize="hasRole('MISSION_MANAGER')" type="button" class="btn btn--cta" th:text="#{operation.create}" data-trigger="open-modal-display" data-modal-id="create-operation-modal">Create New</button>
            </div>
        </form>

        <div id="operations-loading-indicator" style="display:none; text-align:center; padding: 1rem;">
            <span class="krt-loading-indicator"></span>
        </div>

        <div id="operations-results">
            <th:block th:fragment="operationsResults">
            <div class="table-responsive">
                <table th:if="${operations != null and !operations.isEmpty()}" class="operations-table">
                    <thead>
                        <tr>
                            <th th:text="#{operation.name}">Name</th>
                            <th th:text="#{operation.status}">Status</th>
                            <th class="op-desc" th:text="#{operation.description}">Description</th>
                            <th class="op-action" th:text="#{general.action}">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="op : ${operations}">
                            <td th:text="${op.name}">Name</td>
                            <td>
                                <span class="status-pill" th:classappend="${'status-' + #strings.toLowerCase(op.status)}"
                                      th:text="#{__${'operation.status.' + #strings.toLowerCase(op.status)}__}">Status</span>
                            </td>
                            <td class="op-desc" th:text="${op.description}">Description</td>
                            <td class="op-action">
                                <a class="btn btn-ghost" th:href="@{/operations/{id}(id=${op.id})}" th:text="#{general.details}">Details</a>
                                <button sec:authorize="hasRole('ADMIN')" type="button" class="btn btn-quiet-danger btn-icon" th:title="#{general.delete}" th:aria-label="#{general.delete}"
                                        th:data-id="${op.id}"
                                        data-trigger="operations-open-delete"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-trash"/></svg></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${operationsPage != null}">
                <div th:replace="~{fragments/pagination :: pagination(pageResponse=${operationsPage}, baseUrl='/operations')}"></div>
            </div>

            <p th:if="${operations == null or operations.isEmpty()}" th:text="#{operation.empty}">No operations.</p>
            </th:block>
        </div>
    </div>

    <!-- Create Modal -->
    <div id="create-operation-modal" class="modal" style="display:none;">
        <div class="modal-content hud-box" style="max-width:500px;">
            <h2 class="mt-0" th:text="#{operation.create}">Create Operation</h2>
            <form id="create-operation-form" th:action="@{/operations/create}" method="post">
                <div class="form-group">
                    <label for="create-name" class="form-label" th:text="#{operation.name}">Name</label>
                    <input type="text" id="create-name" name="name" class="w-full" required>
                </div>
                <div class="form-group">
                    <label for="create-desc" class="form-label" th:text="#{operation.description}">Description</label>
                    <textarea id="create-desc" name="description" class="w-full"></textarea>
                </div>
                <div class="form-group">
                    <label for="create-status" class="form-label" th:text="#{operation.status}">Status</label>
                    <select id="create-status" name="status" class="w-full" required>
                        <option value="PLANNED" th:text="#{operation.status.planned}">PLANNED</option>
                        <option value="ACTIVE" th:text="#{operation.status.active}">ACTIVE</option>
                        <option value="COMPLETED" th:text="#{operation.status.completed}">COMPLETED</option>
                        <option value="CANCELED" th:text="#{operation.status.canceled}">CANCELED</option>
                    </select>
                </div>
                <!-- R5.d.e owner-picker: hidden when the caller has ≤1 OrgUnit membership. -->
                <th:block th:replace="~{fragments/owner-picker :: ownerPicker(options=${ownerOptions}, name='owningOrgUnitId', selected=null, required=false)}"></th:block>
                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{general.save}">Save</span></button>
                    <button type="button" class="btn btn-ghost" data-trigger="close-modal-display" data-modal-id="create-operation-modal" th:text="#{general.cancel}">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-operation-modal" class="modal" style="display:none;">
        <div class="modal-content hud-box" style="max-width: 500px; text-align: center;">
            <h2 class="mt-0" th:text="#{general.confirm}">Confirm Delete</h2>
            <p class="mb-2" th:text="#{operation.delete.confirm}">Confirm that you want to delete this operation.</p>
            <form id="delete-operation-form" th:action="@{/operations/delete}" method="post">
                <div class="flex-center-gap">
                    <button type="button" class="btn btn-ghost" data-trigger="close-modal-display" data-modal-id="delete-operation-modal" th:text="#{general.cancel}">Cancel</button>
                    <button type="submit" class="btn btn-danger" th:text="#{general.delete}">Delete</button>
                </div>
            </form>
        </div>
    </div>
</main>
<script th:attr="nonce=${cspNonce}">
    function openDeleteModal(id) {
        var deleteForm = document.getElementById('delete-operation-form');
        deleteForm.action = window.safeSameOriginUrl('/operations/' + id + '/delete', deleteForm.action);
        document.getElementById('delete-operation-modal').style.display = 'flex';
    }

    // CSP-safe delegated binding (replaces onclick="openDeleteModal(this.getAttribute('data-id'))").
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('click', 'operations-open-delete', function (el) {
            openDeleteModal(el.getAttribute('data-id'));
        });
    }
</script>
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    // #576: create + delete an operation in place (no full-page reload). The classic POST->redirect
    // forms stay the no-JS fallback; here we intercept the submit, write via the krtFetch
    // X-Requested-With twin, then refresh the list fragment in place via window.krtOperationsReload
    // (exposed by operations.js) so the active filter query is preserved.
    /*<![CDATA[*/
    const OPS_MSG = {
        createSuccess: /*[[#{operation.create.success}]]*/ 'Operation angelegt.',
        createError: /*[[#{operation.create.error}]]*/ 'Fehler beim Anlegen.',
        deleteSuccess: /*[[#{operation.delete.success}]]*/ 'Operation geloescht.',
        deleteError: /*[[#{operation.delete.error}]]*/ 'Fehler beim Loeschen.',
        conflictTitle: /*[[#{frontend.ajax.conflict.title}]]*/ 'Konflikt',
        conflictDetail: /*[[#{frontend.ajax.conflict.detail}]]*/ 'Geaendert.',
        conflictReload: /*[[#{frontend.ajax.conflict.reload}]]*/ 'Neu laden',
        conflictDismiss: /*[[#{frontend.ajax.conflict.dismiss}]]*/ 'Schliessen',
        conflictQuestion: /*[[#{frontend.ajax.conflict.question}]]*/ 'Aktuelle Werte laden?'
    };
    /*]]>*/

    function opsConflictStrings() {
        return {
            title: OPS_MSG.conflictTitle,
            reloadDetailFallback: OPS_MSG.conflictDetail,
            reloadLabel: OPS_MSG.conflictReload,
            dismissLabel: OPS_MSG.conflictDismiss,
            reloadQuestion: OPS_MSG.conflictQuestion
        };
    }

    function closeOperationModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.style.display = 'none';
    }

    function reloadOperationsList() {
        if (typeof window.krtOperationsReload === 'function') window.krtOperationsReload();
    }

    (function () {
        if (!window.krtFetch) return; // no-JS / no-foundation: the classic POST->redirect forms run.

        const createForm = document.getElementById('create-operation-form');
        if (createForm) {
            createForm.addEventListener('submit', function (event) {
                event.preventDefault();
                const owner = createForm.querySelector('[name="owningOrgUnitId"]');
                window.krtFetch.write({
                    method: 'POST',
                    url: createForm.getAttribute('action'),
                    payload: {
                        name: createForm.querySelector('[name="name"]').value,
                        description: createForm.querySelector('[name="description"]').value,
                        status: createForm.querySelector('[name="status"]').value,
                        owningOrgUnitId: owner && owner.value ? owner.value : null
                    },
                    successMessage: OPS_MSG.createSuccess,
                    errorMessage: OPS_MSG.createError,
                    conflict: opsConflictStrings(),
                    onSuccess: function () {
                        closeOperationModal('create-operation-modal');
                        createForm.reset();
                        reloadOperationsList();
                    }
                });
            });
        }

        const deleteForm = document.getElementById('delete-operation-form');
        if (deleteForm) {
            deleteForm.addEventListener('submit', function (event) {
                event.preventDefault();
                window.krtFetch.write({
                    method: 'POST',
                    url: deleteForm.action,
                    successMessage: OPS_MSG.deleteSuccess,
                    errorMessage: OPS_MSG.deleteError,
                    conflict: opsConflictStrings(),
                    onSuccess: function () {
                        closeOperationModal('delete-operation-modal');
                        reloadOperationsList();
                    }
                });
            });
        }
    })();
</script>
<script th:src="@{/js/operations.js}" defer th:attr="nonce=${cspNonce}"></script>
</body>
</html>
