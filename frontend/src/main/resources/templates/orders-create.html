<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{orders.create.title} + ' - ' + ${appTitle}">Neuer Auftrag - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        .form-container {
            max-width: 800px;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--color-surface-input);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
        .form-group textarea {
            resize: vertical;
        }
        .material-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: flex-end;
        }
        /*
         * The item-line row is a flex container with align-items:flex-end and a
         * label-less "Entfernen" button next to label-bearing .form-group columns.
         * The global `.form-group { margin-bottom: 1.25rem }` (styles.css) overrides
         * the `.mb-0` utility on these columns (equal specificity, but `.form-group`
         * is declared later), so the columns' margin box extends 1.25rem below their
         * input. flex-end then aligns the margin boxes, dropping the zero-margin button
         * 1.25rem below the inputs. Zero the margin here (specificity 0/2/0 beats the
         * global 0/1/0) so the button's bottom edge lines up with the Anzahl field.
         */
        .item-line .form-group {
            margin-bottom: 0;
        }
        details.scmdb-import summary::-webkit-details-marker {
            display: none;
        }
        details.scmdb-import summary {
            list-style: none;
            cursor: pointer;
            color: var(--color-primary);
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            outline: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        details.scmdb-import summary::before {
            content: '▶';
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.8rem;
        }
        details.scmdb-import[open] summary::before {
            transform: rotate(90deg);
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="${editOrderId != null} ? #{orders.create.editTitle} : #{orders.create.title}">Neuer Auftrag</h1>
        <div class="flex-gap-sm" sec:authorize="isAuthenticated()">
            <a th:href="@{/orders}" class="btn btn-ghost" th:text="#{orders.detail.back}">Zurück zur Übersicht</a>
        </div>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${error}" class="hud-box hud-box-error">
            <p th:text="#{__${error}__}">Fehler</p>
        </div>
        
        <div th:if="${success}" class="hud-box hud-box-success">
            <p th:text="#{__${success}__}">Erfolg</p>
        </div>

        <div class="form-container">
            <!-- In edit mode the order kind is fixed to ITEM (only item orders are edited via this
                 page reuse), so the toggle is hidden but the item radio is pre-checked. -->
            <div class="form-group" th:style="${editOrderId != null} ? 'display:none' : ''">
                <label th:text="#{orders.create.kind}">Auftragsart</label>
                <div class="flex-gap-sm" style="display:flex; gap:1.5rem;">
                    <label style="display:flex; align-items:center; gap:0.5rem; font-weight:400;">
                        <input type="radio" name="orderModeToggle" value="material"
                               th:attr="checked=${editOrderId == null} ? 'checked' : null"
                               data-trigger="order-mode-toggle" style="width:auto;"
                               data-testid="order-mode-material" />
                        <span th:text="#{orders.create.kind.material}">Materialauftrag</span>
                    </label>
                    <label style="display:flex; align-items:center; gap:0.5rem; font-weight:400;">
                        <input type="radio" name="orderModeToggle" value="item"
                               th:attr="checked=${editOrderId != null} ? 'checked' : null"
                               data-trigger="order-mode-toggle" style="width:auto;"
                               data-testid="order-mode-item" />
                        <span th:text="#{orders.create.kind.item}">Item-Auftrag</span>
                    </label>
                </div>
            </div>

            <div id="mode-material">
            <form th:action="@{/orders/create}" method="post" th:object="${jobOrderForm}">
                <input type="hidden" th:field="*{source}" />
                
                <div th:if="${#lists.isEmpty(responsibleOptions)}" class="hud-box hud-box-error">
                    <p th:text="#{orders.create.responsible.none}">Keine bearbeitende Einheit freigeschaltet.</p>
                </div>
                <div th:replace="~{fragments/orgunit-select :: orgUnitSelect('responsibleOrgUnitId', 'responsibleOrgUnitId', ${responsibleOptions}, ${jobOrderForm.responsibleOrgUnitId}, 'orders.create.responsible', true)}"></div>
                <div th:replace="~{fragments/orgunit-select :: orgUnitSelect('requestingOrgUnitId', 'requestingOrgUnitId', ${requestingOptions}, ${jobOrderForm.requestingOrgUnitId}, 'orders.create.requesting', true)}"></div>

                <div class="form-group">
                    <label for="handle" th:text="#{orders.create.handle}">Handle Ansprechpartner</label>
                    <input type="text" id="handle" th:field="*{handle}" autocomplete="off" required>
                </div>
                
                <h3 style="color: var(--color-gray-1); font-family: var(--font-body); font-weight: 700; margin-top: 2rem; margin-bottom: 1rem;" th:text="#{orders.create.materials.title}">Materialien</h3>
                
                <details class="form-group scmdb-import" style="border: 1px dashed var(--color-primary); padding: 1rem; border-radius: var(--radius-none); margin-bottom: 2rem;">
                    <summary th:text="#{orders.create.scmdb.label}">scmdb.net Export</summary>
                    <div class="mt-1">
                        <textarea id="scmdb-import-text" rows="5" th:placeholder="#{orders.create.scmdb.placeholder}" style="width: 100%; background-color: var(--color-surface-input); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); font-family: var(--font-body); padding: 0.75rem; box-sizing: border-box; resize: vertical;"></textarea>
                        <button type="button" class="btn btn-ghost" style="margin-top: 1rem; width: 100%;" data-trigger="orders-import-scmdb" th:text="#{orders.create.scmdb.button}">Materialien extrahieren</button>
                    </div>
                </details>
                
                <div id="materials-container">
                    <div class="material-row" th:each="mat, stat : *{materials}">
                        <div class="form-group flex-2 mb-0">
                            <label th:text="#{orders.create.material}">Material</label>
                            <select th:field="*{materials[__${stat.index}__].materialId}" data-testid="order-material-select" data-role="material-select" required>
                                <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                                <option th:each="m : ${materials}" th:value="${m.id}" th:data-quantity-type="${m.quantityType}" th:text="${m.name}"></option>
                            </select>
                        </div>
                        <div class="form-group flex-1 mb-0">
                            <label>
                                <span th:text="#{orders.create.amount}">Menge</span>
                                <span data-role="amount-unit"></span>
                                <th:block th:replace="~{fragments/scu-hint :: scuHint(null, true)}"></th:block>
                            </label>
                            <input type="text" inputmode="decimal" data-scu-decimal th:field="*{materials[__${stat.index}__].amount}" data-testid="order-material-amount" data-role="material-amount" step="0.001" min="0" required>
                        </div>
                        <div class="form-group flex-1 mb-0">
                            <label th:text="#{orders.create.minQuality}">Min. Qualität</label>
                            <select th:field="*{materials[__${stat.index}__].minQuality}" th:title="#{orders.create.minQuality.hint}">
                                <option th:value="650" th:text="650">650</option>
                                <option value="" th:text="#{orders.material.minQuality.none}">Keine</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <button type="button" class="btn btn-ghost mt-1" data-trigger="orders-add-material" th:text="#{orders.create.addMaterial}">+ Material hinzufügen</button>

                <div class="form-group mt-2">
                    <label for="comment" th:text="#{orders.create.comment}">Kommentar</label>
                    <textarea id="comment" th:field="*{comment}" rows="4" maxlength="1000" th:placeholder="#{orders.create.comment.placeholder}"></textarea>
                </div>

                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn btn--cta" data-testid="order-submit"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{orders.create.save}">Speichern</span></button>
                    <a sec:authorize="isAuthenticated()" th:href="@{/orders}" class="btn btn-ghost" style="text-align:center; display:flex; align-items:center; justify-content:center;" th:text="#{orders.create.cancel}">Abbrechen</a>
                </div>
            </form>
            </div>

            <div id="mode-item" hidden>
            <form th:action="${editOrderId != null} ? @{/orders/{id}/items/update(id=${editOrderId})} : @{/orders/items}" method="post" th:object="${jobOrderItemForm}">
                <input type="hidden" th:field="*{source}" />

                <div th:if="${#lists.isEmpty(responsibleOptions)}" class="hud-box hud-box-error">
                    <p th:text="#{orders.create.responsible.none}">Keine bearbeitende Einheit freigeschaltet.</p>
                </div>
                <div th:replace="~{fragments/orgunit-select :: orgUnitSelect('item-responsibleOrgUnitId', 'responsibleOrgUnitId', ${responsibleOptions}, ${jobOrderItemForm.responsibleOrgUnitId}, 'orders.create.responsible', true)}"></div>
                <div th:replace="~{fragments/orgunit-select :: orgUnitSelect('item-requestingOrgUnitId', 'requestingOrgUnitId', ${requestingOptions}, ${jobOrderItemForm.requestingOrgUnitId}, 'orders.create.requesting', true)}"></div>

                <div class="form-group">
                    <label for="item-handle" th:text="#{orders.create.handle}">Handle Ansprechpartner</label>
                    <input type="text" id="item-handle" th:field="*{handle}" autocomplete="off" required>
                </div>

                <h3 style="color: var(--color-gray-1); font-family: var(--font-body); font-weight: 700; margin-top: 2rem; margin-bottom: 1rem;" th:text="#{orders.create.items.title}">Items</h3>

                <div th:if="${!hasOrderableItems}" class="hud-box hud-box-error">
                    <p th:text="#{orders.create.item.noItems}">Keine bestellbaren Items verfügbar.</p>
                </div>

                <div id="item-lines"></div>

                <button type="button" class="btn btn-ghost mt-1" data-trigger="orders-add-item" th:text="#{orders.create.item.add}">+ Item hinzufügen</button>

                <div class="form-group mt-2">
                    <label for="item-comment" th:text="#{orders.create.comment}">Kommentar</label>
                    <textarea id="item-comment" th:field="*{comment}" rows="4" maxlength="1000" th:placeholder="#{orders.create.comment.placeholder}"></textarea>
                </div>

                <div class="mt-2-flex-gap">
                    <button type="submit" class="btn btn--cta" data-testid="order-item-submit"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{orders.create.save}">Speichern</span></button>
                    <a sec:authorize="isAuthenticated()" th:href="@{/orders}" class="btn btn-ghost" style="text-align:center; display:flex; align-items:center; justify-content:center;" th:text="#{orders.create.cancel}">Abbrechen</a>
                </div>
            </form>
            </div>
        </div>
    </div>
    
    <!-- Template for new material options -->
    <select id="material-options-template" style="display: none;">
        <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
        <option th:each="m : ${materials}" th:value="${m.id}" th:data-quantity-type="${m.quantityType}" th:text="${m.name}"></option>
    </select>

    <!-- Template for new min-quality options (650 / Keine), cloned by addMaterialRow() -->
    <select id="minquality-options-template" style="display: none;">
        <option value="650">650</option>
        <option value="" th:text="#{orders.material.minQuality.none}">Keine</option>
    </select>

    <!-- Placeholder-only template cloned by addItemLine(); the item options themselves are fetched
         on demand from the backend (see fetchItemOptions / GET /orders/item-search), so the picker
         no longer preloads — and silently truncates past an alphabetical cap — the whole catalog. -->
    <select id="item-options-template" style="display: none;">
        <option value="" th:text="#{orders.create.item.select}">-- Item wählen --</option>
    </select>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
<script th:src="@{/js/krt-searchable-select.js}" th:attr="nonce=${cspNonce}"></script>
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    /*<![CDATA[*/
    let materialIndex = /*[[${jobOrderForm.materials.size()}]]*/ 1;

    // Unit labels + SCU hint text for the quantity-type-aware material rows below.
    const MSG_UNIT_SCU = /*[[#{material.quantity.scu}]]*/ 'SCU';
    const MSG_UNIT_PIECE = /*[[#{material.quantity.piece}]]*/ 'Stueck';
    const MSG_MATERIAL_LABEL = /*[[#{orders.create.material}]]*/ 'Material';
    const MSG_AMOUNT_LABEL = /*[[#{orders.create.amount}]]*/ 'Menge';
    const MSG_MINQUALITY_LABEL = /*[[#{orders.create.minQuality}]]*/ 'Min. Qualitaet';
    const SCU_HINT_TEXT = /*[[#{material.scu.hint}]]*/ 'Eingabe in SCU.';

    // Inline "?" SCU-hint marker for JS-built rows (the Thymeleaf fragment cannot be used here).
    // The hint text is a trusted message constant with no HTML-special characters, so it is safe
    // to inline without escaping. Starts hidden; refreshMaterialUnit() reveals it for SCU materials.
    function scuHintMarkup() {
        return '<span class="scu-hint" data-role="scu-hint" tabindex="0" role="img" aria-label="'
            + SCU_HINT_TEXT + '" style="display:none;"><span aria-hidden="true">?</span>'
            + '<span class="scu-hint__bubble" aria-hidden="true">' + SCU_HINT_TEXT + '</span></span>';
    }

    // Mirrors a material row's amount field to the selected material's quantity type: PIECE -> integer
    // step + "(Stueck)" unit and no SCU hint; SCU -> 0.001 step + "(SCU)" unit + hint. Called on
    // material change, after adding/importing a row, and once per existing row on load.
    function refreshMaterialUnit(row) {
        if (!row) {
            return;
        }
        const sel = row.querySelector('[data-role="material-select"]');
        const amountInput = row.querySelector('[data-role="material-amount"]');
        const unitSpan = row.querySelector('[data-role="amount-unit"]');
        const hint = row.querySelector('.scu-hint');
        if (!sel || !amountInput) {
            return;
        }
        const opt = sel.selectedOptions && sel.selectedOptions[0];
        const qt = opt ? opt.getAttribute('data-quantity-type') : '';
        if (qt === 'PIECE') {
            amountInput.setAttribute('step', '1');
            if (unitSpan) unitSpan.textContent = '(' + MSG_UNIT_PIECE + ')';
            if (hint) hint.style.display = 'none';
        } else if (qt === 'SCU') {
            amountInput.setAttribute('step', '0.001');
            if (unitSpan) unitSpan.textContent = '(' + MSG_UNIT_SCU + ')';
            if (hint) hint.style.display = '';
        } else {
            amountInput.setAttribute('step', '0.001');
            if (unitSpan) unitSpan.textContent = '';
            if (hint) hint.style.display = 'none';
        }
    }
    
    function importFromScmdb() {
        const text = document.getElementById('scmdb-import-text').value;
        const lines = text.split('\n');
        const materialOptions = document.getElementById('material-options-template').options;
        
        let foundAny = false;
        let unknownMaterials = [];
        
        // Regex für SCU (Spitzhacke): ⛏ Name — Menge SCU (oder ähnliche Trennzeichen)
        const scuRegex = /⛏\s*(.+?)\s*[—–\-]\s*([\d,.]+)\s*SCU/i;
        // Regex für Stück (Diamant): 💎 Name × Menge (oder ähnliche Trennzeichen)
        const pieceRegex = /💎\s*(.+?)\s*[×x*]\s*([\d,.]+)/i;
        
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            
            let match = line.match(scuRegex) || line.match(pieceRegex);
            
            if (match) {
                const materialName = match[1].trim().toLowerCase();
                // Komma zu Punkt + numerische Normalisierung, damit Werte wie
                // "2.0000" (Laranite/Titanium) oder "0.0200" (Aluminum) ohne
                // überflüssige Nachkomma-Nullen im number-Input landen.
                const amount = parseFloat(match[2].replace(',', '.'));
                if (isNaN(amount)) continue;

                // Finde materialId im Template
                let materialId = null;
                for (let i = 0; i < materialOptions.length; i++) {
                    const optionText = materialOptions[i].text.trim().toLowerCase();
                    if (optionText === materialName) {
                        materialId = materialOptions[i].value;
                        break;
                    }
                }
                
                if (materialId) {
                    const container = document.getElementById('materials-container');
                    let targetRow = null;
                    
                    // Beim ersten gefundenen Material prüfen, ob die erste Zeile leer ist
                    if (!foundAny) {
                        const rows = container.getElementsByClassName('material-row');
                        if (rows.length > 0) {
                            const firstSelect = rows[0].querySelector('select');
                            if (!firstSelect.value) {
                                targetRow = rows[0];
                            }
                        }
                    }
                    
                    if (!targetRow) {
                        addMaterialRow();
                        targetRow = container.lastElementChild;
                    }
                    
                    const select = targetRow.querySelector('select');
                    const inputs = targetRow.querySelectorAll('input[type="number"]');
                    const amountInput = inputs[0];
                    
                    select.value = materialId;
                    amountInput.value = amount;
                    refreshMaterialUnit(targetRow);
                    
                    foundAny = true;
                } else {
                    unknownMaterials.push(match[1].trim());
                }
            }
        }
        
        if (foundAny) {
            document.getElementById('scmdb-import-text').value = '';
            let successMsg = /*[[#{orders.create.scmdb.success}]]*/ 'Materialien erfolgreich extrahiert.';
            if (unknownMaterials.length > 0) {
                successMsg += ' (' + (/*[[#{orders.create.scmdb.error.some_unknown}]]*/ 'einige unbekannt') + ': ' + unknownMaterials.join(', ') + ')';
            }
            
            if (window.showFrontendSuccessToast) {
                window.showFrontendSuccessToast(successMsg);
            }
        } else {
            let errorMsg = /*[[#{orders.create.scmdb.error.no_match}]]*/ 'Keine bekannten Materialien im Export gefunden.';
            if (unknownMaterials.length > 0) {
                errorMsg = (/*[[#{orders.create.scmdb.error.not_found}]]*/ 'Folgende Materialien wurden nicht im System gefunden') + ': ' + unknownMaterials.join(', ');
            }
            
            if (window.showFrontendErrorToast) {
                window.showFrontendErrorToast(errorMsg);
            }
        }
    }
    
    function addMaterialRow() {
        const container = document.getElementById('materials-container');
        
        const row = document.createElement('div');
        row.className = 'material-row';
        
        const options = document.getElementById('material-options-template').innerHTML;
        const minQualityOptions = document.getElementById('minquality-options-template').innerHTML;

        row.innerHTML = `
            <div class="form-group flex-2 mb-0">
                <label>${MSG_MATERIAL_LABEL}</label>
                <select name="materials[${materialIndex}].materialId" data-role="material-select" required>${options}</select>
            </div>
            <div class="form-group flex-1 mb-0">
                <label>${MSG_AMOUNT_LABEL} <span data-role="amount-unit"></span>${scuHintMarkup()}</label>
                <input type="text" inputmode="decimal" data-scu-decimal name="materials[${materialIndex}].amount" value="" data-role="material-amount" step="0.001" min="0" required>
            </div>
            <div class="form-group flex-1 mb-0">
                <label>${MSG_MINQUALITY_LABEL}</label>
                <select name="materials[${materialIndex}].minQuality">${minQualityOptions}</select>
            </div>
        `;
        
        container.appendChild(row);
        refreshMaterialUnit(row);
        materialIndex++;
    }

    // ── Item-order editor ────────────────────────────────────────────────
    const ITEM_I18N = {
        item: /*[[#{orders.create.item}]]*/ 'Item',
        blueprint: /*[[#{orders.create.item.blueprint}]]*/ 'Bauplan',
        amount: /*[[#{orders.create.item.amount}]]*/ 'Anzahl',
        remove: /*[[#{orders.create.item.remove}]]*/ 'Entfernen',
        materialsTitle: /*[[#{orders.create.item.materials.title}]]*/ 'Materialien',
        qualityGood: /*[[#{orders.create.item.quality.good}]]*/ 'Gut (650+)',
        qualityNone: /*[[#{orders.create.item.quality.none}]]*/ 'Keine',
        subTitle: /*[[#{orders.create.item.subassembly.title}]]*/ 'Unterbaugruppen',
        subAdopt: /*[[#{orders.create.item.subassembly.adopt}]]*/ 'Uebernehmen',
        unresolved: /*[[#{orders.create.item.unresolved}]]*/ 'Nicht aufgeloeste Zutaten:',
        searchPlaceholder: /*[[#{orders.create.item.search.placeholder}]]*/ 'Item suchen oder waehlen...',
        searchNoResults: /*[[#{orders.create.item.search.noResults}]]*/ 'Keine passenden Items',
        searchHint: /*[[#{orders.create.item.search.hint}]]*/ 'Weiter tippen, um die Liste einzugrenzen...',
        searchInvalid: /*[[#{orders.create.item.search.invalid}]]*/ 'Bitte ein Item aus der Liste waehlen.',
        searchLoading: /*[[#{orders.create.item.search.loading}]]*/ 'Suche laeuft...'
    };
    let itemLineIndex = 0;
    // Edit mode (item-order edit): the existing lines, injected server-side. Null on the create page.
    const EDIT_ITEMS = /*[[${editItems}]]*/ null;

    // Live-searches the orderable-item catalog on the backend (the combobox debounces the calls) and
    // maps the result to the combobox's {value, label} option shape. Returns [] on any failure so the
    // picker degrades to "no matches" instead of throwing.
    function fetchItemOptions(query) {
        return fetch('/orders/item-search?q=' + encodeURIComponent(query || ''), {headers: {'Accept': 'application/json'}})
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (list) {
                return (list || []).map(function (gi) { return {value: gi.id, label: gi.name}; });
            })
            .catch(function () { return []; });
    }

    function escapeName(s) {
        if (window.escapeHtml) { return window.escapeHtml(String(s)); }
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function setFormDisabled(containerId, disabled) {
        const c = document.getElementById(containerId);
        if (!c) return;
        c.querySelectorAll('input, select, textarea, button').forEach(el => { el.disabled = disabled; });
    }

    function toggleOrderMode() {
        const checked = document.querySelector('input[name="orderModeToggle"]:checked');
        const mode = checked ? checked.value : 'material';
        document.getElementById('mode-material').hidden = (mode !== 'material');
        document.getElementById('mode-item').hidden = (mode !== 'item');
        // Disable the hidden form's controls so their `required` fields never block the visible
        // form's submit (disabled controls are also omitted from the POST body).
        setFormDisabled('mode-material', mode !== 'material');
        setFormDisabled('mode-item', mode !== 'item');
    }

    function addItemLine(prefill) {
        prefill = prefill || {};
        const idx = itemLineIndex++;
        const container = document.getElementById('item-lines');
        if (!container) return null;
        const row = document.createElement('div');
        row.className = 'item-line';
        row.dataset.lineIndex = idx;
        row.style.cssText = 'border:1px solid var(--color-gray-3); padding:1rem; margin-bottom:1rem;';
        const options = document.getElementById('item-options-template').innerHTML;
        row.innerHTML = `
            <input type="hidden" name="items[${idx}].clientLineId" value="${idx}">
            <input type="hidden" name="items[${idx}].parentClientLineId" value="${prefill.parentId != null ? prefill.parentId : ''}">
            <div style="display:flex; gap:1rem; align-items:flex-end;">
                <div class="form-group flex-2 mb-0">
                    <label>${ITEM_I18N.item}</label>
                    <select name="items[${idx}].gameItemId" data-role="item-select" data-testid="order-item-combobox" required>${options}</select>
                </div>
                <div class="form-group flex-1 mb-0" data-role="blueprint-wrap" hidden>
                    <label>${ITEM_I18N.blueprint}</label>
                    <select name="items[${idx}].blueprintId" data-role="blueprint-select"></select>
                </div>
                <div class="form-group flex-1 mb-0">
                    <label>${ITEM_I18N.amount}</label>
                    <input type="number" step="1" name="items[${idx}].amount" data-role="amount" min="1" value="${prefill.amount || 1}" required>
                </div>
                <button type="button" class="btn btn-quiet-danger mb-0" data-trigger="orders-remove-item" style="white-space:nowrap;">${ITEM_I18N.remove}</button>
            </div>
            <div data-role="derived" style="margin-top:0.75rem;"></div>
            <div data-role="unresolved" class="hud-box hud-box-error" style="margin-top:0.5rem; display:none;"></div>
            <div data-role="subassemblies" style="margin-top:0.5rem;"></div>
        `;
        container.appendChild(row);
        // Seed the chosen item as a selected <option> BEFORE enhancing, so the combobox shows its
        // label even though the option list is now fetched on demand rather than preloaded. Built via
        // the DOM so the backend-supplied name is never parsed as HTML. Then upgrade into a
        // searchable, backend-backed dropdown; if the enhancer failed to load, the plain <select>
        // with the seeded option keeps working as a fallback.
        const itemSelect = row.querySelector('select[data-role="item-select"]');
        if (itemSelect && prefill.gameItemId) {
            const seeded = document.createElement('option');
            seeded.value = prefill.gameItemId;
            seeded.textContent = prefill.gameItemName || prefill.gameItemId;
            seeded.selected = true;
            itemSelect.appendChild(seeded);
            itemSelect.value = prefill.gameItemId;
        }
        if (itemSelect && window.krtSearchableSelect) {
            window.krtSearchableSelect(itemSelect, {
                placeholder: ITEM_I18N.searchPlaceholder,
                noResultsText: ITEM_I18N.searchNoResults,
                hintText: ITEM_I18N.searchHint,
                invalidText: ITEM_I18N.searchInvalid,
                loadingText: ITEM_I18N.searchLoading,
                remoteSource: fetchItemOptions
            });
        }
        if (prefill.gameItemId) {
            // In edit mode, thread the stored blueprint + per-material qualities through the async
            // load so the line restores exactly as ordered. After enhancement the value lives on
            // the combobox's hidden input, which still carries data-role="item-select".
            loadBlueprints(row, prefill.blueprintId, prefill.qualities);
        }
        return row;
    }

    function clearDerived(row) {
        row.querySelector('[data-role="derived"]').innerHTML = '';
        const u = row.querySelector('[data-role="unresolved"]');
        u.style.display = 'none';
        u.innerHTML = '';
        row.querySelector('[data-role="subassemblies"]').innerHTML = '';
    }

    function loadBlueprints(row, preselectBpId, qualities) {
        const gameItemId = row.querySelector('[data-role="item-select"]').value;
        const wrap = row.querySelector('[data-role="blueprint-wrap"]');
        const bpSelect = row.querySelector('[data-role="blueprint-select"]');
        clearDerived(row);
        if (!gameItemId) { wrap.hidden = true; bpSelect.innerHTML = ''; return; }
        fetch('/orders/item-blueprints/' + encodeURIComponent(gameItemId), {headers: {'Accept': 'application/json'}})
            .then(r => r.ok ? r.json() : [])
            .then(list => {
                list = list || [];
                bpSelect.innerHTML = list.map(b => `<option value="${b.id}">${escapeName(b.outputName || b.scwikiKey || b.id)}</option>`).join('');
                wrap.hidden = list.length <= 1;
                if (list.length > 0) {
                    // Restore the previously-chosen blueprint in edit mode if it is still offered.
                    const pick = (preselectBpId && list.some(b => b.id === preselectBpId)) ? preselectBpId : list[0].id;
                    bpSelect.value = pick;
                    loadDerivation(row, qualities);
                }
            })
            .catch(() => { wrap.hidden = true; });
    }

    function loadDerivation(row, qualities) {
        const blueprintId = row.querySelector('[data-role="blueprint-select"]').value;
        const amount = parseInt(row.querySelector('[data-role="amount"]').value, 10) || 1;
        if (!blueprintId) { clearDerived(row); return; }
        const idx = row.dataset.lineIndex;
        const derived = row.querySelector('[data-role="derived"]');
        const unresolved = row.querySelector('[data-role="unresolved"]');
        const subs = row.querySelector('[data-role="subassemblies"]');
        fetch('/orders/item-derivation/' + encodeURIComponent(blueprintId) + '?amount=' + amount, {headers: {'Accept': 'application/json'}})
            .then(r => r.ok ? r.json() : null)
            .then(d => {
                if (!d) { clearDerived(row); return; }
                let html = `<strong style="color:var(--color-gray-1);">${ITEM_I18N.materialsTitle}</strong>`;
                (d.materials || []).forEach((m, mi) => {
                    const mat = m.material || {};
                    const unit = (mat.quantityType === 'PIECE') ? 'Stk' : 'SCU';
                    const qty = (mat.quantityType === 'PIECE') ? Math.round(m.requiredQuantity || 0) : Number((m.requiredQuantity || 0).toFixed(3));
                    // Edit mode: restore the stored quality for this material; else blueprint default.
                    const storedQ = (qualities && mat.id && qualities[mat.id]) ? qualities[mat.id] : m.defaultQuality;
                    const goodSel = (storedQ === 'GOOD') ? ' selected' : '';
                    const noneSel = (storedQ !== 'GOOD') ? ' selected' : '';
                    html += `
                        <div style="display:flex; gap:1rem; align-items:center; margin-top:0.4rem;">
                            <input type="hidden" name="items[${idx}].materials[${mi}].materialId" value="${mat.id}">
                            <span style="flex:2;">${escapeName(mat.name || '')}</span>
                            <span style="flex:1;">${qty} ${unit}</span>
                            <select name="items[${idx}].materials[${mi}].quality" style="flex:1;">
                                <option value="GOOD"${goodSel}>${ITEM_I18N.qualityGood}</option>
                                <option value="NONE"${noneSel}>${ITEM_I18N.qualityNone}</option>
                            </select>
                        </div>`;
                });
                derived.innerHTML = (d.materials || []).length ? html : '';
                if ((d.unresolvedIngredients || []).length) {
                    unresolved.style.display = 'block';
                    unresolved.innerHTML = `<p>${ITEM_I18N.unresolved} ${d.unresolvedIngredients.map(escapeName).join(', ')}</p>`;
                } else {
                    unresolved.style.display = 'none';
                    unresolved.innerHTML = '';
                }
                if ((d.subAssemblies || []).length) {
                    let s = `<strong style="color:var(--color-gray-1);">${ITEM_I18N.subTitle}</strong>`;
                    d.subAssemblies.forEach(sa => {
                        const gi = sa.gameItem || {};
                        s += `<div style="display:flex; gap:1rem; align-items:center; margin-top:0.4rem;">
                            <span style="flex:2;">${escapeName(gi.name || '')} &times; ${sa.quantity}</span>
                            <button type="button" class="btn btn-ghost mb-0" data-trigger="orders-adopt-sub" data-game-item-id="${gi.id}" data-game-item-name="${escapeName(gi.name || '')}" data-amount="${sa.quantity}" data-parent="${idx}">${ITEM_I18N.subAdopt}</button>
                        </div>`;
                    });
                    subs.innerHTML = s;
                } else {
                    subs.innerHTML = '';
                }
            })
            .catch(() => clearDerived(row));
    }

    const itemLinesContainer = document.getElementById('item-lines');
    if (itemLinesContainer) {
        itemLinesContainer.addEventListener('change', e => {
            const row = e.target.closest('.item-line');
            if (!row) return;
            if (e.target.matches('[data-role="item-select"]')) { loadBlueprints(row); }
            else if (e.target.matches('[data-role="blueprint-select"]')) { loadDerivation(row); }
            else if (e.target.matches('[data-role="amount"]')) { loadDerivation(row); }
        });
        itemLinesContainer.addEventListener('click', e => {
            const removeBtn = e.target.closest('[data-trigger="orders-remove-item"]');
            if (removeBtn) { const row = removeBtn.closest('.item-line'); if (row) { row.remove(); } return; }
            const adoptBtn = e.target.closest('[data-trigger="orders-adopt-sub"]');
            if (adoptBtn) {
                addItemLine({gameItemId: adoptBtn.dataset.gameItemId, gameItemName: adoptBtn.dataset.gameItemName, amount: parseInt(adoptBtn.dataset.amount, 10) || 1, parentId: adoptBtn.dataset.parent});
            }
        });
        // Edit mode: rebuild the existing lines from the injected prefill; otherwise start with one
        // empty line.
        if (Array.isArray(EDIT_ITEMS) && EDIT_ITEMS.length) {
            EDIT_ITEMS.forEach(line => addItemLine(line));
        } else {
            addItemLine();
        }
    }
    document.querySelectorAll('input[name="orderModeToggle"]').forEach(r => r.addEventListener('change', toggleOrderMode));
    toggleOrderMode();

    // Quantity-type-aware material rows: react to material changes and sync the rows present on load.
    const materialsContainerEl = document.getElementById('materials-container');
    if (materialsContainerEl) {
        materialsContainerEl.addEventListener('change', e => {
            if (e.target && e.target.matches && e.target.matches('[data-role="material-select"]')) {
                refreshMaterialUnit(e.target.closest('.material-row'));
            }
        });
        materialsContainerEl.querySelectorAll('.material-row').forEach(refreshMaterialUnit);
    }

    // CSP-safe delegated bindings (replaces onclick="importFromScmdb()" and
    // onclick="addMaterialRow()" inline handlers).
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('click', 'orders-import-scmdb', importFromScmdb);
        window.krtEvents.on('click', 'orders-add-material', addMaterialRow);
        window.krtEvents.on('click', 'orders-add-item', () => addItemLine());
    }

    // In-place create submit (#575): a create/edit navigates away on success, so intercept the form,
    // POST it via FormData (the browser serializes the dynamic material/item editor AND omits the
    // disabled inactive-form controls, exactly like the native POST) and navigate to the JSON
    // targetUrl. On a validation/backend failure the page STAYS with an inline toast instead of the
    // POST->redirect reflash. The classic form-POST is the no-JS fallback (krtCsrf absent).
    const MSG_MATERIAL_INVALID = '[(#{error.joborder.material.invalid})]';
    const MSG_ITEM_INVALID = '[(#{error.joborder.item.invalid})]';
    const MSG_CREATE_FAILED = '[(#{error.joborder.create.failed})]';
    const MSG_UPDATE_FAILED = '[(#{error.joborder.update.failed})]';
    async function _submitOrderCreate(form, invalidMessage, failedMessage, submitter) {
        if (!window.krtCsrf) { form.submit(); return; }
        // Double-submit guard: disable the triggering button for the whole round-trip (re-enabled in
        // the finally so a failed create can be retried; the success path navigates away).
        if (submitter) { submitter.disabled = true; }
        try {
        const fd = new FormData(form);
        function buildHeaders() {
            const h = { 'X-Requested-With': 'XMLHttpRequest' };
            const t = window.krtCsrf.token();
            const n = window.krtCsrf.headerName();
            if (t && n) h[n] = t;
            return h;
        }
        let res;
        try {
            res = await fetch(form.action, { method: 'POST', body: fd, headers: buildHeaders() });
            if (res.status === 403 && window.krtCsrf.refresh) {
                const refreshed = await window.krtCsrf.refresh();
                if (refreshed) res = await fetch(form.action, { method: 'POST', body: fd, headers: buildHeaders() });
            }
        } catch (e) {
            showFrontendErrorToast(failedMessage);
            return;
        }
        if (res.status === 400) { showFrontendErrorToast(invalidMessage); return; }
        if (!res.ok) { showFrontendErrorToast(failedMessage); return; }
        let body = null;
        try { body = await res.json(); } catch (e) { /* non-JSON body */ }
        if (body && body.targetUrl) {
            window.location.assign(body.targetUrl);
        } else {
            window.location.reload();
        }
        } finally {
            if (submitter) { submitter.disabled = false; }
        }
    }
    const _materialCreateForm = document.querySelector('#mode-material form');
    if (_materialCreateForm) {
        _materialCreateForm.addEventListener('submit', (e) => {
            e.preventDefault();
            _submitOrderCreate(_materialCreateForm, MSG_MATERIAL_INVALID, MSG_CREATE_FAILED, e.submitter);
        });
    }
    const _itemCreateForm = document.querySelector('#mode-item form');
    if (_itemCreateForm) {
        _itemCreateForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const failed = _itemCreateForm.getAttribute('action').indexOf('/items/update') >= 0
                ? MSG_UPDATE_FAILED : MSG_CREATE_FAILED;
            _submitOrderCreate(_itemCreateForm, MSG_ITEM_INVALID, failed, e.submitter);
        });
    }
    /*]]>*/
</script>
