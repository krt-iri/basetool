<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{orders.detail.title} + ' - ' + #{app.title}">Auftrag Details - IRIDIUM Basetool</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box" style="display: flex; justify-content: space-between; align-items: center;">
        <h1 th:text="#{orders.detail.title}">Auftrag Details</h1>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <a th:href="@{/orders}" class="btn btn-secondary" th:text="#{orders.detail.back}">Zurück zur Übersicht</a>
            <form sec:authorize="hasRole('ADMIN')" th:action="@{/orders/{id}/delete(id=${order.id})}" method="post" style="margin: 0;">
                <button type="submit" class="btn btn-secondary" th:text="#{orders.detail.delete}">Löschen</button>
            </form>
        </div>
    </div>

    <div class="hud-box" style="margin-top: 2rem;">
        <div style="margin-bottom: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; align-items: start;">
            <div>
                <strong th:text="#{orders.index.id}">ID</strong><br>
                <span th:text="'#' + ${order.displayId}"></span>
            </div>
            <div>
                <strong th:text="#{orders.detail.createdAt}">Erstellt am</strong><br>
                <span id="created-date-span" th:data-utc="${order.createdAt}"></span>
            </div>
            <div>
                <strong th:text="#{orders.detail.elapsedDays}">Vergangene Tage</strong><br>
                <span id="elapsed-days-container">
                    <span id="elapsed-days-span" th:data-utc="${order.createdAt}"></span> <span th:text="#{orders.detail.days}">Tage</span>
                </span>
            </div>
            <div>
                <strong th:text="#{orders.detail.priority}">Priorität</strong><br>
                <span th:text="${order.priority != null ? order.priority : '-'}"></span>
            </div>
            <div>
                <strong th:text="#{orders.detail.squadron}">Staffel</strong><br>
                <span th:text="${order.squadron}"></span>
            </div>
            <div>
                <strong th:text="#{orders.detail.handle}">Handle</strong><br>
                <span th:text="${order.handle}"></span>
            </div>
            <div>
                <strong th:text="#{orders.index.status}">Status</strong><br>
                <!-- DEBUG: Authorities: [[${#authentication.authorities}]] -->
                <div style="margin-top: 0.25rem;">
                    <span th:text="#{__${'status.' + order.status}__}" th:class="'status-badge status-' + ${#strings.toLowerCase(order.status)}"></span>
                </div>
                <div sec:authorize="hasRole('LOGISTICIAN')" style="margin-top: 0.75rem;">
                    <!-- DEBUG: LOGISTICIAN check passed -->
                    <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post" style="display: inline-flex; align-items: center; gap: 0.5rem; margin: 0; flex-wrap: wrap;">
                        <select name="status" style="background: var(--color-gray-4); color: white; border: 1px solid var(--color-gray-3); padding: 0.25rem;">
                            <option value="OPEN" th:selected="${order.status == 'OPEN'}" th:text="#{status.OPEN}">Offen</option>
                            <option value="IN_PROGRESS" th:selected="${order.status == 'IN_PROGRESS'}" th:text="#{status.IN_PROGRESS}">In Bearbeitung</option>
                            <option value="REJECTED" th:selected="${order.status == 'REJECTED'}" th:text="#{status.REJECTED}">Abgelehnt</option>
                            <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}" th:text="#{status.COMPLETED}">Abgeschlossen</option>
                        </select>
                        <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" th:text="#{orders.detail.status.update}">Update</button>
                    </form>
                </div>
            </div>
        </div>
        
        <h3 style="color: var(--color-primary); font-family: 'Lato', sans-serif; font-weight: 700; margin-bottom: 1rem;" th:text="#{orders.detail.materials.title}">Benötigte Materialien</h3>
        <div class="table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th th:text="#{orders.material.name}">Material</th>
                <th th:text="#{orders.material.minQuality}">Min. Qualität</th>
                <th th:text="#{orders.detail.amount}">Benötigt</th>
                <th th:text="#{orders.detail.stock}">Im Lager</th>
                <th th:text="#{orders.detail.status}">Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="mat : ${order.materials}">
                <td th:text="${mat.material.name}"></td>
                <td th:text="${mat.minQuality}"></td>
                <td th:text="${mat.amount != null ? #numbers.formatDecimal(mat.amount, 1, 3) : '0.000'}"></td>
                <td th:text="${mat.currentStock != null ? #numbers.formatDecimal(mat.currentStock, 1, 3) : '0.000'}"></td>
                <td>
                    <span th:if="${mat.currentStock >= mat.amount}" style="color: #2ecc71;" th:text="'✓ ' + #{orders.detail.status.fulfilled}">✓ Erfüllt</span>
                    <span th:if="${mat.currentStock < mat.amount}" style="color: #e74c3c;" th:text="'✗ ' + #{orders.detail.status.missing}">✗ Fehlend</span>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
        
        <h3 style="color: var(--color-primary); font-family: 'Lato', sans-serif; font-weight: 700; margin-bottom: 1rem; margin-top: 2rem;" th:text="#{orders.detail.assignees.title}">Bearbeiter</h3>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <ul style="list-style-type: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 1rem;">
                <li th:each="user : ${order.assignees}" style="background-color: var(--color-gray-4); padding: 0.5rem 1rem; border: 1px solid var(--color-gray-3); border-radius: 4px; display: flex; align-items: center; gap: 1rem;">
                    <span th:text="${user.effectiveName}"></span>
                    
                    <form th:if="${currentUserId != null and currentUserId.equals(user.id)} or ${#authorization.expression('hasAnyRole(''ADMIN'', ''OFFICER'')')}"
                          th:action="@{/orders/{id}/assignees/remove(id=${order.id})}" method="post" style="margin: 0;">
                        <input type="hidden" name="userId" th:value="${user.id}">
                        <button type="submit" class="btn btn-secondary" style="padding: 0.1rem 0.5rem; font-size: 0.8rem; background-color: rgba(231,76,60,0.1); border-color: #e74c3c; color: #e74c3c;">&times;</button>
                    </form>
                </li>
                <li th:if="${order.assignees == null or order.assignees.isEmpty()}" style="color: var(--color-gray-2); padding: 0.5rem 0;" th:text="#{orders.detail.assignees.empty}">
                    Bisher arbeitet niemand an diesem Auftrag.
                </li>
            </ul>

            <div style="display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem; flex-wrap: wrap;">
                <form th:if="${currentUserId != null and (order.assignees == null or !#lists.contains(order.assignees.![id], currentUserId))}"
                      th:action="@{/orders/{id}/assignees(id=${order.id})}" method="post" style="margin: 0;">
                    <input type="hidden" name="userId" th:value="${currentUserId}">
                    <button type="submit" class="btn" th:text="#{orders.detail.assignees.addMe}">Mich eintragen</button>
                </form>

                <form sec:authorize="hasRole('LOGISTICIAN')" th:if="${users != null and !users.isEmpty()}"
                      th:action="@{/orders/{id}/assignees(id=${order.id})}" method="post" style="margin: 0; display: flex; gap: 0.5rem; align-items: center;">
                    <select name="userId" style="padding: 0.5rem; background-color: var(--color-gray-4); border: 1px solid var(--color-gray-3); color: var(--color-gray-1);" required>
                        <option value="" disabled selected th:text="#{orders.detail.assignees.selectUser}">-- Nutzer wählen --</option>
                        <th:block th:each="u : ${users}">
                            <option th:if="${order.assignees == null or !#lists.contains(order.assignees.![id], u.id)}" th:value="${u.id}" th:text="${u.effectiveName}"></option>
                        </th:block>
                    </select>
                    <button type="submit" class="btn btn-secondary" th:text="#{orders.detail.assignees.addUser}">Hinzufügen</button>
                </form>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        const dateSpan = document.getElementById('created-date-span');
        const daysSpan = document.getElementById('elapsed-days-span');
        const daysContainer = document.getElementById('elapsed-days-container');
        const yellowDays = /*[[${ageYellowDays}]]*/ 30;
        const redDays = /*[[${ageRedDays}]]*/ 90;
        
        if (dateSpan && daysSpan) {
            const utcDateStr = dateSpan.getAttribute('data-utc');
            if (utcDateStr) {
                const date = new Date(utcDateStr);
                if (!isNaN(date)) {
                    dateSpan.textContent = date.toLocaleDateString();
                    const now = new Date();
                    const diffTime = now.getTime() - date.getTime();
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    daysSpan.textContent = diffDays > 0 ? diffDays : 0;
                    
                    const targetEl = daysContainer || daysSpan;
                    if (diffDays >= redDays) {
                        targetEl.style.color = '#e74c3c'; // red
                    } else if (diffDays >= yellowDays) {
                        targetEl.style.color = '#f1c40f'; // yellow
                    }
                }
            }
        }
    });
</script>
</body>
</html>
