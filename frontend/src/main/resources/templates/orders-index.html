<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{nav.orders}">Aufträge</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{nav.orders}">Aufträge</h1>
        <a th:href="@{/orders/create(source='index')}" class="btn btn--cta">Neuer Auftrag</a>
    </div>

    <div class="hud-box mt-2">
        <form id="orders-filter-form" class="no-track" method="get" th:action="@{/orders}" style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap;">
            <span th:text="#{orders.index.filter.status}" style="font-weight: 700; font-size: 0.8rem; color: var(--color-gray-1);">Status:</span>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="OPEN" th:checked="${selectedStatuses != null and selectedStatuses.contains('OPEN')}">
                <span th:text="#{status.OPEN}">Offen</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="IN_PROGRESS" th:checked="${selectedStatuses != null and selectedStatuses.contains('IN_PROGRESS')}">
                <span th:text="#{status.IN_PROGRESS}">In Bearbeitung</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="REJECTED" th:checked="${selectedStatuses != null and selectedStatuses.contains('REJECTED')}">
                <span th:text="#{status.REJECTED}">Abgelehnt</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="COMPLETED" th:checked="${selectedStatuses != null and selectedStatuses.contains('COMPLETED')}">
                <span th:text="#{status.COMPLETED}">Abgeschlossen</span>
            </label>
            <!-- Squadron scope toggle (MULTI_SQUADRON_PLAN.md §5.3): default "mine" (matches
                 creating OR requesting = active squadron); flip to "all" for the cross-staffel
                 union. Collapses silently to "all" for users with no active squadron context
                 (admins in "all squadrons" mode) — the backend filter is a display preference,
                 not an access-control gate. -->
            <span th:text="#{orders.index.filter.scope}" style="font-weight: 700; font-size: 0.8rem; color: var(--color-gray-1); margin-left: 1rem;">Staffel:</span>
            <label class="flex-gap-2xs">
                <input type="radio" name="scope" value="mine" th:checked="${selectedScope == null or selectedScope == 'mine'}">
                <span th:text="#{orders.index.filter.scope.mine}">Eigene Staffel</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="radio" name="scope" value="all" th:checked="${selectedScope == 'all'}">
                <span th:text="#{orders.index.filter.scope.all}">Alle Staffeln</span>
            </label>
            <button type="submit" class="btn btn-ghost" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;" th:text="#{orders.index.filter.apply}">Filtern</button>
        </form>

        <div th:if="${error}" class="hud-box hud-box-error">
            <p th:text="#{__${error}__}">Fehler</p>
        </div>
        
        <div th:if="${success}" class="hud-box hud-box-success">
            <p th:text="#{__${success}__}">Erfolg</p>
        </div>

        <div id="orders-results">
        <th:block th:fragment="ordersResults">
        <div class="table-responsive">
        <table class="data-table">
            <colgroup>
                <col class="w-1">
                <col class="w-1">
                <col class="w-1">
                <col class="w-full">
                <col class="w-1">
            </colgroup>
            <thead>
            <tr>
                <th th:text="#{orders.index.id}" class="nowrap">ID</th>
                <th class="nowrap"><span th:text="#{orders.index.prio}">Prio</span> / <span th:text="#{orders.index.status}">Status</span></th>
                <th th:text="#{orders.index.requesting}" class="nowrap">Auftraggeber</th>
                <th th:text="#{orders.index.materials}">Materialien</th>
                <th th:text="#{orders.index.actions}" class="nowrap">Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order, stat : ${orders}" data-testid="order-row"
                th:attr="data-id=${order.id}, data-priority=${order.priority}"
                th:classappend="${#authorization.expression('hasRole(''LOGISTICIAN'')') and order.priority != null} ? 'draggable-row' : ''"
                th:draggable="${#authorization.expression('hasRole(''LOGISTICIAN'')') and order.priority != null} ? 'true' : 'false'">
                <td class="nowrap">
                    <span class="order-id-display" th:data-utc="${order.createdAt}" th:text="'#' + ${order.displayId}"></span>
                    <br>
                    <span th:switch="${order.type}">
                        <span th:case="'ITEM'" class="order-kind-badge order-kind-item" th:text="#{orders.kind.item}">Item</span>
                        <span th:case="*" class="order-kind-badge order-kind-material" th:text="#{orders.kind.material}">Material</span>
                    </span>
                </td>
                <td class="nowrap">
                    <span sec:authorize="hasRole('LOGISTICIAN')" th:if="${order.priority != null}" style="cursor: grab; margin-right: 0.5rem; color: var(--color-primary);" title="Drag & Drop zum Ändern der Priorität">☰</span>
                    <span th:text="${order.priority != null ? order.priority : '-'}"></span>
                    <br>
                    <span th:text="#{__${'status.' + order.status}__}" th:class="'status-badge status-' + ${#strings.toLowerCase(order.status)}"></span>
                </td>
                <td class="nowrap">
                    <span th:if="${order.requestingOrgUnit != null}" class="squadron-badge"
                          th:title="${order.requestingOrgUnit.name()}"
                          th:text="${order.requestingOrgUnit.shorthand()}">IRI</span>
                    <span th:if="${order.requestingOrgUnit == null}" class="squadron-badge squadron-badge-muted">—</span>
                    <br>
                    <span th:text="${order.handle}"></span>
                </td>
                <td class="p-0">
                    <!-- MATERIAL orders: the material-requirement summary with per-material stock
                         progress. ITEM orders show their ordered items with delivery progress
                         instead, keeping the column visually parallel between the two kinds. -->
                    <div th:if="${order.type != 'ITEM'}" class="table-responsive">
                    <table class="data-table" style="margin: 0; background: transparent; border: none; box-shadow: none; width: 100%;">
                        <colgroup>
                            <col class="w-full">
                            <col class="w-1">
                            <col class="w-1">
                        </colgroup>
                        <thead>
                            <tr>
                                <th th:text="#{orders.material.name}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Material</th>
                                <th th:text="#{orders.material.amount}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Gefordert</th>
                                <th th:text="#{orders.material.progress}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Fortschritt</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="mat : ${order.materials}">
                                <td th:text="${mat.material.name}" th:title="${mat.material.name}" style="border-bottom: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 1px;"></td>
                                <td style="border-bottom: none; white-space: nowrap;" th:switch="${mat.material.quantityType}">
                                    <span th:case="'PIECE'" th:text="|${mat.amount != null ? #numbers.formatInteger(mat.amount, 1) : '0'} #{material.quantity.piece}|"></span>
                                    <span th:case="*" th:text="|${mat.amount != null ? #numbers.formatDecimal(mat.amount, 1, 'NONE', 3, 'DEFAULT') : '0.000'} #{material.quantity.scu}|"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(mat.amount > 0 ? (mat.currentStock >= mat.amount ? 100.0 : (mat.currentStock * 100.0 / mat.amount)) : 0, 1, 0)} + ' %'" style="border-bottom: none; white-space: nowrap;"></td>
                            </tr>
                        </tbody>
                    </table>
                    </div>
                    <div th:if="${order.type == 'ITEM'}" class="table-responsive">
                    <table class="data-table" style="margin: 0; background: transparent; border: none; box-shadow: none; width: 100%;">
                        <colgroup>
                            <col class="w-full">
                            <col class="w-1">
                            <col class="w-1">
                        </colgroup>
                        <thead>
                            <tr>
                                <th th:text="#{orders.detail.item.name}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Item</th>
                                <th th:text="#{orders.detail.item.amount}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Anzahl</th>
                                <th th:text="#{orders.material.progress}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Fortschritt</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.gameItem != null ? item.gameItem.name() : '-'}" th:title="${item.gameItem != null ? item.gameItem.name() : '-'}" style="border-bottom: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 1px;"></td>
                                <td th:text="${item.amount != null ? #numbers.formatInteger(item.amount, 1) : '0'}" style="border-bottom: none; white-space: nowrap;"></td>
                                <td th:text="${#numbers.formatDecimal((item.amount != null and item.amount > 0) ? ((item.deliveredAmount != null ? item.deliveredAmount : 0) * 100.0 / item.amount) : 0, 1, 0)} + ' %'" style="border-bottom: none; white-space: nowrap;"></td>
                            </tr>
                            <tr th:if="${order.items == null or order.items.isEmpty()}">
                                <td colspan="3" class="text-muted" style="border-bottom: none;" th:text="#{orders.detail.items.empty}">Keine Items vorhanden.</td>
                            </tr>
                        </tbody>
                    </table>
                    </div>
                </td>
                <td class="nowrap">
                    <div class="flex-gap-xs">
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-ghost">Details</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${orders.empty}">
                <td colspan="5" class="text-center" th:text="#{orders.index.empty}">Keine Aufträge vorhanden</td>
            </tr>
            </tbody>
        </table>
        </div>
        </th:block>
        </div>
    </div>
    <form id="priority-update-form" th:action="@{/orders/dummy}" method="post" style="display: none;">
        <input type="hidden" name="priority" id="priority-update-input" value="">
    </form>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    const KRT_ORDERS_AGE_YELLOW = /*[[${ageYellowDays}]]*/ 30;
    const KRT_ORDERS_AGE_RED = /*[[${ageRedDays}]]*/ 90;

    // Age-colour the order ids. Extracted so it can re-run on `krt:swapped` — the row colours are
    // otherwise only applied on the initial load and would be lost on a fragment swap (#573).
    function colorOrderAges(root) {
        const now = new Date();
        (root || document).querySelectorAll('.order-id-display').forEach(el => {
            const utcDateStr = el.getAttribute('data-utc');
            if (utcDateStr) {
                const date = new Date(utcDateStr);
                if (!isNaN(date)) {
                    const diffDays = Math.floor((now.getTime() - date.getTime()) / (1000 * 60 * 60 * 24));
                    if (diffDays >= KRT_ORDERS_AGE_RED) {
                        el.classList.add('text-danger');
                        el.style.fontWeight = 'bold';
                    } else if (diffDays >= KRT_ORDERS_AGE_YELLOW) {
                        el.classList.add('text-warning');
                        el.style.fontWeight = 'bold';
                    }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        colorOrderAges(document);

        // In-place status/scope filter (epic #571 / #573). The form id was renamed off the generic
        // "filter-form" so the sidebar's generic change->submit auto-reload no longer fires here.
        const filterForm = document.getElementById('orders-filter-form');
        const resultsContainer = document.getElementById('orders-results');
        if (filterForm && resultsContainer && window.krtFetch) {
            const applyFilter = () => {
                const data = new FormData(filterForm);
                const params = new URLSearchParams();
                for (const [key, value] of data.entries()) {
                    if (value !== '') params.append(key, value);
                }
                const query = params.toString();
                window.krtFetch.swap({
                    url: '/orders' + (query ? '?' + query : ''),
                    container: resultsContainer,
                    history: true,
                });
            };
            filterForm.addEventListener('submit', (event) => {
                event.preventDefault();
                applyFilter();
            });
            filterForm.querySelectorAll('input').forEach((el) => {
                el.addEventListener('change', applyFilter);
            });
        }
    });

    document.addEventListener('krt:swapped', (e) => {
        colorOrderAges(e && e.detail ? e.detail.container : document);
    });
</script>
<script sec:authorize="hasRole('LOGISTICIAN')" th:attr="nonce=${cspNonce}">
// Bind the drag-reorder to the STABLE #orders-results container (not the <tbody>) so the
// delegation survives a filter fragment swap that replaces the table (#573). The handlers
// already use e.target.closest('tr.draggable-row'), so container-level delegation is equivalent.
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('orders-results');
    if (!container) return;

    let draggedRow = null;
    let oldIndex = -1;

    container.addEventListener('dragstart', function(e) {
        draggedRow = e.target.closest('tr.draggable-row');
        if (!draggedRow) return;
        
        draggedRow.style.opacity = '0.5';
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedRow.dataset.id);
        
        const rows = Array.from(container.querySelectorAll('tr.draggable-row'));
        oldIndex = rows.indexOf(draggedRow);
    });

    container.addEventListener('dragend', function(e) {
        if (!draggedRow) return;
        draggedRow.style.opacity = '1';
        draggedRow = null;
        oldIndex = -1;
    });

    container.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        
        const targetRow = e.target.closest('tr.draggable-row');
        if (!targetRow || targetRow === draggedRow) return;
        
        const bounding = targetRow.getBoundingClientRect();
        const offset = bounding.y + (bounding.height / 2);
        
        if (e.clientY - offset > 0) {
            targetRow.after(draggedRow);
        } else {
            targetRow.before(draggedRow);
        }
    });

    container.addEventListener('drop', function(e) {
        e.preventDefault();
        if (!draggedRow || oldIndex === -1) return;
        
        const rows = Array.from(container.querySelectorAll('tr.draggable-row'));
        const newIndex = rows.indexOf(draggedRow);
        
        if (newIndex === oldIndex) return;
        
        let targetPriority = null;
        if (newIndex > oldIndex) {
            targetPriority = rows[newIndex - 1].dataset.priority;
        } else if (newIndex < oldIndex) {
            targetPriority = rows[newIndex + 1].dataset.priority;
        }
        
        if (targetPriority) {
            const orderId = draggedRow.dataset.id;
            const form = document.getElementById('priority-update-form');
            form.action = `/orders/${orderId}/priority`;
            document.getElementById('priority-update-input').value = targetPriority;
            form.submit();
        }
    });
});
</script>
</body>
</html>
