<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{nav.orders}">Aufträge</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" width="50" height="50">
            <span class="logo-text" th:text="${appTitle}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{nav.orders}">Aufträge</h1>
        <a th:href="@{/orders/create(source='index')}" class="btn">Neuer Auftrag</a>
    </div>

    <div class="hud-box mt-2">
        <form id="filter-form" class="no-track" method="get" th:action="@{/orders}" style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap;">
            <span th:text="#{orders.index.filter.status}" style="font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.8rem; color: var(--color-primary);">Status:</span>
            <label style="display: flex; align-items: center; gap: 0.25rem;">
                <input type="checkbox" name="status" value="OPEN" th:checked="${selectedStatuses != null and selectedStatuses.contains('OPEN')}">
                <span th:text="#{status.OPEN}">Offen</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.25rem;">
                <input type="checkbox" name="status" value="IN_PROGRESS" th:checked="${selectedStatuses != null and selectedStatuses.contains('IN_PROGRESS')}">
                <span th:text="#{status.IN_PROGRESS}">In Bearbeitung</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.25rem;">
                <input type="checkbox" name="status" value="REJECTED" th:checked="${selectedStatuses != null and selectedStatuses.contains('REJECTED')}">
                <span th:text="#{status.REJECTED}">Abgelehnt</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.25rem;">
                <input type="checkbox" name="status" value="COMPLETED" th:checked="${selectedStatuses != null and selectedStatuses.contains('COMPLETED')}">
                <span th:text="#{status.COMPLETED}">Abgeschlossen</span>
            </label>
            <!-- Squadron scope toggle (MULTI_SQUADRON_PLAN.md §5.3): default "mine" (matches
                 creating OR requesting = active squadron); flip to "all" for the cross-staffel
                 union. Collapses silently to "all" for users with no active squadron context
                 (admins in "all squadrons" mode) — the backend filter is a display preference,
                 not an access-control gate. -->
            <span th:text="#{orders.index.filter.scope}" style="font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.8rem; color: var(--color-primary); margin-left: 1rem;">Staffel:</span>
            <label style="display: flex; align-items: center; gap: 0.25rem;">
                <input type="radio" name="scope" value="mine" th:checked="${selectedScope == null or selectedScope == 'mine'}">
                <span th:text="#{orders.index.filter.scope.mine}">Eigene Staffel</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.25rem;">
                <input type="radio" name="scope" value="all" th:checked="${selectedScope == 'all'}">
                <span th:text="#{orders.index.filter.scope.all}">Alle Staffeln</span>
            </label>
            <button type="submit" class="btn" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;" th:text="#{orders.index.filter.apply}">Filtern</button>
        </form>

        <div th:if="${error}" class="hud-box hud-box-error">
            <p th:text="#{__${error}__}">Fehler</p>
        </div>
        
        <div th:if="${success}" class="hud-box hud-box-success">
            <p th:text="#{__${success}__}">Erfolg</p>
        </div>

        <div class="table-responsive">
        <table class="data-table">
            <colgroup>
                <col style="width: 1%;">
                <col style="width: 1%;">
                <col style="width: 1%;">
                <col style="width: 1%;">
                <col style="width: 1%;">
                <col style="width: 100%;">
                <col style="width: 1%;">
            </colgroup>
            <thead>
            <tr>
                <th th:text="#{orders.index.id}" style="white-space: nowrap;">ID</th>
                <th th:text="#{orders.index.prio}" style="white-space: nowrap;">Prio</th>
                <th th:text="#{orders.index.status}" style="white-space: nowrap;">Status</th>
                <th th:text="#{orders.index.squadron}" style="white-space: nowrap;">Staffel</th>
                <th th:text="#{orders.index.creating_squadron}" style="white-space: nowrap;">Erstellt durch</th>
                <th th:text="#{orders.index.handle}" style="white-space: nowrap;">Handle</th>
                <th th:text="#{orders.index.materials}">Materialien</th>
                <th th:text="#{orders.index.actions}" style="white-space: nowrap;">Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order, stat : ${orders}"
                th:attr="data-id=${order.id}, data-priority=${order.priority}"
                th:classappend="${#authorization.expression('hasRole(''LOGISTICIAN'')') and order.priority != null} ? 'draggable-row' : ''"
                th:draggable="${#authorization.expression('hasRole(''LOGISTICIAN'')') and order.priority != null} ? 'true' : 'false'">
                <td style="white-space: nowrap;">
                    <span class="order-id-display" th:data-utc="${order.createdAt}" th:text="'#' + ${order.displayId}"></span>
                </td>
                <td style="white-space: nowrap;">
                    <span sec:authorize="hasRole('LOGISTICIAN')" th:if="${order.priority != null}" style="cursor: grab; margin-right: 0.5rem; color: var(--color-primary);" title="Drag & Drop zum Ändern der Priorität">☰</span>
                    <span th:text="${order.priority != null ? order.priority : '-'}"></span>
                </td>
                <td style="white-space: nowrap;">
                    <span th:text="#{__${'status.' + order.status}__}" th:class="'status-badge status-' + ${#strings.toLowerCase(order.status)}"></span>
                </td>
                <td style="white-space: nowrap;">
                    <span th:if="${order.requestingSquadron != null}" class="squadron-badge"
                          th:title="${order.requestingSquadron.name()}"
                          th:text="${order.requestingSquadron.shorthand()}">IRI</span>
                    <span th:if="${order.requestingSquadron == null}" class="squadron-badge squadron-badge-muted">—</span>
                </td>
                <td style="white-space: nowrap;">
                    <span th:if="${order.creatingSquadron != null}"
                          th:class="${order.requestingSquadron != null and order.creatingSquadron.id() == order.requestingSquadron.id()} ? 'squadron-badge squadron-badge-muted' : 'squadron-badge squadron-badge-foreign'"
                          th:title="${order.creatingSquadron.name()}"
                          th:text="${order.creatingSquadron.shorthand()}">IRI</span>
                    <span th:if="${order.creatingSquadron == null}" class="squadron-badge squadron-badge-muted">—</span>
                </td>
                <td th:text="${order.handle}" style="white-space: nowrap;"></td>
                <td style="padding: 0;">
                    <div class="table-responsive">
                    <table class="data-table" style="margin: 0; background: transparent; border: none; box-shadow: none; width: 100%;">
                        <colgroup>
                            <col style="width: 100%;">
                            <col style="width: 1%;">
                            <col style="width: 1%;">
                            <col style="width: 1%;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th th:text="#{orders.material.name}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Material</th>
                                <th th:text="#{orders.material.minQuality}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Min. Q.</th>
                                <th th:text="#{orders.material.amount}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Gefordert</th>
                                <th th:text="#{orders.material.progress}" style="background: transparent; padding-top: 0.75rem; white-space: nowrap;">Fortschritt</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="mat : ${order.materials}">
                                <td th:text="${mat.material.name}" th:title="${mat.material.name}" style="border-bottom: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 1px;"></td>
                                <td th:text="${mat.minQuality}" style="border-bottom: none; white-space: nowrap;"></td>
                                <td style="border-bottom: none; white-space: nowrap;" th:switch="${mat.material.quantityType}">
                                    <span th:case="'PIECE'" th:text="|${mat.amount != null ? #numbers.formatInteger(mat.amount, 1) : '0'} #{material.quantity.piece}|"></span>
                                    <span th:case="*" th:text="|${mat.amount != null ? #numbers.formatDecimal(mat.amount, 1, 'NONE', 3, 'DEFAULT') : '0.000'} #{material.quantity.scu}|"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(mat.amount > 0 ? (mat.currentStock >= mat.amount ? 100.0 : (mat.currentStock * 100.0 / mat.amount)) : 0, 1, 0)} + ' %'" style="border-bottom: none; white-space: nowrap;"></td>
                            </tr>
                        </tbody>
                    </table>
                    </div>
                </td>
                <td style="white-space: nowrap;">
                    <div class="flex-gap-xs">
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn">Details</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${orders.empty}">
                <td colspan="8" style="text-align: center;" th:text="#{orders.index.empty}">Keine Aufträge vorhanden</td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
    <form id="priority-update-form" th:action="@{/orders/dummy}" method="post" style="display: none;">
        <input type="hidden" name="priority" id="priority-update-input" value="">
    </form>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', () => {
        const yellowDays = /*[[${ageYellowDays}]]*/ 30;
        const redDays = /*[[${ageRedDays}]]*/ 90;
        const now = new Date();

        document.querySelectorAll('.order-id-display').forEach(el => {
            const utcDateStr = el.getAttribute('data-utc');
            if (utcDateStr) {
                const date = new Date(utcDateStr);
                if (!isNaN(date)) {
                    const diffTime = now.getTime() - date.getTime();
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays >= redDays) {
                        el.classList.add('text-danger');
                        el.style.fontWeight = 'bold';
                    } else if (diffDays >= yellowDays) {
                        el.classList.add('text-warning');
                        el.style.fontWeight = 'bold';
                    }
                }
            }
        });
    });
</script>
<script sec:authorize="hasRole('LOGISTICIAN')" th:attr="nonce=${cspNonce}">
document.addEventListener('DOMContentLoaded', () => {
    const tableBody = document.querySelector('.data-table tbody');
    if (!tableBody) return;
    
    let draggedRow = null;
    let oldIndex = -1;

    tableBody.addEventListener('dragstart', function(e) {
        draggedRow = e.target.closest('tr.draggable-row');
        if (!draggedRow) return;
        
        draggedRow.style.opacity = '0.5';
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedRow.dataset.id);
        
        const rows = Array.from(tableBody.querySelectorAll('tr.draggable-row'));
        oldIndex = rows.indexOf(draggedRow);
    });

    tableBody.addEventListener('dragend', function(e) {
        if (!draggedRow) return;
        draggedRow.style.opacity = '1';
        draggedRow = null;
        oldIndex = -1;
    });

    tableBody.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        
        const targetRow = e.target.closest('tr.draggable-row');
        if (!targetRow || targetRow === draggedRow) return;
        
        const bounding = targetRow.getBoundingClientRect();
        const offset = bounding.y + (bounding.height / 2);
        
        if (e.clientY - offset > 0) {
            targetRow.after(draggedRow);
        } else {
            targetRow.before(draggedRow);
        }
    });

    tableBody.addEventListener('drop', function(e) {
        e.preventDefault();
        if (!draggedRow || oldIndex === -1) return;
        
        const rows = Array.from(tableBody.querySelectorAll('tr.draggable-row'));
        const newIndex = rows.indexOf(draggedRow);
        
        if (newIndex === oldIndex) return;
        
        let targetPriority = null;
        if (newIndex > oldIndex) {
            targetPriority = rows[newIndex - 1].dataset.priority;
        } else if (newIndex < oldIndex) {
            targetPriority = rows[newIndex + 1].dataset.priority;
        }
        
        if (targetPriority) {
            const orderId = draggedRow.dataset.id;
            const form = document.getElementById('priority-update-form');
            form.action = `/orders/${orderId}/priority`;
            document.getElementById('priority-update-input').value = targetPriority;
            form.submit();
        }
    });
});
</script>
</body>
</html>
