<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{profile.title} + ' - ' + ${appTitle}">User Profile - Profit Basetool</title>
    <th:block th:fragment="extraLinks"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>
<main>
    <div class="greeting hud-box">
        <h1 th:text="#{profile.title}">User Profile</h1>
    </div>

    <div class="hud-box mt-2">
        <dl class="kv-list kv-ruled">
            <dt th:text="#{profile.username}">Username</dt>
            <dd th:text="${username}">username</dd>

            <dt th:text="#{profile.email}">Email</dt>
            <dd th:text="${email}">email@example.com</dd>

            <th:block th:if="${rank}">
                <dt th:text="#{profile.rank}">Rank</dt>
                <dd th:text="${rank}">10</dd>
            </th:block>
            <th:block th:if="${joinDate}">
                <dt th:text="#{member.join_date}">Beitrittsdatum</dt>
                <dd th:text="${#temporals.format(joinDate, 'dd.MM.yyyy')}">01.01.2020</dd>
            </th:block>
            <th:block th:if="${monthsInSquadron != null}">
                <dt th:text="#{member.months_in_squadron}">Monate bei der Staffel</dt>
                <dd th:text="${monthsInSquadron}">0</dd>
            </th:block>

            <dt class="kv-row-self-start" th:text="#{profile.custom_data}">Custom Data</dt>
            <dd>
                <form id="profile-description-form" th:action="@{/profile/description}" method="post" th:object="${profileDescriptionForm}">
                    <input type="hidden" name="version" th:field="*{version}">
                    <div class="form-group">
                        <label for="displayName" class="form-label" th:text="#{profile.display_name}">Display Name</label>
                        <input type="text" id="displayName" name="displayName" th:field="*{displayName}" class="w-full"
                               th:classappend="${#fields.hasErrors('displayName')} ? 'input-error'" />
                        <div th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}" class="field-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label" th:text="#{profile.description}">Description</label>
                        <textarea id="description" name="description" rows="5" th:text="*{description}" class="w-full"
                                  th:classappend="${#fields.hasErrors('description')} ? 'input-error'"></textarea>
                        <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></div>
                    </div>
                    <button type="submit" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{profile.save_custom_data}">Save</span></button>
                </form>
            </dd>

            <dt class="kv-row-self-start" th:text="#{profile.payout.preference}">Default Payout Preference</dt>
            <dd>
                <form id="profile-payout-form" th:action="@{/profile/payout-preference}" method="post" th:object="${profilePayoutPreferenceForm}">
                    <input type="hidden" name="version" th:field="*{version}">
                    <div class="form-group">
                        <select th:field="*{defaultPayoutPreference}" th:aria-label="#{profile.payout.preference}" class="w-full">
                            <option th:value="PAYOUT" th:text="#{mission.payout.preference.payout}">Payout</option>
                            <option th:value="DONATE" th:text="#{mission.payout.preference.donate}">Donate</option>
                        </select>
                        <p th:text="#{profile.payout.preference.hint}" class="form-hint">Pre-selected at every mission sign-up. You can still change it per mission.</p>
                    </div>
                    <button type="submit" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{profile.payout.save}">Save Payout Preference</span></button>
                </form>
            </dd>
        </dl>

        <div class="mt-2-flex-gap">
            <a th:href="${keycloakAccountUrl}" class="btn btn-outline" target="_blank" th:text="#{profile.edit_link}">Edit in Keycloak</a>
            <a th:href="@{/}" class="btn btn-ghost" th:text="#{profile.back}">Back</a>
        </div>
    </div>
</main>
<!-- KRT toast / confirm infrastructure (showFrontendSuccessToast / showFrontendErrorToast /
     showKrtConfirm) used by the in-place description save below. -->
<th:block th:replace="~{fragments/toast :: toast}" />
<!--
  In-place profile saves (epic #571, REQ-FE-001). Intercepts BOTH the description form and the
  payout-preference form submit and routes each through window.krtFetch.write — no page navigation
  on success. Both forms keep their th:action/method=post so a script-disabled browser still posts
  and hits the redirect handlers (ProfileController#updateDescription / #updatePayoutPreference),
  i.e. progressive enhancement with a no-JS fallback.
-->
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    (function () {
        'use strict';
        if (!window.krtFetch) {
            return;
        }
        var i18n = {
            saved: /*[[#{frontend.ajax.saved}]]*/ 'Saved successfully.',
            error: /*[[#{error.profile.update.failed}]]*/ 'Update failed.',
            conflictTitle: /*[[#{frontend.ajax.conflict.title}]]*/ 'Conflict',
            conflictReload: /*[[#{frontend.ajax.conflict.reload}]]*/ 'Load current values',
            conflictDismiss: /*[[#{frontend.ajax.conflict.dismiss}]]*/ 'Close',
            conflictQuestion: /*[[#{frontend.ajax.conflict.question}]]*/ 'Load current values?',
            conflictDetail: /*[[#{frontend.ajax.conflict.detail}]]*/ 'The data was changed in the meantime.'
        };

        // The description form and the payout-preference form share ONE user-row version; sync
        // every hidden version input on success so the next save (from either form) does not 409.
        function syncAllVersions(version) {
            if (version == null) {
                return;
            }
            document.querySelectorAll('input[name="version"]').forEach(function (input) {
                input.value = String(version);
            });
        }

        function bindInPlaceSave(formId, buildPayload) {
            var form = document.getElementById(formId);
            if (!form) {
                return;
            }
            form.addEventListener('submit', function (event) {
                event.preventDefault();
                var versionInput = form.querySelector('input[name="version"]');
                window.krtFetch.write({
                    method: 'POST',
                    url: form.getAttribute('action'),
                    payload: buildPayload(form, versionInput ? Number(versionInput.value) : 0),
                    successMessage: i18n.saved,
                    errorMessage: i18n.error,
                    conflict: {
                        title: i18n.conflictTitle,
                        reloadLabel: i18n.conflictReload,
                        dismissLabel: i18n.conflictDismiss,
                        reloadQuestion: i18n.conflictQuestion,
                        reloadDetailFallback: i18n.conflictDetail
                    },
                    onSuccess: function (body) {
                        if (body) {
                            syncAllVersions(body.version);
                        }
                    }
                });
            });
        }

        bindInPlaceSave('profile-description-form', function (form, version) {
            return {
                description: form.querySelector('#description').value,
                displayName: form.querySelector('#displayName').value,
                version: version
            };
        });
        bindInPlaceSave('profile-payout-form', function (form, version) {
            var select = form.querySelector('select[name="defaultPayoutPreference"]');
            return {
                defaultPayoutPreference: select ? select.value : null,
                version: version
            };
        });
    })();
</script>
</body>
</html>
