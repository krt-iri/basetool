<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{promotion.admin.topics.title} + ' - ' + #{app.title}">Themenbereiche verwalten - IRIDIUM Basetool</title>
    <th:block th:fragment="extraLinks">
    <style>
        .admin-topic-card {
            background: #141414;
            border: 1px solid #333;
            margin-bottom: 1.5rem;
            padding: 1rem 1.25rem;
        }
        .admin-topic-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .admin-topic-name {
            font-family: 'Ethnocentric', sans-serif;
            text-transform: uppercase;
            color: var(--color-primary);
            font-size: 1rem;
            letter-spacing: 0.08em;
        }
        .admin-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .category-list { margin-top: 0.75rem; padding-left: 1rem; border-left: 2px solid #333; }
        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .category-item:last-child { border-bottom: none; }
        .modal-overlay {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
        }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
        .modal-box {
            background: #141414;
            border: 1px solid var(--color-primary);
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 0 20px rgba(231,126,35,0.3);
        }
        .modal-title {
            font-family: 'Ethnocentric', sans-serif;
            text-transform: uppercase;
            color: var(--color-primary);
            font-size: 1rem;
            margin-bottom: 1.25rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.85rem; color: var(--color-gray-2); margin-bottom: 0.3rem; }
        .form-input {
            width: 100%; background: var(--color-gray-5); border: 1px solid #444;
            color: var(--color-gray-1); padding: 0.5rem 0.75rem; font-size: 0.9rem;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: var(--color-primary); outline: none; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; flex-wrap: wrap; }
        @media (max-width: 768px) {
            .admin-topic-header { flex-direction: column; align-items: flex-start; }
            .btn { min-height: 44px; }
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/iridium.svg}" alt="Logo" height="50">
            <span class="logo-text" th:text="#{app.title}">IRIDIUM Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box">
        <h1 th:text="#{promotion.admin.topics.title}">Themenbereiche verwalten</h1>
        <p th:text="#{promotion.admin.topics.subtitle}">Themenbereiche und Kategorien</p>
    </div>

    <div class="hud-box mt-2">
        <div style="margin-bottom:1rem;">
            <button class="btn" onclick="openCreateTopicModal()" th:text="#{promotion.admin.topics.new}">Neuer Themenbereich</button>
        </div>

        <div th:if="${#lists.isEmpty(topics)}">
            <p th:text="#{promotion.admin.topics.no.topics}">Keine Themenbereiche vorhanden.</p>
        </div>

        <div th:each="topic : ${topics}" class="admin-topic-card">
            <div class="admin-topic-header">
                <span class="admin-topic-name" th:text="${topic.name}" style="font-family:'Lato',sans-serif;font-weight:700;">Themenbereich</span>
                <div class="admin-actions">
                    <button class="btn btn-edit-topic"
                            th:data-id="${topic.id}"
                            th:data-name="${topic.name}"
                            th:data-description="${topic.description}"
                            th:data-sort="${topic.sortOrder}"
                            th:data-version="${topic.version}"
                            th:text="#{promotion.admin.topics.edit}">Bearbeiten</button>
                    <button class="btn btn-danger btn-delete-topic"
                            th:data-id="${topic.id}"
                            th:text="#{promotion.admin.topics.delete}">Löschen</button>
                    <button class="btn btn-create-category"
                            th:data-topic-id="${topic.id}"
                            th:text="#{promotion.admin.topics.category.new}">Neue Kategorie</button>
                </div>
            </div>
            <p th:if="${topic.description}" th:text="${topic.description}" style="font-size:0.85rem;color:var(--color-gray-2);margin-bottom:0.5rem;"></p>

            <div class="category-list" th:if="${topicCategoryMap[topic.id.toString()] != null and not #lists.isEmpty(topicCategoryMap[topic.id.toString()])}">
                <div th:each="cat : ${topicCategoryMap[topic.id.toString()]}" class="category-item" style="flex-direction:column;align-items:flex-start;gap:0.5rem;">
                    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:0.5rem;">
                        <span th:text="${cat.name}" style="font-size:0.9rem;color:var(--color-gray-1);font-weight:600;">Kategorie</span>
                        <div class="admin-actions">
                            <button class="btn btn-edit-category"
                                    th:data-id="${cat.id}"
                                    th:data-name="${cat.name}"
                                    th:data-description="${cat.description}"
                                    th:data-sort="${cat.sortOrder}"
                                    th:data-version="${cat.version}"
                                    th:data-topic-id="${topic.id}"
                                    th:text="#{promotion.admin.topics.edit}">Bearbeiten</button>
                            <button class="btn btn-danger btn-delete-category"
                                    th:data-id="${cat.id}"
                                    th:text="#{promotion.admin.topics.delete}">Löschen</button>
                        </div>
                    </div>
                    <!-- Stufeninhalte inline -->
                    <div th:with="contents=${categoryContentMap[cat.id.toString()]}" style="width:100%;margin-top:0.5rem;display:flex;flex-direction:column;gap:0.4rem;">
                        <!-- Stufe A -->
                        <div th:with="lc=${contents != null and !contents.?[level == 'LEVEL_A'].isEmpty() ? contents.?[level == 'LEVEL_A'][0] : null}"
                             style="display:flex;align-items:flex-start;gap:0.5rem;background:var(--color-bg-2,#1a1a1a);border:1px solid #333;border-radius:4px;padding:0.4rem 0.6rem;">
                            <span th:text="#{promotion.level.a}" style="color:var(--color-orange,#E77E23);font-weight:700;font-size:0.8rem;min-width:52px;padding-top:0.35rem;">Stufe A</span>
                            <textarea class="form-input lc-textarea"
                                      th:data-category-id="${cat.id}"
                                      data-level="LEVEL_A"
                                      th:data-lc-id="${lc != null ? lc.id : ''}"
                                      th:data-lc-version="${lc != null ? lc.version : ''}"
                                      th:text="${lc != null ? lc.description : ''}"
                                      rows="2" maxlength="2000"
                                      style="flex:1;font-size:0.85rem;resize:vertical;min-height:44px;"></textarea>
                            <button class="btn btn-save-level-content" style="font-size:0.8rem;padding:0.3rem 0.7rem;align-self:flex-start;" th:text="#{promotion.admin.levelcontent.save}">Speichern</button>
                        </div>
                        <!-- Stufe B -->
                        <div th:with="lc=${contents != null and !contents.?[level == 'LEVEL_B'].isEmpty() ? contents.?[level == 'LEVEL_B'][0] : null}"
                             style="display:flex;align-items:flex-start;gap:0.5rem;background:var(--color-bg-2,#1a1a1a);border:1px solid #333;border-radius:4px;padding:0.4rem 0.6rem;">
                            <span th:text="#{promotion.level.b}" style="color:var(--color-orange,#E77E23);font-weight:700;font-size:0.8rem;min-width:52px;padding-top:0.35rem;">Stufe B</span>
                            <textarea class="form-input lc-textarea"
                                      th:data-category-id="${cat.id}"
                                      data-level="LEVEL_B"
                                      th:data-lc-id="${lc != null ? lc.id : ''}"
                                      th:data-lc-version="${lc != null ? lc.version : ''}"
                                      th:text="${lc != null ? lc.description : ''}"
                                      rows="2" maxlength="2000"
                                      style="flex:1;font-size:0.85rem;resize:vertical;min-height:44px;"></textarea>
                            <button class="btn btn-save-level-content" style="font-size:0.8rem;padding:0.3rem 0.7rem;align-self:flex-start;" th:text="#{promotion.admin.levelcontent.save}">Speichern</button>
                        </div>
                        <!-- Stufe C -->
                        <div th:with="lc=${contents != null and !contents.?[level == 'LEVEL_C'].isEmpty() ? contents.?[level == 'LEVEL_C'][0] : null}"
                             style="display:flex;align-items:flex-start;gap:0.5rem;background:var(--color-bg-2,#1a1a1a);border:1px solid #333;border-radius:4px;padding:0.4rem 0.6rem;">
                            <span th:text="#{promotion.level.c}" style="color:var(--color-orange,#E77E23);font-weight:700;font-size:0.8rem;min-width:52px;padding-top:0.35rem;">Stufe C</span>
                            <textarea class="form-input lc-textarea"
                                      th:data-category-id="${cat.id}"
                                      data-level="LEVEL_C"
                                      th:data-lc-id="${lc != null ? lc.id : ''}"
                                      th:data-lc-version="${lc != null ? lc.version : ''}"
                                      th:text="${lc != null ? lc.description : ''}"
                                      rows="2" maxlength="2000"
                                      style="flex:1;font-size:0.85rem;resize:vertical;min-height:44px;"></textarea>
                            <button class="btn btn-save-level-content" style="font-size:0.8rem;padding:0.3rem 0.7rem;align-self:flex-start;" th:text="#{promotion.admin.levelcontent.save}">Speichern</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Create Topic Modal -->
<div id="modal-create-topic" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title" th:text="#{promotion.admin.topics.modal.create.title}">Neuen Themenbereich anlegen</div>
        <div class="form-group">
            <label class="form-label" th:text="#{promotion.admin.topics.name.label}">Name</label>

            <textarea id="ct-desc" class="form-input" rows="3" maxlength="2000"></textarea>

            <label class="form-label" th:text="#{promotion.admin.topics.sort.label}">Sortierung</label>

        <div class="modal-actions">

<th:block th:replace="~{fragments/toast :: toast}" />

<script th:inline="javascript" th:attr="nonce=${cspNonce}">
/*<![CDATA[*/
var MSG_SAVED = /*[[#{promotion.admin.topics.saved}]]*/ 'Saved';
var MSG_DELETED = /*[[#{promotion.admin.topics.deleted}]]*/ 'Deleted';
var MSG_ERROR = /*[[#{promotion.admin.topics.error}]]*/ 'Error';
var MSG_ERROR_DELETE = /*[[#{promotion.admin.topics.error.delete}]]*/ 'Error';
var MSG_CONFLICT = /*[[#{promotion.admin.topics.conflict}]]*/ 'Conflict';

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }

document.addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    if (btn.classList.contains('btn-edit-topic')) {
        openEditTopicModal(btn.dataset.id, btn.dataset.name, btn.dataset.description, btn.dataset.sort, btn.dataset.version);
    } else if (btn.classList.contains('btn-delete-topic')) {
        openDeleteTopicModal(btn.dataset.id);
    } else if (btn.classList.contains('btn-create-category')) {
        openCreateCategoryModal(btn.dataset.topicId);
    } else if (btn.classList.contains('btn-edit-category')) {
        openEditCategoryModal(btn.dataset.id, btn.dataset.name, btn.dataset.description, btn.dataset.sort, btn.dataset.version, btn.dataset.topicId);
    } else if (btn.classList.contains('btn-delete-category')) {
        openDeleteCategoryModal(btn.dataset.id);
    } else if (btn.classList.contains('btn-save-level-content')) {
        saveLevelContentInline(btn);
    }
});

function openCreateTopicModal() { openModal('modal-create-topic'); }
function openEditTopicModal(id, name, desc, sort, version) {
    document.getElementById('et-id').value = id;
    document.getElementById('et-version').value = version;
    document.getElementById('et-name').value = name;
    document.getElementById('et-desc').value = desc || '';
    document.getElementById('et-sort').value = sort;
    openModal('modal-edit-topic');
}
function openDeleteTopicModal(id) {
    document.getElementById('dt-id').value = id;
    openModal('modal-delete-topic');
}
function openCreateCategoryModal(topicId) {
    document.getElementById('cc-topic-id').value = topicId;
    openModal('modal-create-category');
}
function openEditCategoryModal(id, name, desc, sort, version, topicId) {
    document.getElementById('ec-id').value = id;
    document.getElementById('ec-version').value = version;
    document.getElementById('ec-topic-id').value = topicId;
    document.getElementById('ec-name').value = name;
    document.getElementById('ec-desc').value = desc || '';
    document.getElementById('ec-sort').value = sort;
    openModal('modal-edit-category');
}
function openDeleteCategoryModal(id) {
    document.getElementById('dc-id').value = id;
    openModal('modal-delete-category');
}

function getCsrfToken() { return document.querySelector('meta[name="_csrf"]')?.content || ''; }
function getCsrfHeader() { return document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN'; }

function apiCall(url, method, body, onSuccess) {
    var headers = { 'Content-Type': 'application/json' };
    headers[getCsrfHeader()] = getCsrfToken();
    fetch(url, { method: method, headers: headers, body: body ? JSON.stringify(body) : undefined })
    .then(function(r) {
        if (r.status === 409) { if (typeof showToast === 'function') showToast(MSG_CONFLICT, 'warning'); setTimeout(function() { window.location.reload(); }, 1500); return null; }
        if (!r.ok) { if (typeof showToast === 'function') showToast(MSG_ERROR, 'error'); return null; }
        return r.status === 204 ? {} : r.json();
    })
    .then(function(data) { if (data !== null && data !== undefined) { onSuccess(data); } })
    .catch(function() { if (typeof showToast === 'function') showToast(MSG_ERROR, 'error'); });
}

function createTopic() {
    var body = { name: document.getElementById('ct-name').value, description: document.getElementById('ct-desc').value || null, sortOrder: parseInt(document.getElementById('ct-sort').value) || 0 };
    apiCall('/api/proxy/promotion/topics', 'POST', body, function() { if (typeof showToast === 'function') showToast(MSG_SAVED, 'success'); closeModal('modal-create-topic'); setTimeout(function() { window.location.reload(); }, 800); });
}
function updateTopic() {
    var id = document.getElementById('et-id').value;
    var body = { version: parseInt(document.getElementById('et-version').value), name: document.getElementById('et-name').value, description: document.getElementById('et-desc').value || null, sortOrder: parseInt(document.getElementById('et-sort').value) || 0 };
    apiCall('/api/proxy/promotion/topics/' + id, 'PUT', body, function() { if (typeof showToast === 'function') showToast(MSG_SAVED, 'success'); closeModal('modal-edit-topic'); setTimeout(function() { window.location.reload(); }, 800); });
}
function deleteTopic() {
    var id = document.getElementById('dt-id').value;
    apiCall('/api/proxy/promotion/topics/' + id, 'DELETE', null, function() { if (typeof showToast === 'function') showToast(MSG_DELETED, 'success'); closeModal('modal-delete-topic'); setTimeout(function() { window.location.reload(); }, 800); });
}
function createCategory() {
    var body = { topicId: document.getElementById('cc-topic-id').value, name: document.getElementById('cc-name').value, description: document.getElementById('cc-desc').value || null, sortOrder: parseInt(document.getElementById('cc-sort').value) || 0 };
    apiCall('/api/proxy/promotion/categories', 'POST', body, function() { if (typeof showToast === 'function') showToast(MSG_SAVED, 'success'); closeModal('modal-create-category'); setTimeout(function() { window.location.reload(); }, 800); });
}
function updateCategory() {
    var id = document.getElementById('ec-id').value;
    var body = { version: parseInt(document.getElementById('ec-version').value), topicId: document.getElementById('ec-topic-id').value, name: document.getElementById('ec-name').value, description: document.getElementById('ec-desc').value || null, sortOrder: parseInt(document.getElementById('ec-sort').value) || 0 };
    apiCall('/api/proxy/promotion/categories/' + id, 'PUT', body, function() { if (typeof showToast === 'function') showToast(MSG_SAVED, 'success'); closeModal('modal-edit-category'); setTimeout(function() { window.location.reload(); }, 800); });
}
function deleteCategory() {
    var id = document.getElementById('dc-id').value;
    apiCall('/api/proxy/promotion/categories/' + id, 'DELETE', null, function() { if (typeof showToast === 'function') showToast(MSG_DELETED, 'success'); closeModal('modal-delete-category'); setTimeout(function() { window.location.reload(); }, 800); });
}
function saveLevelContentInline(btn) {
    // find the textarea in the same row container
    var container = btn.parentElement;
    var textarea = container.querySelector('textarea.lc-textarea');
    if (!textarea) return;
    var categoryId = textarea.dataset.categoryId;
    var level = textarea.dataset.level;
    var lcId = textarea.dataset.lcId;
    var lcVersion = textarea.dataset.lcVersion;
    var description = textarea.value;
    if (lcId && lcId !== '') {
        var body = { version: parseInt(lcVersion) || 0, categoryId: categoryId, level: level, description: description };
        apiCall('/api/proxy/promotion/level-contents/' + lcId, 'PUT', body, function(data) {
            if (data && data.version !== undefined) { textarea.dataset.lcVersion = data.version; }
            if (typeof showToast === 'function') showToast(MSG_SAVED, 'success');
        });
    } else {
        var body = { categoryId: categoryId, level: level, description: description };
        apiCall('/api/proxy/promotion/level-contents', 'POST', body, function(data) {
            if (data && data.id) { textarea.dataset.lcId = data.id; textarea.dataset.lcVersion = data.version; }
            if (typeof showToast === 'function') showToast(MSG_SAVED, 'success');
        });
    }
}
