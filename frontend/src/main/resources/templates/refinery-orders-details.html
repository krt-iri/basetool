<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{refineryorder.detail.title} + ' - ' + ${appTitle}">Raffinerieauftrag Details - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
        <style th:attr="nonce=${cspNonce}">
            .form-group label {
                display: block;
                margin-bottom: 0.5rem;
                font-family: var(--font-body);
                font-weight: bold;
                font-size: 0.9rem;
            }
            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 0.75rem;
                background-color: var(--color-surface-input);
                border: 1px solid var(--color-gray-3);
                color: var(--color-gray-1);
                font-family: var(--font-body);
                box-sizing: border-box;
            }
            .material-row {
                display: flex;
                gap: 1rem;
                margin-bottom: 1rem;
                align-items: flex-end;
            }
            @media (max-width: 768px) {
                .material-row {
                    flex-direction: column;
                    align-items: stretch;
                }
            }
            /* UEX refinery yield bonus/malus next to the output-quantity label.
               Positive = green (Profit department color), negative = red (danger),
               zero = muted. Matches the semantic-color palette in styles.css. */
            .yield-bonus-badge {
                display: inline-block;
                margin-left: 0.5rem;
                padding: 0.05rem 0.4rem;
                font-family: var(--font-body);
                font-weight: bold;
                font-size: 0.75rem;
                letter-spacing: 0;
                border-radius: var(--radius-none);
                text-transform: none;
            }
            .yield-bonus-badge.yield-positive {
                color: var(--color-dept-profit);
                background-color: rgba(35, 158, 51, 0.12);
                border: 1px solid var(--color-dept-profit);
            }
            .yield-bonus-badge.yield-negative {
                color: var(--color-danger);
                background-color: rgba(163, 0, 10, 0.12);
                border: 1px solid var(--color-danger);
            }
            .yield-bonus-badge.yield-zero {
                color: var(--color-gray-2);
                background-color: var(--color-gray-4);
                border: 1px solid var(--color-gray-3);
            }
            /*
             * When the output-quantity label contains the yield bonus badge, the
             * global `.form-group:has([required]) > label::after` asterisk lands
             * AFTER the badge ("Erwartete Ausgangsmenge (Units) -5% *"), which
             * reads as if the badge itself were the required marker. Override:
             * anchor the asterisk to the first <span> (the field name) instead,
             * and suppress the outer ::after for these labels.
             */
            .form-group:has([required]) > label:has(> .yield-bonus-badge) > span:first-child::after {
                content: " *";
                color: var(--color-primary);
            }
            .form-group:has([required]) > label:has(> .yield-bonus-badge)::after {
                content: none;
            }
            /* Small "Material #N" header at the top of every material entry.
               Hosts the per-entry Remove button on the right so it never overlaps
               the input fields (the previously absolute-positioned button sat on
               top of the input-quantity column once the yield badge was added). */
            .material-entry-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 0.75rem;
                padding-bottom: 0.5rem;
                border-bottom: 1px solid var(--color-gray-3);
            }
            .material-entry-title {
                color: var(--color-primary);
                font-family: var(--font-body);
                font-weight: bold;
                font-size: 0.85rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            /* Full-width "add another row" affordance below the materials list.
               Dashed outline + transparent fill keep it visually subordinate to
               the solid Speichern/Einlagern/Abbrechen actions further down,
               while the primary-orange color anchors it to the same form
               section. The button sits after #materials-container, so it
               naturally moves down whenever a new material row is appended. */
            .btn-add-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                width: 100%;
                min-height: 44px;
                padding: 0.75rem 1rem;
                margin-bottom: 1rem;
                background-color: rgba(231, 126, 35, 0.05);
                border: 1px dashed var(--color-primary);
                color: var(--color-primary);
                font-family: var(--font-body);
                font-weight: 700;
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                cursor: pointer;
                transition: background-color 0.15s ease, border-style 0.15s ease;
            }
            .btn-add-row:hover {
                background-color: rgba(231, 126, 35, 0.12);
                border-style: solid;
            }
            .btn-add-row::before {
                content: "+";
                font-size: 1.1rem;
                font-weight: 700;
                line-height: 1;
            }
        </style>
        <script th:src="@{/js/refinery-yield-badge.js}" th:attr="nonce=${cspNonce}"></script>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{refineryorder.detail.title}">Raffinerieauftrag Details</h1>
    </div>

    <div class="hud-box mt-2">
        <div th:if="${errorToast}" class="hud-box hud-box-error">
            <p th:text="#{__${errorToast}__}">Fehler</p>
        </div>

        <div class="form-container">
            <form id="refineryOrderMainForm" th:action="@{/refinery-orders/{id}(id=${orderId})}" method="post" th:object="${refineryOrderForm}">
                <input type="hidden" th:field="*{version}" />
                
                <div class="material-row mt-1-5">
                    <div class="form-group flex-2 mb-0">
                        <label for="ownerId" th:text="#{refineryorder.form.owner}">Besitzer</label>
                        <select id="ownerId" th:field="*{ownerId}" required th:disabled="${!isLogistician}">
                            <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.effectiveName}"></option>
                        </select>
                        <input type="hidden" th:field="*{ownerId}" th:if="${!isLogistician}" />
                    </div>

                    <div class="form-group flex-1 mb-0">
                        <label for="expenses" th:text="#{refineryorder.form.expenses}">Auftragskosten (aUEC)</label>
                        <input type="number" id="expenses" th:field="*{expenses}" min="0" th:readonly="${!canEdit}" data-trigger="rod-update-profit">
                    </div>

                    <div class="form-group flex-1 mb-0">
                        <label for="otherExpenses" th:text="#{refineryorder.form.otherExpenses}">Sonstige Kosten (aUEC)</label>
                        <input type="number" id="otherExpenses" th:field="*{otherExpenses}" min="0" step="1"
                               th:title="#{refineryorder.form.otherExpenses.help}"
                               th:readonly="${!canEdit}" data-trigger="rod-update-profit">
                    </div>

                    <div class="form-group flex-1 mb-0">
                        <label for="oreSales" th:text="#{refineryorder.form.oreSales}">Ore Sales (aUEC)</label>
                        <input type="number" id="oreSales" th:field="*{oreSales}" min="0" step="1" th:readonly="${!canEdit}" data-trigger="rod-update-profit">
                    </div>

                    <div class="form-group flex-1 mb-0">
                        <label for="profitPreview" th:text="#{refineryorder.form.profit}">Gewinn/Verlust (aUEC)</label>
                        <input type="text" id="profitPreview" readonly tabindex="-1"
                               th:title="#{refineryorder.form.profit.help}"
                               style="background-color: var(--color-gray-4); color: var(--color-gray-1); border: 1px solid var(--color-primary); border-left-width: 4px; min-height: 44px;">
                    </div>
                </div>

                <div class="material-row mt-1-5">
                    <div class="form-group datetime-split-group flex-1 mb-0" th:attr="data-validate-not-past='false', data-error-past=#{validation.datetime.past}">
                        <label for="startedAtLocal" th:text="#{refineryorder.form.startedAt}">Startdatum</label>
                        <div class="flex-gap-xs">
                            <input type="hidden" id="startedAt" th:field="*{startedAt}">
                            <div class="datetime-split-inputs flex-1">
                                <input type="date" class="date-part" th:aria-label="#{a11y.datetime.date}" th:readonly="${!canEdit}">
                                <input type="time" class="time-part" th:aria-label="#{a11y.datetime.time}" th:readonly="${!canEdit}">
                            </div>
                            <button th:if="${canEdit}" type="button" class="btn btn-ghost" data-trigger="rod-set-started-now" th:text="#{refineryorder.form.now}" style="padding: 0.5rem 1rem;">Jetzt</button>
                        </div>
                    </div>
                    
                    <div class="form-group flex-1 mb-0">
                        <label th:text="#{refineryorder.form.duration}">Dauer</label>
                        <div class="flex-gap-sm">
                            <input type="number" id="durationHours" th:field="*{durationHours}" min="0" step="1" inputmode="numeric" th:placeholder="#{refineryorder.form.duration.hours}" class="flex-1" th:readonly="${!canEdit}">
                            <span class="text-muted">h</span>
                            <input type="number" id="durationMinutes" th:field="*{durationMinutes}" min="0" max="59" step="1" inputmode="numeric" th:placeholder="#{refineryorder.form.duration.minutes}" class="flex-1" th:readonly="${!canEdit}">
                            <span class="text-muted">m</span>
                        </div>
                    </div>

                    <div class="form-group flex-1 mb-0">
                        <label th:text="#{refineryorder.form.endsAt}">Fertig am</label>
                        <div id="endsAtDisplay" style="padding: 0.75rem; background-color: var(--color-gray-4); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); font-family: var(--font-body); box-sizing: border-box; min-height: 44px; display: flex; align-items: center;">
                            <span>-</span>
                        </div>
                    </div>
                </div>

                <div class="material-row mt-1-5">
                    <div class="form-group flex-2 mb-0">
                        <label for="locationId" th:text="#{refineryorder.form.location}">Raffinerie</label>
                        <select id="locationId" th:field="*{locationId}" required th:disabled="${!canEdit}" data-trigger="rod-location-change">
                            <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                            <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                        </select>
                    </div>
                    
                    <div class="form-group flex-2 mb-0">
                        <label for="missionId" th:text="#{refineryorder.form.mission}">Einsatz (Optional)</label>
                        <select id="missionId" th:field="*{missionId}" th:disabled="${!canEdit}">
                            <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                            <option th:each="mis : ${missions}" th:value="${mis.id}"
                                    th:text="${mis.plannedStartTime != null} ? |${mis.name} - ${#temporals.format(mis.plannedStartTime, #messages.msg('format.date'), #locale)}| : ${mis.name}"></option>
                        </select>
                    </div>

                    <div class="form-group flex-2 mb-0">
                        <label for="status" th:text="#{refineryorder.form.status}">Status</label>
                        <select id="status" th:field="*{status}">
                            <option value="OPEN" th:text="#{refineryorder.status.OPEN}">Offen</option>
                            <option value="IN_PROGRESS" th:text="#{refineryorder.status.IN_PROGRESS}">In Bearbeitung</option>
                            <option value="COMPLETED" th:text="#{refineryorder.status.COMPLETED}">Abgeschlossen</option>
                            <option value="CANCELED" th:text="#{refineryorder.status.CANCELED}">Abgebrochen</option>
                        </select>
                    </div>
                </div>

                <div class="material-row mt-1-5">
                    <div class="form-group flex-2 mb-0">
                        <label for="refiningMethodId" th:text="#{refineryorder.form.method}">Raffiniermethode</label>
                        <select id="refiningMethodId" th:field="*{refiningMethodId}" data-trigger="rod-update-method" th:disabled="${!canEdit}">
                            <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                            <option th:each="method : ${methods}" th:value="${method.id}" th:text="${method.name}" 
                                th:attr="data-yield=${method.ratingYield},data-cost=${method.ratingCost},data-speed=${method.ratingSpeed}"></option>
                        </select>
                    </div>
                    <div id="methodRatings" style="flex: 3; display: none; align-items: center; gap: 1.5rem; padding: 0.5rem 1rem; background-color: var(--color-gray-4); border: 1px solid var(--color-gray-3); border-radius: var(--radius-none); min-height: 44px;">
                        <div class="stat-label">
                            <span th:text="#{refineryorder.rating.yield}">Ertrag</span>
                            <span id="ratingYieldVal" class="stat-value">-</span>
                        </div>
                        <div class="stat-label">
                            <span th:text="#{refineryorder.rating.cost}">Kosten</span>
                            <span id="ratingCostVal" class="stat-value">-</span>
                        </div>
                        <div class="stat-label">
                            <span th:text="#{refineryorder.rating.speed}">Dauer</span>
                            <span id="ratingSpeedVal" class="stat-value">-</span>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem; margin-bottom: 1rem;">
                    <h3 style="color: var(--color-gray-1); font-family: var(--font-body); font-weight: bold; margin: 0;" th:text="#{refineryorder.form.materials.title}">Materialien</h3>
                </div>

                <div id="materials-container">
                    <div th:each="good, stat : *{goods}" class="material-entry" style="border: 1px solid var(--color-gray-3); padding: 1rem; border-radius: var(--radius-none); background-color: var(--color-bg-dark-gray); margin-bottom: 1rem;">
                        <div class="material-entry-header">
                            <span class="material-entry-title" th:text="#{refineryorder.form.material.entryTitle} + ' #' + ${stat.index + 1}">Material #1</span>
                            <button th:if="${canEdit and stat.index > 0}" type="button" class="btn btn-quiet-danger remove-btn btn-icon" data-trigger="rod-remove-material" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" th:title="#{refineryorder.form.material.remove}" th:aria-label="#{refineryorder.form.material.remove}"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-trash"/></svg></button>
                        </div>

                        <div class="material-row">
                            <div class="form-group flex-2 mb-0">
                                <label th:for="'inputMaterialId_' + ${stat.index}" th:text="#{refineryorder.form.material.input}">Eingangsmaterial</label>
                                <select th:id="'inputMaterialId_' + ${stat.index}" th:field="*{goods[__${stat.index}__].inputMaterialId}" required data-trigger="rod-update-output" th:disabled="${!canEdit}">
                                    <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                                    <option th:each="mat : ${materials}" th:if="${mat.type == 'RAW' or mat.isManualRawMaterial == true}" th:value="${mat.id}" th:text="${mat.name}" th:attr="data-refined-id=${mat.refinedMaterial != null ? mat.refinedMaterial.id : ''},data-refined-name=${mat.refinedMaterial != null ? mat.refinedMaterial.name : ''}"></option>
                                </select>
                            </div>

                            <div class="form-group flex-1 mb-0">
                                <label th:for="'quality_' + ${stat.index}" th:text="#{refineryorder.form.material.quality}">Qualität</label>
                                <input type="number" th:id="'quality_' + ${stat.index}" th:field="*{goods[__${stat.index}__].quality}" min="0" max="1000" th:readonly="${!canEdit}">
                            </div>

                            <div class="form-group flex-1 mb-0">
                                <label th:for="'inputQuantity_' + ${stat.index}" th:text="#{refineryorder.form.material.inputQty}">Eingangsmenge</label>
                                <input type="text" inputmode="numeric" th:id="'inputQuantity_' + ${stat.index}" th:field="*{goods[__${stat.index}__].inputQuantity}" required th:readonly="${!canEdit}">
                            </div>
                        </div>

                        <div class="material-row mt-1-5">
                            <div class="form-group flex-2 mb-0">
                                <label th:text="#{refineryorder.form.material.output}">Ausgangsmaterial</label>
                                <div class="output-material-display" style="padding: 0.75rem; background-color: var(--color-bg-dark-gray); border: 1px solid var(--color-gray-3); color: var(--color-gray-1); font-family: var(--font-body); box-sizing: border-box; min-height: 44px; display: flex; align-items: center;">
                                    <span th:id="'outputMaterialDisplay_' + ${stat.index}" style="opacity: 0.7;">-</span>
                                </div>
                            </div>

                            <div class="form-group flex-1 mb-0">
                                <label th:for="'outputQuantity_' + ${stat.index}">
                                    <span th:text="#{refineryorder.form.material.outputQty}">Erwartete Ausgangsmenge (Units)</span>
                                    <span class="yield-bonus-badge"
                                          th:id="'yieldBonus_' + ${stat.index}"
                                          th:with="bonus=${(order != null and order.goods != null and stat.index &lt; #lists.size(order.goods)) ? order.goods[__${stat.index}__].yieldBonusPercent : null}"
                                          th:if="${bonus != null}"
                                          th:classappend="${bonus > 0} ? ' yield-positive' : (${bonus &lt; 0} ? ' yield-negative' : ' yield-zero')"
                                          th:title="#{refineryorder.form.material.yieldBonus.help}"
                                          th:text="${(bonus > 0 ? '+' : '') + bonus + '%'}">+5%</span>
                                </label>
                                <input type="text" inputmode="numeric" th:id="'outputQuantity_' + ${stat.index}" th:field="*{goods[__${stat.index}__].outputQuantity}" th:data-index="${stat.index}" data-trigger="rod-calc-scu" required th:readonly="${!canEdit}">
                            </div>

                            <div class="form-group flex-1 mb-0">
                                <label th:for="'outputQuantityScu_' + ${stat.index}" th:text="#{refineryorder.form.material.outputQtyScu}">Erwartete Ausgangsmenge (SCU)</label>
                                <input type="text" th:id="'outputQuantityScu_' + ${stat.index}" readonly style="background-color: var(--color-gray-4); cursor: not-allowed;">
                            </div>
                        </div>
                    </div>
                </div>

                <button th:if="${canEdit}" type="button" class="btn-add-row" data-trigger="rod-add-material" th:text="#{refineryorder.form.material.add}">Material hinzufügen</button>

            </form>

            <div style="margin-top: 2rem; display: flex; gap: 1rem; align-items: center;">
                <th:block th:if="${canEdit}">
                    <button type="submit" form="refineryOrderMainForm" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{orders.create.save}">Speichern</span></button>
                </th:block>
                <th:block th:if="${canEdit and (refineryOrderForm.status.name() == 'OPEN' or refineryOrderForm.status.name() == 'IN_PROGRESS')}">
                    <button type="button" class="btn btn-outline" data-trigger="rod-open-store" th:text="#{refineryorder.action.store}">Einlagern</button>
                    <form id="refineryCancelForm" th:action="@{/refinery-orders/{id}/delete(id=${orderId})}" method="post" class="m-0">
                        <th:block th:replace="~{fragments/components :: button(label=#{refineryorder.action.cancel}, variant='danger', type='submit', extraClass=null)}"></th:block>
                    </form>
                </th:block>
                <a th:href="@{/refinery-orders}" class="btn btn-ghost" style="text-align:center; display:flex; align-items:center; justify-content:center;" th:text="#{profile.back}">Zurück</a>
            </div>
        </div>
    </div>

    <div id="storeModal" class="modal" th:style="${showStoreModal} ? 'display: flex;' : 'display: none;'">
        <div class="modal-content form-container" style="max-width: 600px; padding: 2rem; background-color: var(--color-bg-dark-gray); border: 1px solid var(--color-gray-3); border-radius: var(--radius-none);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0; color: var(--color-primary); font-family: var(--font-headline); text-transform: uppercase;" th:text="#{refineryorder.action.store}">Einlagern</h2>
                <span class="close" data-trigger="rod-close-store" style="cursor: pointer; font-size: 1.5rem;">&times;</span>
            </div>
            
            <form id="storeForm" th:action="@{/refinery-orders/{id}/store(id=${orderId})}" method="post" th:object="${storeForm}" data-trigger="rod-disable-submit">
                <div id="storeItemsContainer">
                    <div th:each="item, stat : *{items}" class="store-item-block" style="border: 1px solid var(--color-gray-3); padding: 1rem; border-radius: var(--radius-none); background-color: var(--color-surface-input); margin-bottom: 1rem;">
                        <div class="flex-between-mb">
                            <h4 style="margin: 0; color: var(--color-gray-1); font-family: var(--font-body);" th:text="${item.materialName}"></h4>
                            <button type="button" class="btn btn-ghost" style="padding: 0.2rem 0.5rem;" data-trigger="rod-duplicate-store" th:title="#{refineryorder.action.split}" th:if="${!item.amountFixed}">+</button>
                        </div>
                        
                        <input type="hidden" th:field="*{items[__${stat.index}__].materialId}" />
                        <input type="hidden" th:field="*{items[__${stat.index}__].materialName}" />
                        <input type="hidden" th:field="*{items[__${stat.index}__].amountFixed}" />
                        <input type="hidden" th:field="*{items[__${stat.index}__].quantityType}" />
                        
                        <div class="material-row">
                            <div class="form-group flex-1 mb-0">
                                <label th:for="'storeAmount_' + ${stat.index}">
                                    <span th:text="#{inventory.form.amount}">Menge</span>
                                    <span th:if="*{items[__${stat.index}__].quantityType == 'PIECE'}" th:text="'(' + #{material.quantity.piece} + ')'"></span>
                                    <span th:if="*{items[__${stat.index}__].quantityType == 'SCU'}" th:text="'(' + #{material.quantity.scu} + ')'"></span>
                                    <th:block th:if="*{items[__${stat.index}__].quantityType == 'SCU'}" th:replace="~{fragments/scu-hint :: scuHint(null, false)}"></th:block>
                                </label>
                                <input type="text" data-scu-decimal th:id="'storeAmount_' + ${stat.index}" th:field="*{items[__${stat.index}__].amount}" th:step="*{items[__${stat.index}__].quantityType == 'PIECE' ? '1' : '0.001'}" min="0" inputmode="decimal" required>
                            </div>
                            <div class="form-group flex-1 mb-0">
                                <label th:for="'storeQuality_' + ${stat.index}" th:text="#{inventory.form.quality}">Qualität</label>
                                <input type="number" th:id="'storeQuality_' + ${stat.index}" th:field="*{items[__${stat.index}__].quality}" required min="0" max="1000">
                            </div>
                        </div>
                        <div class="material-row mt-1">
                            <div class="form-group flex-1 mb-0">
                                <label th:for="'storeLocation_' + ${stat.index}" th:text="#{inventory.form.location}">Lagerort</label>
                                <select th:id="'storeLocation_' + ${stat.index}" th:field="*{items[__${stat.index}__].locationId}" required>
                                    <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                                    <option th:each="loc : ${allLocations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                                </select>
                            </div>
                            <div class="form-group flex-1 mb-0">
                                <label th:for="'storeUser_' + ${stat.index}" th:text="#{refineryorder.store.user}">Mitglied</label>
                                <select th:id="'storeUser_' + ${stat.index}" th:field="*{items[__${stat.index}__].userId}" required>
                                    <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.effectiveName}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0; margin-top: 1rem;">
                            <label th:for="'storeOrgUnit_' + ${stat.index}" th:text="#{refineryorder.store.orgUnit}">Org-Einheit</label>
                            <select th:id="'storeOrgUnit_' + ${stat.index}" class="store-org-unit-select" th:field="*{items[__${stat.index}__].owningOrgUnitId}">
                                <option value="" th:text="#{refineryorder.store.orgUnit.placeholder}">-- Org-Einheit w&#228;hlen --</option>
                                <option th:each="ou : ${storeOrgUnitOptions}" th:value="${ou.orgUnitId()}" th:text="${ou.orgUnitName()}"></option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0; margin-top: 1rem;">
                            <label th:for="'storeJobOrder_' + ${stat.index}" th:text="#{refineryorder.store.joborder}">Auftrag (Optional)</label>
                            <select th:id="'storeJobOrder_' + ${stat.index}" th:field="*{items[__${stat.index}__].jobOrderId}">
                                <option value="" th:text="#{orders.create.select}">-- Bitte wählen --</option>
                                <option th:each="jo : ${jobOrders}" th:if="${jo.materials != null and !jo.materials.isEmpty() and #lists.contains(jo.materials.![material.id], item.materialId)}" th:value="${jo.id}" th:text="${jo.displayId + ' - ' + (jo.requestingOrgUnit != null ? jo.requestingOrgUnit.name() : '—')}"></option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0; margin-top: 1rem;">
                            <label th:for="'storeNote_' + ${stat.index}" th:text="#{refineryorder.store.note}">Notiz (Optional)</label>
                            <textarea th:id="'storeNote_' + ${stat.index}" th:field="*{items[__${stat.index}__].note}" maxlength="1000" rows="2" th:placeholder="#{refineryorder.store.note.placeholder}"></textarea>
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn--cta"><svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-save"/></svg> <span th:text="#{orders.create.save}">Speichern</span></button>
                    <button type="button" class="btn btn-ghost" data-trigger="rod-close-store" th:text="#{orders.create.cancel}">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    const ROUNDING_MODE = /*[[${roundingMode}]]*/ 'UP';

    // Initialize the shared yield-badge module with the server-rendered map for this order's
    // refinery. Subsequent location/material changes update the badge via the module's helpers
    // (refinery-yield-badge.js) without a page reload.
    window.krtRefineryYield.init(
        /*[[${materialYieldBonuses}]]*/ {},
        /*[[#{refineryorder.form.material.yieldBonus.help}]]*/ '');
    const MATERIAL_ENTRY_TITLE_LABEL = /*[[#{refineryorder.form.material.entryTitle}]]*/ 'Material';
    const MATERIAL_REMOVE_LABEL = /*[[#{refineryorder.form.material.remove}]]*/ 'Entfernen';

    // In-place writes (#575): the refinery update/store/cancel navigate away on success (to the
    // list), so intercept the forms, POST FormData (the browser serializes the dynamic goods/store
    // editor) with X-Requested-With + krtCsrf, and navigate to the JSON targetUrl. On a
    // validation/backend failure the page STAYS with an inline toast instead of the POST->redirect
    // reflash. The classic form-POST handlers are the no-JS fallback (krtCsrf absent).
    const MSG_SAVING = /*[[#{refineryorder.action.saving}]]*/ 'Saving...';
    const MSG_REFINERY_UPDATE_FAILED = /*[[#{error.refineryorder.update.failed}]]*/ 'Update failed.';
    const MSG_REFINERY_STORE_FAILED = /*[[#{error.refineryorder.store.failed}]]*/ 'Store failed.';
    const MSG_REFINERY_CANCEL_FAILED = /*[[#{error.refineryorder.cancel.failed}]]*/ 'Cancel failed.';
    const MSG_CANCEL_CONFIRM = /*[[#{refineryorder.action.cancel.confirm}]]*/ 'Cancel this order?';
    const MSG_CANCEL_TITLE = /*[[#{refineryorder.action.cancel}]]*/ 'Cancel Order';
    const MSG_CANCEL_DISMISS = /*[[#{general.cancel}]]*/ 'Cancel';
    // #596 store-dialog owning-org-unit picker: the order's inherited default selection (null when
    // the order itself is ownerless) and the placeholder label for the rebuilt option list.
    const STORE_INHERITED_ORG_UNIT_ID = /*[[${orderOwningOrgUnitId}]]*/ null;
    const STORE_ORG_UNIT_PLACEHOLDER = /*[[#{refineryorder.store.orgUnit.placeholder}]]*/ 'Select org unit';
    async function _submitRefinery(form, errorMessage, onFailure, submitter) {
        if (!window.krtCsrf) { form.submit(); return; }
        // Double-submit guard: disable the triggering button for the whole round-trip (re-enabled in
        // the finally so a failed write can be retried; the success path navigates away).
        if (submitter) { submitter.disabled = true; }
        try {
        const fd = new FormData(form);
        function buildHeaders() {
            const h = { 'X-Requested-With': 'XMLHttpRequest' };
            const t = window.krtCsrf.token();
            const n = window.krtCsrf.headerName();
            if (t && n) h[n] = t;
            return h;
        }
        let res;
        try {
            res = await fetch(form.action, { method: 'POST', body: fd, headers: buildHeaders() });
            if (res.status === 403 && window.krtCsrf.refresh) {
                const refreshed = await window.krtCsrf.refresh();
                if (refreshed) res = await fetch(form.action, { method: 'POST', body: fd, headers: buildHeaders() });
            }
        } catch (e) {
            if (onFailure) onFailure();
            showFrontendErrorToast(errorMessage);
            return;
        }
        if (!res.ok) {
            if (onFailure) onFailure();
            showFrontendErrorToast(errorMessage);
            return;
        }
        let body = null;
        try { body = await res.json(); } catch (e) { /* non-JSON body */ }
        if (typeof window.resetUnsavedChanges === 'function') window.resetUnsavedChanges();
        if (body && body.targetUrl) window.location.assign(body.targetUrl);
        else window.location.reload();
        } finally {
            if (submitter) { submitter.disabled = false; }
        }
    }

    function calcScu(index) {
        const unitInput = document.getElementById('outputQuantity_' + index);
        const scuInput = document.getElementById('outputQuantityScu_' + index);
        if (unitInput && scuInput) {
            let valStr = unitInput.value.replace(/\./g, '').replace(',', '.');
            const val = parseInt(valStr);
            if (!isNaN(val)) {
                const scu = val / 100.0;
                scuInput.value = scu.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3, useGrouping: false });
            } else {
                scuInput.value = '';
            }
        }
    }

    function closeStoreModal() {
        if (typeof window.resetUnsavedChanges === 'function') {
            window.resetUnsavedChanges();
        }
        document.getElementById('storeModal').style.display = 'none';
    }

    function openStoreModal() {
        document.getElementById('storeModal').style.display = 'flex';
    }

    function duplicateStoreItem(btn) {
        const container = document.getElementById('storeItemsContainer');
        const blockToCopy = btn.closest('.store-item-block');
        const newBlock = blockToCopy.cloneNode(true);
        
        const allBlocks = container.querySelectorAll('.store-item-block');
        const newIndex = allBlocks.length;
        
        const nameRegex = /items\[\d+\]/g;
        
        newBlock.querySelectorAll('input, select, textarea').forEach(el => {
            if (el.name) {
                el.name = el.name.replace(nameRegex, `items[${newIndex}]`);
            }
            if (el.id) {
                el.id = el.id.replace(/_\d+$/, `_${newIndex}`);
            }
            if (el.id && el.id.startsWith('storeAmount_')) {
                el.value = '';
            }
            if (el.id && el.id.startsWith('storeNote_')) {
                el.value = '';
            }
        });
        
        newBlock.querySelectorAll('label').forEach(el => {
            if (el.htmlFor) {
                el.htmlFor = el.htmlFor.replace(/_\d+$/, `_${newIndex}`);
            }
        });
        
        const btnInNewBlock = newBlock.querySelector('button');
        if (btnInNewBlock) {
            btnInNewBlock.textContent = '-';
            btnInNewBlock.onclick = function() {
                newBlock.remove();
                reindexStoreItems();
            };
            btnInNewBlock.setAttribute('title', 'Aufteilung entfernen');
        }
        
        blockToCopy.after(newBlock);
        reindexStoreItems();
    }

    function reindexStoreItems() {
        const container = document.getElementById('storeItemsContainer');
        const allBlocks = container.querySelectorAll('.store-item-block');
        allBlocks.forEach((block, index) => {
            const nameRegex = /items\[\d+\]/g;
            block.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.name) {
                    el.name = el.name.replace(nameRegex, `items[${index}]`);
                }
                if (el.id) {
                    el.id = el.id.replace(/_\d+$/, `_${index}`);
                }
            });
            block.querySelectorAll('label').forEach(el => {
                if (el.htmlFor) {
                    el.htmlFor = el.htmlFor.replace(/_\d+$/, `_${index}`);
                }
            });
        });
    }

    // #596: rebuild a store row's owning-org-unit <select> from the picked receiver's OrgUnit
    // memberships. Re-selects the order's inherited default when the receiver belongs to it, else
    // keeps a prior still-valid pick, else leaves the placeholder selected to force a choice.
    function rebuildOrgUnitOptions(selectEl, options) {
        const previous = selectEl.value;
        while (selectEl.firstChild) {
            selectEl.removeChild(selectEl.firstChild);
        }
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = STORE_ORG_UNIT_PLACEHOLDER;
        selectEl.appendChild(placeholder);
        let hasInherited = false;
        let hasPrevious = false;
        options.forEach((o) => {
            const opt = document.createElement('option');
            opt.value = o.orgUnitId;
            opt.textContent = o.orgUnitName;
            selectEl.appendChild(opt);
            if (o.orgUnitId === STORE_INHERITED_ORG_UNIT_ID) hasInherited = true;
            if (previous && o.orgUnitId === previous) hasPrevious = true;
        });
        if (hasInherited) selectEl.value = STORE_INHERITED_ORG_UNIT_ID;
        else if (hasPrevious) selectEl.value = previous;
        else selectEl.value = '';
    }

    // When the receiving member of a store row changes, refresh that row's owning-org-unit picker
    // from the new member's memberships (proxied via the frontend AJAX endpoint). Delegated on the
    // items container so split (duplicated) rows are covered too.
    (function () {
        const storeItemsContainer = document.getElementById('storeItemsContainer');
        if (!storeItemsContainer) return;
        storeItemsContainer.addEventListener('change', (e) => {
            const sel = e.target;
            if (!sel || !sel.id || !sel.id.startsWith('storeUser_')) return;
            const index = sel.id.substring('storeUser_'.length);
            const orgSelect = document.getElementById('storeOrgUnit_' + index);
            if (!orgSelect || !sel.value) return;
            fetch('/refinery-orders/users/' + encodeURIComponent(sel.value) + '/org-units',
                { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then((r) => (r.ok ? r.json() : []))
                .then((opts) => rebuildOrgUnitOptions(orgSelect, Array.isArray(opts) ? opts : []))
                .catch(() => rebuildOrgUnitOptions(orgSelect, []));
        });
    })();

    function updateOutputMaterial(selectElement) {
        const entryBlock = selectElement.closest('.material-entry');
        const outputDisplay = entryBlock.querySelector('span[id^="outputMaterialDisplay_"]');
        const selectedOption = selectElement.options[selectElement.selectedIndex];

        if (selectedOption) {
            const refinedName = selectedOption.getAttribute('data-refined-name');
            if (refinedName) {
                outputDisplay.innerText = refinedName;
                outputDisplay.style.opacity = '1';
            } else {
                outputDisplay.innerText = '-';
                outputDisplay.style.opacity = '0.7';
            }
        }

        // Refresh the yield badge against the in-memory materialId -> bonus map (shared module
        // state). The map is loaded server-side on first paint for the order's current location
        // and refreshed via AJAX whenever the user picks a different refinery in the location
        // dropdown (see the rod-location-change handler at the bottom of this script).
        window.krtRefineryYield.refreshFor(selectElement);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const inputSelects = document.querySelectorAll('select[id^="inputMaterialId_"]');
        inputSelects.forEach(select => {
            if(select.value) {
                updateOutputMaterial(select);
            }
        });
        updateMethodRatings();
        const entries = document.querySelectorAll('.material-entry');
        entries.forEach((_, index) => {
            calcScu(index);
        });
        // Resync every row's badge against the shared module's map. Server-side render uses the
        // same map so this is normally a no-op, but it guarantees the post-save reload state
        // matches the map even if a future refactor breaks the parity between Thymeleaf and JS.
        window.krtRefineryYield.refreshAll();
    });

    function setStartedAtNow() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        const dateInput = document.querySelector('.datetime-split-group .date-part');
        const timeInput = document.querySelector('.datetime-split-group .time-part');
        
        if (dateInput && timeInput) {
            dateInput.value = `${year}-${month}-${day}`;
            timeInput.value = `${hours}:${minutes}`;
            dateInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
        updateEndsAt();
    }

    function addMaterialRow() {
        const container = document.getElementById('materials-container');
        const entries = container.querySelectorAll('.material-entry');
        const count = entries.length;

        const template = entries[0].cloneNode(true);

        // Renumber the title in the header. Source is row 0 ("Material #1") so without an
        // update the cloned row would also read "Material #1" until the page is reloaded.
        const title = template.querySelector('.material-entry-title');
        if (title) {
            title.textContent = MATERIAL_ENTRY_TITLE_LABEL + ' #' + (count + 1);
        }

        // Row 0 has no Remove button (the very first material can't be removed) — inject one
        // into the cloned row's header. Wired through the delegated 'rod-remove-material'
        // krtEvents handler via data-trigger, matching the server-rendered button.
        if (!template.querySelector('.remove-btn')) {
            const header = template.querySelector('.material-entry-header');
            if (header) {
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'btn btn-quiet-danger remove-btn btn-icon';
                removeBtn.style.cssText = 'padding: 0.25rem 0.5rem; font-size: 0.8rem;';
                removeBtn.setAttribute('data-trigger', 'rod-remove-material');
                // Icon-only trash button, matching the server-rendered remove button in the
                // material-entry header. Label moves to title/aria-label; the SVG references the
                // sprite injected by the sidebar.
                removeBtn.setAttribute('title', MATERIAL_REMOVE_LABEL);
                removeBtn.setAttribute('aria-label', MATERIAL_REMOVE_LABEL);
                removeBtn.innerHTML = '<svg class="krt-icon" aria-hidden="true"><use href="#krt-icon-trash"/></svg>';
                header.appendChild(removeBtn);
            }
        }

        const inputs = template.querySelectorAll('input, select');
        inputs.forEach(input => {
            if (input.id) {
                input.id = input.id.replace(/_\d+$/, '_' + count);
            }
            if (input.name) {
                input.name = input.name.replace(/\[\d+\]/, '[' + count + ']');
            }
            // The delegated rod-calc-scu handler reads data-index to know which row's
            // SCU field to update; without renumbering, calcScu() always targets row 0.
            if (input.hasAttribute('data-index')) {
                input.setAttribute('data-index', count);
            }
            if (input.tagName.toLowerCase() === 'select') {
                input.selectedIndex = 0;
            } else {
                input.value = '';
            }
        });

        const displaySpan = template.querySelector('span[id^="outputMaterialDisplay_"]');
        if (displaySpan) {
            displaySpan.id = displaySpan.id.replace(/_\d+$/, '_' + count);
            displaySpan.innerText = '-';
            displaySpan.style.opacity = '0.7';
        }

        // A cloned row inherits the source row's yield badge — but the new row's material is
        // empty so the badge has no meaning. setYieldBadge() with undefined removes it; the
        // badge re-renders as soon as the user picks a material that has a yield row.
        const yieldBadge = template.querySelector('span[id^="yieldBonus_"]');
        if (yieldBadge) {
            yieldBadge.id = 'yieldBonus_' + count;
            yieldBadge.remove();
        }

        const labels = template.querySelectorAll('label');
        labels.forEach(label => {
            const forAttr = label.getAttribute('for');
            if (forAttr) {
                label.setAttribute('for', forAttr.replace(/_\d+$/, '_' + count));
            }
        });

        container.appendChild(template);
    }
    
    function removeMaterialRow(button) {
        const entry = button.closest('.material-entry');
        entry.remove();

        const container = document.getElementById('materials-container');
        const entries = container.querySelectorAll('.material-entry');
        entries.forEach((entry, index) => {
            const inputs = entry.querySelectorAll('input, select');
            inputs.forEach(input => {
                if (input.id) {
                    input.id = input.id.replace(/_\d+$/, '_' + index);
                }
                if (input.name) {
                    input.name = input.name.replace(/\[\d+\]/, '[' + index + ']');
                }
                if (input.hasAttribute('data-index')) {
                    input.setAttribute('data-index', index);
                }
            });
            const displaySpan = entry.querySelector('span[id^="outputMaterialDisplay_"]');
            if (displaySpan) {
                displaySpan.id = displaySpan.id.replace(/_\d+$/, '_' + index);
            }
            const yieldBadge = entry.querySelector('span[id^="yieldBonus_"]');
            if (yieldBadge) {
                yieldBadge.id = 'yieldBonus_' + index;
            }
            const title = entry.querySelector('.material-entry-title');
            if (title) {
                title.textContent = MATERIAL_ENTRY_TITLE_LABEL + ' #' + (index + 1);
            }
            const labels = entry.querySelectorAll('label');
            labels.forEach(label => {
                const forAttr = label.getAttribute('for');
                if (forAttr) {
                    label.setAttribute('for', forAttr.replace(/_\d+$/, '_' + index));
                }
            });
        });
    }

    function updateMethodRatings() {
        const methodSelect = document.getElementById('refiningMethodId');
        const ratingsDiv = document.getElementById('methodRatings');
        if (!methodSelect || !ratingsDiv) return;
        
        const selectedOption = methodSelect.options[methodSelect.selectedIndex];
        
        const ratingLevels = {
            1: /*[[#{refining.rating.level.1}]]*/ 'Niedrig',
            2: /*[[#{refining.rating.level.2}]]*/ 'Mittel',
            3: /*[[#{refining.rating.level.3}]]*/ 'Hoch'
        };
        
        const speedLevels = {
            1: /*[[#{refining.rating.speed.1}]]*/ 'Langsam',
            2: /*[[#{refining.rating.speed.2}]]*/ 'Mittel',
            3: /*[[#{refining.rating.speed.3}]]*/ 'Schnell'
        };
        
        if (selectedOption && selectedOption.value !== "") {
            document.getElementById('ratingYieldVal').innerText = ratingLevels[selectedOption.getAttribute('data-yield')] || '-';
            document.getElementById('ratingCostVal').innerText = ratingLevels[selectedOption.getAttribute('data-cost')] || '-';
            document.getElementById('ratingSpeedVal').innerText = speedLevels[selectedOption.getAttribute('data-speed')] || '-';
            ratingsDiv.style.display = 'flex';
        } else {
            ratingsDiv.style.display = 'none';
        }
    }

    function updateEndsAt() {
        const startedAtInput = document.getElementById('startedAt');
        const durationHoursInput = document.getElementById('durationHours');
        const durationMinutesInput = document.getElementById('durationMinutes');
        const endsAtDisplay = document.querySelector('#endsAtDisplay span');
        
        if (!startedAtInput || !durationHoursInput || !durationMinutesInput || !endsAtDisplay) return;
        
        const startedAt = startedAtInput.value;
        const hours = parseInt(durationHoursInput.value) || 0;
        const minutes = parseInt(durationMinutesInput.value) || 0;
        
        if (startedAt) {
            const startDate = new Date(startedAt);
            if (!isNaN(startDate)) {
                const totalMinutes = (hours * 60) + minutes;
                const endDate = new Date(startDate.getTime() + totalMinutes * 60000);
                
                const day = String(endDate.getDate()).padStart(2, '0');
                const month = String(endDate.getMonth() + 1).padStart(2, '0');
                const year = endDate.getFullYear();
                const hoursDisplay = String(endDate.getHours()).padStart(2, '0');
                const minutesDisplay = String(endDate.getMinutes()).padStart(2, '0');
                
                endsAtDisplay.innerText = `${day}.${month}.${year} ${hoursDisplay}:${minutesDisplay}`;
            } else {
                endsAtDisplay.innerText = '-';
            }
        } else {
            endsAtDisplay.innerText = '-';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const hiddenStartedAt = document.getElementById('startedAt');
        const dHours = document.getElementById('durationHours');
        const dMinutes = document.getElementById('durationMinutes');
        
        if (hiddenStartedAt) {
            hiddenStartedAt.addEventListener('change', updateEndsAt);
            hiddenStartedAt.addEventListener('input', updateEndsAt);
        }
        if (dHours) dHours.addEventListener('input', updateEndsAt);
        if (dMinutes) dMinutes.addEventListener('input', updateEndsAt);
        
        updateEndsAt();
    });

    document.addEventListener('DOMContentLoaded', function() {
        updateMethodRatings();
    });

    /**
     * Aktualisiert das read-only "Gewinn/Verlust"-Feld live aus oreSales - expenses - otherExpenses.
     * Server bleibt Source of Truth; dies ist lediglich eine UI-Vorschau.
     */
    function updateProfitPreview() {
        const expensesEl = document.getElementById('expenses');
        const otherExpensesEl = document.getElementById('otherExpenses');
        const oreSalesEl = document.getElementById('oreSales');
        const preview = document.getElementById('profitPreview');
        if (!preview) return;
        const expenses = parseFloat(expensesEl && expensesEl.value) || 0;
        const otherExpenses = parseFloat(otherExpensesEl && otherExpensesEl.value) || 0;
        const oreSales = parseFloat(oreSalesEl && oreSalesEl.value) || 0;
        const profit = Math.round(oreSales - expenses - otherExpenses);
        preview.value = profit.toLocaleString();
        preview.classList.toggle('text-danger', profit < 0); preview.classList.toggle('text-muted', profit >= 0);
    }
    document.addEventListener('DOMContentLoaded', updateProfitPreview);

    // CSP-safe delegated bindings (replaces the 14 inline on*= handlers above — preserves the
    // input/change/submit semantics so the page behaves identically to the prior version).
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('input', 'rod-update-profit', updateProfitPreview);
        // Restore "0" if the user clears one of the money fields and tabs away. Uses
        // `focusout` (which bubbles) instead of `blur` because event delegation listens
        // on `document` and `blur` does not bubble. The profit-preview re-runs after the
        // restore so the read-only Gewinn/Verlust field reflects the implicit 0 immediately.
        window.krtEvents.on('focusout', 'rod-update-profit', function (el) {
            if (el.value.trim() === '') {
                el.value = '0';
                updateProfitPreview();
            }
        });
        window.krtEvents.on('click', 'rod-set-started-now', setStartedAtNow);
        window.krtEvents.on('change', 'rod-update-method', updateMethodRatings);
        window.krtEvents.on('click', 'rod-add-material', addMaterialRow);
        window.krtEvents.on('click', 'rod-remove-material', function (el) { removeMaterialRow(el); });
        window.krtEvents.on('change', 'rod-update-output', function (el) { updateOutputMaterial(el); });
        window.krtEvents.on('change', 'rod-location-change', function (el) { window.krtRefineryYield.onLocationChange(el); });
        window.krtEvents.on('input', 'rod-calc-scu', function (el) {
            calcScu(el.getAttribute('data-index'));
        });
        window.krtEvents.on('click', 'rod-open-store', openStoreModal);
        window.krtEvents.on('click', 'rod-close-store', closeStoreModal);
        window.krtEvents.on('click', 'rod-duplicate-store', function (el) { duplicateStoreItem(el); });
        window.krtEvents.on('submit', 'rod-disable-submit', function (el) {
            // Disable the submit button + relabel it so a double-click does not file the form twice
            // (the old inline onsubmit handler did the same thing).
            var btn = el.querySelector('button[type=submit]');
            if (btn) {
                btn.disabled = true;
                // Relabel only the text <span> so the leading <svg> save icon survives;
                // overwriting btn.innerText would wipe the icon out of the icon+text button.
                var btnLabel = btn.querySelector('span');
                if (btnLabel) {
                    btnLabel.textContent = MSG_SAVING;
                } else {
                    btn.innerText = MSG_SAVING;
                }
            }
        });
    }

    // #575 in-place form interceptors. Bound at parse time (the forms are rendered above this
    // script). rod-* controls stay document-delegated (they survive); these just replace the native
    // POST->redirect with FormData + navigate/toast.
    (function () {
        const mainForm = document.getElementById('refineryOrderMainForm');
        if (mainForm) {
            mainForm.addEventListener('submit', (e) => {
                e.preventDefault();
                _submitRefinery(mainForm, MSG_REFINERY_UPDATE_FAILED, null, e.submitter);
            });
        }
        const storeForm = document.getElementById('storeForm');
        if (storeForm) {
            storeForm.addEventListener('submit', (e) => {
                e.preventDefault();
                // rod-disable-submit (document-delegated) disables + relabels the button after this
                // handler; capture the original label now so a failed store can restore it (no reload).
                const btn = storeForm.querySelector('button[type=submit]');
                const btnLabel = btn ? btn.querySelector('span') : null;
                const originalLabel = btnLabel ? btnLabel.textContent : null;
                _submitRefinery(storeForm, MSG_REFINERY_STORE_FAILED, function () {
                    if (btn) btn.disabled = false;
                    if (btnLabel && originalLabel != null) btnLabel.textContent = originalLabel;
                });
            });
        }
        const cancelForm = document.getElementById('refineryCancelForm');
        if (cancelForm) {
            cancelForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (typeof window.showKrtConfirm === 'function') {
                    const ok = await window.showKrtConfirm(
                        MSG_CANCEL_TITLE, MSG_CANCEL_CONFIRM, MSG_CANCEL_TITLE, MSG_CANCEL_DISMISS);
                    if (!ok) return;
                }
                _submitRefinery(cancelForm, MSG_REFINERY_CANCEL_FAILED, null, e.submitter);
            });
        }
    })();
</script>
</body>
