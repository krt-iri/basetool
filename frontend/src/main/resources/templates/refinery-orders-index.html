<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{})}">
    <title th:text="#{nav.refinery}">Raffinerie</title>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{nav.refinery}">Raffinerieaufträge</h1>
        <a th:href="@{/refinery-orders/create(source='index')}" class="btn btn--cta" data-testid="refinery-create-link" th:text="#{refineryorder.create.btn}">Neuer Auftrag</a>
    </div>

    <div class="hud-box mt-2">
        <form id="refinery-filter-form" class="no-track" method="get" th:action="@{/refinery-orders}" style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap;">
            <span th:text="#{orders.index.filter.status}" style="font-weight: 700; font-size: 0.8rem; color: var(--color-gray-1);">Status:</span>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="OPEN" th:checked="${selectedStatuses != null and selectedStatuses.contains('OPEN')}">
                <span th:text="#{refineryorder.status.OPEN}">Offen</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="IN_PROGRESS" th:checked="${selectedStatuses != null and selectedStatuses.contains('IN_PROGRESS')}">
                <span th:text="#{refineryorder.status.IN_PROGRESS}">In Bearbeitung</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="COMPLETED" th:checked="${selectedStatuses != null and selectedStatuses.contains('COMPLETED')}">
                <span th:text="#{refineryorder.status.COMPLETED}">Abgeschlossen</span>
            </label>
            <label class="flex-gap-2xs">
                <input type="checkbox" name="status" value="CANCELED" th:checked="${selectedStatuses != null and selectedStatuses.contains('CANCELED')}">
                <span th:text="#{refineryorder.status.CANCELED}">Abgebrochen</span>
            </label>
            <label style="display: flex; align-items: center; gap: 0.25rem; padding-left: 1rem; border-left: 1px solid var(--color-gray-3);">
                <input type="checkbox" name="onlyMine" value="true" th:checked="${onlyMine}">
                <span th:text="#{refineryorder.index.filter.onlyMine}">Meine Aufträge</span>
            </label>
            <button type="submit" class="btn btn-ghost" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;" th:text="#{orders.index.filter.apply}">Filtern</button>
        </form>

        <div id="refinery-orders-results">
        <th:block th:fragment="refineryOrdersResults">
        <div class="table-responsive">
        <table class="data-table">
            <thead>
            <tr>
                <th th:text="#{refineryorder.index.id}">ID</th>
                <th th:text="#{refineryorder.index.owner}">Besitzer</th>
                <th class="nowrap" style="width: 1%;" th:text="#{refineryorder.index.endsAt}">Ende</th>
                <th th:text="#{refineryorder.index.location}">Ort</th>
                <th th:text="#{refineryorder.index.mission}">Einsatz</th>
                <th th:text="#{refineryorder.index.materials}">Materialien</th>
                <th th:if="${isAllSquadronsMode}" th:text="#{refineryorder.index.owning_squadron}">Staffel</th>
                <th th:text="#{refineryorder.index.actions}">Aktionen</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}" data-testid="refinery-order-row">
                <td class="nowrap">
                    <span class="refinery-order-id-display" th:data-utc="${order.endsAt != null ? order.endsAt.toEpochMilli() : 'null'}" th:text="${#strings.substring(order.id, #strings.length(order.id) - 4)}"></span>
                </td>
                <td th:text="${order.owner != null ? order.owner.effectiveName : '-'}"></td>
                <td class="nowrap">
                    <!-- Server-Rendering explizit in UTC, Anzeige wird im Browser per JS in Browser-Lokalzeit (DST-korrekt) konvertiert. -->
                    <span class="local-datetime-display" th:data-utc="${order.endsAt != null ? order.endsAt.toEpochMilli() : 'null'}" th:text="${order.endsAt != null ? #temporals.format(order.endsAt, 'dd.MM. HH:mm', 'UTC') + ' UTC' : '-'}"></span>
                </td>
                <td th:text="${order.location != null ? order.location.name : '-'}"></td>
                <td th:text="${order.mission != null ? order.mission.name : '-'}"></td>
                <td>
                    <span th:with="uniqueMaterials=${new java.util.LinkedHashSet()}">
                        <th:block th:each="mat : ${order.goods}">
                            <th:block th:if="${mat.inputMaterial != null}">
                                <span th:text="${uniqueMaterials.add(mat.inputMaterial.name) ? '' : ''}" th:remove="all"></span>
                            </th:block>
                        </th:block>
                        <span th:each="matName, iterStat : ${uniqueMaterials}" th:text="${matName} + ${!iterStat.last ? ', ' : ''}"></span>
                    </span>
                </td>
                <td th:if="${isAllSquadronsMode}">
                    <span th:if="${order.owningSquadron != null}" class="squadron-badge"
                          th:title="${order.owningSquadron.name()}"
                          th:text="${order.owningSquadron.shorthand()}">IRI</span>
                    <span th:if="${order.owningSquadron == null}" class="squadron-badge squadron-badge-muted">&mdash;</span>
                </td>
                <td class="nowrap">
                    <a th:href="@{/refinery-orders/{id}(id=${order.id})}" class="btn btn-ghost" th:text="#{refineryorder.action.details}">Details</a>
                </td>
            </tr>
            <tr th:if="${orders.empty}">
                <td th:attr="colspan=${isAllSquadronsMode ? 8 : 7}" class="text-center" th:text="#{refineryorder.index.empty}">Keine Aufträge vorhanden</td>
            </tr>
            </tbody>
        </table>
        </div>
        </th:block>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/toast :: toast}" />
<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    function updateRefineryOrderColors() {
        const nowMs = new Date().getTime();
        document.querySelectorAll('.refinery-order-id-display').forEach(el => {
            const utcMsStr = el.getAttribute('data-utc');
            
            if (utcMsStr && utcMsStr !== 'null') {
                const endsAtMs = parseInt(utcMsStr, 10);
                if (!isNaN(endsAtMs) && nowMs > endsAtMs) {
                    el.classList.add('text-success');
                    el.style.fontWeight = 'bold';
                }
            }
        });
    }

    function formatLocalDates() {
        document.querySelectorAll('.local-datetime-display').forEach(el => {
            const utcMsStr = el.getAttribute('data-utc');
            if (utcMsStr && utcMsStr !== 'null') {
                const date = new Date(parseInt(utcMsStr, 10));
                if (!isNaN(date)) {
                    const day = String(date.getDate()).padStart(2, '0');
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    el.innerText = `${day}.${month}. ${hours}:${minutes}`;
                }
            } else {
                el.innerText = '-';
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        formatLocalDates();
        updateRefineryOrderColors();
        setInterval(updateRefineryOrderColors, 10000);

        // In-place status filter (epic #571 / #573). The GET form stays the no-JS fallback;
        // the form id was renamed away from the generic "filter-form" so the sidebar's generic
        // change->submit auto-reload no longer fires here.
        const filterForm = document.getElementById('refinery-filter-form');
        const resultsContainer = document.getElementById('refinery-orders-results');
        if (filterForm && resultsContainer && window.krtFetch) {
            const applyFilter = () => {
                const data = new FormData(filterForm);
                const params = new URLSearchParams();
                for (const [key, value] of data.entries()) {
                    if (value !== '') params.append(key, value);
                }
                const query = params.toString();
                window.krtFetch.swap({
                    url: '/refinery-orders' + (query ? '?' + query : ''),
                    container: resultsContainer,
                    history: true,
                });
            };
            filterForm.addEventListener('submit', (event) => {
                event.preventDefault();
                applyFilter();
            });
            filterForm.querySelectorAll('input').forEach((el) => {
                el.addEventListener('change', applyFilter);
            });
        }
    });

    // Re-run the row enhancers after a fragment swap so swapped-in rows get their local-time
    // display + overdue colouring (they are otherwise only wired on the initial page load).
    document.addEventListener('krt:swapped', () => {
        formatLocalDates();
        updateRefineryOrderColors();
    });
</script>
</body>
</html>
