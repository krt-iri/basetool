<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:lang="${#locale.language}" lang="de">
<head th:replace="~{fragments/head :: head(titleContent=~{::title}, additionalLinks=~{::extraLinks})}">
    <title th:text="#{nav.hangar_data} + ' - ' + ${appTitle}">Schiffsdaten - Profit Basetool</title>
    <th:block th:fragment="extraLinks">
<style th:attr="nonce=${cspNonce}">
        .data-section {
            margin-bottom: 3rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.8rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--color-surface-input);
            border: 1px solid var(--color-gray-3);
            color: var(--color-gray-1);
            font-family: var(--font-body);
            box-sizing: border-box;
        }
    </style>
    </th:block>
</head>
<body>
<th:block th:replace="~{fragments/sidebar :: sidebar}" />

<header>
    <nav>
        <button id="hamburger" class="hamburger-btn" type="button" th:aria-label="#{a11y.nav.menu}">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <a th:href="@{/}" class="brand">
            <img th:src="@{/logos/krt.webp}" alt="Logo" height="50">
            <span class="logo-text" th:text="${appTitle}">Profit Basetool</span>
        </a>
    </nav>
</header>

<main>
    <div class="greeting hud-box flex-between">
        <h1 th:text="#{nav.hangar_data}">Schiffsdaten</h1>
        <form sec:authorize="hasRole('ADMIN')" th:action="@{/ship-data/reset-fitted}" method="post" id="reset-fitted-form">
            <button type="button" class="btn btn-ghost" data-trigger="open-modal-display" data-modal-id="reset-fitted-confirm-modal" th:text="#{hangar.ship.reset_fitted}">Alle unfitted</button>
        </form>
    </div>

    <div class="hud-box mt-2">

        <!-- ShipTypes Section -->
        <div class="data-section">
            <div class="flex-between-mb">
                <h2 th:text="#{ship.shiptypes}">Schiffstypen</h2>
                <div class="form-group" style="margin-bottom: 0; width: 300px; position: relative;">
                    <input type="text" id="filterShipTypes" th:placeholder="#{general.filter.name.placeholder}" data-trigger="filter-table" data-table-id="shipTypesTable" autocomplete="off">
                    <!--/*
                      Ship-type names are exposed to JavaScript via this server-
                      rendered <datalist> instead of a Thymeleaf JS-inline
                      expression. Thymeleaf 3.1 truncates the surrounding
                      <script> block right after the first List/Collection
                      JS-inline serialisation, so the second autocomplete
                      binding (manufacturers) plus filterTable + the modal
                      close handler would silently never wire. Keep the
                      datalist; do NOT move this back into <script>.
                    */-->
                    <datalist id="shipTypeNames-data" style="display: none;">
                        <option th:each="st : ${shipTypes}" th:value="${st.name}"></option>
                    </datalist>
                </div>
            </div>

            <div class="table-responsive">
            <table id="shipTypesTable">
                <thead>
                    <tr>
                        <th th:text="#{ship.shiptype.name}">Name</th>
                        <th th:text="#{ship.manufacturer}">Hersteller</th>
                        <th th:text="#{ship.shiptype.description}">Beschreibung</th>
                        <th sec:authorize="hasRole('ADMIN')" th:text="#{general.action}">Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="st : ${shipTypes}" th:style="${st.hidden} ? 'opacity: 0.5;' : ''">
                        <td th:text="${st.name}">Name</td>
                        <td th:text="${st.manufacturer != null ? st.manufacturer.abbreviation : ''}">Hersteller</td>
                        <td th:text="${st.description}">Desc</td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <form th:action="@{/ship-data/ship-types/{id}/visibility(id=${st.id})}" method="post"
                                  class="js-visibility-toggle"
                                  th:data-label-show="#{info.show}" th:data-label-hide="#{info.hide}">
                                <input type="hidden" name="hidden" th:value="${!st.hidden}">
                                <button type="submit" class="btn" th:classappend="${st.hidden} ? '' : 'btn-secondary'" th:text="${st.hidden} ? #{info.show} : #{info.hide}">Ausblenden</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>

        <!-- Manufacturers Section -->
        <div class="data-section">
            <div class="flex-between-mb">
                <h2 th:text="#{ship.manufacturers}">Hersteller</h2>
                <div class="form-group" style="margin-bottom: 0; width: 300px; position: relative;">
                    <input type="text" id="filterManufacturers" th:placeholder="#{general.filter.name.placeholder}" data-trigger="filter-table" data-table-id="manufacturersTable" autocomplete="off">
                    <!--/*
                      Manufacturer names datalist — companion to the shipTypes
                      datalist above. See that comment for the Thymeleaf 3.1
                      truncation bug.
                    */-->
                    <datalist id="mfgNames-data" style="display: none;">
                        <option th:each="m : ${manufacturers}" th:value="${m.name}"></option>
                    </datalist>
                </div>
            </div>
            
            <div class="table-responsive">
            <table id="manufacturersTable">
                <thead>
                    <tr>
                        <th th:text="#{ship.manufacturer.name}">Name</th>
                        <th th:text="#{ship.manufacturer.abbreviation}">Kürzel</th>
                        <th th:text="#{ship.manufacturer.description}">Beschreibung</th>
                        <th sec:authorize="hasRole('ADMIN')" th:text="#{general.action}">Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${manufacturers}" th:style="${m.hidden} ? 'opacity: 0.5;' : ''">
                        <td th:text="${m.name}">Name</td>
                        <td th:text="${m.abbreviation}">Kürzel</td>
                        <td th:text="${m.description}">Desc</td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <form th:action="@{/ship-data/manufacturers/{id}/visibility(id=${m.id})}" method="post"
                                  class="js-visibility-toggle"
                                  th:data-label-show="#{info.show}" th:data-label-hide="#{info.hide}">
                                <input type="hidden" name="hidden" th:value="${!m.hidden}">
                                <button type="submit" class="btn" th:classappend="${m.hidden} ? '' : 'btn-secondary'" th:text="${m.hidden} ? #{info.show} : #{info.hide}">Ausblenden</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</main>

<!-- Modals -->
<div sec:authorize="hasRole('ADMIN')">
    <!-- Reset Fitted Confirmation Modal -->
    <div id="reset-fitted-confirm-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:480px; text-align:center;">
            <h2 th:text="#{hangar.ship.reset_fitted.confirm.title}">Zurücksetzen bestätigen</h2>
            <p style="margin:1.5rem 0; font-family:var(--font-body); color:var(--color-gray-1);" th:text="#{hangar.ship.reset_fitted.confirm.message}">Möchten Sie wirklich alle Schiffe aller Spieler auf "nicht einsatzbereit" (unfitted) setzen?</p>
            <div style="display:flex; gap:1rem; justify-content:center;">
                <button type="button" class="btn btn-ghost" data-trigger="ship-close-modal" data-modal-id="reset-fitted-confirm-modal" th:text="#{info.cancel}">Abbrechen</button>
                <button type="button" class="btn btn-danger" data-trigger="shipdata-reset" th:text="#{hangar.ship.reset_fitted.button}">Zurücksetzen</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/autocomplete.js}" th:attr="nonce=${cspNonce}"></script>
<script th:attr="nonce=${cspNonce}">
    document.addEventListener("DOMContentLoaded", function() {
        const shipTypesData = document.getElementById("shipTypeNames-data");
        const shipTypeNames = shipTypesData
            ? Array.from(shipTypesData.options).map(function (o) { return o.value; })
            : [];
        const mfgData = document.getElementById("mfgNames-data");
        const mfgNames = mfgData
            ? Array.from(mfgData.options).map(function (o) { return o.value; })
            : [];

        const inpShipTypes = document.getElementById("filterShipTypes");
        if(inpShipTypes) krtAutocomplete(inpShipTypes, shipTypeNames);

        const inpMfgs = document.getElementById("filterManufacturers");
        if(inpMfgs) krtAutocomplete(inpMfgs, mfgNames);
    });

    function filterTable(tableId, query) {
        var filter = query.toUpperCase();
        var table = document.getElementById(tableId);
        var tr = table.getElementsByTagName("tr");
        for (var i = 1; i < tr.length; i++) {
            var td = tr[i].getElementsByTagName("td")[0]; // Name is in the first column
            if (td) {
                var txtValue = td.textContent || td.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }       
        }
    }

    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
    }
    function closeModal(id) {
        if (typeof window.resetUnsavedChanges === 'function') {
            window.resetUnsavedChanges();
        }
        document.getElementById(id).style.display = 'none';
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll('.modal').forEach(m => {
            m.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.style.display = 'none';
                }
            });
        });
    });

    // CSP-safe delegated binding for the page-local close-modal flow (which additionally
    // calls window.resetUnsavedChanges before hiding — see closeModal above). Open and the
    // form-submit are covered by the global common-handlers (open-modal-display /
    // submit-form-by-id).
    if (window.krtEvents && typeof window.krtEvents.on === 'function') {
        window.krtEvents.on('click', 'ship-close-modal', function (el) {
            closeModal(el.getAttribute('data-modal-id'));
        });
    }
</script>

<script th:inline="javascript" th:attr="nonce=${cspNonce}">
    /*<![CDATA[*/
    // In-place AJAX (epic #571 / REQ-FE-001): the visibility toggles flip the row and the reset
    // clears the fitted flag without a full-page reload. The classic POST→redirect forms stay the
    // no-JS fallback (the AJAX twins are gated on the X-Requested-With header).
    (function () {
        if (!window.krtFetch) {
            return;
        }
        var i18n = {
            saved:        /*[[#{notification.success.save}]]*/ 'Gespeichert.',
            toggleError:  /*[[#{shipdata.toggle.error}]]*/ 'Sichtbarkeit konnte nicht geaendert werden.',
            resetSuccess: /*[[#{notification.success.ship_unfitted}]]*/ 'Alle Schiffe zurueckgesetzt.',
            resetError:   /*[[#{error.shipdata.unfit.failed}]]*/ 'Zuruecksetzen fehlgeschlagen.'
        };
        var conflict = {
            title:                /*[[#{frontend.ajax.conflict.title}]]*/ 'Konflikt',
            reloadDetailFallback: /*[[#{frontend.ajax.conflict.detail}]]*/ 'Bitte neu laden.',
            reloadLabel:          /*[[#{frontend.ajax.conflict.reload}]]*/ 'Aktuelle Werte laden',
            dismissLabel:         /*[[#{frontend.ajax.conflict.dismiss}]]*/ 'Schliessen',
            reloadQuestion:       /*[[#{frontend.ajax.conflict.question}]]*/ 'Aktuelle Werte laden?'
        };

        // Visibility toggle: intercept the per-row form submit and flip the affected row in place
        // (button label + secondary style + dimmed opacity), updating the hidden input so the next
        // toggle sends the opposite value. Delegated on document so it needs no per-row binding.
        document.addEventListener('submit', function (e) {
            var form = e.target;
            if (!form.classList || !form.classList.contains('js-visibility-toggle')) {
                return;
            }
            e.preventDefault();
            var hiddenInput = form.querySelector('input[name="hidden"]');
            var desired = hiddenInput ? hiddenInput.value === 'true' : true;
            var btn = form.querySelector('button[type="submit"]');
            if (btn) {
                btn.disabled = true;
            }
            window.krtFetch
                .write({
                    method: 'POST',
                    url: form.getAttribute('action') + '?hidden=' + desired,
                    toast: false,
                    errorMessage: i18n.toggleError,
                    conflict: conflict,
                    onSuccess: function () {
                        var row = form.closest('tr');
                        if (row) {
                            row.style.opacity = desired ? '0.5' : '';
                        }
                        if (hiddenInput) {
                            hiddenInput.value = (!desired).toString();
                        }
                        if (btn) {
                            btn.textContent = desired
                                ? form.getAttribute('data-label-show')
                                : form.getAttribute('data-label-hide');
                            btn.classList.toggle('btn-secondary', !desired);
                        }
                        if (window.showFrontendSuccessToast) {
                            window.showFrontendSuccessToast(i18n.saved);
                        }
                    },
                })
                .then(function () {
                    if (btn) {
                        btn.disabled = false;
                    }
                });
        });

        // Reset-all-fitted: drive the confirm button through krtFetch, then close the modal + toast.
        window.krtEvents.on('click', 'shipdata-reset', function (el) {
            el.disabled = true;
            window.krtFetch
                .write({
                    method: 'POST',
                    url: /*[[@{/ship-data/reset-fitted}]]*/ '/ship-data/reset-fitted',
                    toast: false,
                    errorMessage: i18n.resetError,
                    conflict: conflict,
                    onSuccess: function () {
                        closeModal('reset-fitted-confirm-modal');
                        if (window.showFrontendSuccessToast) {
                            window.showFrontendSuccessToast(i18n.resetSuccess);
                        }
                    },
                })
                .then(function () {
                    el.disabled = false;
                });
        });
    })();
    /*]]>*/
</script>
</body>
</html>
