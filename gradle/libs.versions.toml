## Generated by $ ./gradlew refreshVersionsCatalog

[plugins]

spring-boot = { id = "org.springframework.boot", version.ref = "springBoot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "springDependencyManagement" }
cyclonedx-bom = { id = "org.cyclonedx.bom", version.ref = "cyclonedx" }
# Build-tooling plugins, consolidated here from the per-module build scripts so the single source of
# truth lives in this catalog and `./gradlew refreshVersions` surfaces updates for them too.
spotbugs-base = { id = "com.github.spotbugs-base", version.ref = "spotbugs" }
pitest = { id = "info.solidsoft.pitest", version.ref = "pitest" }
node-gradle = { id = "com.github.node-gradle.node", version.ref = "nodeGradle" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
owasp-dependencycheck = { id = "org.owasp.dependencycheck", version.ref = "owaspDependencycheck" }

[versions]

springBoot = "4.1.0"
springDependencyManagement = "1.1.7"
cyclonedx = "3.2.4"
testcontainers = "2.0.5"
flyway = "12.9.0"
mapstruct = "1.6.3"
##     ⬆ = "1.7.0.Beta1"
# Stay on 1.6.x stable; only 1.7.0.Beta1 is available upstream as of 2026-06.
resilience4j = "2.4.0"
bucket4j = "8.19.0"
semver4j = "6.0.0"
logstashLogback = "9.0"
archunit = "1.4.2"
springdocOpenapi = "3.0.3"
okhttp3 = "5.4.0"
playwright = "1.60.0"
axeCorePlaywright = "4.11.3"
jetbrainsAnnotations = "26.1.0"
lombokMapstructBinding = "0.2.0"
openpdf = "3.0.5"
commonmark = "0.29.0"
# Build-tooling versions, consolidated from the module build scripts (see the [plugins] note above).
# google-java-format, checkstyle and the Pitest JUnit5 plugin are wired by version string rather than
# as plugins; the matching version-tracking [libraries] entries below let refreshVersions check them.
# `node` pins the Node.js runtime downloaded by the node-gradle plugin and is not a Maven artifact, so
# refreshVersions cannot track it — bump it by hand against the active Node LTS line.
spotbugs = "6.5.8"
pitest = "1.19.0"
pitestJunit5 = "1.2.3"
nodeGradle = "7.1.0"
spotless = "8.7.0"
owaspDependencycheck = "12.2.2"
findsecbugs = "1.14.0"
checkstyle = "13.6.0"
googleJavaFormat = "1.35.0"
node = "24.17.0"
# Keycloak server SPI artifacts for the keycloak-spi provider module (Discord
# federation + first-login gate, epic #720). Pin to the highest 26.6.x patch — the
# floating `quay.io/keycloak/keycloak:26.6` runtime tag resolves to it; SPI APIs are
# stable across a minor, so an exact match avoids any load-time surprises.
keycloak = "26.6.4"
# JUnit pinned explicitly for the keycloak-spi module only — it has no Spring Boot
# dependency-management to supply a JUnit version, unlike backend/frontend. Kept in
# lockstep with the JUnit version Spring Boot 4.1.0 manages for those modules (6.0.3)
# so the whole repo runs one JUnit, rather than chasing the newest upstream release.
junit = "6.0.3"

[libraries]

testcontainers-junit = { module = "org.testcontainers:testcontainers-junit-jupiter", version.ref = "testcontainers" }
testcontainers-postgresql = { module = "org.testcontainers:testcontainers-postgresql", version.ref = "testcontainers" }
flyway-core = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-postgresql = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway" }
mapstruct-core = { module = "org.mapstruct:mapstruct", version.ref = "mapstruct" }
mapstruct-processor = { module = "org.mapstruct:mapstruct-processor", version.ref = "mapstruct" }
resilience4j-spring-boot3 = { module = "io.github.resilience4j:resilience4j-spring-boot3", version.ref = "resilience4j" }
resilience4j-reactor = { module = "io.github.resilience4j:resilience4j-reactor", version.ref = "resilience4j" }
micrometer-context-propagation = { module = "io.micrometer:context-propagation" }
bucket4j-core = { module = "com.bucket4j:bucket4j_jdk17-core", version.ref = "bucket4j" }
semver4j-core = { module = "org.semver4j:semver4j", version.ref = "semver4j" }
logstash-logback-encoder = { module = "net.logstash.logback:logstash-logback-encoder", version.ref = "logstashLogback" }
archunit-core = { module = "com.tngtech.archunit:archunit", version.ref = "archunit" }
springdoc-openapi-starter-webmvc-api = { module = "org.springdoc:springdoc-openapi-starter-webmvc-api", version.ref = "springdocOpenapi" }
okhttp3-mockwebserver = { module = "com.squareup.okhttp3:mockwebserver", version.ref = "okhttp3" }
playwright = { module = "com.microsoft.playwright:playwright", version.ref = "playwright" }
axe-core-playwright = { module = "com.deque.html.axe-core:playwright", version.ref = "axeCorePlaywright" }
jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrainsAnnotations" }
lombok-mapstruct-binding = { module = "org.projectlombok:lombok-mapstruct-binding", version.ref = "lombokMapstructBinding" }
openpdf-core = { module = "com.github.librepdf:openpdf", version.ref = "openpdf" }
commonmark-core = { module = "org.commonmark:commonmark", version.ref = "commonmark" }
# FindSecBugs detector plugin, loaded into the manually-registered spotbugsMain task via the
# `spotbugsPlugins` configuration in each module build script.
findsecbugs-plugin = { module = "com.h3xstream.findsecbugs:findsecbugs-plugin", version.ref = "findsecbugs" }
# Version-tracking aliases only (NOT declared as dependencies anywhere): the Checkstyle CLI,
# google-java-format and the Pitest JUnit5 plugin are configured by version string in the build
# scripts. Mapping their coordinates here lets `./gradlew refreshVersions` annotate available updates
# for them alongside everything else; the generated `libs.*` accessors are intentionally unused.
checkstyle = { module = "com.puppycrawl.tools:checkstyle", version.ref = "checkstyle" }
google-java-format = { module = "com.google.googlejavaformat:google-java-format", version.ref = "googleJavaFormat" }
pitest-junit5-plugin = { module = "org.pitest:pitest-junit5-plugin", version.ref = "pitestJunit5" }
keycloak-server-spi = { module = "org.keycloak:keycloak-server-spi", version.ref = "keycloak" }
keycloak-server-spi-private = { module = "org.keycloak:keycloak-server-spi-private", version.ref = "keycloak" }
keycloak-services = { module = "org.keycloak:keycloak-services", version.ref = "keycloak" }
keycloak-core = { module = "org.keycloak:keycloak-core", version.ref = "keycloak" }
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
