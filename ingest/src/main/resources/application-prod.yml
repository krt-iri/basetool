spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

# OpenAPI document is disabled in prod (parity with the backend) — never reachable from outside.
springdoc:
  api-docs:
    enabled: false

app:
  ingest:
    backend-base-url: ${BACKEND_URL:https://backend:11261}
    frontend-base-url: ${FRONTEND_URL}
