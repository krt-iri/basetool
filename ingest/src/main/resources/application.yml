server:
  port: 11262
  # Behind nginx-proxy-manager (TLS terminated at the proxy). `native` routes X-Forwarded-* through
  # Tomcat's RemoteIpValve, which only honours the header from a TRUSTED internal proxy (its default
  # internal-proxies regex covers the Docker private ranges, including the NPM hop). Unlike
  # `framework`, this stops an external client spoofing an arbitrary X-Forwarded-For to mint a fresh
  # per-IP rate-limit budget (security audit INGEST-RATELIMIT-1). The enforceable throttle is the
  # per-subject limiter; this only hardens the coarse per-IP front line.
  forward-headers-strategy: native
  max-http-request-header-size: 65536
  shutdown: graceful
  ssl:
    # The gateway serves HTTPS on 11262, mirroring backend/frontend (REQ-INGEST-001). nginx-proxy-
    # manager terminates the public TLS and re-encrypts to this connector over https:// on the
    # internal network (NPM upstream: scheme https, upstream-certificate verification OFF, since the
    # shared cert is self-signed). The SERVER_SSL_KEY_STORE / SERVER_SSL_KEY_STORE_PASSWORD env vars
    # feed BOTH this server connector AND the `backend-trust` SSL *bundle* (the truststore that
    # validates the backend's self-signed https://backend:11261 cert — see application-prod.yml); the
    # same PKCS12 file serves as both server identity and trust anchor. The Docker HEALTHCHECK probes
    # https://localhost:11262/... with --no-check-certificate (self-signed). The test profile disables
    # this connector (application-test.yml) since the MOCK web environment ships no keystore.
    enabled: true
    key-store: ${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: basetool

spring:
  application:
    name: ingest
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  messages:
    fallback-to-system-locale: false
  web:
    error:
      whitelabel:
        enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak.profit-base.online/realms/iri}

app:
  ingest:
    backend-base-url: ${BACKEND_URL:https://backend:11261}
    frontend-base-url: ${FRONTEND_URL:https://app.profit-base.online}
    refinery-path: /refinery-orders/create
    blueprint-path: /personal-inventory/blueprints
    handoff-ttl: PT5M
    max-payload-bytes: 2097152
  rate-limit:
    enabled: true
    capacity: 30
    refill-tokens: 30
    refill-period: PT1M
  security:
    jwt:
      # Opt-in audience check. Empty by default; set to `basetool-backend` ONLY after both the
      # extractor and frontend tokens carry that audience (docs/INGEST_KEYCLOAK_SETUP.md).
      expected-audiences: ${APP_SECURITY_JWT_EXPECTED_AUDIENCES:}
  monitoring:
    scrape:
      # Basic-auth credentials for GET /actuator/prometheus (REQ-OBS-005, ADR-0065). Fail-closed:
      # when either variable is unset/blank, MonitoringScrapeSecurityConfig denies every request
      # to the endpoint. Set both only where a Prometheus scraper actually runs; never commit
      # real values.
      username: ${MONITORING_SCRAPE_USER:}
      password: ${MONITORING_SCRAPE_PASSWORD:}

# Resilience4j around the backend relay. HTTP response errors are ignored (a 400 envelope reject is
# a client problem, not a backend-health signal); only transport failures open the breaker.
resilience4j:
  circuitbreaker:
    instances:
      backend:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        ignore-exceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException

logging:
  level:
    root: INFO
    io.github.resilience4j: INFO

# Actuator: expose `health` (Docker HEALTHCHECK / compose service_healthy gating; bare status)
# plus `prometheus` for the monitoring scrape (REQ-OBS-005). `/actuator/prometheus` is NOT
# public: MonitoringScrapeSecurityConfig guards it with fail-closed basic auth (denyAll until
# MONITORING_SCRAPE_USER/PASSWORD are set).
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
  metrics:
    tags:
      # Common tag on every meter; the Grafana "Spring Boot apps" dashboard selects the
      # module through this `application` label (epic #936 dashboard set).
      application: basetool-ingest
  tracing:
    export:
      otlp:
        # Second half of the master gate: without the monitoring stack the OTLP span exporter
        # bean is not even instantiated (Boot gates it via ConditionalOnEnabledTracingExport;
        # belt and braces on top of management.opentelemetry.enabled below).
        enabled: ${MONITORING_TRACING_ENABLED:false}
    sampling:
      # Only honored while tracing is enabled. Low traffic makes full sampling affordable;
      # revisited in the Phase-3 tuning (epic #936).
      probability: ${MONITORING_TRACING_SAMPLING_PROBABILITY:1.0}
  opentelemetry:
    # Master gate for distributed tracing (REQ-OBS-009, epic #936 Phase 1b). Default false keeps
    # dev/test/e2e and a prod host without the monitoring stack inert: no OTel tracer, no span
    # exporter, no export attempts (Boot leaves only no-op propagators behind). Phase 2 sets
    # MONITORING_TRACING_ENABLED=true together with the OTLP endpoint below. Boot 4 note: THIS
    # flag is the gate the OTel tracing auto-configuration actually honours
    # (@ConditionalOnEnabledOpenTelemetry); the legacy `management.tracing.enabled` is not
    # consumed by any Boot 4.1 auto-configuration (verified against the module bytecode) and an
    # endpoint-only gate is likewise not possible - tracing would be active by default.
    enabled: ${MONITORING_TRACING_ENABLED:false}
    resource-attributes:
      # Align the trace service name with the `application` metric tag so Grafana's
      # logs<->traces<->metrics correlation uses one identity per module.
      "service.name": basetool-ingest
    tracing:
      export:
        otlp:
          # OTLP HTTP endpoint of the span collector (Phase 2: Alloy on the scrape network,
          # http://alloy:4318/v1/traces). Only honored while tracing is enabled.
          endpoint: ${MONITORING_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
