# Login-theme message overrides for the krt-theme (epic #720, Discord login).
# Keycloak merges these with the parent (keycloak) theme's login messages.
discordMembershipDenied=Anmeldung abgelehnt. Du musst ein verifiziertes Mitglied von DAS KARTELL sein - im das-kartell Discord und mit der Rolle KRT-Mitglied -, um dich mit Discord anzumelden.
discordAccountAlreadyExists=Anmeldung abgelehnt. Es existiert bereits ein Konto mit diesem Benutzernamen oder Server-Nicknamen. Wenn es dein Konto ist, verbinde es in den Kontoeinstellungen mit Discord, anstatt dich neu zu registrieren. Andernfalls wende dich an einen Admin.
