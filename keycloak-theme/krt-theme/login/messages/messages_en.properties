# Login-theme message overrides for the krt-theme (epic #720, Discord login).
# Keycloak merges these with the parent (keycloak) theme's login messages.
discordMembershipDenied=Login denied. You must be a verified DAS KARTELL member - in the das-kartell Discord and holding the KRT-Mitglied role - to sign in with Discord.
discordAccountAlreadyExists=Login denied. An account with this username or server nickname already exists. If it is yours, link it to Discord in your account settings instead of registering again. Otherwise, contact an admin.
